const MAX_UNDO = 100;
function useProjectState(initial) {
  const [state, setState] = useState(initial);
  const undoStack = useRef([]), redoStack = useRef([]);
  const dispatch = useCallback((fn) => {
    setState(prev => { const next = fn(prev); undoStack.current = [...undoStack.current.slice(-MAX_UNDO + 1), prev]; redoStack.current = []; return next; });
  }, []);
  const undo = useCallback(() => {
    setState(prev => { if (!undoStack.current.length) return prev; const snap = undoStack.current[undoStack.current.length - 1]; undoStack.current = undoStack.current.slice(0, -1); redoStack.current = [prev, ...redoStack.current]; return snap; });
  }, []);
  const redo = useCallback(() => {
    setState(prev => { if (!redoStack.current.length) return prev; const snap = redoStack.current[0]; redoStack.current = redoStack.current.slice(1); undoStack.current = [...undoStack.current, prev]; return snap; });
  }, []);
  const loadProject = useCallback((rawProject) => {
    const migrated = migrateProject(rawProject);
    validateProject(migrated);
    undoStack.current = [];
    redoStack.current = [];
    setState(migrated);
  }, []);
  return { project: state, dispatch, undo, redo, loadProject, canUndo: undoStack.current.length > 0, canRedo: redoStack.current.length > 0 };
}
// === GRAPH ENGINE ============================================================
// =============================================================================
// Kahn's algorithm for topological sort via upstreamStepIds.
// Public API: topoSort(steps), detectCycles(steps)
// =============================================================================

function detectCycles(steps) {
  const visited = new Set(), inStack = new Set(), cycleIds = new Set();
  const dfs = (id) => {
    if (inStack.has(id)) { cycleIds.add(id); return true; }
    if (visited.has(id)) return false;
    visited.add(id); inStack.add(id);
    const step = steps.find(s => s.id === id);
    if (step) for (const upId of (step.upstreamStepIds || [])) { if (dfs(upId)) cycleIds.add(id); }
    inStack.delete(id); return false;
  };
  for (const s of steps) dfs(s.id);
  return [...cycleIds];
}

function topoSort(steps) {
  if (!steps.length) return [];
  const inDegree = {}, adj = {};
  for (const s of steps) { inDegree[s.id] = inDegree[s.id] || 0; adj[s.id] = adj[s.id] || []; }
  for (const s of steps) {
    for (const upId of (s.upstreamStepIds || [])) {
      if (!adj[upId]) adj[upId] = []; adj[upId].push(s.id);
      inDegree[s.id] = (inDegree[s.id] || 0) + 1;
    }
  }
  const queue = steps.filter(s => (inDegree[s.id] || 0) === 0).map(s => s.id), result = [];
  const stepMap = Object.fromEntries(steps.map(s => [s.id, s]));
  while (queue.length) {
    const id = queue.shift(); result.push(stepMap[id]);
    for (const nextId of (adj[id] || [])) { if (--inDegree[nextId] === 0) queue.push(nextId); }
  }
  if (result.length !== steps.length) {
    const cycleIds = detectCycles(steps);
    return { error: `Cycle detected involving: ${cycleIds.map(id => stepMap[id]?.name || id).join(", ")}` };
  }
  return result;
}

// =============================================================================
// === DURATION ENGINE =========================================================
// =============================================================================
// Heuristic duration per operation type (SPEC Section 4).
//
// Public API:
//   resolveDuration(op, project) -> DurationResult | null
//   computeAllDurations(project) -> { [opId]: DurationResult | null }
//
// DurationResult: { calculated, unit, formula, inputValues, source }
// USER_SPECIFIED_DURATION_TYPES return null (no auto-calc).
// =============================================================================

function resolveDuration(op, project) {
  if (USER_SPECIFIED_DURATION_TYPES.has(op.type)) return null;
  const equip = project.equipment.find(e => e.id === op.primaryEquipmentId);
  const mat = project.materials.find(m => m.id === op.materialId);
  const compoundById = Object.fromEntries((project.compounds || []).map(c => [c.id, c]));
  const settings = project.settings;
  // CC-016: pump rate is now per-operation; falls back to DEFAULT_PUMP_RATE constant
  const pumpRate = op.pumpRate ?? DEFAULT_PUMP_RATE;
  const fmt = (n, d = 3) => parseFloat(n.toFixed(d));
  // Formula/input/source strings are rendered directly in calc popovers for traceability.

  switch (op.type) {
    case "addition": {
      const state = mat?.physicalState || "liquid";
      const amount = op.amount;
      if (!amount) return null;
      if (state === "solid") {
        const density = mat?.density ?? 1.0;
        const massKg = amountToKg(amount, op.unit, mat, compoundById, density);
        // Per-op rate takes priority over global settings (v46: operation-level config).
        const pctPerHour = Math.max(0.001, normalizeNumber(op.solidAdditionPctPerHour ?? settings?.solidAdditionPctPerHour, 25));
        if (massKg <= 0) return null;
        const durationH = 100 / pctPerHour;
        return {
          calculated: fmt(durationH), unit: "h",
          formula: "Assume solids are dosed as a percent of planned charge per hour.",
          inputValues: `Charge mass: ${fmt(massKg, 1)} kg; solid-addition rate: ${fmt(pctPerHour, 2)} %/h`,
          source: op.solidAdditionPctPerHour != null ? `Solid-addition rate: ${fmt(pctPerHour, 2)} %/h (set on this operation)` : "Solid additions use percent of planned amount per hour (default 25 %/h)."
        };
      } else if (state === "slurry") {
        const vol = amountToL(amount, op.unit, mat, compoundById, mat?.density ?? 1.0);
        if (vol <= 0) return null;
        const rate = pumpRate * 0.6;
        return {
          calculated: fmt(vol / rate), unit: "h",
          formula: "Assume slurry transfer runs at 60% of the configured pump rate.",
          inputValues: `Slurry volume: ${fmt(vol, 2)} L; effective pump rate: ${fmt(rate, 2)} L/h (from ${fmt(pumpRate, 2)} L/h nominal)`,
          source: op.pumpRate != null ? `Pump rate: ${pumpRate} L/h (set on this operation, slurry: 60% of nominal)` : `Pump rate: ${DEFAULT_PUMP_RATE} L/h (default -- set on operation to override; slurry: 60% of nominal)`
        };
      } else {
        const vol = amountToL(amount, op.unit, mat, compoundById, mat?.density ?? 1.0);
        if (vol <= 0) return null;
        return {
          calculated: fmt(vol / pumpRate), unit: "h",
          formula: "Duration is transfer volume divided by pump rate.",
          inputValues: `Liquid volume: ${fmt(vol, 2)} L; pump rate: ${fmt(pumpRate, 2)} L/h`,
          source: op.pumpRate != null ? `Pump rate: ${pumpRate} L/h (set on this operation)` : `Pump rate: ${DEFAULT_PUMP_RATE} L/h (default -- set on operation to override)`
        };
      }
    }
    case "transfer": {
      const vol = op.amount
        ? amountToL(op.amount, op.unit, mat, compoundById, mat?.density ?? 1.0)
        : (equip?.maxWorkingVolume ?? null);
      if (!vol) return null;
      return {
        calculated: fmt(vol / pumpRate), unit: "h",
        formula: "Duration is transfer volume divided by pump rate.",
        inputValues: `Transfer volume: ${fmt(vol, 2)} L; pump rate: ${fmt(pumpRate, 2)} L/h`,
        source: op.pumpRate != null ? `Pump rate: ${pumpRate} L/h (set on this operation)` : `Pump rate: ${DEFAULT_PUMP_RATE} L/h (default -- set on operation to override)`
      };
    }
    case "filtration": {
      const vol = equip?.maxWorkingVolume ?? 100;
      // Midpoint heuristics are fixed constants so schedule comparisons stay stable.
      return {
        calculated: fmt(vol / 112.5), unit: "h",
        formula: "Assume filtration throughput of 112.5 L/h (midpoint heuristic).",
        inputValues: `Reference volume: ${fmt(vol, 2)} L; filtration rate: 112.5 L/h`,
        source: `Filtration rate: 112.5 L/h (midpoint 75 -- 150 L/h)${equip ? `; ${equip.id}` : ""}`
      };
    }
    case "distillation": {
      const vol = op.amount
        ? amountToL(op.amount, op.unit, mat, compoundById, mat?.density ?? 1.0)
        : (equip?.maxWorkingVolume ?? 100);
      // Midpoint heuristics are fixed constants so schedule comparisons stay stable.
      return {
        calculated: fmt(vol / 35), unit: "h",
        formula: "Assume distillation throughput of 35 L/h (midpoint heuristic).",
        inputValues: `Reference volume: ${fmt(vol, 2)} L; distillation rate: 35 L/h`,
        source: `Distillation rate: 35 L/h (midpoint 20 -- 50 L/h)${equip ? `; ${equip.id}` : ""}`
      };
    }
    case "heat_cool": {
      const targetT = op.temperature; if (targetT == null) return null;
      const ambientT = 20, deltaT = Math.abs(targetT - ambientT);
      if (deltaT === 0) return { calculated: 0, unit: "h", formula: "No temperature change is required.", inputValues: `Target equals ambient (${ambientT} degC).`, source: "Ambient reference 20 degC" };
      return {
        calculated: fmt(deltaT / 1.5 / 60), unit: "h",
        formula: "Use absolute temperature delta and a 1.5 degC/min ramp rate.",
        inputValues: `Target: ${targetT} degC; ambient: ${ambientT} degC; delta: ${deltaT} degC`,
        source: "Heating/cooling rate: 1.5 degC/min; reference: 20 degC ambient"
      };
    }
    case "ipc":
      return {
        calculated: 1, unit: "h", formula: "Use the slower concurrent path between PRD and QC checks.",
        inputValues: "PRD: 0.5 h concurrent with QC: 1 h",
        source: "Scheduling: 1 h elapsed; both departments charge concurrently"
      };
    case "release_testing":
      return {
        calculated: 4, unit: "h", formula: "Use standard fixed release-testing duration.",
        inputValues: "4 h (QC only)", source: "Release testing standard duration (SPEC sec.4)"
      };
    case "inert_purge":
      return {
        calculated: 0.5, unit: "h", formula: "Use standard fixed inert-purge duration.",
        inputValues: "0.5 h", source: "Inert/purge standard duration (SPEC sec.4)"
      };
    case "ipc_cleaning":
      return {
        calculated: 3, unit: "h", formula: "Use standard fixed in-process cleaning duration.",
        inputValues: "3 h", source: "In-process cleaning standard (SPEC sec.4)"
      };
    case "changeover_cleaning":
      return {
        calculated: 6, unit: "h", formula: "Use standard fixed changeover-cleaning duration.",
        inputValues: "6 h", source: "Changeover cleaning standard (SPEC sec.4)"
      };
    case "staging":
      return {
        calculated: 6, unit: "h", formula: "Use standard fixed staging duration.",
        inputValues: "6 h", source: "Staging standard duration (SPEC sec.4)"
      };
    case "packaging":
      {
        const massKg = amountToKg(op.amount ?? 0, op.unit, mat, compoundById, mat?.density ?? 1.0);
        // Per-op rate takes priority over global settings (v46: operation-level config).
        const packagingRate = op.packagingRateKgPerH ?? project.settings?.packagingRateKgPerH ?? 100;
        if (massKg > 0) {
          return {
            calculated: fmt(massKg / packagingRate), unit: "h",
            formula: "Duration is packaged mass divided by configured packaging rate.",
            inputValues: `Package mass: ${fmt(massKg, 2)} kg; packaging rate: ${fmt(packagingRate, 1)} kg/h`,
            source: op.packagingRateKgPerH != null ? `Packaging rate: ${fmt(packagingRate, 1)} kg/h (set on this operation)` : `Packaging rate: ${fmt(packagingRate, 1)} kg/h (default 100 kg/h)`
          };
        }
        return {
          calculated: 2, unit: "h", formula: "Fallback fixed packaging duration when package mass is unavailable.",
          inputValues: "No package mass set", source: "Fallback duration when package amount is missing"
        };
      }
    default: return null;
  }
}

function computeAllDurations(project) {
  const result = {};
  for (const op of project.operations) result[op.id] = resolveDuration(op, project);
  return result;
}

// =============================================================================
// === MASS FLOW ENGINE ========================================================
// =============================================================================
// Tracks vessel inventory across all operations in topological + sequence order.
//
// Public API:
//   runMassFlow(project, sortedSteps) -> MassFlowResult
//
// MassFlowResult: { stepBalances, vesselInventory, stepOutputMassByStepId,
//   materialOutputMassByMaterialId, error }
// StepBalance: { stepId, stepName, massIn, massOut, unaccounted, balanced, flagged }
// =============================================================================

function runMassFlow(project, sortedSteps) {
  if (!sortedSteps || sortedSteps.error) {
    return {
      stepBalances: [],
      vesselInventory: {},
      stepOutputMassByStepId: {},
      materialOutputMassByMaterialId: {},
      error: sortedSteps?.error ?? "Sort error",
    };
  }
  const tol = project.settings?.massBalanceTolerance ?? 0.05;
  const inventory = {};  // equipId -> matId -> massKg
  const getMat = id => project.materials.find(m => m.id === id);
  const compoundById = Object.fromEntries((project.compounds || []).map(c => [c.id, c]));
  const stepById = Object.fromEntries((sortedSteps || []).map(s => [s.id, s]));
  const stepOutputMassByStepId = {};
  const materialOutputMassByMaterialId = {};
  const consumedUpstreamMaterialByStep = new Set();

  const toKg = (amount, unit, mat) => {
    return amountToKg(amount, unit, mat, compoundById, mat?.density ?? 1.0);
  };
  const ensure = id => { if (!inventory[id]) inventory[id] = {}; };
  const addInv = (eq, matId, kg) => { if (!eq || !kg || kg <= 0) return; ensure(eq); inventory[eq][matId || "_u"] = (inventory[eq][matId || "_u"] || 0) + kg; };
  const removeInv = (eq, matId, kg) => { if (!eq || !kg || kg <= 0) return; ensure(eq); const k = matId || "_u"; inventory[eq][k] = Math.max(0, (inventory[eq][k] || 0) - kg); };
  const removeProportional = (eq, kg) => {
    if (!eq || !kg || kg <= 0) return 0;
    ensure(eq);
    const total = totalMass(eq);
    if (total <= 0) return 0;
    const frac = Math.min(1, kg / total);
    for (const [mid, mass] of Object.entries(inventory[eq])) {
      inventory[eq][mid] = Math.max(0, mass * (1 - frac));
    }
    return total * frac;
  };
  const totalMass = eq => { if (!inventory[eq]) return 0; return Object.values(inventory[eq]).reduce((s, m) => s + m, 0); };
  const inferInventoryDensity = (eq, fallback = 1.0) => {
    if (!eq) return fallback;
    ensure(eq);
    let totalKg = 0;
    let totalVolL = 0;
    for (const [matId, massKg] of Object.entries(inventory[eq] || {})) {
      if (!massKg || massKg <= 0) continue;
      totalKg += massKg;
      const mat = getMat(matId);
      const density = getMaterialDensity(mat, compoundById, null);
      if (density && density > 0) totalVolL += massKg / density;
      else totalVolL += massKg / fallback;
    }
    if (totalKg <= 0 || totalVolL <= 0) return fallback;
    const inferred = totalKg / totalVolL;
    return (Number.isFinite(inferred) && inferred > 0) ? inferred : fallback;
  };
  const volumeToInventoryKg = (eq, amountL) => {
    const volL = normalizeNumber(amountL, null);
    if (!volL || volL <= 0) return 0;
    return volL * inferInventoryDensity(eq, 1.0);
  };
  const transferAll = (from, to) => {
    if (!from || !to) return; ensure(from); ensure(to);
    for (const [mid, mass] of Object.entries(inventory[from])) inventory[to][mid] = (inventory[to][mid] || 0) + mass;
    inventory[from] = {};
  };
  const resolveUpstreamMassForMaterial = (step, materialId) => {
    if (!materialId) return 0;
    let total = 0;
    for (const upId of (step.upstreamStepIds || [])) {
      const upStep = stepById[upId];
      if (!upStep || upStep.intermediateOutputMaterialId !== materialId) continue;
      total += stepOutputMassByStepId[upId] || 0;
    }
    return total;
  };

  // CC-040: Track which step loaded each equipment vessel so cross-step
  // transfers can credit massIn to the receiving step.
  const equipOwnerStep = {};  // equipId -> stepId that first added mass to it

  const stepBalances = [];
  for (const step of sortedSteps) {
    let massIn = 0, massOut = 0;
    const touchedEquipIds = new Set();
    const flatOps = (step.itemIds || []).flatMap(id => {
      const directOp = project.operations.find(o => o.id === id && !o.compositeOperationId);
      if (directOp) return [directOp];
      const comp = project.compositeOperations.find(c => c.id === id);
      if (comp) return (comp.operationIds || []).map(oid => project.operations.find(o => o.id === oid)).filter(Boolean);
      return [];
    });

    for (const op of flatOps) {
      const mat = getMat(op.materialId), eq = op.primaryEquipmentId, sec = op.secondaryEquipmentId;
      if (eq) touchedEquipIds.add(eq);
      if (sec) touchedEquipIds.add(sec);
      switch (op.type) {
        case "addition": {
          let kg = toKg(op.amount, op.unit, mat);
          const upstreamKey = `${step.id}::${op.materialId || "_none"}`;
          if (kg <= 0 && eq && op.materialId && !consumedUpstreamMaterialByStep.has(upstreamKey)) {
            kg = resolveUpstreamMassForMaterial(step, op.materialId);
            if (kg > 0) consumedUpstreamMaterialByStep.add(upstreamKey);
          }
          if (kg > 0 && eq) {
            addInv(eq, op.materialId, kg);
            massIn += kg;
            // Record this step as the owner of this equipment's inventory
            if (!equipOwnerStep[eq]) equipOwnerStep[eq] = step.id;
          }
          break;
        }
        case "transfer": {
          if (eq && sec) {
            const massBefore = totalMass(eq);
            const hasExplicitAmount = !!(op.amount && op.amount > 0);
            let reqKg = 0;
            if (hasExplicitAmount) {
              reqKg = toKg(op.amount, op.unit, mat);
              if ((op.unit || "kg") === "L" && reqKg <= 0) {
                reqKg = volumeToInventoryKg(eq, op.amount);
              }
            } else if (op.materialId) {
              reqKg = resolveUpstreamMassForMaterial(step, op.materialId);
            }
            let movedKg = 0;
            if (massBefore > 0 && reqKg > 0) {
              const frac = Math.min(1, reqKg / massBefore); ensure(eq); ensure(sec);
              for (const [mid, mass] of Object.entries(inventory[eq])) { const moved = mass * frac; inventory[sec][mid] = (inventory[sec][mid] || 0) + moved; inventory[eq][mid] = mass - moved; movedKg += moved; }
            } else if (!hasExplicitAmount) {
              movedKg = massBefore;
              transferAll(eq, sec);
            }
            // CC-040: Account for cross-step transfers in mass balance.
            // If the source equipment was loaded by a different step, credit
            // massIn to this (receiving) step.
            if (movedKg > 0) {
              const sourceStep = equipOwnerStep[eq] || null;
              if (sourceStep && sourceStep !== step.id) {
                // Cross-step transfer: mass enters this step from an upstream one
                massIn += movedKg;
              }
              // Update ownership: destination now belongs to this step
              equipOwnerStep[sec] = step.id;
            }
          }
          break;
        }
        case "reaction": {
          if (!eq) break;
          const total = totalMass(eq);
          if (total <= 0) break;
          const ry = Math.max(0, Math.min(100, normalizeNumber(op.reactionYield, 100))) / 100;
          // Approximate non-converted mass as unresolved process loss.
          const unresolvedKg = total * (1 - ry) * 0.05;
          if (unresolvedKg > 0) massOut += removeProportional(eq, unresolvedKg);
          break;
        }
        case "filtration": { if (eq && sec) { transferAll(eq, sec); equipOwnerStep[sec] = step.id; } break; }
        case "distillation": {
          const kg = toKg(op.amount, op.unit, mat);
          if (kg > 0 && eq) { const k = op.materialId || "_dist"; const ex = (inventory[eq]?.[k] || 0); const rm = Math.min(kg, ex > 0 ? ex : totalMass(eq)); removeInv(eq, k, rm); massOut += rm; }
          break;
        }
        case "loss": {
          let kg = toKg(op.amount, op.unit, mat);
          if ((op.unit || "kg") === "L" && kg <= 0) {
            kg = volumeToInventoryKg(eq, op.amount);
          }
          if (kg > 0 && eq) {
            const hasComposition = Array.isArray(op.lossComposition) && op.lossComposition.length > 0;
            if (hasComposition || !op.materialId) {
              massOut += removeProportional(eq, kg);
            } else {
              removeInv(eq, op.materialId || "_loss", kg);
              massOut += kg;
            }
          }
          break;
        }
        default: break;
      }
    }
    if (step.intermediateOutputMaterialId) {
      const stepYieldFactor = Math.max(0, Math.min(100, normalizeNumber(step.yield, 100))) / 100;
      const reactionYieldFactor = flatOps
        .filter(o => o.type === "reaction")
        .reduce((acc, o) => acc * (Math.max(0, Math.min(100, normalizeNumber(o.reactionYield, 100))) / 100), 1);
      const outputFactor = stepYieldFactor * reactionYieldFactor;
      let baseOutputKg = 0;
      if (step.keyEquipmentId) baseOutputKg = totalMass(step.keyEquipmentId);
      if (baseOutputKg <= 0) {
        baseOutputKg = Array.from(touchedEquipIds).reduce((sum, eqId) => sum + totalMass(eqId), 0);
      }
      const outputKg = Math.max(0, baseOutputKg * outputFactor);
      stepOutputMassByStepId[step.id] = outputKg;
      materialOutputMassByMaterialId[step.intermediateOutputMaterialId] =
        (materialOutputMassByMaterialId[step.intermediateOutputMaterialId] || 0) + outputKg;
      // CC-041: Credit step output (product remaining in vessel) as massOut.
      // Without this, mass retained as product appears as "unaccounted".
      massOut += outputKg;
    }
    const unaccounted = massIn - massOut;
    const flagged = massIn > 0 && Math.abs(unaccounted / massIn) > tol;
    stepBalances.push({
      stepId: step.id, stepName: step.name, massIn: parseFloat(massIn.toFixed(2)),
      massOut: parseFloat(massOut.toFixed(2)), unaccounted: parseFloat(unaccounted.toFixed(2)), balanced: !flagged, flagged
    });
  }
  const vesselInventory = Object.fromEntries(Object.entries(inventory).map(([k, v]) => [k, { ...v }]));
  return { stepBalances, vesselInventory, stepOutputMassByStepId, materialOutputMassByMaterialId, error: null };
}

// =============================================================================
// === COST ENGINE =============================================================
// =============================================================================
// Computes material, equipment, and labor costs from resolved durations.
//
// Public API:
//   computeCosts(project, massFlowResult, durationMap) -> CostResult
//
// CostResult: { totalBatchCost, byStep: StepCost[], byCategory, bom }
// StepCost:   { stepId, stepName, materialCost, equipmentCost, laborCost, total }
// BomRow:     { materialId, materialName, totalKg, unitCostPerKg, totalCost, opCount }
// =============================================================================

function _getOpDurationH(op, durationMap) {
  const d = op.duration;
  if (d.isOverridden && d.override != null) {
    const v = d.unit === "min" ? d.override / 60 : d.override;
    return Number.isFinite(v) ? v : 0;
  }
  const calc = durationMap[op.id];
  if (!calc || calc.calculated == null) return 0;
  const v = calc.unit === "min" ? calc.calculated / 60 : calc.calculated;
  return Number.isFinite(v) ? v : 0;
}

function computeCosts(project, massFlowResult, durationMap) {
  if (!project || !durationMap) return null;
  const prdRate = (project.laborRates || []).find(r => r.department === "PRD")?.rate ?? 100;
  const qcRate = (project.laborRates || []).find(r => r.department === "QC")?.rate ?? 150;
  const compoundById = Object.fromEntries((project.compounds || []).map(c => [c.id, c]));
  const equipById = Object.fromEntries((project.equipment || []).map(e => [e.id, e]));
  const materialById = Object.fromEntries((project.materials || []).map(m => [m.id, m]));
  const allOps = project.operations || [];
  const stepCostMap = {};
  const bomAccum = {};

  for (const op of allOps) {
    const stepId = op.stepId;
    if (!stepCostMap[stepId]) stepCostMap[stepId] = { materialCost: 0, equipmentCost: 0, laborCost: 0 };
    const sc = stepCostMap[stepId];
    const durationH = _getOpDurationH(op, durationMap);

    if (op.type === "addition") {
      const mat = materialById[op.materialId];
      if (mat && op.amount) {
        const massKg = amountToKg(op.amount, op.unit, mat, compoundById, mat.density ?? 1.0);
        if (massKg > 0 && mat.composition && mat.composition.length > 0) {
          let opMatCost = 0;
          for (const { compoundId, fraction } of mat.composition) {
            const compound = compoundById[compoundId];
            if (compound && compound.unitCost) opMatCost += massKg * (fraction ?? 0) * compound.unitCost;
          }
          sc.materialCost += opMatCost;
          const effectiveCostPerKg = mat.composition.reduce((sum, { compoundId, fraction }) => {
            const c = compoundById[compoundId]; return sum + (c?.unitCost ?? 0) * (fraction ?? 0);
          }, 0);
          if (!bomAccum[mat.id]) bomAccum[mat.id] = { totalKg: 0, totalCost: 0, opCount: 0, unitCostPerKg: effectiveCostPerKg };
          bomAccum[mat.id].totalKg += massKg;
          bomAccum[mat.id].totalCost += opMatCost;
          bomAccum[mat.id].opCount += 1;
        }
      }
    }

    if (op.primaryEquipmentId && durationH > 0) {
      const equip = equipById[op.primaryEquipmentId];
      if (equip && equip.hourlyRate) sc.equipmentCost += durationH * equip.hourlyRate;
    }

    if (op.type === "ipc") {
      sc.laborCost += 0.5 * prdRate + 1.0 * qcRate;
    } else if (op.type === "ipc_cleaning" || op.type === "changeover_cleaning") {
      sc.laborCost += durationH * prdRate;
      sc.laborCost += durationH * qcRate;
    } else if (op.type === "release_testing") {
      sc.laborCost += 4.0 * qcRate;
    } else if (durationH > 0) {
      sc.laborCost += durationH * prdRate;
    }
  }

  const bom = Object.entries(bomAccum).map(([matId, acc]) => ({
    materialId: matId,
    materialName: materialById[matId]?.name ?? matId,
    totalKg: parseFloat(acc.totalKg.toFixed(3)),
    unitCostPerKg: parseFloat(acc.unitCostPerKg.toFixed(4)),
    totalCost: parseFloat(acc.totalCost.toFixed(2)),
    opCount: acc.opCount,
  }));

  const byStep = (project.steps || []).map(step => {
    const sc = stepCostMap[step.id] || { materialCost: 0, equipmentCost: 0, laborCost: 0 };
    return {
      stepId: step.id, stepName: step.name,
      materialCost: parseFloat(sc.materialCost.toFixed(2)),
      equipmentCost: parseFloat(sc.equipmentCost.toFixed(2)),
      laborCost: parseFloat(sc.laborCost.toFixed(2)),
      total: parseFloat((sc.materialCost + sc.equipmentCost + sc.laborCost).toFixed(2)),
    };
  });

  const byCategory = {
    materials: parseFloat(byStep.reduce((s, r) => s + r.materialCost, 0).toFixed(2)),
    equipment: parseFloat(byStep.reduce((s, r) => s + r.equipmentCost, 0).toFixed(2)),
    labor: parseFloat(byStep.reduce((s, r) => s + r.laborCost, 0).toFixed(2)),
  };

  return {
    totalBatchCost: parseFloat((byCategory.materials + byCategory.equipment + byCategory.labor).toFixed(2)),
    byStep, byCategory, bom,
  };
}

// =============================================================================
// === SCHEDULE ENGINE =========================================================
// =============================================================================
// Assigns start/end times to operations using a greedy sequential scheduler.
//
// Public API:
//   buildSchedule(project, sortedSteps, durationMap) -> Schedule
//
// Schedule: { scheduledOps: ScheduledOp[], totalDuration: number }
// ScheduledOp: { opId, equipId, startTime, endTime, department, hasEquipOverlap }
// =============================================================================

function buildSchedule(project, sortedSteps, durationMap) {
  if (!sortedSteps || sortedSteps.length === 0) return { scheduledOps: [], totalDuration: 0 };
  const scheduledOps = [];
  const stepEndTime = {};

  for (const step of sortedSteps) {
    const upstreamEnd = (step.upstreamStepIds || []).reduce((max, sid) => Math.max(max, stepEndTime[sid] ?? 0), 0);
    let cursor = upstreamEnd;

    const allStepOps = [];
    for (const itemId of (step.itemIds || [])) {
      const op = project.operations.find(o => o.id === itemId && !o.compositeOperationId);
      const comp = project.compositeOperations?.find(c => c.id === itemId);
      if (op) {
        allStepOps.push(op);
      } else if (comp) {
        for (const childId of (comp.operationIds || [])) {
          const childOp = project.operations.find(o => o.id === childId);
          if (childOp) allStepOps.push(childOp);
        }
      }
    }

    for (const op of allStepOps) {
      const durationH = _getOpDurationH(op, durationMap);
      const equipId = op.primaryEquipmentId || null;
      if (op.type === "ipc") {
        scheduledOps.push({ opId: op.id, equipId, startTime: cursor, endTime: cursor + 0.5, department: "PRD", hasEquipOverlap: false });
        scheduledOps.push({ opId: op.id + "_qc", equipId: null, startTime: cursor, endTime: cursor + 1.0, department: "QC", hasEquipOverlap: false });
        cursor += 1.0;
      } else {
        const endTime = cursor + durationH;
        scheduledOps.push({ opId: op.id, equipId, startTime: cursor, endTime, department: op.type === "release_testing" ? "QC" : "PRD", hasEquipOverlap: false });
        cursor = endTime;
      }
    }
    stepEndTime[step.id] = cursor;
  }

  const equipOps = scheduledOps.filter(o => o.equipId);
  for (let i = 0; i < equipOps.length; i++) {
    for (let j = i + 1; j < equipOps.length; j++) {
      if (equipOps[i].equipId === equipOps[j].equipId) {
        if (Math.min(equipOps[i].endTime, equipOps[j].endTime) > Math.max(equipOps[i].startTime, equipOps[j].startTime) + 0.001) {
          equipOps[i].hasEquipOverlap = true;
          equipOps[j].hasEquipOverlap = true;
        }
      }
    }
  }

  return { scheduledOps, totalDuration: parseFloat(scheduledOps.reduce((max, o) => Math.max(max, o.endTime), 0).toFixed(3)) };
}

// =============================================================================
// === GREEN METRICS ENGINE ====================================================
// =============================================================================
// Computes green chemistry metrics from mass flow data.
//
// Public API:
//   computeGreenMetrics(project, massFlowResult) -> GreenMetricsResult
//
// GreenMetricsResult: {
//   totalMassIn: number,       // kg -- sum of all Addition inputs
//   productMassOut: number,    // kg -- explicit (CC-015) or last-step heuristic
//   productTrackingMode: "explicit" | "heuristic",  // CC-015
//   productCompoundNames: string[],  // CC-015: names of flagged product compounds
//   pmi: number | null,        // Process Mass Intensity = totalMassIn / productMassOut
//   solventMassIn: number,     // kg -- additions where material.type === "solvent"
//   solventFraction: number,   // 0-1
//   wasteKg: number,           // totalMassIn - productMassOut
//   byMaterialType: { [type]: { massIn: number, fraction: number } }
//   atomEconomy: number | null  // stub: MW product / sum(MW reactants) if data present
// }
// =============================================================================

function computeGreenMetrics(project, massFlowResult) {
  if (!massFlowResult || massFlowResult.error) return null;
  const compoundById = Object.fromEntries((project.compounds || []).map(c => [c.id, c]));

  // Aggregate additions by material type
  const byType = {};
  let totalMassIn = 0;

  const addOps = project.operations.filter(o => o.type === "addition");
  for (const op of addOps) {
    const mat = project.materials.find(m => m.id === op.materialId);
    const kg = amountToKg(op.amount, op.unit, mat, compoundById, mat?.density ?? 1.0);
    if (kg <= 0) continue;
    const mtype = mat?.type ?? "unknown";
    if (!byType[mtype]) byType[mtype] = { massIn: 0, fraction: 0 };
    byType[mtype].massIn += kg;
    totalMassIn += kg;
  }

  // Compute fractions
  for (const t of Object.keys(byType)) {
    byType[t].fraction = totalMassIn > 0 ? byType[t].massIn / totalMassIn : 0;
  }

  // CC-015: Explicit product tracking
  // Find compounds flagged isProduct=true, then find materials containing them,
  // and sum their remaining mass from the final vessel inventory.
  const productCompounds = (project.compounds || []).filter(c => !!c.isProduct);
  const productCompoundIds = new Set(productCompounds.map(c => c.id));
  const productCompoundNames = productCompounds.map(c => c.name || c.symbol || c.id);

  let productMassOut = 0;
  let productTrackingMode = "heuristic";

  if (productCompoundIds.size > 0) {
    // Find materials whose composition contains at least one product compound
    const productMatIds = new Set(
      (project.materials || [])
        .filter(m => (m.composition || []).some(x => productCompoundIds.has(x.compoundId)))
        .map(m => m.id)
    );

    if (productMatIds.size > 0) {
      // Priority 1: step output propagation map from mass flow engine.
      const outByMat = massFlowResult.materialOutputMassByMaterialId || {};
      let explicitKgFromOutput = 0;
      for (const matId of productMatIds) {
        explicitKgFromOutput += normalizeNumber(outByMat[matId], 0) || 0;
      }
      if (explicitKgFromOutput > 0) {
        productMassOut = explicitKgFromOutput;
        productTrackingMode = "explicit";
      } else {
        // Priority 2: remaining inventory fallback.
        const inv = massFlowResult.vesselInventory || {};
        let explicitKg = 0;
        for (const equipId of Object.keys(inv)) {
          for (const [matId, kg] of Object.entries(inv[equipId] || {})) {
            if (productMatIds.has(matId)) explicitKg += kg;
          }
        }
        if (explicitKg > 0) {
          productMassOut = explicitKg;
          productTrackingMode = "explicit";
        }
      }
    }
  }

  if (productTrackingMode === "heuristic") {
    // Fallback: sum of final step mass inputs minus mass outs (last-step proxy)
    const balances = massFlowResult.stepBalances || [];
    const lastBalance = balances[balances.length - 1];
    productMassOut = lastBalance
      ? Math.max(0, lastBalance.massIn - lastBalance.massOut)
      : 0;
  }

  const pmi = (productMassOut > 0 && totalMassIn > 0)
    ? parseFloat((totalMassIn / productMassOut).toFixed(2))
    : null;

  const wasteKg = Math.max(0, totalMassIn - productMassOut);

  // Split waste into aqueous and organic fractions.
  // v46: uses material.isAqueous (set explicitly at creation or seeded from the
  // legacy name-based heuristic during migration). Falls back to false if not set.
  // The aqueous input mass is an upper bound on aqueous waste; the remainder is organic.
  let aqueousMassIn = 0;
  for (const op of addOps) {
    const mat = project.materials.find(m => m.id === op.materialId);
    const kg = amountToKg(op.amount, op.unit, mat, compoundById, mat?.density ?? 1.0);
    if (kg <= 0) continue;
    if (mat?.isAqueous === true) aqueousMassIn += kg;
  }
  const aqueousWasteKg = Math.min(wasteKg, aqueousMassIn);
  const organicWasteKg = Math.max(0, wasteKg - aqueousWasteKg);

  return {
    totalMassIn: parseFloat(totalMassIn.toFixed(2)),
    productMassOut: parseFloat(productMassOut.toFixed(2)),
    productTrackingMode,                // CC-015
    productCompoundNames,               // CC-015
    pmi,
    wasteKg: parseFloat(wasteKg.toFixed(2)),
    aqueousWasteKg: parseFloat(aqueousWasteKg.toFixed(2)),
    organicWasteKg: parseFloat(organicWasteKg.toFixed(2)),
    byMaterialType: byType,
  };
}

// =============================================================================
// === BATCH ENGINE ============================================================
// =============================================================================
// Computes a batch scale factor and per-step volume utilisation.
//
// Public API:
//   solveDAGBatchCounts(project, sortedSteps, rawVolumeMap) -> DAGResult     CC-003
//   computeBatchSizing(project, massFlowResult, greenMetrics, sortedSteps) -> BatchResult | null
//
// BatchResult: {
//   mode:                 "target_output"
//   scaleFactor:          number           // multiplier applied to all operation amounts
//   baseAmount:           number | null
//   targetAmount:         number | null
//   stepVolumes:          StepVolume[]
//   scaledBom:            ScaledBomRow[]
//   warnings:             string[]
//   branchReconciliation: BranchEdge[]
//   dagBatchCounts:       { [stepId]: number }   // CC-003: DAG-propagated batch counts
// }
//
// StepVolume: {
//   stepId, stepName, equipName
//   baseVolL:            number    // unscaled own-op volume (L) -- explicit additions only
//   ownScaledVolL:       number    // baseVolL * scaleFactor                  CC-003
//   upstreamContribVolL: number    // volume from upstream intermediate flows  CC-003
//   scaledVolL:          number    // ownScaledVolL + upstreamContribVolL      CC-003
//   maxVol, minVol:      number | null
//   batchCount:          number    // DAG-propagated                          CC-003
//   perBatchVolL:        number    // scaledVolL / batchCount
//   utilizationPct:      number | null
//   exceeds:             boolean
//   belowMin:            boolean
//   dagPropagated:       boolean   // true if upstream flow changed batchCount CC-003
// }
//
// ScaledBomRow: { materialId, matName, baseKg, perBatchKg, scaledKg }
//   CC-004: scaledKg = baseKg * scaleFactor * stepBatchCount (total across all batches)
// =============================================================================

// CC-003: DAG Quantity Solver
// Propagates batch counts forward through the topo-sorted step DAG.
// For each step, the total load is own explicit-addition volume PLUS any volume
// flowing in as intermediate material from upstream steps.
//
// An upstream contribution is detected when a step has an addition op with
// op.amount <= 0 (i.e. not explicitly sized) whose materialId matches the
// intermediateOutputMaterialId of an upstream step.
//
// Returns: {
//   dagCounts:              { [stepId]: number }  -- DAG-propagated batch counts
//   stepPerBatchOutVolL:    { [stepId]: number }  -- per-batch output volume after yield
//   stepUpstreamContribVolL:{ [stepId]: number }  -- upstream vol added to total load
// }
function solveDAGBatchCounts(project, sortedSteps, rawVolumeMap) {
  const dagCounts = {};
  const stepPerBatchOutVolL = {};
  const stepUpstreamContribVolL = {};

  for (const step of (Array.isArray(sortedSteps) ? sortedSteps : [])) {
    const sv = rawVolumeMap[step.id];
    if (!sv) {
      dagCounts[step.id] = 1;
      stepPerBatchOutVolL[step.id] = 0;
      stepUpstreamContribVolL[step.id] = 0;
      continue;
    }

    // Own explicitly-sized operations (already globally scaled)
    const ownLoad = sv.ownScaledVolL;
    let upstreamLoad = 0;

    // Detect zero-amount additions that draw from upstream intermediate outputs
    const seenMaterialIds = new Set();
    for (const op of project.operations) {
      if (op.stepId !== step.id || op.type !== "addition") continue;
      if (op.amount && op.amount > 0) continue;          // explicit -- already counted
      // Deduplicate by material so a repeated placeholder op does not double count load.
      if (!op.materialId || seenMaterialIds.has(op.materialId)) continue;
      for (const upId of (step.upstreamStepIds || [])) {
        const upStep = project.steps.find(s => s.id === upId);
        if (!upStep || upStep.intermediateOutputMaterialId !== op.materialId) continue;
        const upBatches = dagCounts[upId] ?? 1;
        const upPerBatch = stepPerBatchOutVolL[upId] ?? 0;
        upstreamLoad += upBatches * upPerBatch;
        seenMaterialIds.add(op.materialId);
        break;
      }
    }

    const totalLoadL = ownLoad + upstreamLoad;
    const capacity = sv.capacityVolL;
    let batchCount;
    if (capacity && capacity > 0 && totalLoadL > 0) {
      batchCount = Math.max(1, Math.ceil(totalLoadL / capacity));
    } else {
      // Respect user/equipment fallback count when capacity math is not available.
      batchCount = Math.max(1, sv.batchCount);
    }

    dagCounts[step.id] = batchCount;
    stepUpstreamContribVolL[step.id] = upstreamLoad;

    // Per-batch output volume: input * combined yield
    const perBatchInputL = batchCount > 0 ? totalLoadL / batchCount : totalLoadL;
    const stepYieldFrac = Math.max(0, Math.min(100, normalizeNumber(step.yield, 100))) / 100;
    const rxnYieldFrac = project.operations
      .filter(o => o.stepId === step.id && o.type === "reaction")
      .reduce((acc, o) => acc * (Math.max(0, Math.min(100, normalizeNumber(o.reactionYield, 100))) / 100), 1);
    stepPerBatchOutVolL[step.id] = perBatchInputL * stepYieldFrac * rxnYieldFrac;
  }

  return { dagCounts, stepPerBatchOutVolL, stepUpstreamContribVolL };
}

function computeBatchSizing(project, massFlowResult, greenMetrics, sortedSteps) {
  const cfg = project.batchSizingConfig;
  if (!cfg) return null;
  const compoundById = Object.fromEntries((project.compounds || []).map(c => [c.id, c]));

  const emptyResult = (extra = {}) => ({
    mode: "target_output", scaleFactor: 1, baseAmount: null, targetAmount: null,
    stepVolumes: [], scaledBom: [], warnings: [], branchReconciliation: [], ...extra,
  });

  let scaleFactor = 1.0;
  let baseAmount = null;
  let targetAmount = null;
  const warnings = [];

  if (!cfg.targetMass || cfg.targetMass <= 0) return emptyResult();
  const productMass = greenMetrics?.productMassOut ?? 0;
  if (productMass <= 0) {
    return emptyResult({ warnings: ["Cannot scale: product mass is zero. Check mass balance and addition operations."] });
  }
  baseAmount = productMass;
  targetAmount = cfg.targetMass;
  scaleFactor = targetAmount / baseAmount;

  // Guardrails: keep target-output mode finite even with very small base output mass.
  scaleFactor = Math.max(0.0001, scaleFactor);

  // --- Per-step volume utilisation (own-op volumes) ---
  const stepOverrideMap = cfg.stepOverrides || {};
  const rawStepVolumes = project.steps.map(step => {
    const stepOps = project.operations.filter(o => o.stepId === step.id);
    const equip = project.equipment.find(e => e.id === step.keyEquipmentId);
    let totalVolL = 0;
    for (const op of stepOps) {
      if (op.type !== "addition" && op.type !== "transfer") continue;
      if (!op.amount || op.amount <= 0) continue;
      const mat = project.materials.find(m => m.id === op.materialId);
      totalVolL += amountToL(op.amount, op.unit, mat, compoundById, mat?.density ?? 1.0);
    }
    const ownScaledVolL = totalVolL * scaleFactor;
    const overrideBatchSizeL = normalizeNumber(stepOverrideMap?.[step.id]?.batchSizeL, null);
    const maxVol = equip?.maxWorkingVolume ?? null;
    const minVol = equip?.minWorkingVolume ?? null;
    const capacityVolL = overrideBatchSizeL ?? maxVol ?? null;
    const ownBatchCount = (capacityVolL && capacityVolL > 0 && ownScaledVolL > 0)
      ? Math.max(1, Math.ceil(ownScaledVolL / capacityVolL))
      : 1;
    return {
      stepId: step.id, stepName: step.name || ("Step " + step.sequence),
      equipName: equip?.name ?? null,
      baseVolL: parseFloat(totalVolL.toFixed(2)),
      ownScaledVolL: parseFloat(ownScaledVolL.toFixed(2)),
      upstreamContribVolL: 0,
      scaledVolL: parseFloat(ownScaledVolL.toFixed(2)),
      overrideBatchSizeL, capacityVolL, maxVol, minVol,
      batchCount: ownBatchCount,
      dagPropagated: false,
    };
  });

  // --- CC-003: DAG Quantity Solver (propagate upstream volumes) ---
  const rawVolumeMap = Object.fromEntries(rawStepVolumes.map(sv => [sv.stepId, sv]));
  // Fallback to project order only if topo output is unavailable; DAG solver still runs.
  const effectiveSorted = Array.isArray(sortedSteps) && sortedSteps.length > 0
    ? sortedSteps : project.steps;
  const { dagCounts, stepUpstreamContribVolL } = solveDAGBatchCounts(project, effectiveSorted, rawVolumeMap);

  const stepVolumes = rawStepVolumes.map(sv => {
    const dagBatchCount = dagCounts[sv.stepId] ?? sv.batchCount;
    const upstreamContribVolL = stepUpstreamContribVolL[sv.stepId] ?? 0;
    const dagPropagated = dagBatchCount !== sv.batchCount || upstreamContribVolL > 0;
    const totalScaledVolL = sv.ownScaledVolL + upstreamContribVolL;
    const perBatchVolL = dagBatchCount > 0 ? totalScaledVolL / dagBatchCount : totalScaledVolL;
    const utilizationPct = (sv.capacityVolL && sv.capacityVolL > 0)
      ? (perBatchVolL / sv.capacityVolL) * 100 : null;
    const exceeds = sv.capacityVolL ? perBatchVolL > sv.capacityVolL : false;
    const belowMin = (sv.minVol && perBatchVolL > 0 && perBatchVolL < sv.minVol);
    return {
      ...sv,
      upstreamContribVolL: parseFloat(upstreamContribVolL.toFixed(2)),
      scaledVolL: parseFloat(totalScaledVolL.toFixed(2)),
      batchCount: dagBatchCount,
      dagPropagated,
      perBatchVolL: parseFloat(perBatchVolL.toFixed(2)),
      utilizationPct: utilizationPct !== null ? parseFloat(utilizationPct.toFixed(1)) : null,
      exceeds, belowMin,
    };
  });

  // Build constraint warnings
  for (const sv of stepVolumes) {
    if (sv.exceeds) warnings.push(`Step "${sv.stepName}": ${sv.perBatchVolL.toFixed(0)} L exceeds ${sv.equipName ?? "vessel"} capacity ${sv.capacityVolL} L`);
    if (sv.belowMin) warnings.push(`Step "${sv.stepName}": ${sv.perBatchVolL.toFixed(0)} L is below ${sv.equipName ?? "vessel"} min ${sv.minVol} L`);
  }

  // --- Branch reconciliation ---
  const countByStep = Object.fromEntries(stepVolumes.map(sv => [sv.stepId, sv.batchCount]));
  const branchReconciliation = [];
  for (const step of project.steps) {
    for (const upId of (step.upstreamStepIds || [])) {
      const upstreamBatches = countByStep[upId] ?? 1;
      const downstreamBatches = countByStep[step.id] ?? 1;
      const surplusBatches = Math.max(0, upstreamBatches - downstreamBatches);
      const deficitBatches = Math.max(0, downstreamBatches - upstreamBatches);
      if (surplusBatches > 0 || deficitBatches > 0) {
        branchReconciliation.push({
          fromStepId: upId,
          toStepId: step.id,
          upstreamBatches,
          downstreamBatches,
          surplusBatches,
          deficitBatches,
        });
      }
      if (surplusBatches > 0 && !cfg.allowExcessIntermediate) {
        // Keep this as a warning (not hard error) so users can inspect branch data first.
        const upStep = project.steps.find(s => s.id === upId);
        warnings.push(`Branch mismatch: "${upStep?.name ?? upId}" produces ${upstreamBatches} batch(es) for "${step.name}" requiring ${downstreamBatches}. Enable excess intermediate to allow this.`);
      }
    }
  }

  // --- CC-004: Scaled BOM with per-step DAG batch counts ---
  const bomMap = {};
  for (const op of project.operations) {
    if (op.type !== "addition" || !op.materialId || !op.amount || op.amount <= 0) continue;
    const mat = project.materials.find(m => m.id === op.materialId);
    const kg = amountToKg(op.amount, op.unit, mat, compoundById, mat?.density ?? 1.0);
    if (kg <= 0) continue;
    const stepBatchCount = dagCounts[op.stepId] ?? 1; // CC-004: per-step batch count
    if (!bomMap[op.materialId]) {
      bomMap[op.materialId] = { materialId: op.materialId, matName: mat?.name ?? "Unknown", baseKg: 0, perBatchKg: 0, scaledKg: 0 };
    }
    bomMap[op.materialId].baseKg += kg;
    bomMap[op.materialId].perBatchKg += kg * scaleFactor;
    bomMap[op.materialId].scaledKg += kg * scaleFactor * stepBatchCount; // total across all batches
  }
  const scaledBom = Object.values(bomMap).map(r => ({
    materialId: r.materialId,
    matName: r.matName,
    baseKg: parseFloat(r.baseKg.toFixed(3)),
    perBatchKg: parseFloat(r.perBatchKg.toFixed(3)),
    scaledKg: parseFloat(r.scaledKg.toFixed(3)),
  }));

  return {
    mode: "target_output",
    scaleFactor: parseFloat(scaleFactor.toFixed(5)),
    baseAmount: baseAmount !== null ? parseFloat(baseAmount.toFixed(3)) : null,
    targetAmount: targetAmount !== null ? parseFloat(targetAmount.toFixed(3)) : null,
    stepVolumes,
    scaledBom,
    warnings,
    branchReconciliation,
    dagBatchCounts: dagCounts, // CC-003
  };
}

};
const MONO = "ui-monospace, 'SF Mono', 'Cascadia Code', 'Consolas', monospace";

// Standard data-table header and cell styles used across read-only tabs.
const TBL = {
  thS: {
    padding: "8px 12px", textAlign: "left", fontSize: "11px", fontWeight: 700,

  numS: { fontFamily: MONO, fontSize: "13px" },
};

// USD formatters: fmtUSD shows 2 decimal places; fmtUSD0 shows none.
function fmtUSD(n) { return n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtUSD0(n) { return n.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }

// Smart significant-figure formatters (v38).
// These replace ad-hoc toFixed() calls throughout the UI for consistent display.
// Rule: 3 significant figures for physical quantities (kg, L), 4 for ratios/equiv.
function fmtSig(n, sig) {
  // Format n to `sig` significant figures, trimming trailing zeros.
  if (n == null || !isFinite(n)) return "--";
  if (n === 0) return "0";
  const p = sig - 1 - Math.floor(Math.log10(Math.abs(n)));
  if (p < 0) return n.toFixed(0);
  const s = n.toFixed(p);
  // Trim trailing decimal zeros only when there's a decimal point
  return s.includes(".") ? s.replace(/\.?0+$/, "") : s;
}
// Mass in kg: 3 sig figs, with g conversion for values < 1 kg.
function fmtKgSig(v) {
  if (v == null || !isFinite(v)) return "--";
  if (v < 0.001) return fmtSig(v * 1e6, 3) + " ug";
  if (v < 1) return fmtSig(v * 1000, 3) + " g";
  return fmtSig(v, 3) + " kg";
}
// Volume in L: 3 sig figs.
function fmtLSig(v) {
  if (v == null || !isFinite(v)) return "--";
  if (v < 0.001) return fmtSig(v * 1000, 3) + " mL";
  return fmtSig(v, 3) + " L";
}
// Molar equivalents: 4 sig figs + equiv label.
function fmtEquivSig(v) {
  if (v == null || !isFinite(v)) return "--";
  return fmtSig(v, 4) + " equiv.";
}

// Durations in h/d with consistent significant-figure formatting.
function fmtDurationSig(hours) {
  if (hours == null || !isFinite(hours) || hours < 0) return "--";
  if (hours < 24) return `${fmtSig(hours, 3)} h`;
  return `${fmtSig(hours / 24, 3)} d`;
}

function fmtPctSig(v, sig = 3) {
  if (v == null || !isFinite(v)) return "--";
  return `${fmtSig(v, sig)}%`;
}

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function toLookupNumber(raw) {
  const n = typeof raw === "number" ? raw : parseFloat(raw);
  return isFinite(n) ? n : null;
}

// resolveLookupRows: accepts a root array or common wrapper-object shapes from
// different local DB export tools (compounds, records, items, data).
// If the shape is unrecognized, returns empty so normalizeLookupEntries produces
// a clear load error rather than a silent misparse.
function resolveLookupRows(parsed) {
  if (Array.isArray(parsed)) return parsed;
  if (!parsed || typeof parsed !== "object") return [];
  if (Array.isArray(parsed.compounds)) return parsed.compounds;
  if (Array.isArray(parsed.records)) return parsed.records;
  if (Array.isArray(parsed.items)) return parsed.items;
  if (Array.isArray(parsed.data)) return parsed.data;
  return [];
}

// normalizeLookupEntries: maps diverse row field names to a canonical shape.
// Accepts common variants (name/title, cas/CAS, smiles/SMILES, mw/molecularWeight)
// so a user can supply a DB export without pre-processing.
// Rows with no usable identifier (no title, CAS, or SMILES) are silently dropped.
function normalizeLookupEntries(rows) {
  if (!Array.isArray(rows)) return [];
  const out = [];
  rows.forEach((row, idx) => {
    if (!row || typeof row !== "object") return;
    const title = String(row.title || row.name || row.compound || "").trim();
    const cas = String(row.cas || row.casNumber || row.CAS || "").trim();
    const smiles = String(row.smiles || row.SMILES || row.isomericSmiles || "").trim();
    const molecularWeight = toLookupNumber(row.molecularWeight ?? row.mw ?? row.MolecularWeight);
    const density = toLookupNumber(row.density ?? row.densityKgL ?? row.density_kg_l);
    if (!title && !cas && !smiles) return;
    out.push({
      id: `lookup-${idx}`,
      title: title || cas || smiles,
      cas,
      smiles,
      molecularWeight: molecularWeight && molecularWeight > 0 ? molecularWeight : null,
      density: density && density > 0 ? density : null,
      source: String(row.source || row.dataset || "local").trim() || "local",
    });
  });
  return out;
}

function lookupCompoundInEntries(entries, query) {
  const q = String(query || "").trim().toLowerCase();
  if (!q || !Array.isArray(entries) || entries.length === 0) return null;
  const exactCas = entries.find(e => String(e.cas || "").toLowerCase() === q);
  if (exactCas) return exactCas;
  const exactSmiles = entries.find(e => String(e.smiles || "").toLowerCase() === q);
  if (exactSmiles) return exactSmiles;
  const exactTitle = entries.find(e => String(e.title || "").toLowerCase() === q);
  if (exactTitle) return exactTitle;
  return entries.find(e => (
    String(e.title || "").toLowerCase().includes(q)
    || String(e.cas || "").toLowerCase().includes(q)
    || String(e.smiles || "").toLowerCase().includes(q)
  )) || null;
}

// Derive batch-scaling values from a SimContext batchResult.
// Returns { sf, scaledBomMap, showScaled, totalBatches, hasBatchSizing }.
// Shared between CostTab and BomTab.
function deriveBatchScaling(batchResult) {
  const sf = batchResult?.scaleFactor ?? null;
  const scaledBomMap = {};
  if (sf && batchResult?.scaledBom) {
    batchResult.scaledBom.forEach(row => { scaledBomMap[row.materialId] = row.scaledKg; });
  }
  const showScaled = sf != null && Object.keys(scaledBomMap).length > 0;
  const batchCounts = Object.values(batchResult?.dagBatchCounts || {}).filter(v => isFinite(v) && v > 0);
  const totalBatches = batchCounts.length > 0 ? Math.max(...batchCounts) : 1;
  const hasBatchSizing = totalBatches > 1 || showScaled;
  return { sf, scaledBomMap, showScaled, totalBatches, hasBatchSizing };
}


// =============================================================================
// === SMILES RENDERER (CC-042) ================================================
// =============================================================================
// Renders 2D chemical structures from SMILES strings using SmilesDrawer.
// Falls back gracefully when SmiDrawer is not available (e.g. dev harness).
// =============================================================================

function SmilesRenderer({ smiles, width = 180, height = 120, theme = "light" }) {
  // CC-042 fix (v34): SmilesDrawer draws to a <canvas> element, not <img>.
  // Using a canvas ref ensures the library has a valid draw target.
  const canvasRef = useRef(null);
  const [error, setError] = useState(false);

  useEffect(() => {
    if (!smiles || typeof SmiDrawer === "undefined" || !canvasRef.current) {
      setError(false);
      return;
    }
    setError(false);
    try {
      const sd = new SmiDrawer({ width, height });
      sd.draw(smiles, canvasRef.current, theme, () => { setError(false); }, () => { setError(true); });
    } catch (_) {
      setError(true);
    }
  }, [smiles, width, height, theme]);

  if (!smiles) {
    return (
      <div style={{ width, height, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontSize: "9px", color: C.midDark, fontFamily: MONO }}>No SMILES</span>
      </div>
    );
  }

  if (typeof SmiDrawer === "undefined") {
    return (
      <div style={{ width, height, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2 }}>
        <span style={{ fontSize: "9px", color: C.midDark, fontFamily: MONO }}>SmiDrawer N/A</span>
        <span style={{ fontSize: "8px", color: C.blue, fontFamily: MONO, maxWidth: "90%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{smiles}</span>
      </div>
    );
  }

  return (
    <div style={{ width, height, display: "flex", alignItems: "center", justifyContent: "center", position: "relative" }}>
      <canvas ref={canvasRef} width={width} height={height} style={{ display: error ? "none" : "block" }} />
      {error && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
          <span style={{ fontSize: "9px", color: C.orange, fontFamily: MONO }}>Parse error</span>
          <span style={{ fontSize: "8px", color: C.midDark, fontFamily: MONO, maxWidth: "90%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{smiles.length > 22 ? smiles.slice(0, 20) + ".." : smiles}</span>
        </div>
      )}
    </div>
  );
}

// =============================================================================
// === TEMPLATE FIELD SYSTEM ===================================================
// =============================================================================
// CalcPopover: floating tooltip showing formula, inputs, and calculated result for
// any field that uses CalcInfoIcon. Uses position:fixed to avoid clipping by any
// overflow:hidden ancestor (e.g. StepCard). Coordinates are derived from
// getBoundingClientRect() of the icon element and re-computed on mouse-move to
// track scroll. Placement flips below the icon when viewport space above is limited.
// Do NOT revert to position:absolute -- it causes clipping in scrollable panels.
// =============================================================================

function CalcPopover({ result, anchorRect }) {
  if (!result || !anchorRect) return null;
  // Clamp left edge so the popover stays within the viewport regardless of icon position.
  const EST_W = 320;
  const EST_H = result.source ? 184 : 150;
  const popoverW = Math.min(EST_W, Math.max(220, window.innerWidth - 16));
  const centerX = anchorRect.left + anchorRect.width / 2;
  const left = clamp(centerX - popoverW / 2, 8, Math.max(8, window.innerWidth - popoverW - 8));
  const spaceAbove = anchorRect.top;
  const spaceBelow = window.innerHeight - anchorRect.bottom;
  const placeAbove = spaceAbove >= EST_H || (spaceAbove >= 120 && spaceAbove >= spaceBelow);
  const posStyle = placeAbove
    ? { bottom: `${window.innerHeight - anchorRect.top + 8}px` }
    : { top: `${clamp(anchorRect.bottom + 8, 8, Math.max(8, window.innerHeight - EST_H - 8))}px` };
  return (
    <div style={{
      position: "fixed", left: `${left}px`, width: `${popoverW}px`,
      background: C.dark, border: "1px solid #3a3935", borderRadius: "7px", padding: "10px 13px",
      zIndex: 9000, boxShadow: "0 6px 24px rgba(0,0,0,0.4)",
      pointerEvents: "none", whiteSpace: "normal", ...posStyle
    }}>
      <div style={{ display: "flex", flexDirection: "column", gap: "5px" }}>
        {[["Formula", result.formula, "#e8e6dc"], ["Inputs", result.inputValues, "#c8c5bd"]].map(([label, text, color]) => (
          <div key={label} style={{ display: "flex", gap: "8px", alignItems: "baseline" }}>
            <span style={{ fontSize: "9px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: C.midDark, width: "52px", flexShrink: 0 }}>{label}</span>
            <span style={{ fontSize: "11px", color, fontFamily: MONO }}>{text}</span>
          </div>
        ))}
        <div style={{ display: "flex", gap: "8px", alignItems: "baseline" }}>
          <span style={{ fontSize: "9px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: C.midDark, width: "52px", flexShrink: 0 }}>Result</span>
          <span style={{ fontSize: "12px", color: C.blue, fontFamily: MONO, fontWeight: 600 }}>{result.calculated} {result.unit}</span>
        </div>
        {result.source && (
          <div style={{ marginTop: "3px", paddingTop: "6px", borderTop: "1px solid #333330", fontSize: "10px", color: C.midDark, lineHeight: 1.5 }}>{result.source}</div>
        )}
      </div>
    </div>
  );
}

function CalcInfoIcon({ result, size = 10, color = C.blue }) {
  const [showPopover, setShowPopover] = useState(false);
  const [anchorRect, setAnchorRect] = useState(null);
  const iconRef = useRef(null);
  if (!result) return null;
  return (
    <span ref={iconRef} style={{ color, opacity: 0.75, lineHeight: 1, position: "relative", display: "inline-flex" }}
      onMouseEnter={e => {
        e.stopPropagation();
        if (iconRef.current) setAnchorRect(iconRef.current.getBoundingClientRect());
        setShowPopover(true);
      }}
      onMouseMove={() => { if (iconRef.current) setAnchorRect(iconRef.current.getBoundingClientRect()); }}
      onMouseLeave={() => setShowPopover(false)}
      onClick={e => e.stopPropagation()}>
      <Icon name="info" size={size} />
      {showPopover && <CalcPopover result={result} anchorRect={anchorRect} />}
    </span>
  );
}

function TemplateField({ value, displayValue, placeholder = " --", variant = "empty", onSave, inputType = "text",
  options = [], min, max, step = "any", suffix, onRevert, calcResult }) {
  const [editing, setEditing] = useState(false);
  const [local, setLocal] = useState("");
  const inputRef = useRef(null);

  useEffect(() => { if (editing) { inputRef.current?.focus(); if (inputRef.current?.select) inputRef.current.select(); } }, [editing]);

  const startEdit = () => { if (!onSave || inputType === null) return; setLocal(value != null ? String(value) : ""); setEditing(true); };
  const commit = () => {
    setEditing(false); if (!onSave) return;
    if (inputType === "number") { const parsed = local.trim() === "" ? null : parseFloat(local); if (parsed !== value) onSave(parsed); }
    else { const v = local.trim() || null; if (v !== (value ?? null)) onSave(v); }
  };
  const commitSelect = (v) => { setEditing(false); if (onSave && v !== (value ?? "")) onSave(v || null); };

  const underlines = {
    static: { borderBottom: "none", cursor: "default" },
    auto: { borderBottom: `1.5px solid ${C.blue}`, cursor: "pointer" },
    overridden: { borderBottom: `1.5px solid ${C.orange}`, cursor: "pointer" },
    user: { borderBottom: `1.5px solid ${C.border}`, cursor: "pointer" },
    empty: { borderBottom: `1.5px dashed ${C.midDark}`, cursor: "pointer" },
  };
  const spanStyle = {
    fontFamily: MONO, fontSize: "13px", padding: "0 2px",
    color: variant === "empty" ? C.midDark : C.dark, display: "inline-flex", alignItems: "center",
    gap: "3px", position: "relative", ...(underlines[variant] || underlines.empty)
  };
  const shown = displayValue != null ? displayValue : (value != null ? String(value) : null);

  if (editing) {
    const editStyle = {
      fontFamily: MONO, fontSize: "13px", background: "#fff",
      border: `1.5px solid ${C.blue}`, borderRadius: "3px", padding: "0 4px", outline: "none",
      color: C.dark, lineHeight: "1.6"
    };
    if (inputType === "select") return (
      <select ref={inputRef} value={local || ""} onChange={e => commitSelect(e.target.value)} onBlur={() => setEditing(false)} style={{ ...editStyle, minWidth: "80px" }}>
        <option value=""> -- select  --</option>
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    );
    return (
      <input ref={inputRef} type={inputType} value={local} min={min} max={max} step={step}
        onChange={e => setLocal(e.target.value)} onBlur={commit}
        onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); commit(); } if (e.key === "Escape") setEditing(false); }}
        style={{ ...editStyle, width: Math.max(60, (local.length + 2) * 8) + "px" }} />
    );
  }

  return (
    <span style={spanStyle} onClick={onSave ? startEdit : undefined}>
      <span>{shown ?? placeholder}</span>
      {suffix && <span style={{ color: C.midDark, fontFamily: "inherit", fontSize: "12px" }}>{suffix}</span>}
      {variant === "auto" && (
        <CalcInfoIcon result={calcResult} />
      )}
      {variant === "overridden" && onRevert && (
        <span onClick={e => { e.stopPropagation(); onRevert(); }} title="Revert to calculated"
          style={{ color: C.orange, opacity: 0.8, cursor: "pointer", lineHeight: 1 }}>
          <Icon name="revert" size={10} />
        </span>
      )}
    </span>
  );
}

// DurationField reads calculated values from SimContext  -- never stores in project
function DurationField({ op, dispatch, isAutoCalc = false }) {
  const { durationMap } = useContext(SimContext);
  const calcResult = isAutoCalc ? (durationMap[op.id] ?? null) : null;
  const dur = op.duration;
  const calcVal = calcResult?.calculated ?? null;
  const calcUnit = calcResult?.unit ?? "h";
  const displayVal = dur.isOverridden ? dur.override : calcVal;
  const displayUnit = dur.isOverridden ? dur.unit : calcUnit;
  let autoVariant = "empty";
  if (dur.isOverridden) {
    autoVariant = "overridden";
  } else if (calcVal != null) {
    autoVariant = "auto";
  }

  let variant = "empty";
  if (isAutoCalc) {
    variant = autoVariant;
  } else if (displayVal != null) {
    variant = "user";
  }

  return (
    <TemplateField
      value={displayVal}
      displayValue={displayVal != null ? `${displayVal} ${displayUnit}` : null}
      placeholder="duration" variant={variant} inputType="text"
      calcResult={isAutoCalc && !dur.isOverridden ? calcResult : null}
      onSave={(raw) => {
        if (!raw) { dispatch(p => updateOperation(p, op.id, { duration: { ...dur, override: null, isOverridden: false } })); return; }
        const parts = String(raw).trim().split(/\s+/);
        const num = parseFloat(parts[0]); const unit = parts[1] || "h";
        if (!isNaN(num)) dispatch(p => updateOperation(p, op.id, { duration: { ...dur, override: num, isOverridden: true, unit: ["h", "min"].includes(unit) ? unit : "h" } }));
      }}
      onRevert={dur.isOverridden ? () => dispatch(p => updateOperation(p, op.id, { duration: { ...dur, override: null, isOverridden: false } })) : undefined}
    />
  );
}

function EquipField({ equipmentId, project, dispatch, opId, fieldName = "primaryEquipmentId", equipFilter = null }) {
  const eq = project.equipment.find(e => e.id === equipmentId);
  const options = project.equipment
    .filter(e => !equipFilter || equipFilter(e))
    .map(e => ({ value: e.id, label: `${e.id} (${EQUIPMENT_TYPE_LABELS[e.type]})` }));
  return <TemplateField value={equipmentId} displayValue={eq?.id || null} placeholder="vessel"
    variant={eq ? "user" : "empty"} inputType="select"
    options={options}
    onSave={v => dispatch(p => updateOperation(p, opId, { [fieldName]: v }))} />;
}

function MatField({ materialId, project, dispatch, opId, placeholder = "material" }) {
  const mat = project.materials.find(m => m.id === materialId);
  return <TemplateField value={materialId} displayValue={mat?.name || null} placeholder={placeholder}
    variant={mat ? "user" : "empty"} inputType="select"
    options={project.materials.map(m => ({ value: m.id, label: m.name || m.id }))}
    onSave={v => dispatch(p => updateOperation(p, opId, { materialId: v }))} />;
}

function NumField({ value, field, opId, dispatch, placeholder = "amount", suffix }) {
  return <TemplateField value={value} placeholder={placeholder} variant={value != null ? "user" : "empty"}
    inputType="number" suffix={suffix} min={0} step="any"
    onSave={v => dispatch(p => updateOperation(p, opId, { [field]: v }))} />;
}

function UnitField({ value, opId, dispatch, options = AMOUNT_UNITS }) {
  return <TemplateField value={value || "L"} displayValue={value || "L"} variant="user"
    inputType="select" options={options.map(u => ({ value: u, label: u }))}
    onSave={v => dispatch(p => updateOperation(p, opId, { unit: v }))} />;
}

function toDisplayTemp(tempC, unit) {
  if (tempC == null) return null;
  return unit === "F" ? ((tempC * 9) / 5) + 32 : tempC;
}

function toCelsiusTemp(tempDisplay, unit) {
  if (tempDisplay == null) return null;
  return unit === "F" ? ((tempDisplay - 32) * 5) / 9 : tempDisplay;
}

function TempField({ value, opId, dispatch, tempUnit = "C" }) {
  const displayValue = toDisplayTemp(value, tempUnit);
  const suffix = tempUnit === "F" ? "\u00b0F" : "\u00b0C";
  return <TemplateField value={displayValue} placeholder="temp" variant={displayValue != null ? "user" : "empty"}
    suffix={suffix} inputType="number" step="any"
    onSave={v => dispatch(p => updateOperation(p, opId, { temperature: toCelsiusTemp(v, tempUnit) }))} />;
}

function TextField({ value, field, opId, dispatch, placeholder = "text" }) {
  return <TemplateField value={value} placeholder={placeholder} variant={value ? "user" : "empty"}
    inputType="text" onSave={v => dispatch(p => updateOperation(p, opId, { [field]: v }))} />;
}

function P({ children }) {
  return <span style={{ fontFamily: "inherit", fontSize: "13px", color: C.midDark }}>{children}</span>;
}

function ReactionStoichEditor({ op, project, dispatch }) {
  const reactants = op.reactants || [], products = op.products || [], reactionYield = op.reactionYield ?? 100;
  const updR = (i, f) => dispatch(p => updateOperation(p, op.id, { reactants: reactants.map((r, idx) => idx === i ? { ...r, ...f } : r) }));
  const updP = (i, f) => dispatch(p => updateOperation(p, op.id, { products: products.map((r, idx) => idx === i ? { ...r, ...f } : r) }));
  const addR = () => dispatch(p => updateOperation(p, op.id, { reactants: [...reactants, { label: "", molarEquiv: 1 }] }));
  const addP = () => dispatch(p => updateOperation(p, op.id, { products: [...products, { label: "", molarRatio: 1 }] }));
  const rmR = (i) => dispatch(p => updateOperation(p, op.id, { reactants: reactants.filter((_, idx) => idx !== i) }));
  const rmP = (i) => dispatch(p => updateOperation(p, op.id, { products: products.filter((_, idx) => idx !== i) }));
  const tbS = { width: "100%", borderCollapse: "collapse", fontSize: "12px", fontFamily: MONO };
  const thS = { textAlign: "left", padding: "4px 8px", color: C.midDark, fontSize: "10px", fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", borderBottom: `1px solid ${C.lightBorder}` };
  const tdS = { padding: "4px 8px", borderBottom: `1px solid ${C.lightBorder}`, color: C.dark };
  const ci = { background: C.lightHover, border: `1px solid ${C.border}`, borderRadius: "3px", padding: "2px 6px", fontSize: "12px", fontFamily: MONO, width: "100%", outline: "none", color: C.dark };
  return (
    <div style={{ marginTop: "10px", padding: "12px 14px", background: C.lightHover, borderRadius: "6px", border: `1px solid ${C.lightBorder}` }}>
      <div style={{ display: "flex", gap: "16px", alignItems: "flex-start" }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark, marginBottom: "6px" }}>Reactants</div>
          <table style={tbS}><thead><tr><th style={thS}>Label</th><th style={{ ...thS, width: "80px" }}>Equiv.</th><th style={{ ...thS, width: "28px" }}></th></tr></thead>
            <tbody>{reactants.map((r, i) => (<tr key={i}><td style={tdS}><input value={r.label || ""} onChange={e => updR(i, { label: e.target.value })} style={ci} placeholder="label" /></td><td style={tdS}><input type="number" min="0" step="any" value={r.molarEquiv ?? 1} onChange={e => updR(i, { molarEquiv: parseFloat(e.target.value) })} style={{ ...ci, textAlign: "right" }} /></td><td style={{ ...tdS, padding: "4px" }}><button onClick={() => rmR(i)} style={{ background: "none", border: "none", cursor: "pointer", color: C.midDark, padding: "2px" }}><Icon name="x" size={11} /></button></td></tr>))}</tbody>
          </table>
          <button onClick={addR} style={{ marginTop: "6px", background: "none", border: "none", cursor: "pointer", color: C.blue, fontSize: "11px", fontFamily: "inherit", padding: "2px 0", display: "flex", alignItems: "center", gap: "4px" }}><Icon name="plus" size={11} /> Add reactant</button>
        </div>
        <div style={{ paddingTop: "36px", color: C.midDark, fontSize: "18px", flexShrink: 0 }}>&rarr;</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark, marginBottom: "6px" }}>Products</div>
          <table style={tbS}><thead><tr><th style={thS}>Label</th><th style={{ ...thS, width: "80px" }}>Ratio</th><th style={{ ...thS, width: "28px" }}></th></tr></thead>
            <tbody>{products.map((r, i) => (<tr key={i}><td style={tdS}><input value={r.label || ""} onChange={e => updP(i, { label: e.target.value })} style={ci} placeholder="label" /></td><td style={tdS}><input type="number" min="0" step="any" value={r.molarRatio ?? 1} onChange={e => updP(i, { molarRatio: parseFloat(e.target.value) })} style={{ ...ci, textAlign: "right" }} /></td><td style={{ ...tdS, padding: "4px" }}><button onClick={() => rmP(i)} style={{ background: "none", border: "none", cursor: "pointer", color: C.midDark, padding: "2px" }}><Icon name="x" size={11} /></button></td></tr>))}</tbody>
          </table>
          <button onClick={addP} style={{ marginTop: "6px", background: "none", border: "none", cursor: "pointer", color: C.blue, fontSize: "11px", fontFamily: "inherit", padding: "2px 0", display: "flex", alignItems: "center", gap: "4px" }}><Icon name="plus" size={11} /> Add product</button>
        </div>
        <div style={{ flexShrink: 0, width: "80px" }}>
          <div style={{ fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark, marginBottom: "6px" }}>Yield (%)</div>
          <input type="number" min="0" max="100" step="any" value={reactionYield} onChange={e => dispatch(p => updateOperation(p, op.id, { reactionYield: parseFloat(e.target.value) }))} style={{ ...ci, width: "70px", textAlign: "right" }} />
        </div>
      </div>
      {reactants.length > 0 && products.length > 0 && (
        <div style={{ marginTop: "10px", fontSize: "11px", color: C.midDark, fontFamily: MONO, padding: "6px 10px", background: "#fff", borderRadius: "4px", border: `1px solid ${C.lightBorder}` }}>
          {reactants.map(r => `${r.molarEquiv ?? 1} ${r.label || "?"}`).join(" + ")} &rarr; {products.map(r => `${r.molarRatio ?? 1} ${r.label || "?"}`).join(" + ")} (yield: {reactionYield}%)
        </div>
      )}
    </div>
  );
}

function LossCompositionEditor({ op, project, dispatch }) {
  const rows = Array.isArray(op.lossComposition) ? op.lossComposition : [];
  const updateRows = (nextRows) => dispatch(p => updateOperation(p, op.id, { lossComposition: nextRows }));
  const sum = rows.reduce((s, r) => s + (normalizeNumber(r?.fraction, 0) || 0), 0);
  const rowStyle = { display: "flex", alignItems: "center", gap: "6px", marginBottom: "4px" };
  const inputStyle = { background: "#fff", border: `1px solid ${C.border}`, borderRadius: "4px", padding: "3px 6px", fontSize: "11px", fontFamily: MONO, color: C.dark };
  return (
    <div style={{ marginTop: "8px", padding: "8px 10px", background: C.lightHover, border: `1px solid ${C.lightBorder}`, borderRadius: "5px" }}>
      <div style={{ fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark, marginBottom: "5px" }}>
        Loss composition (% of loss amount) - sum {sum.toFixed(1)}%
      </div>
      {rows.map((row, idx) => (
        <div key={idx} style={rowStyle}>
          <select
            value={row.compoundId || ""}
            onChange={e => updateRows(rows.map((x, i) => i === idx ? { ...x, compoundId: e.target.value || null } : x))}
            style={{ ...inputStyle, flex: 1, minWidth: "120px" }}
          >
            <option value="">-- compound --</option>
            {project.compounds.map(c => <option key={c.id} value={c.id}>{c.symbol || c.name}</option>)}
          </select>
          <input
            type="number"
            min="0"
            max="100"
            step="any"
            value={row.fraction ?? ""}
            onChange={e => updateRows(rows.map((x, i) => i === idx ? { ...x, fraction: normalizeNumber(e.target.value, null) } : x))}
            placeholder="%"
            style={{ ...inputStyle, width: "84px", textAlign: "right" }}
          />
          <button onClick={() => updateRows(rows.filter((_, i) => i !== idx))} style={{ border: "none", background: "none", cursor: "pointer", color: C.midDark, padding: "2px" }}><Icon name="x" size={11} /></button>
        </div>
      ))}
      <button onClick={() => updateRows([...rows, { compoundId: null, fraction: null }])} style={{ border: "none", background: "none", cursor: "pointer", color: C.blue, padding: "2px 0", fontSize: "11px", display: "inline-flex", alignItems: "center", gap: "4px" }}><Icon name="plus" size={10} /> Add composition row</button>
    </div>
  );
}
