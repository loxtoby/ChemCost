// =============================================================================

function BomTab({ project }) {
  const { costResult, batchResult } = useContext(SimContext);

  if (!costResult || !costResult.bom || costResult.bom.length === 0) return (
    <div style={{ padding: "40px 24px", color: C.midDark, textAlign: "center", fontSize: "13px" }}>
      No bill of materials data. Add steps with Addition operations and assign compounds with unit costs.
    </div>
  );

  const { bom, byCategory } = costResult;
  const { thS, tdS, numS } = TBL;   // shared table styles
  const { scaledBomMap, showScaled, totalBatches, hasBatchSizing } = deriveBatchScaling(batchResult);

  const handleExportCSV = () => {
    // v47: include material type, per-batch kg, and per-campaign kg (when batch sizing active)
    // v57: append consumable cost breakdown as a separate section after the materials table
    const materialById = Object.fromEntries(project.materials.map(m => [m.id, m]));
    const headers = showScaled
      ? ["Material", "Type", "Per Batch (kg)", "Per Campaign (kg)", "Unit Cost ($/kg)", "Per Batch Cost ($)", "Per Campaign Cost ($)"]
      : ["Material", "Type", "Per Batch (kg)", "Unit Cost ($/kg)", "Per Batch Cost ($)"];
    const dataRows = bom.map(r => {
      const mat = materialById[r.materialId];
      const scaledKg = scaledBomMap[r.materialId] ?? null;
      if (showScaled) {
        return [
          r.materialName,
          mat?.type ?? "",
          r.totalKg,
          scaledKg != null ? scaledKg : "",
          r.unitCostPerKg > 0 ? r.unitCostPerKg : "",
          r.lineCost > 0 ? r.lineCost : "",
          scaledKg != null && r.unitCostPerKg > 0 ? scaledKg * r.unitCostPerKg : "",
        ];
      }
      return [
        r.materialName,
        mat?.type ?? "",
        r.totalKg,
        r.unitCostPerKg > 0 ? r.unitCostPerKg : "",
        r.lineCost > 0 ? r.lineCost : "",
      ];
    });
    const rows = [headers, ...dataRows];

    // Consumable section (v57): appended after materials if any consumables exist.
    if (costResult.consumableUsage && costResult.consumableUsage.length > 0) {
      rows.push([]); // blank separator row
      const conHeaders = showScaled
        ? ["Consumable", "Step", "Units/Batch", "Units/Campaign", "Unit Cost ($)", "Per Batch Cost ($)", "Per Campaign Cost ($)"]
        : ["Consumable", "Step", "Units/Batch", "Unit Cost ($)", "Per Batch Cost ($)"];
      rows.push(conHeaders);
      const stepById = Object.fromEntries(project.steps.map(s => [s.id, s]));
      costResult.consumableUsage.forEach(u => {
        const stepName = stepById[u.stepId]?.name ?? "";
        const campaignUnits = showScaled ? u.unitsNeeded * totalBatches : null;
        const campaignCost = campaignUnits != null && u.consumable.unitCost != null ? campaignUnits * u.consumable.unitCost : null;
        if (showScaled) {
          rows.push([u.consumable.name, stepName, u.unitsNeeded, campaignUnits ?? "", u.consumable.unitCost ?? "", u.totalCost ?? "", campaignCost ?? ""]);
        } else {
          rows.push([u.consumable.name, stepName, u.unitsNeeded, u.consumable.unitCost ?? "", u.totalCost ?? ""]);
        }
      });
    }

    const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" }); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `${project.name.replace(/\s+/g, "_")}_bom.csv`; a.click(); URL.revokeObjectURL(url);
  };

  // v58: export consumables-only CSV for procurement/packaging analysis
  const handleExportConsumablesCSV = () => {
    if (!costResult.consumableUsage || costResult.consumableUsage.length === 0) return;
    const stepById = Object.fromEntries(project.steps.map(s => [s.id, s]));
    const headers = showScaled
      ? ["Consumable", "Step", "Units/Batch", "Units/Campaign", "Unit Cost ($)", "Per Batch Cost ($)", "Per Campaign Cost ($)"]
      : ["Consumable", "Step", "Units/Batch", "Unit Cost ($)", "Per Batch Cost ($)"];
    const rows = [headers];
    costResult.consumableUsage.forEach(u => {
      const stepName = stepById[u.stepId]?.name ?? "";
      const campaignUnits = showScaled ? u.unitsNeeded * totalBatches : null;
      const campaignCost = campaignUnits != null && u.consumable.unitCost != null ? campaignUnits * u.consumable.unitCost : null;
      if (showScaled) {
        rows.push([u.consumable.name, stepName, u.unitsNeeded, campaignUnits ?? "", u.consumable.unitCost ?? "", u.totalCost ?? "", campaignCost ?? ""]);
      } else {
        rows.push([u.consumable.name, stepName, u.unitsNeeded, u.consumable.unitCost ?? "", u.totalCost ?? ""]);
      }
    });
    const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" }); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `${project.name.replace(/\s+/g, "_")}_consumables.csv`; a.click(); URL.revokeObjectURL(url);
  };

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "20px" }}>
        <span style={{ fontSize: "17px", fontWeight: 700, color: C.dark }}>Bill of Materials</span>
        <span style={{ fontSize: "12px", color: C.midDark }}>{project.name}</span>
        {hasBatchSizing && (
          <span title="Batch requirement derived from target output and vessel limits." style={{ fontFamily: MONO, fontSize: "12px", color: C.orange, background: C.orange + "18", border: `1px solid ${C.orange}44`, borderRadius: "4px", padding: "2px 10px" }}>
            Batches: {totalBatches}
          </span>
        )}
        <span style={{ marginLeft: "auto", display: "flex", gap: "6px" }}>
          <Btn variant="primary" size="sm" onClick={handleExportCSV} title="Export full BOM as CSV (materials + consumables)">Export CSV</Btn>
          {costResult.consumableUsage && costResult.consumableUsage.length > 0 && (
            <Btn variant="light" size="sm" onClick={handleExportConsumablesCSV} title="Export consumables-only CSV">Consumables CSV</Btn>
          )}
        </span>
      </div>

      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", minWidth: "500px" }}>
          <thead>
            <tr>
              <th style={thS}>Material</th>
              <th style={{ ...thS, textAlign: "right" }} title="Quantity per batch (unscaled baseline). For campaigns with batch sizing enabled, this reflects one batch of the limiting step.">Per Batch (kg) *</th>
              {showScaled && <th style={{ ...thS, textAlign: "right", color: C.orange }}>Per Campaign (kg)</th>}
              <th style={{ ...thS, textAlign: "right" }}>Unit Cost ($/kg)</th>
              <th style={{ ...thS, textAlign: "right" }}>Per Batch Cost ($)</th>
              {showScaled && <th style={{ ...thS, textAlign: "right", color: C.orange }}>Per Campaign Cost ($)</th>}
            </tr>
          </thead>
          <tbody>
            {bom.map((row, i) => {
              const scaledKg = scaledBomMap[row.materialId] ?? null;
              return (
                <tr key={row.materialId} style={{ background: i % 2 === 0 ? "#fff" : C.lightHover }}>
                  <td style={tdS}>{row.materialName}</td>
                  <td style={{ ...tdS, textAlign: "right" }}><span style={numS}>{fmtKgSig(row.totalKg)}</span></td>
                  {showScaled && <td style={{ ...tdS, textAlign: "right" }}><span style={{ ...numS, color: C.orange }}>{scaledKg != null ? fmtKgSig(scaledKg) : "--"}</span></td>}
                  <td style={{ ...tdS, textAlign: "right" }}><span style={numS}>{row.unitCostPerKg > 0 ? `$${fmtUSD(row.unitCostPerKg)}` : "--"}</span></td>
                  <td style={{ ...tdS, textAlign: "right" }}><span style={{ ...numS, color: C.blue }}>{row.lineCost > 0 ? `$${fmtUSD(row.lineCost)}` : "--"}</span></td>
                  {showScaled && <td style={{ ...tdS, textAlign: "right" }}><span style={{ ...numS, color: C.orange }}>{scaledKg != null && row.unitCostPerKg > 0 ? `$${fmtUSD(scaledKg * row.unitCostPerKg)}` : "--"}</span></td>}
                </tr>
              );
            })}
            <tr style={{ background: C.lightHover, borderTop: `2px solid ${C.border}` }}>
              <td style={{ ...tdS, fontWeight: 700, color: C.dark }}>Total</td>
              <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={numS}>{fmtKgSig(bom.reduce((s, r) => s + r.totalKg, 0))}</span></td>
              {showScaled && <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={{ ...numS, color: C.orange }}>{fmtKgSig(Object.values(scaledBomMap).reduce((s, v) => s + v, 0))}</span></td>}
              <td style={{ ...tdS, fontWeight: 700, color: C.dark }}></td>
              <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={{ ...numS, color: C.blue }}>${fmtUSD(byCategory.materials)}</span></td>
              {showScaled && <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={{ ...numS, color: C.orange }}>${fmtUSD(bom.reduce((s, r) => { const sk = scaledBomMap[r.materialId] ?? null; return s + (sk != null && r.unitCostPerKg > 0 ? sk * r.unitCostPerKg : 0); }, 0))}</span></td>}
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{ fontSize: "10px", color: C.midDark, marginTop: "8px" }}>
        * Per Batch reflects the stoichiometric baseline quantity (one batch of the limiting step). Campaign totals account for the batch count needed to meet the target output.
      </div>

      {/* Consumables section */}
      {costResult.consumableUsage && costResult.consumableUsage.length > 0 && (
        <div style={{ marginTop: "24px" }}>
          <div style={{ fontSize: "13px", fontWeight: 700, color: C.dark, marginBottom: "10px", paddingBottom: "6px", borderBottom: `1px solid ${C.border}` }}>
            Consumables (Packaging Containers)
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", minWidth: "400px" }}>
              <thead>
                <tr>
                  <th style={thS}>Container</th>
                  <th style={{ ...thS, textAlign: "right" }}>Units / Batch</th>
                  {showScaled && <th style={{ ...thS, textAlign: "right", color: C.orange }}>Units / Campaign</th>}
                  <th style={{ ...thS, textAlign: "right" }}>Unit Cost</th>
                  <th style={{ ...thS, textAlign: "right" }}>Per Batch Cost ($)</th>
                  {showScaled && <th style={{ ...thS, textAlign: "right", color: C.orange }}>Per Campaign Cost ($)</th>}
                </tr>
              </thead>
              <tbody>
                {costResult.consumableUsage.map((u, i) => {
                  const opStep = project.steps.find(s => s.id === u.stepId);
                  const campaignUnits = showScaled ? u.unitsNeeded * totalBatches : null;
                  const campaignCost = (campaignUnits != null && u.consumable.unitCost != null) ? campaignUnits * u.consumable.unitCost : null;
                  return (
                    <tr key={u.opId} style={{ background: i % 2 === 0 ? "#fff" : C.lightHover }}>
                      <td style={tdS}>
                        {u.consumable.name}
                        {opStep && <span style={{ marginLeft: "6px", fontSize: "10px", color: C.midDark }}>({opStep.name})</span>}
                      </td>
                      <td style={{ ...tdS, textAlign: "right" }}><span style={numS}>{u.unitsNeeded}</span></td>
                      {showScaled && <td style={{ ...tdS, textAlign: "right" }}><span style={{ ...numS, color: C.orange }}>{campaignUnits ?? "--"}</span></td>}
                      <td style={{ ...tdS, textAlign: "right" }}><span style={numS}>{u.consumable.unitCost != null ? `$${fmtUSD(u.consumable.unitCost)}` : "--"}</span></td>
                      <td style={{ ...tdS, textAlign: "right" }}><span style={{ ...numS, color: C.blue }}>{u.totalCost != null ? `$${fmtUSD(u.totalCost)}` : "--"}</span></td>
                      {showScaled && <td style={{ ...tdS, textAlign: "right" }}><span style={{ ...numS, color: C.orange }}>{campaignCost != null ? `$${fmtUSD(campaignCost)}` : "--"}</span></td>}
                    </tr>
                  );
                })}
                <tr style={{ background: C.lightHover, borderTop: `2px solid ${C.border}` }}>
                  <td style={{ ...tdS, fontWeight: 700, color: C.dark }}>Total Consumables</td>
                  <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={numS}>{costResult.consumableUsage.reduce((s, u) => s + u.unitsNeeded, 0)}</span></td>
                  {showScaled && <td colSpan={1} />}
                  <td style={{ ...tdS, fontWeight: 700, color: C.dark }} />
                  <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={{ ...numS, color: C.blue }}>${fmtUSD(costResult.consumableCostTotal ?? 0)}</span></td>
                  {showScaled && <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={{ ...numS, color: C.orange }}>${fmtUSD((costResult.consumableCostTotal ?? 0) * totalBatches)}</span></td>}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );

    borderBottom: `1px solid ${C.border}`,
  });

  function SectionHeader({ label, subtotal, skey }) {
    return (
      <div style={secHeaderS(C.dark)} onClick={() => toggleCollapse(skey)}>
        <Icon name={collapsed[skey] ? "chevronRight" : "chevronDown"} size={14} />
        <span style={{ fontWeight: 700, fontSize: "14px", color: C.dark, flex: 1 }}>{label}</span>
        {subtotal != null && (
          <span style={{ fontFamily: MONO, fontSize: "13px", color: C.dark }}>
            ${fmtUSD(subtotal)}
          </span>
        )}
      </div>
    );
  }

  function OrgRow({ itm, section, qtyField, isAuto, isCheckbox }) {
    const qty = isAuto ? itm.quantity : null;
    const userQty = isCheckbox
      ? (project.orgCosts[section]?.[qtyField] || false)
      : (project.orgCosts[section]?.[qtyField] ?? 0);
    const displayQty = isAuto ? qty : userQty;
    const total = isCheckbox
      ? (userQty ? itm.rate : 0)
      : parseFloat(((isAuto ? itm.quantity : userQty) * itm.rate).toFixed(2));

    return (
      <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "7px 18px", borderBottom: `1px solid ${C.lightBorder}`, fontSize: "13px" }}>
        <span style={{ flex: 1, color: C.dark }}>{itm.label}</span>
        <span style={{ color: C.midDark, fontSize: "11px", minWidth: "130px", textAlign: "right" }}>{itm.rateLabel}</span>
        {isCheckbox ? (
          <input type="checkbox" checked={!!userQty}
            onChange={ev => upOC(section, qtyField, ev.target.checked)}
            style={{ width: "18px", height: "18px", cursor: "pointer" }} />
        ) : isAuto ? (
          <span style={{ ...inpS, background: C.lightHover, color: C.midDark, display: "inline-block", textAlign: "right", minWidth: "90px" }}>
            {displayQty} <span style={{ fontSize: "10px" }}>(auto)</span>
          </span>
        ) : (
          <input type="number" min="0" step="any" value={userQty}
            onChange={ev => upOC(section, qtyField, Math.max(0, parseFloat(ev.target.value) || 0))}
            style={inpS} />
        )}
        <span style={{ fontFamily: MONO, fontSize: "13px", color: C.dark, minWidth: "80px", textAlign: "right" }}>
          ${fmtUSD(total)}
        </span>
      </div>
    );
  }

  const r = orgCostResult || { rd: null, qc: null, qa: null, prd: null, grand: 0 };

  // Map section -> field names for user-entered quantities
  const rdFields = { processDevelopmentWeeks: null, processSupportHours: null, developmentReportIncluded: null };
  const prdPpeField = "ppeCostPerHour";

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "20px" }}>
        <Icon name="dollar" size={18} />
        <span style={{ fontSize: "17px", fontWeight: 700, color: C.dark }}>Org Costs</span>
        <span style={{ fontSize: "12px", color: C.midDark }}>{project.name}</span>
        {r.grand > 0 && (
          <span style={{ marginLeft: "auto", fontFamily: MONO, fontSize: "15px", fontWeight: 700, color: C.dark }}>
            Total: ${fmtUSD(r.grand)}
          </span>
        )}
      </div>

      {/* Hourly Labor Rates (moved from ConfigurationTab v51) */}
      <div style={secCardS}>
        <div style={secHeaderS()} onClick={() => toggleCollapse("labor")}>
          <Icon name={collapsed.labor ? "chevronRight" : "chevronDown"} size={14} />
          <span style={{ fontWeight: 700, fontSize: "14px", color: C.dark, flex: 1 }}>Hourly Labor Rates (PRD / QC)</span>
        </div>
        {!collapsed.labor && (
          <div style={{ padding: "14px 18px" }}>
            {lr.map(row => (
              <div key={row.department} style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "10px", fontSize: "13px" }}>
                <span style={{ flex: 1, color: C.dark }}>{row.name} ({row.department})</span>
                <span style={{ color: C.midDark, fontSize: "11px" }}>$/h</span>
                <input type="number" min="0" step="any" value={row.rate}
                  onChange={ev => upR(row.department, ev.target.value)}
                  style={inpS} />
              </div>
            ))}
            <div style={{ fontSize: "11px", color: C.midDark, marginTop: "6px" }}>
              PRD hourly rate feeds duration-based operation labor costs throughout the process. QC rate is used for IPC and release testing labor estimates.
            </div>
          </div>
        )}
      </div>

      {/* R&D Costs */}
      <div style={secCardS}>
        <SectionHeader label="R&D Costs" subtotal={r.rd?.subtotal} skey="rd" />
        {!collapsed.rd && (
          <div>
            {r.rd?.lineItems.map((itm, i) => {
              const isAuto = !!itm.autoQuantity;
              const isCB = !!itm.isCheckbox;
              const fields = { "Process Development": "processDevelopmentWeeks", "Process Support Hours": "processSupportHours", "Development Report": "developmentReportIncluded", "RM Supplies (per step)": null, "Batch Record Review (per step)": null };
              const qf = fields[itm.label] ?? null;
              return <OrgRow key={i} itm={itm} section="rd" qtyField={qf} isAuto={isAuto} isCheckbox={isCB} />;
            })}
          </div>
        )}
      </div>

      {/* QC Costs */}
      <div style={secCardS}>
        <SectionHeader label="QC Costs" subtotal={r.qc?.subtotal} skey="qc" />
        {!collapsed.qc && (
          <div>
            {r.qc?.lineItems.map((itm, i) => {
              const isAuto = !!itm.autoQuantity;
              const qcFieldMap = {
                "QC FTE Hours": "fteHours", "Method Transfers": "methodTransfers",
                "RM/Intermediate Releases": "rmIntermediateReleases", "Method Validations": "methodValidations",
                "Product Releases": "productReleases", "Stability Test Points": "stabilityTestPoints",
                "Stability Storage Sets": "stabilityStorage", "Supplies/Columns (per step)": null,
                "External Lab Validations": "externalLabValidations", "External Lab Testing (batches)": "externalLabTestingBatches",
                "External Lab Qualifications": "externalLabQualification",
              };
              const qf = qcFieldMap[itm.label] ?? null;
              return <OrgRow key={i} itm={itm} section="qc" qtyField={qf} isAuto={isAuto} isCheckbox={false} />;
            })}
          </div>
        )}
      </div>

      {/* QA Costs */}
      <div style={secCardS}>
        <SectionHeader label="QA Costs" subtotal={r.qa?.subtotal} skey="qa" />
        {!collapsed.qa && (
          <div>
            {r.qa?.lineItems.map((itm, i) => {
              const qaFieldMap = {
                "Review Method Transfers": "reviewMethodTransfer", "Review Specifications": "reviewSpecifications",
                "Review Analytical Documentation": "reviewAnalyticalDocumentation",
                "Review New Master Batch Records": "reviewNewMasterBatchRecord", "Review Test Methods": "reviewTestMethods",
                "Review Cleaning Method Validation": "reviewCleaningMethodValidation",
                "Review Executed Batch Records": "reviewExecutedBatchRecord",
                "Review Analytical Release Paperwork": "reviewAnalyticalReleasePaperwork",
                "Author PV Protocol & Report": "authorPVProtocolAndReport",
                "Review FP Method Validation": "reviewFPMethodValidation",
                "New Supplier Qualifications": "newSupplierQualification",
              };
              const qf = qaFieldMap[itm.label] ?? null;
              return <OrgRow key={i} itm={itm} section="qa" qtyField={qf} isAuto={false} isCheckbox={false} />;
            })}
          </div>
        )}
      </div>

      {/* PRD Costs */}
      <div style={secCardS}>
        <SectionHeader label="PRD Costs" subtotal={r.prd?.subtotal} skey="prd" />
        {!collapsed.prd && (
          <div>
            {r.prd?.lineItems.map((itm, i) => {
              const isAuto = !!itm.autoQuantity;
              const isPpe = itm.label.startsWith("PPE");
              if (isPpe) {
                // PPE row: user edits $/h rate, quantity comes from scheduled PRD hours
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: "10px", padding: "7px 18px", borderBottom: `1px solid ${C.lightBorder}`, fontSize: "13px" }}>
                    <span style={{ flex: 1, color: C.dark }}>{itm.label}</span>
                    <span style={{ color: C.midDark, fontSize: "11px", minWidth: "130px", textAlign: "right" }}>PRD hours x batches x</span>
                    <div style={{ display: "flex", alignItems: "center", gap: "4px" }}>
                      <span style={{ fontSize: "11px", color: C.midDark }}>$</span>
                      <input type="number" min="0" step="any"
                        value={project.orgCosts.prd?.ppeCostPerHour ?? 10}
                        onChange={ev => upOC("prd", "ppeCostPerHour", Math.max(0, parseFloat(ev.target.value) || 0))}
                        style={{ ...inpS, width: "70px" }} />
                      <span style={{ fontSize: "11px", color: C.midDark }}>/h</span>
                    </div>
                    <span style={{ fontFamily: MONO, fontSize: "13px", color: C.dark, minWidth: "80px", textAlign: "right" }}>
                      ${fmtUSD(itm.total)}
                    </span>
                  </div>
                );
              }
              return <OrgRow key={i} itm={itm} section="prd" qtyField={null} isAuto={isAuto} isCheckbox={false} />;
            })}
          </div>
        )}
      </div>

      {/* Grand total footer */}
      <div style={{ padding: "14px 20px", background: C.lightHover, border: `1px solid ${C.border}`, borderRadius: "8px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: "14px", fontWeight: 700, color: C.dark }}>Grand Total (Org Costs)</span>
        <span style={{ fontFamily: MONO, fontSize: "17px", fontWeight: 700, color: C.dark }}>${fmtUSD(r.grand)}</span>
      </div>
      <div style={{ fontSize: "11px", color: C.midDark, marginTop: "10px", lineHeight: 1.6 }}>
        Per-step rows (auto) are computed from the current number of process steps. PRD PPE cost uses scheduled PRD hours multiplied by the batch count and your entered $/h rate. All other quantities are user-entered.
      </div>
    </div>
  );
}

// === ROOT APP ================================================================
// =============================================================================

function App() {
  const { project, dispatch, undo, redo, canUndo, canRedo, loadProject } = useProjectState(makeEmptyProject());
  const [activeTab, setActiveTab] = useState("process");
  const [focusStepId, setFocusStepId] = useState(null);
  const [loadValidation, setLoadValidation] = useState(null);  // CC-011: { result, filename }

  useEffect(() => {
    if (!focusStepId) return undefined;
    const timer = setTimeout(() => setFocusStepId(null), 4000);
    return () => clearTimeout(timer);
  }, [focusStepId]);

  // Keyboard shortcuts for undo/redo
  useEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === "z") { e.preventDefault(); undo(); }
      else if ((e.ctrlKey || e.metaKey) && (e.shiftKey && e.key === "z" || (e.key === "y"))) { e.preventDefault(); redo(); }
    };
    window.addEventListener("keydown", handler); return () => window.removeEventListener("keydown", handler);
  }, [undo, redo]);

  // === SIMULATION -- computed outside of state, never stored ==================
  // Keep all simulation views derived from the same project snapshot in this render.
  const sortedSteps = useMemo(() => topoSort(project.steps), [project.steps]);
  const cycleIds = useMemo(() => {
    if (!Array.isArray(sortedSteps) && sortedSteps?.error) return detectCycles(project.steps);
    return [];
  }, [project.steps, sortedSteps]);
  const durationMap = useMemo(() => computeAllDurations(project), [
    // computeAllDurations only reads project.operations, .equipment, .materials, .compounds, .settings.
    // Narrowing the dep avoids spurious re-runs when project.name, .notes, .batchSizingConfig,
    // .steps (yield/name), .laborRates, .compositeOperations, or .updatedAt change.
    project.operations, project.equipment, project.materials, project.compounds, project.settings,
  ]);
  const massFlowResult = useMemo(() => {
    const sorted = Array.isArray(sortedSteps) ? sortedSteps : null;
    if (!sorted) return { stepBalances: [], vesselInventory: {}, stepOutputMassByStepId: {}, materialOutputMassByMaterialId: {}, error: "Cycle in steps" };
    return runMassFlow(project, sorted);
  }, [project, sortedSteps]);

  // Engines that require topological order get [] when a cycle exists; cycleIds still surfaces diagnostics.
  const sortedArr = useMemo(() => Array.isArray(sortedSteps) ? sortedSteps : [], [sortedSteps]);
  const costResult = useMemo(() => computeCosts(project, massFlowResult, durationMap), [project, massFlowResult, durationMap]);
  const schedule = useMemo(() => buildSchedule(project, sortedArr, durationMap), [project, sortedArr, durationMap]);
  const greenMetrics = useMemo(() => computeGreenMetrics(project, massFlowResult), [project, massFlowResult]);
  const batchResult = useMemo(() => computeBatchSizing(project, massFlowResult, greenMetrics, sortedArr), [project, massFlowResult, greenMetrics, sortedArr]);
  const orgCostResult = useMemo(() => {
    const nb = batchResult?.stepVolumes?.reduce((m, sv) => Math.max(m, sv?.batchCount || 1), 1) || 1;
    return computeOrgCosts(project, schedule, nb);
  }, [project, schedule, batchResult]);
  const simValue = useMemo(() => ({ durationMap, massFlowResult, sortedSteps: sortedArr, cycleIds, costResult, schedule, greenMetrics, batchResult, orgCostResult }),
    [durationMap, massFlowResult, sortedArr, cycleIds, costResult, schedule, greenMetrics, batchResult, orgCostResult]);

  return (
    <SimContext.Provider value={simValue}>
      <div style={{ display: "flex", flexDirection: "column", height: "100vh", fontFamily: "system-ui,-apple-system,'Segoe UI',sans-serif", overflow: "hidden", background: C.light, color: C.dark }}>
        <Toolbar project={project} dispatch={dispatch} undo={undo} redo={redo} canUndo={canUndo} canRedo={canRedo} loadProject={loadProject}
          onValidationResult={setLoadValidation}
        />
        <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
          <Sidebar project={project} dispatch={dispatch} activeTab={activeTab} setActiveTab={setActiveTab} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {activeTab === "process" && <ProcessEditorTab project={project} dispatch={dispatch} focusStepId={focusStepId} />}
            {activeTab === "materials" && <MaterialsTab project={project} dispatch={dispatch} />}
            {activeTab === "equipment" && <EquipmentTab project={project} dispatch={dispatch} />}
            {activeTab === "config" && <ConfigurationTab project={project} dispatch={dispatch} />}
            {activeTab === "overview" && <OverviewTab project={project} />}
            {activeTab === "balance" && <MassBalanceTab project={project} onJumpToStep={(stepId) => { setActiveTab("process"); setFocusStepId(stepId); }} />}
            {activeTab === "gantt" && <GanttTab project={project} />}
            {activeTab === "cost" && <CostTab project={project} />}
            {activeTab === "orgcosts" && <OrgCostsTab project={project} dispatch={dispatch} />}
            {activeTab === "bom" && <BomTab project={project} />}
            {activeTab === "pfd" && <PfdTab project={project} dispatch={dispatch} />}
          </div>
        </div>
        <SummaryBar project={project} />
        {loadValidation && (
          <LoadValidationModal
            result={loadValidation.result}
            filename={loadValidation.filename}
            onClose={() => setLoadValidation(null)}
          />
        )}
      </div>
    </SimContext.Provider>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
