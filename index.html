            )}
            {pubchemStatus && (
              <div style={{ marginTop: "4px", fontSize: "10px", color: pubchemStatus === "found" ? C.green : pubchemStatus === "searching" ? C.blue : C.orange }}>
                {pubchemStatus === "searching" && (lookupEntries.length > 0 ? "Searching local DB, then ChEMBL, then CIR..." : "Searching ChEMBL, then CIR...")}
                {pubchemStatus === "found" && pubchemResult && `${pubchemResult.source === "local" ? "Local DB" : pubchemResult.source === "cir" ? "CIR" : "ChEMBL"} hit: ${pubchemResult.title} (MW: ${pubchemResult.molecularWeight ?? "--"}${pubchemResult.density != null ? ", density: " + fmtSig(pubchemResult.density, 5) + " kg/L" : ""})`}
                {pubchemStatus === "not_found" && "Not found in local DB, ChEMBL, or CIR. Try a different name, CAS, or SMILES."}
                {pubchemStatus === "error" && "Network error: compound lookup failed. Check your connection or try a local DB JSON file."}
              </div>
            )}
          </div>
          {showAddCompound && (
            <div style={{ margin: "8px 12px", padding: "10px", background: C.lightHover, borderRadius: "6px", border: `1px solid ${C.border}` }}>
              <input autoFocus placeholder="Name..." value={newCmp.name} onChange={e => setNewCmp(c => ({ ...c, name: e.target.value }))} style={{ ...inp(), width: "100%", marginBottom: "6px", boxSizing: "border-box" }} />
              <input placeholder="Symbol (opt.)" value={newCmp.symbol} onChange={e => setNewCmp(c => ({ ...c, symbol: e.target.value }))} style={{ ...inp(), width: "100%", marginBottom: "6px", boxSizing: "border-box" }} />
              <input placeholder="SMILES (opt.)" value={newCmp.smiles || ""} onChange={e => setNewCmp(c => ({ ...c, smiles: e.target.value }))} style={{ ...inp(), width: "100%", marginBottom: "6px", boxSizing: "border-box" }} />
              <select value={newCmp.type} onChange={e => setNewCmp(c => ({ ...c, type: e.target.value }))} style={{ ...inp(), width: "100%", marginBottom: "8px", boxSizing: "border-box" }}>
                {COMPOUND_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              {newCmp.molecularWeight && (
                <div style={{ fontSize: "10px", color: C.green, marginBottom: "6px" }}>Lookup MW: {newCmp.molecularWeight} g/mol{newCmp.density != null ? ` | Density: ${fmtSig(newCmp.density, 5)} kg/L` : ""}</div>
              )}
              {newCmp.smiles && (
                <div style={{ marginBottom: "6px" }}>
                  <SmilesRenderer smiles={newCmp.smiles} width={200} height={100} />
                </div>
              )}
              <div style={{ display: "flex", gap: "6px" }}>
                <Btn variant="primary" size="sm" onClick={() => {
                  if (!newCmp.name.trim()) return;
                  const cmpData = { ...newCmp };
                  if (cmpData.molecularWeight) cmpData.molecularWeight = parseFloat(cmpData.molecularWeight);
                  dispatch(p => addCompound(p, cmpData));
                  setNewCmp({ name: "", symbol: "", type: "raw_material", smiles: "" });
                  setShowAddCompound(false);
                  setPubchemStatus(null);
                  setPubchemResult(null);
                  setPubchemQuery("");
                }}>Add</Btn>
                <Btn variant="ghost" size="sm" onClick={() => { setShowAddCompound(false); setPubchemStatus(null); setPubchemResult(null); }}>Cancel</Btn>
              </div>
            </div>
          )}
          {project.compounds.length === 0 && !showAddCompound && (
            <div style={{ padding: "12px 16px", fontSize: "12px", color: C.midDark }}>No compounds. Add a pure chemical compound.</div>
          )}
          {project.compounds.map(c => {
            const isOpen = expandedCompId === c.id;
            const typeColor = typeColors[c.type] || C.midDark;
            return (
              <div key={c.id} style={{
                borderBottom: `1px solid ${C.lightBorder}`,
                borderLeft: `3px solid ${typeColor}`,
                background: isOpen ? C.lightHover : "#fff",
                transition: "background 0.1s",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "9px 12px 9px 10px", cursor: "pointer" }} onClick={() => setExpandedCompId(isOpen ? null : c.id)}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: "13px", fontWeight: 600, color: C.dark, display: "flex", alignItems: "center", gap: "6px", flexWrap: "wrap" }}>
                      {c.name || <span style={{ fontStyle: "italic", color: C.midDark }}>Unnamed</span>}
                      {c.symbol && <span style={{ fontFamily: MONO, color: C.midDark, fontSize: "10px", background: C.lightBorder, padding: "0px 4px", borderRadius: "3px" }}>{c.symbol}</span>}
                      {c.isProduct && <span style={{ fontSize: "9px", background: C.orange, color: "#fff", borderRadius: "3px", padding: "1px 5px", fontWeight: 700 }}>PRODUCT</span>}
                    </div>
                    <div style={{ display: "flex", gap: "8px", marginTop: "3px", fontSize: "10px", flexWrap: "wrap" }}>
                      <span style={{ color: typeColor, fontWeight: 600 }}>{c.type}</span>
                      {c.molecularWeight && <span style={{ color: C.midDark, fontFamily: MONO }}>MW {c.molecularWeight}</span>}
                      {c.density && <span style={{ color: C.midDark, fontFamily: MONO }}>{fmtSig(c.density, 3)} kg/L</span>}
                      {c.unitCost && <span style={{ color: C.green, fontFamily: MONO }}>${c.unitCost}/kg</span>}
                      {c.smiles && <span style={{ color: C.blue }}>SMILES</span>}
                    </div>
                  </div>
                  <button onClick={e => { e.stopPropagation(); dispatch(p => deleteCompound(p, c.id)); }} style={{ background: "none", border: "none", cursor: "pointer", color: C.midDark, opacity: 0.4, padding: "2px", flexShrink: 0 }} title="Delete compound"><Icon name="trash" size={11} /></button>
                </div>
                {isOpen && (
                  <div style={{ padding: "10px 14px 14px", background: C.lightHover, borderTop: `1px solid ${C.border}` }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "8px" }}>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Name</div><input value={c.name} onChange={e => dispatch(p => updateCompound(p, c.id, { name: e.target.value }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }} /></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Symbol</div><input value={c.symbol || ""} onChange={e => dispatch(p => updateCompound(p, c.id, { symbol: e.target.value }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }} /></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Type</div><select value={c.type} onChange={e => dispatch(p => updateCompound(p, c.id, { type: e.target.value }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }}>{COMPOUND_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>MW (g/mol)</div><input type="number" step="any" min="0" value={c.molecularWeight ?? ""} onChange={e => dispatch(p => updateCompound(p, c.id, { molecularWeight: e.target.value ? parseFloat(e.target.value) : null }))} placeholder="e.g. 36.46" style={{ ...inp(), width: "100%", boxSizing: "border-box" }} /></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Density (kg/L)</div><input type="number" step="any" min="0" value={c.density ?? ""} onChange={e => dispatch(p => updateCompound(p, c.id, { density: e.target.value ? parseFloat(e.target.value) : null }))} placeholder="e.g. 1.19" style={{ ...inp(), width: "100%", boxSizing: "border-box" }} /></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Unit cost ($/kg)</div><input type="number" step="any" min="0" value={c.unitCost ?? ""} onChange={e => dispatch(p => updateCompound(p, c.id, { unitCost: e.target.value ? parseFloat(e.target.value) : null }))} placeholder="e.g. 2.50" style={{ ...inp(), width: "100%", boxSizing: "border-box" }} /></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Molar equiv</div><input type="number" step="any" min="0" value={c.molarEquivalents ?? 1} onChange={e => dispatch(p => updateCompound(p, c.id, { molarEquivalents: parseFloat(e.target.value) || 1 }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }} /></div>
                      <div style={{ gridColumn: "1 / -1" }}><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>SMILES</div><input value={c.smiles || ""} onChange={e => dispatch(p => updateCompound(p, c.id, { smiles: e.target.value }))} placeholder="e.g. CCO" style={{ ...inp(), width: "100%", boxSizing: "border-box", fontFamily: MONO }} /></div>
                    </div>
                    {c.smiles && (
                      <div style={{ display: "flex", justifyContent: "center", margin: "8px 0", background: "#fff", borderRadius: "6px", border: `1px solid ${C.lightBorder}`, padding: "6px" }}>
                        <SmilesRenderer smiles={c.smiles} width={200} height={120} />
                      </div>
                    )}
                    <div style={{ display: "flex", flexDirection: "column", gap: "6px", marginTop: "6px" }}>
                      <label style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "11px", color: c.isProduct ? C.orange : C.midDark, cursor: "pointer" }}>
                        <input type="checkbox" checked={!!c.isProduct} onChange={e => dispatch(p => updateCompound(p, c.id, { isProduct: e.target.checked }))} style={{ accentColor: C.orange }} />
                        Product compound (used for PMI calculation)
                      </label>
                      <label style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "11px", color: c.isAqueous ? C.blue : C.midDark, cursor: "pointer" }}>
                        <input type="checkbox" checked={!!c.isAqueous} onChange={e => dispatch(p => updateCompound(p, c.id, { isAqueous: e.target.checked }))} style={{ accentColor: C.blue }} />
                        Aqueous compound (contributes to aqueous waste split in green metrics)
                      </label>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* === RIGHT: Process Materials + Intermediate Map === */}
        <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px", background: C.light }}>
          {/* Process Materials header */}
          <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "16px" }}>
            <span style={{ fontSize: "15px", fontWeight: 700, color: C.dark }}>Process Materials</span>
            <span style={{ fontSize: "12px", color: C.midDark }}>{project.materials.length} material{project.materials.length !== 1 ? "s" : ""}</span>
            <div style={{ marginLeft: "auto" }}>
              <Btn variant="primary" size="sm" onClick={() => setShowAddMaterial(true)}><Icon name="plus" size={12} /> Add Material</Btn>
            </div>
          </div>

          {/* Add material form */}
          {showAddMaterial && (
            <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", padding: "14px 16px", marginBottom: "16px" }}>
              <div style={{ fontSize: "12px", fontWeight: 600, color: C.dark, marginBottom: "10px" }}>New Process Material</div>
              <input autoFocus placeholder="Name..." value={newMat.name} onChange={e => setNewMat(m => ({ ...m, name: e.target.value }))} style={{ ...inp(), width: "100%", marginBottom: "8px", boxSizing: "border-box" }} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "10px" }}>
                <div>
                  <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Type</div>
                  <select value={newMat.type} onChange={e => setNewMat(m => ({ ...m, type: e.target.value }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }}>
                    {MATERIAL_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Physical State</div>
                  <select value={newMat.physicalState} onChange={e => setNewMat(m => ({ ...m, physicalState: e.target.value }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }}>
                    {PHYSICAL_STATES.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ display: "flex", gap: "6px" }}>
                <Btn variant="primary" size="sm" onClick={() => { if (!newMat.name.trim()) return; dispatch(p => addMaterial(p, newMat)); setNewMat({ name: "", type: "input", physicalState: "liquid" }); setShowAddMaterial(false); }}>Add</Btn>
                <Btn variant="ghost" size="sm" onClick={() => setShowAddMaterial(false)}>Cancel</Btn>
              </div>
            </div>
          )}

          {project.materials.length === 0 && !showAddMaterial && (
            <div style={{ padding: "24px 16px", color: C.midDark, fontSize: "13px", textAlign: "center", background: "#fff", borderRadius: "8px", border: `1px solid ${C.border}` }}>
              No process materials yet. Add materials here, then assign them to operations in the Process Editor.
            </div>
          )}

          {/* Material cards */}
          {project.materials.map(m => {
            const isOpen = expandedMatId === m.id;
            const isIntermediate = intermediates.has(m.id);
            const usedInSteps = matToSteps[m.id] || [];
            const fSum = (m.composition || []).reduce((s, x) => s + (x.fraction || 0), 0);
            return (
              <div key={m.id} style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", marginBottom: "8px", overflow: "hidden" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "10px 14px", cursor: "pointer", background: isOpen ? C.lightHover : "#fff" }} onClick={() => setExpandedMatId(isOpen ? null : m.id)}>
                  <Icon name={isOpen ? "chevronDown" : "chevronRight"} size={12} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: "13px", fontWeight: 500, color: C.dark, display: "flex", alignItems: "center", gap: "6px", flexWrap: "wrap" }}>
                      {m.name || <span style={{ fontStyle: "italic", color: C.midDark }}>Unnamed</span>}
                      {isIntermediate && <span style={{ fontSize: "9px", background: C.orange + "22", color: C.orange, borderRadius: "3px", padding: "1px 5px", fontWeight: 700 }}>INTERMEDIATE{!explicitIntermediateIds.has(m.id) ? <span style={{ fontWeight: 400, opacity: 0.75 }}> (auto)</span> : null}</span>}
                    </div>
                    <div style={{ display: "flex", gap: "10px", marginTop: "2px", fontSize: "10px" }}>
                      <span style={{ color: matTypeColors[m.type] || C.midDark }}>{m.type}</span>
                      <span style={{ color: C.midDark }}>{m.physicalState}</span>
                      {m.density && <span style={{ color: C.midDark, fontFamily: MONO }}>{fmtSig(m.density, 3)} kg/L</span>}
                      {m.isAqueous && <span style={{ color: C.blue, fontWeight: 600 }}>aq</span>}
                      {usedInSteps.length > 0 && <span style={{ color: C.blue }}>used in {usedInSteps.length} step{usedInSteps.length !== 1 ? "s" : ""}</span>}
                      {(m.composition || []).length > 0 && <span style={{ color: C.midDark }}>{(m.composition || []).length} compound{(m.composition || []).length !== 1 ? "s" : ""}</span>}
                    </div>
                  </div>
                  <button onClick={e => { e.stopPropagation(); dispatch(p => deleteMaterial(p, m.id)); }} style={{ background: "none", border: "none", cursor: "pointer", color: C.midDark, opacity: 0.5, padding: "2px" }} title="Delete material"><Icon name="trash" size={11} /></button>
                </div>
                {isOpen && (
                  <div style={{ padding: "12px 16px 14px", background: C.lightHover, borderTop: `1px solid ${C.border}` }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "10px" }}>
                      <div style={{ gridColumn: "1/-1" }}><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Name</div><input value={m.name} onChange={e => dispatch(p => updateMaterial(p, m.id, { name: e.target.value }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }} /></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Type</div><select value={m.type} onChange={e => dispatch(p => updateMaterial(p, m.id, { type: e.target.value }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }}>{MATERIAL_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>State</div><select value={m.physicalState} onChange={e => dispatch(p => updateMaterial(p, m.id, { physicalState: e.target.value }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }}>{PHYSICAL_STATES.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Pref. unit</div><select value={m.preferredUnit} onChange={e => dispatch(p => updateMaterial(p, m.id, { preferredUnit: e.target.value }))} style={{ ...inp(), width: "100%", boxSizing: "border-box" }}>{PREFERRED_UNITS.map(u => <option key={u} value={u}>{u}</option>)}</select></div>
                      <div><div style={{ fontSize: "10px", color: C.midDark, marginBottom: "3px" }}>Density (kg/L)</div><input type="number" step="any" min="0" value={m.density ?? ""} onChange={e => dispatch(p => updateMaterial(p, m.id, { density: e.target.value ? parseFloat(e.target.value) : null }))} placeholder="e.g. 1.19" style={{ ...inp(), width: "100%", boxSizing: "border-box" }} /></div>
                    </div>
                    <label style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "11px", color: m.isAqueous ? C.blue : C.midDark, cursor: "pointer", marginBottom: "8px" }}>
                      <input type="checkbox" checked={!!m.isAqueous} onChange={e => dispatch(p => updateMaterial(p, m.id, { isAqueous: e.target.checked }))} style={{ accentColor: C.blue }} />
                      Aqueous material (used for aqueous/organic waste split in green metrics)
                    </label>
                    {project.compounds.length > 0 && (
                      <div>
                        <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "6px", fontWeight: 600 }}>
                          Composition (mass fractions) &Sigma; = {fSum.toFixed(3)}{Math.abs(fSum - 1) < 0.01 ? " ok" : " (should sum to 1.0)"}
                        </div>
                        {project.compounds.map(cmp => {
                          const entry = m.composition.find(x => x.compoundId === cmp.id);
                          const matLocks = lockedFractions[m.id];
                          const isLocked = matLocks instanceof Set && matLocks.has(cmp.id);
                          return (
                            <div key={cmp.id} style={{ display: "flex", alignItems: "center", gap: "6px", marginBottom: "4px" }}>
                              <span style={{ fontSize: "11px", flex: 1, color: C.dark }}>{cmp.symbol || cmp.name}</span>
                              <input type="number" step="any" min="0" max="1" placeholder="0.00" value={entry?.fraction ?? ""} onChange={e => {
                                const frac = e.target.value ? parseFloat(e.target.value) : 0;
                                const curComp = p => p.materials.find(x => x.id === m.id)?.composition || [];
                                dispatch(p => {
                                  const comp = curComp(p);
                                  const hasEntry = comp.some(x => x.compoundId === cmp.id);
                                  const base = hasEntry ? comp : [...comp, { compoundId: cmp.id, fraction: 0 }];
                                  const rebalanced = rebalanceCompositionFractions(base, cmp.id, frac, matLocks);
                                  const cleaned = rebalanced.filter(x => x.fraction > 0 || x.compoundId === cmp.id);
                                  return updateMaterial(p, m.id, { composition: cleaned });
                                });
                              }} style={{ ...inp(), width: "72px", textAlign: "right" }} />
                              {(m.composition || []).length > 1 && (
                                <button
                                  onClick={() => toggleLock(m.id, cmp.id)}
                                  title={isLocked ? "Unlock -- fraction will adjust during rebalance" : "Lock -- fraction stays fixed during rebalance"}
                                  style={{ background: "none", border: "none", cursor: "pointer", padding: "2px", fontSize: "12px", color: isLocked ? C.orange : C.lightBorder, lineHeight: 1 }}
                                >
                                  <Icon name={isLocked ? "lock" : "unlock"} size={11} />
                                </button>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}

          {/* Intermediate flow map -- reference section showing how intermediates flow between steps */}
          {intermediates.size > 0 && (
            <div style={{ marginTop: "20px" }}>
              <div style={{ fontSize: "13px", fontWeight: 700, color: C.dark, marginBottom: "12px" }}>Intermediate Material Flow</div>
              {[...intermediates].map(matId => {
                const mat = project.materials.find(m => m.id === matId);
                const stepsUsing = matToSteps[matId] || [];
                if (stepsUsing.length < 2) return null;
                const stepNames = stepsUsing.map(sid => {
                  const s = project.steps.find(x => x.id === sid);
                  return s ? `${s.sequence}. ${s.name}` : sid;
                });
                return (
                  <div key={matId} style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: "6px", padding: "12px 16px", marginBottom: "8px", display: "flex", alignItems: "center", gap: "12px" }}>
                    <span style={{ fontSize: "10px", background: C.orange + "22", color: C.orange, borderRadius: "3px", padding: "2px 6px", fontWeight: 700, flexShrink: 0 }}>INTERMEDIATE</span>
                    <span style={{ fontSize: "13px", fontWeight: 600, color: C.dark }}>{mat?.name || matId}</span>
                    <span style={{ color: C.border, fontSize: "13px" }}>&#8594;</span>
                    <span style={{ fontSize: "12px", color: C.midDark }}>{stepNames.join(" -> ")}</span>
                  </div>
                );
              }).filter(Boolean)}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
// === CONFIGURATION TAB =======================================================

// Hoisted to module scope so ConfigurationTab does not recreate it per render.
function LabelRow({ label, children }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "10px" }}>
      <span style={{ fontSize: "12px", color: C.midDark, width: "160px", flexShrink: 0 }}>{label}</span>
      <div style={{ flex: 1 }}>{children}</div>
    </div>
  );
}
// =============================================================================
// Dedicated tab for project configuration: batch target, process settings,
// labor rates, and project notes. Replaces the former sidebar settings panel.
// =============================================================================

function ConfigurationTab({ project, dispatch }) {
  const { batchResult } = useContext(SimContext);
  const s = project.settings, lr = project.laborRates;
  const upS = (field, val) => dispatch(p => ({ ...p, settings: { ...p.settings, [field]: val }, updatedAt: new Date().toISOString() }));
  const upR = (dept, val) => dispatch(p => ({ ...p, laborRates: p.laborRates.map(r => r.department === dept ? { ...r, rate: parseFloat(val) || 0 } : r), updatedAt: new Date().toISOString() }));
  const cfg = project.batchSizingConfig || {};
  const stepVolumes = batchResult?.stepVolumes || [];
  const totalBatches = stepVolumes.reduce((maxB, sv) => Math.max(maxB, sv?.batchCount || 1), 1);
  const limitingStep = stepVolumes.reduce((worst, sv) => {
    if (!sv) return worst;
    if (!worst) return sv;
    return (sv.batchCount || 1) > (worst.batchCount || 1) ? sv : worst;
  }, null);
  const inpS = { border: `1px solid ${C.border}`, borderRadius: "4px", padding: "6px 10px", fontSize: "13px", fontFamily: "inherit", background: "#fff", color: C.dark, outline: "none", width: "100%", boxSizing: "border-box" };

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "24px" }}>
        <Icon name="settings" size={18} />
        <span style={{ fontSize: "17px", fontWeight: 700, color: C.dark }}>Configuration</span>
        <span style={{ fontSize: "12px", color: C.midDark }}>{project.name}</span>
      </div>

      {/* Batch Target */}
      <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", padding: "16px 20px", marginBottom: "16px" }}>
        <div style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark, marginBottom: "14px" }}>Batch Target</div>
        <LabelRow label="Target output (kg)">
          <input type="number" min="0" step="any" value={cfg.targetMass ?? ""}
            onChange={e => dispatch(p => setTargetOutputMass(p, e.target.value ? parseFloat(e.target.value) : null))}
            placeholder="e.g. 10" style={inpS} />
        </LabelRow>
        <div style={{ marginTop: "10px", paddingTop: "10px", borderTop: `1px solid ${C.lightBorder}`, fontSize: "12px", color: C.midDark, lineHeight: 1.6 }}>
          {cfg.targetMass && cfg.targetMass > 0 && stepVolumes.length > 0 ? (
            <>
              <div>Estimated batches required: <strong style={{ color: C.dark, fontFamily: MONO }}>{totalBatches}</strong></div>
              {limitingStep && (
                <div>
                  Constraint step: <strong style={{ color: C.dark }}>{limitingStep.stepName}</strong>
                  {" "}({fmtLSig(limitingStep.perBatchVolL)} per batch{limitingStep.capacityVolL ? ` vs ${fmtLSig(limitingStep.capacityVolL)} capacity` : ""})
                </div>
              )}
            </>
          ) : (
            <div>Set a target output to compute required batch count from stoichiometric scaling and vessel limits.</div>
          )}
        </div>
      </div>

      {/* Process Settings */}
      <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", padding: "16px 20px", marginBottom: "16px" }}>
        <div style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark, marginBottom: "14px" }}>Process Settings</div>
        <LabelRow label="Temperature display"><select value={s.temperatureUnit || "C"} onChange={e => upS("temperatureUnit", e.target.value)} style={inpS}>{TEMP_UNITS.map(u => <option key={u} value={u}>{u === "C" ? "Celsius (" + String.fromCharCode(176) + "C)" : "Fahrenheit (" + String.fromCharCode(176) + "F)"}</option>)}</select></LabelRow>
        <LabelRow label="Mass balance tol."><input type="number" min="0" max="1" step="0.01" value={s.massBalanceTolerance} onChange={e => upS("massBalanceTolerance", parseFloat(e.target.value) ?? 0.05)} style={inpS} /></LabelRow>
        <div style={{ fontSize: "10px", color: C.midDark, marginTop: "8px", fontStyle: "italic" }}>Solid addition rate (%/h) and packaging rate (kg/h) are now configured per-operation in the Process Editor.</div>
      </div>

      {/* Labor Rates */}
      <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", padding: "16px 20px", marginBottom: "16px" }}>
        <div style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark, marginBottom: "14px" }}>Labor Rates</div>
        {lr.map(r => (
          <LabelRow key={r.department} label={`${r.name} -- ${r.department} ($/h)`}>
            <input type="number" value={r.rate} onChange={e => upR(r.department, e.target.value)} style={inpS} />
          </LabelRow>
        ))}
      </div>

      {/* Project Notes */}
      <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", padding: "16px 20px" }}>
        <div style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark, marginBottom: "14px" }}>Project Notes</div>
        <textarea
          value={project.notes || ""}
          onChange={e => dispatch(p => ({ ...p, notes: e.target.value, updatedAt: new Date().toISOString() }))}
          placeholder="Add process notes and assumptions..."
          rows={6}
          style={{
            width: "100%", border: `1px solid ${C.border}`, borderRadius: "5px", color: C.dark,
            fontSize: "13px", fontFamily: "inherit", padding: "10px 12px", resize: "vertical", boxSizing: "border-box",
            lineHeight: 1.6, outline: "none", background: "#fff"
          }}
        />
      </div>
    </div>
  );

// =============================================================================
// === GANTT TAB ===============================================================
// =============================================================================
// SVG-based horizontal Gantt chart. Y-axis = equipment lanes + department lanes.
// X-axis = time in hours. Each bar colored by operation type.
// Gantt view module.
// =============================================================================

function GanttTab({ project }) {
  const { schedule, cycleIds, durationMap } = useContext(SimContext);
  const [pxPerHour, setPxPerHour] = useState(60);
  const [tooltip, setTooltip] = useState(null);

  if (cycleIds.length > 0) return (
    <div style={{ padding: "40px 24px", color: C.orange, textAlign: "center" }}>
      <Icon name="warning" size={24} /><br /><br />
      <strong>Cycle detected in step dependencies.</strong><br />
      <span style={{ fontSize: "13px", color: C.midDark }}>Resolve the cycle before viewing the Gantt chart.</span>
    </div>
  );
  if (!schedule || schedule.scheduledOps.length === 0) return (
    <div style={{ padding: "40px 24px", color: C.midDark, textAlign: "center", fontSize: "13px" }}>
      No scheduled operations. Add steps and operations to see the Gantt chart.
    </div>
  );

  const { scheduledOps, totalDuration } = schedule;

  // Guard against Infinity/NaN total duration (e.g. from unconfigured operations)
  if (!Number.isFinite(totalDuration) || totalDuration <= 0) return (
    <div style={{ padding: "40px 24px", color: C.midDark, textAlign: "center", fontSize: "13px" }}>
      Could not compute a valid schedule duration. Check that all operations have amounts or durations set.
    </div>
  );
  const opById = Object.fromEntries(project.operations.map(o => [o.id, o]));
  const equipById = Object.fromEntries(project.equipment.map(e => [e.id, e]));

  // === Critical path computation (v47) ===
  // A step is on the critical path if its chain of dependencies is responsible
  // for the overall project duration. In convergent syntheses, shorter arms
  // have slack and are not critical.
  //
  // Algorithm: compute stepEndTime from scheduledOps, then trace back from the
  // step(s) finishing at totalDuration. An upstream step is critical if its
  // endTime equals the downstream critical step's startTime (no slack between them).
  const stepEndTimes = {};
  const stepStartTimes = {};
  for (const sop of scheduledOps) {
    const cleanId = sop.opId.endsWith("_qc") ? sop.opId.slice(0, -3) : sop.opId;
    const op = opById[cleanId];
    if (!op) continue;
    const sid = op.stepId;
    stepEndTimes[sid] = Math.max(stepEndTimes[sid] ?? 0, sop.endTime);
    if (stepStartTimes[sid] == null || sop.startTime < stepStartTimes[sid]) {
      stepStartTimes[sid] = sop.startTime;
    }
  }

  // BFS backward from steps finishing at totalDuration
  const criticalStepIds = new Set();
  const queue = [];
  for (const [sid, et] of Object.entries(stepEndTimes)) {
    if (Math.abs(et - totalDuration) < 0.001) queue.push(sid);
  }
  while (queue.length > 0) {
    const sid = queue.shift();
    if (criticalStepIds.has(sid)) continue;
    criticalStepIds.add(sid);
    const step = project.steps.find(s => s.id === sid);
    if (!step) continue;
    const thisStart = stepStartTimes[sid] ?? 0;
    for (const upId of (step.upstreamStepIds || [])) {
      // Upstream step is critical only if it finishes exactly when this step starts (no slack)
      if (Math.abs((stepEndTimes[upId] ?? 0) - thisStart) < 0.001) {
        queue.push(upId);
      }
    }
  }
  // An op is critical if its step is in criticalStepIds
  const isOpCritical = (op) => op && criticalStepIds.has(op.stepId);
  const hasCriticalPath = criticalStepIds.size > 0 && project.steps.length > 1;

  // Build lanes: equipment lanes + "PRD (no equip)" + "QC" lanes
  const laneOrder = [];
  const laneSet = new Set();
  for (const sop of scheduledOps) {
    const key = sop.equipId ? `equip:${sop.equipId}` : `dept:${sop.department}`;
    if (!laneSet.has(key)) { laneSet.add(key); laneOrder.push(key); }
  }

  const LANE_H = 38;
  const LABEL_W = 130;
  const HEADER_H = 32;
  const PADDING = 16;
  const svgW = Math.max(600, totalDuration * pxPerHour + LABEL_W + PADDING * 2);
  const svgH = laneOrder.length * LANE_H + HEADER_H + PADDING;

  const timeX = t => LABEL_W + t * pxPerHour;
  const laneY = idx => HEADER_H + idx * LANE_H;

  // Build step boundaries: start time of each step's first op, with step name
  const stepStarts = {};
  const stepNameByStart = {};
  for (const sop of scheduledOps) {
    const op = opById[sop.opId.replace("_qc", "")];
    if (op && !(op.stepId in stepStarts)) {
      stepStarts[op.stepId] = sop.startTime;
      const step = project.steps.find(s => s.id === op.stepId);
      stepNameByStart[sop.startTime] = step ? step.name : op.stepId;
    }
  }
  const stepBoundaries = Object.values(stepStarts).sort((a, b) => a - b);

  // Tick marks (every 2h, or every 4h if long)
  let tickInterval = 2;
  if (totalDuration > 48) {
    tickInterval = 8;
  } else if (totalDuration > 24) {
    tickInterval = 4;
  }
  const ticks = [];
  for (let t = 0; t <= totalDuration + tickInterval; t += tickInterval) ticks.push(t);

  const getLaneLabel = key => {
    if (key.startsWith("equip:")) {
      const id = key.slice(6);
      const eq = equipById[id];
      // Use vessel ID only (e.g. "PC-51") without the equipment type suffix
      return eq ? id : id;
    }
    // dept:PRD -> "PRD", dept:QC -> "QC Lab"
    const dept = key.slice(5);
    return dept === "QC" ? "QC Lab" : dept;
  };

  const fmtTime = h => fmtDurationSig(h).replace(" ", "");
  const TOOLTIP_W = 236;
  const TOOLTIP_H = 156;
  const tooltipLeft = tooltip ? clamp(tooltip.x + 12, 8, Math.max(8, window.innerWidth - TOOLTIP_W - 8)) : 8;
  const tooltipTop = tooltip ? clamp(tooltip.y - 10, 8, Math.max(8, window.innerHeight - TOOLTIP_H - 8)) : 8;

  return (
    <div style={{ flex: 1, overflowY: "auto", overflowX: "auto", padding: "20px 24px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "16px", flexWrap: "wrap" }}>
        <span style={{ fontSize: "17px", fontWeight: 700, color: C.dark }}>Gantt Chart</span>
        <span style={{ fontSize: "12px", color: C.midDark }}>{project.name}</span>
        <div style={{ marginLeft: "auto", display: "flex", gap: "6px", alignItems: "center" }}>
          <span style={{ fontSize: "11px", color: C.midDark }}>Zoom:</span>
          <Btn variant="light" size="sm" onClick={() => setPxPerHour(p => Math.min(p * 1.5, 300))}>+</Btn>
          <Btn variant="light" size="sm" onClick={() => setPxPerHour(p => Math.max(p / 1.5, 10))}>-</Btn>
          <Btn variant="light" size="sm" onClick={() => setPxPerHour(60)}>Reset</Btn>
          <span style={{ fontSize: "11px", color: C.midDark, fontFamily: MONO }}>Total: {fmtTime(totalDuration)}</span>
        </div>
      </div>

      <div style={{ position: "relative", display: "inline-block", minWidth: "100%" }}>
        <svg width={svgW} height={svgH} style={{ display: "block", fontFamily: "inherit", overflow: "visible" }}>
          {/* Lane backgrounds */}
          {laneOrder.map((key, idx) => (
            <rect key={key} x={0} y={laneY(idx)} width={svgW} height={LANE_H}
              fill={idx % 2 === 0 ? "#faf9f5" : "#f3f2eb"} />
          ))}

          {/* Step boundary lines + step name labels */}
          {stepBoundaries.map((t, i) => {
            const stepName = stepNameByStart[t];
            const nextT = stepBoundaries[i + 1] ?? (totalDuration + 4);
            const midX = timeX(t) + (timeX(nextT) - timeX(t)) / 2;
            return (
              <g key={i}>
                <line x1={timeX(t)} y1={HEADER_H} x2={timeX(t)} y2={svgH}
                  stroke={C.border} strokeWidth="1" strokeDasharray="4,3" />
                {stepName && (
                  <text x={timeX(t) + 4} y={HEADER_H - 6} textAnchor="start" fontSize="10" fill={C.midDark}
                    fontFamily="inherit" fontWeight="700" style={{ userSelect: "none" }}>
                    {stepName.length > 20 ? stepName.slice(0, 20) + "..." : stepName}
                  </text>
                )}
              </g>
            );
          })}

          {/* Time axis grid lines and labels */}
          {ticks.map(t => (
            <g key={t}>
              <line x1={timeX(t)} y1={HEADER_H} x2={timeX(t)} y2={svgH} stroke={C.lightBorder} strokeWidth="0.5" />
              <text x={timeX(t)} y={HEADER_H - 6} textAnchor="middle" fontSize="12" fill={C.midDark} fontFamily="inherit">
                {fmtTime(t)}
              </text>
            </g>
          ))}

          {/* Lane labels */}
          {laneOrder.map((key, idx) => {
            const label = getLaneLabel(key);
            return (
              <text key={key} x={LABEL_W - 8} y={laneY(idx) + LANE_H / 2 + 4} textAnchor="end"
                fontSize="13" fill={C.dark} fontFamily="inherit">
                {label.length > 18 ? label.slice(0, 18) + "..." : label}
              </text>
            );
          })}

          {/* Vertical label separator */}
          <line x1={LABEL_W} y1={HEADER_H} x2={LABEL_W} y2={svgH} stroke={C.border} strokeWidth="1" />
          <line x1={0} y1={HEADER_H} x2={svgW} y2={HEADER_H} stroke={C.border} strokeWidth="1" />

          {/* Operation bars */}
          {scheduledOps.map((sop, sopIdx) => {
            const isQcSuffix = sop.opId.endsWith("_qc");
            const op = opById[isQcSuffix ? sop.opId.slice(0, -3) : sop.opId];
            if (!op && !isQcSuffix) return null;
            const laneKey = sop.equipId ? `equip:${sop.equipId}` : `dept:${sop.department}`;
            const laneIdx = laneOrder.indexOf(laneKey);
            if (laneIdx < 0) return null;
            const barW = Math.max(2, (sop.endTime - sop.startTime) * pxPerHour);
            const barX = timeX(sop.startTime);
            const barY = laneY(laneIdx) + 5;
            const barH = LANE_H - 10;
            const opType = isQcSuffix ? "ipc" : (op?.type ?? "staging");
            const color = sop.department === "QC" ? "#7a5fa0" : (OP_TYPE_COLORS[opType] ?? C.midDark);
            const abbrevMap = {
              addition: "ADD", transfer: "XFR", reaction: "RXN", stir: "STR", heat_cool: "H/C",
              filtration: "FILT", distillation: "DIST", drying: "DRY", ipc: "IPC",
              release_testing: "REL", loss: "LOSS", inert_purge: "PURGE",
              ipc_cleaning: "CLN", changeover_cleaning: "C/O", packaging: "PKG", staging: "STAGE",
            };
            const label = isQcSuffix ? "QC" : (abbrevMap[opType] ?? opType.toUpperCase());
            const durationH = sop.endTime - sop.startTime;
            // v47: critical path bars get a bold dark border to distinguish them
            const isCritical = isOpCritical(op);

            return (
              <g key={`${sop.opId}-${sopIdx}`}
                onMouseEnter={e => setTooltip({ sop, op: isQcSuffix ? { ...op, type: "ipc_qc" } : op, x: e.clientX, y: e.clientY, durationH, isCritical })}
                onMouseMove={e => setTooltip(t => t ? { ...t, x: e.clientX, y: e.clientY } : null)}
                onMouseLeave={() => setTooltip(null)}
                style={{ cursor: "pointer" }}>
                <rect x={barX} y={barY} width={barW} height={barH} rx="2"
                  fill={color} opacity={sop.hasEquipOverlap ? 0.9 : 0.82}
                  stroke={isCritical ? "#1a1a1a" : "none"} strokeWidth={isCritical ? 2 : 0} />
                {sop.hasEquipOverlap && (
                  <rect x={barX} y={barY} width={barW} height={barH} rx="2"
                    fill="url(#hatch)" opacity={0.6} />
                )}
                {barW > 24 && (
                  <text x={barX + 4} y={barY + barH / 2 + 4} fontSize="11" fill="#fff" fontFamily="inherit" fontWeight="700">
                    {barW > 40 ? label : label.slice(0, 3)}
                  </text>
                )}
              </g>
            );
          })}

          {/* Hatch pattern for overlaps */}
          <defs>
            <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
              <line x1="0" y1="0" x2="0" y2="6" stroke="#cc0000" strokeWidth="2" opacity="0.7" />
            </pattern>
          </defs>
        </svg>

        {/* Tooltip */}
        {tooltip && (
          <div style={{
            position: "fixed", left: tooltipLeft, top: tooltipTop, background: C.dark, color: "#e8e6dc",
            borderRadius: "6px", padding: "8px 12px", fontSize: "11px", zIndex: 1000, pointerEvents: "none",
            border: "1px solid #3a3935", boxShadow: "0 4px 16px rgba(0,0,0,0.4)", minWidth: "160px", lineHeight: 1.6
          }}>
            <div style={{ fontWeight: 700, marginBottom: "4px", color: "#fff" }}>{tooltip.op?.type ?? ""}</div>
            {tooltip.sop.equipId && <div style={{ color: C.mid }}>Equip: <span style={{ fontFamily: MONO }}>{tooltip.sop.equipId}</span></div>}
            <div style={{ color: C.mid }}>Dept: {tooltip.sop.department}</div>
            <div style={{ color: C.mid }}>Start: <span style={{ fontFamily: MONO }}>{fmtSig(tooltip.sop.startTime, 4)}h</span></div>
            <div style={{ color: C.mid }}>End: <span style={{ fontFamily: MONO }}>{fmtSig(tooltip.sop.endTime, 4)}h</span></div>
            <div style={{ color: C.mid }}>Duration: <span style={{ fontFamily: MONO }}>{fmtSig(tooltip.durationH, 4)}h</span></div>
            {tooltip.isCritical && <div style={{ color: "#ffcc55", marginTop: "4px", fontWeight: 700 }}>Critical path</div>}
            {tooltip.sop.hasEquipOverlap && <div style={{ color: C.orange, marginTop: "4px" }}>Equipment overlap detected</div>}
          </div>
        )}
      </div>

      {/* Legend */}
      <div style={{ marginTop: "16px", display: "flex", flexWrap: "wrap", gap: "10px", alignItems: "center", fontSize: "10px", color: C.midDark }}>
        {Object.entries(OP_TYPE_COLORS).map(([type, color]) => (
          <span key={type} style={{ display: "flex", alignItems: "center", gap: "4px" }}>
            <span style={{ width: "10px", height: "10px", borderRadius: "2px", background: color, opacity: 0.85, display: "inline-block" }} />
            {type}
          </span>
        ))}
        <span style={{ display: "flex", alignItems: "center", gap: "4px" }}>
          <span style={{ width: "10px", height: "10px", borderRadius: "2px", background: "#7a5fa0", opacity: 0.85, display: "inline-block" }} />
          QC (IPC/Release)
        </span>
        <span style={{ display: "flex", alignItems: "center", gap: "4px", borderLeft: `1px solid ${C.border}`, paddingLeft: "10px" }}>
          <span style={{ width: "10px", height: "10px", borderRadius: "2px", background: "url(#hatch)", border: "1px solid #cc0000", display: "inline-block" }} />
          Equipment overlap (red hatch)
        </span>
        {hasCriticalPath && (
          <span style={{ display: "flex", alignItems: "center", gap: "4px", borderLeft: `1px solid ${C.border}`, paddingLeft: "10px" }}>
            <span style={{ width: "10px", height: "10px", borderRadius: "2px", background: "#888", border: "2px solid #1a1a1a", display: "inline-block" }} />
            Critical path (bold border)
          </span>
        )}
        <span style={{ borderLeft: `1px solid ${C.border}`, paddingLeft: "10px" }}>Dashed lines = step boundaries</span>
      </div>
    </div>
  );
}

// Native SVG donut chart -- hoisted to module scope.  Uses fmtUSD / fmtUSD0
// from shared utilities above.
function DonutChart({ data, size = 220 }) {
  const [hovered, setHovered] = useState(null);
  const cx = size / 2, cy = size / 2;
  const R = size * 0.43, r = size * 0.27;
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return null;
  let angle = -Math.PI / 2;
  const slices = data.map(d => {
    const sweep = (d.value / total) * 2 * Math.PI;
    const a1 = angle, a2 = angle + sweep;
    angle = a2;
    const x1 = cx + R * Math.cos(a1), y1 = cy + R * Math.sin(a1);
    const x2 = cx + R * Math.cos(a2), y2 = cy + R * Math.sin(a2);
    const ix1 = cx + r * Math.cos(a1), iy1 = cy + r * Math.sin(a1);
    const ix2 = cx + r * Math.cos(a2), iy2 = cy + r * Math.sin(a2);
    const large = sweep > Math.PI ? 1 : 0;
    const path = `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${r} ${r} 0 ${large} 0 ${ix1} ${iy1} Z`;
    return { ...d, path, midAngle: (a1 + a2) / 2, pct: (d.value / total * 100).toFixed(1) };
  });
  const hov = hovered != null ? slices[hovered] : null;
  return (
    <svg width={size} height={size} style={{ display: "block", margin: "0 auto", overflow: "visible" }}>
      {slices.map((s, i) => (
        <path key={i} d={s.path} fill={s.color}
          opacity={hovered === null || hovered === i ? 1 : 0.55}
          stroke={C.light} strokeWidth={2}
          style={{ cursor: "pointer", transition: "opacity 0.15s" }}
          onMouseEnter={() => setHovered(i)}
          onMouseLeave={() => setHovered(null)}
          transform={hovered === i ? `translate(${Math.cos(s.midAngle) * 4} ${Math.sin(s.midAngle) * 4})` : ""}
        />
      ))}
      <text x={cx} y={cy - 7} textAnchor="middle" style={{ fontSize: "11px", fill: C.midDark, fontFamily: "inherit" }}>
        {hov ? hov.name : "Total"}
      </text>
      <text x={cx} y={cy + 10} textAnchor="middle" style={{ fontSize: "13px", fontWeight: 700, fill: C.dark, fontFamily: MONO }}>
        {hov ? `${hov.pct}%` : `$${fmtUSD0(total)}`}
      </text>
      {hov && (
        <text x={cx} y={cy + 24} textAnchor="middle" style={{ fontSize: "11px", fill: C.midDark, fontFamily: MONO }}>
          ${fmtUSD(hov.value)}
        </text>
      )}
    </svg>
  );
}

// BOM table and cost breakdown using native SVG donut chart for category split.
// CC-026: $/kg product KPI badge in header (uses greenMetrics).
// CC-027: Batch-scaled BOM columns when batchResult.scaleFactor > 0.
// CC-028: Cost Insights card with fraction breakdown + scaled totals.
// Cost summary module.
// =============================================================================

function CostTab({ project }) {
  const { costResult, cycleIds, greenMetrics, batchResult } = useContext(SimContext);

  if (cycleIds.length > 0) return (
    <div style={{ padding: "40px 24px", color: C.orange, textAlign: "center" }}>
      <Icon name="warning" size={24} /><br /><br />
      <strong>Cycle detected in step dependencies.</strong><br />
      <span style={{ fontSize: "13px", color: C.midDark }}>Resolve the cycle before viewing cost breakdown.</span>
    </div>
  );
  if (!costResult) return (
    <div style={{ padding: "40px 24px", color: C.midDark, textAlign: "center", fontSize: "13px" }}>
      No cost data. Add steps with Addition operations and assign compounds with unit costs.
    </div>
  );

  const { totalBatchCost, byStep, byCategory, bom } = costResult;
  const { thS, tdS, numS } = TBL;   // shared table styles; also fixes missing thS/tdS (latent bug)
  const { sf, scaledBomMap, showScaled, totalBatches, hasBatchSizing } = deriveBatchScaling(batchResult);

  // CC-026: $/kg product KPI
  const productMassOut = greenMetrics?.productMassOut ?? 0;
  const costPerKg = (productMassOut > 0 && totalBatchCost > 0) ? totalBatchCost / productMassOut : null;

  // CSV export: cost breakdown by step
  const handleExportCostCSV = () => {
    if (!byStep || !byStep.length) return;
    const rows = [
      ["Step", "Materials ($)", "Equipment ($)", "Labor ($)", "Total ($)"],
      ...byStep.map(r => [r.stepName, r.materialCost, r.equipmentCost, r.laborCost, r.total]),
      ["TOTAL", byCategory.materials, byCategory.equipment, byCategory.labor, totalBatchCost],
    ];
    const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${project.name.replace(/\s+/g, "_")}_cost_breakdown.csv`; a.click(); URL.revokeObjectURL(url);
  };

  const pieData = [
    { name: "Materials", value: byCategory.materials, color: C.blue },
    { name: "Equipment", value: byCategory.equipment, color: C.orange },
    { name: "Labor", value: byCategory.labor, color: C.green },
  ].filter(d => d.value > 0);

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "20px" }}>
        <span style={{ fontSize: "17px", fontWeight: 700, color: C.dark }}>Cost Analysis</span>
        <span style={{ fontSize: "12px", color: C.midDark }}>{project.name}</span>
        <span style={{ marginLeft: "auto", fontFamily: MONO, fontSize: "15px", fontWeight: 700, color: C.dark }}>
          Total: ${fmtUSD(totalBatchCost)}
        </span>
        {costPerKg != null && (
          <span title="Cost per kg of product (requires mass balance to determine product mass)" style={{ fontFamily: MONO, fontSize: "13px", color: C.green, background: C.green + "18", border: `1px solid ${C.green}44`, borderRadius: "4px", padding: "2px 10px" }}>
            ${fmtUSD(costPerKg)}/kg product
          </span>
        )}
        {hasBatchSizing && (
          <span title="Batch requirement derived from target output and vessel limits." style={{ fontFamily: MONO, fontSize: "12px", color: C.orange, background: C.orange + "18", border: `1px solid ${C.orange}44`, borderRadius: "4px", padding: "2px 10px" }}>
            Batches: {totalBatches}
          </span>
        )}
        <Btn variant="ghost" size="sm" onClick={handleExportCostCSV} title="Export cost breakdown as CSV">Export CSV</Btn>
      </div>

      {/* Cost Breakdown */}
      <div style={{ display: "flex", gap: "28px", flexWrap: "wrap", marginBottom: "28px" }}>
        <div style={{ flex: "0 0 320px" }}>
          <div style={{ fontSize: "13px", fontWeight: 700, color: C.dark, marginBottom: "10px", paddingBottom: "6px", borderBottom: `1px solid ${C.border}` }}>Cost by Category</div>
          {pieData.length > 0 ? (
            <DonutChart data={pieData} size={220} />
          ) : (
            <div style={{ height: "200px", display: "flex", alignItems: "center", justifyContent: "center", color: C.midDark, fontSize: "13px" }}>
              No cost data to chart.
            </div>
          )}
        </div>
        <div style={{ flex: 1, minWidth: "200px" }}>
          <div style={{ fontSize: "13px", fontWeight: 700, color: C.dark, marginBottom: "10px", paddingBottom: "6px", borderBottom: `1px solid ${C.border}` }}>Summary</div>
          {[
            { label: "Materials", value: byCategory.materials, color: C.blue },
            { label: "Equipment", value: byCategory.equipment, color: C.orange },
            { label: "Labor", value: byCategory.labor, color: C.green },
          ].map(({ label, value, color }) => {
            const pct = totalBatchCost > 0 ? (value / totalBatchCost * 100).toFixed(1) : 0;
            return (
              <div key={label} style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "12px" }}>
                <span style={{ width: "10px", height: "10px", borderRadius: "50%", background: color, flexShrink: 0 }} />
                <span style={{ flex: 1, fontSize: "13px", color: C.dark }}>{label}</span>
                <span style={{ fontFamily: MONO, fontSize: "13px", color: C.dark }}>${fmtUSD(value)}</span>
                <span style={{ fontSize: "11px", color: C.midDark, width: "42px", textAlign: "right" }}>{pct}%</span>
              </div>
            );
          })}
          <div style={{ borderTop: `2px solid ${C.border}`, marginTop: "8px", paddingTop: "10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: "13px", fontWeight: 700, color: C.dark }}>Total</span>
            <span style={{ fontFamily: MONO, fontSize: "15px", fontWeight: 700, color: C.dark }}>${fmtUSD(totalBatchCost)}</span>
          </div>
        </div>
      </div>

      {/* Per-step cost table */}
      {byStep.length > 0 && byStep.some(s => s.total > 0) && (
        <div>
          <div style={{ fontSize: "13px", fontWeight: 700, color: C.dark, marginBottom: "10px", paddingBottom: "6px", borderBottom: `1px solid ${C.border}` }}>Cost by Step</div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", minWidth: "600px" }}>
              <thead>
                <tr>
                  <th style={thS}>Step</th>
                  <th style={{ ...thS, textAlign: "right" }}>Materials ($)</th>
                  <th style={{ ...thS, textAlign: "right" }}>Equipment ($)</th>
                  <th style={{ ...thS, textAlign: "right" }}>Labor ($)</th>
                  <th style={{ ...thS, textAlign: "right" }}>Total ($)</th>
                </tr>
              </thead>
              <tbody>
                {byStep.map((row, i) => {
                  const step = project.steps.find(s => s.id === row.stepId);
                  return (
                    <tr key={row.stepId} style={{ background: i % 2 === 0 ? "#fff" : C.lightHover }}>
                      <td style={tdS}>
                        <span style={{ fontFamily: MONO, fontSize: "10px", color: C.midDark, background: C.lightBorder, padding: "1px 5px", borderRadius: "3px", marginRight: "7px" }}>{step?.sequence ?? i + 1}</span>
                        {row.stepName}
                      </td>
                      <td style={{ ...tdS, textAlign: "right" }}><span style={{ ...numS, color: row.materialCost > 0 ? C.blue : C.midDark }}>{row.materialCost > 0 ? `$${fmtUSD(row.materialCost)}` : "--"}</span></td>
                      <td style={{ ...tdS, textAlign: "right" }}><span style={{ ...numS, color: row.equipmentCost > 0 ? C.orange : C.midDark }}>{row.equipmentCost > 0 ? `$${fmtUSD(row.equipmentCost)}` : "--"}</span></td>
                      <td style={{ ...tdS, textAlign: "right" }}><span style={{ ...numS, color: row.laborCost > 0 ? C.green : C.midDark }}>{row.laborCost > 0 ? `$${fmtUSD(row.laborCost)}` : "--"}</span></td>
                      <td style={{ ...tdS, textAlign: "right", fontWeight: 600 }}><span style={numS}>{row.total > 0 ? `$${fmtUSD(row.total)}` : "--"}</span></td>
                    </tr>
                  );
                })}
                <tr style={{ background: C.lightHover, borderTop: `2px solid ${C.border}` }}>
                  <td style={{ ...tdS, fontWeight: 700, color: C.dark }}>Grand Total</td>
                  <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={{ ...numS, color: C.blue }}>${fmtUSD(byCategory.materials)}</span></td>
                  <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={{ ...numS, color: C.orange }}>${fmtUSD(byCategory.equipment)}</span></td>
                  <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={{ ...numS, color: C.green }}>${fmtUSD(byCategory.labor)}</span></td>
                  <td style={{ ...tdS, textAlign: "right", fontWeight: 700 }}><span style={{ ...numS }}>${fmtUSD(totalBatchCost)}</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* CC-028: Cost Insights card */}
      {totalBatchCost > 0 && (
        <div style={{ marginTop: "24px", padding: "16px 20px", background: C.lightHover, border: `1px dashed ${C.border}`, borderRadius: "8px" }}>
          <div style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark, marginBottom: "12px" }}>Cost Insights</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "24px", fontSize: "12px", color: C.dark }}>
            <div>
              <div style={{ color: C.midDark, marginBottom: "3px" }}>Material fraction</div>
              <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: "14px", color: C.blue }}>{totalBatchCost > 0 ? ((byCategory.materials / totalBatchCost) * 100).toFixed(1) : 0}%</div>
            </div>
            <div>
              <div style={{ color: C.midDark, marginBottom: "3px" }}>Equipment fraction</div>
              <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: "14px", color: C.orange }}>{totalBatchCost > 0 ? ((byCategory.equipment / totalBatchCost) * 100).toFixed(1) : 0}%</div>
            </div>
            <div>
              <div style={{ color: C.midDark, marginBottom: "3px" }}>Labor fraction</div>
              <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: "14px", color: C.green }}>{totalBatchCost > 0 ? ((byCategory.labor / totalBatchCost) * 100).toFixed(1) : 0}%</div>
            </div>
            {costPerKg != null && (
              <div>
                <div style={{ color: C.midDark, marginBottom: "3px" }}>Cost / kg product</div>
                <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: "14px", color: C.dark }}>${fmtUSD(costPerKg)}</div>
              </div>
            )}
            {showScaled && sf != null && (
              <div>
                <div style={{ color: C.midDark, marginBottom: "3px" }}>Total cost at target output</div>
                <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: "14px", color: C.orange }}>
                  ${fmtUSD(bom.reduce((s, r) => { const sk = scaledBomMap[r.materialId] ?? null; return s + (sk != null && r.unitCostPerKg > 0 ? sk * r.unitCostPerKg : 0); }, 0) + byCategory.equipment * sf + byCategory.labor * sf)}
                </div>
                <div style={{ fontSize: "10px", color: C.midDark, marginTop: "2px" }}>Estimated across {totalBatches} batch{totalBatches === 1 ? "" : "es"}.</div>
              </div>
            )}
            <div>
              <div style={{ color: C.midDark, marginBottom: "3px" }}>Steps costed</div>
              <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: "14px", color: C.dark }}>{byStep.filter(s => s.total > 0).length} / {byStep.length}</div>
            </div>
          </div>
        </div>
      )}

      {/* Cost Sankey (embedded from former standalone tab) */}
      <CostSankeySection project={project} />
    </div>
  );
}

// === COST SANKEY SECTION (embedded in Cost tab) ==============================
// =============================================================================
// Cost flow Sankey diagram. Two-column hand-rolled SVG layout.
// Cost mode: steps -> cost categories (Materials / Equipment / Labor).
// Rendered as a collapsible section within CostTab.
// =============================================================================

function CostSankeySection({ project }) {
  const [expanded, setExpanded] = useState(true);
  const { costResult } = useContext(SimContext);

  function buildCostNodes() {
    if (!costResult) return { nodes: [], links: [] };
    const { byStep, byCategory } = costResult;
    const stepNodes = byStep
      .filter(s => s.total > 0 && Number.isFinite(s.total))
      .map((s, i) => ({ id: "step-" + s.stepId, label: s.stepName, col: 0, idx: i }));
    const catDefs = [
      { id: "cat-mat", label: "Materials", val: byCategory.materials },
      { id: "cat-equip", label: "Equipment", val: byCategory.equipment },
      { id: "cat-labor", label: "Labor", val: byCategory.labor },
    ].filter(c => c.val > 0 && Number.isFinite(c.val));
    const catNodes = catDefs.map((c, i) => ({ id: c.id, label: c.label, col: 1, idx: i }));
    const nodes = [...stepNodes, ...catNodes];
    const stepNodeIds = new Set(stepNodes.map(n => n.id));
    const links = [];
    byStep.forEach(s => {
      const sid = "step-" + s.stepId;
      if (!stepNodeIds.has(sid)) return;
      if (s.materialCost > 0 && Number.isFinite(s.materialCost)) links.push({ src: sid, dst: "cat-mat", value: s.materialCost });
      if (s.equipmentCost > 0 && Number.isFinite(s.equipmentCost)) links.push({ src: sid, dst: "cat-equip", value: s.equipmentCost });
      if (s.laborCost > 0 && Number.isFinite(s.laborCost)) links.push({ src: sid, dst: "cat-labor", value: s.laborCost });
    });
    return { nodes, links };
  }

  const { nodes, links } = buildCostNodes();

  if (!costResult || nodes.length === 0 || links.length === 0) return null;

  // Layout geometry
  const W = 720, H = Math.max(400, nodes.filter(n => n.col === 0).length * 80 + 80), PAD = 48, NODE_W = 22;
  const COL_X = [PAD + NODE_W / 2, W - PAD - NODE_W / 2];

  // Compute node total values
  const nodeVal = {};
  nodes.forEach(n => { nodeVal[n.id] = 0; });
  links.forEach(l => {
    nodeVal[l.src] = (nodeVal[l.src] ?? 0) + l.value;
    nodeVal[l.dst] = (nodeVal[l.dst] ?? 0) + l.value;
  });

  // Node Y layout (per column)
  const nodeY = {};
  [0, 1].forEach(col => {
    const cnodes = nodes.filter(n => n.col === col).sort((a, b) => nodeVal[b.id] - nodeVal[a.id]);
    const totalVal = cnodes.reduce((s, n) => s + (nodeVal[n.id] ?? 0), 0);
    const availH = H - PAD * 2;
    let cursor = PAD;
    cnodes.forEach(n => {
      const frac = (totalVal > 0 && Number.isFinite(totalVal)) ? nodeVal[n.id] / totalVal : 1 / Math.max(1, cnodes.length);
      const nh = Math.max(18, (Number.isFinite(frac) ? frac : 0) * availH * 0.92);
      nodeY[n.id] = { top: cursor, height: nh };
      cursor += nh + 8;
    });
  });

  // Link stacking cursors
  const srcCur = {}, dstCur = {};
  nodes.forEach(n => { srcCur[n.id] = nodeY[n.id]?.top ?? 0; dstCur[n.id] = nodeY[n.id]?.top ?? 0; });
  const COLORS = [C.blue, C.orange, C.green, "#a8729e", "#7aaa9e", "#c4a44b", "#d97757", "#8888aa"];

  const fmtVal = v => "$" + (v >= 1000 ? (v / 1000).toFixed(1) + "k" : v.toFixed(0));

  return (
    <div style={{ marginTop: "28px" }}>
      <div
        onClick={() => setExpanded(!expanded)}
        style={{ display: "flex", alignItems: "center", gap: "8px", cursor: "pointer", padding: "10px 0", borderBottom: `1px solid ${C.border}`, marginBottom: expanded ? "12px" : "0" }}
      >
        <Icon name={expanded ? "chevronDown" : "chevronRight"} size={12} color={C.midDark} />
        <span style={{ fontSize: "13px", fontWeight: 700, color: C.dark }}>Cost Flow Sankey</span>
        <span style={{ fontSize: "12px", color: C.midDark }}>Steps &rarr; Cost categories</span>
        <span style={{ marginLeft: "auto", fontSize: "12px", fontFamily: MONO, color: C.midDark }}>
          Total: ${costResult.totalBatchCost.toLocaleString(undefined, { maximumFractionDigits: 0 })}
        </span>
      </div>
      {expanded && (
        <div style={{ overflow: "auto", display: "flex", justifyContent: "center", background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", padding: "16px" }}>
          <svg width={W} height={H} style={{ fontFamily: "inherit", display: "block" }}>
            {/* Links */}
            {links.map((link, li) => {
              const srcNodeH = nodeY[link.src]?.height ?? 1;
              const srcNodeTotalVal = nodeVal[link.src] ?? 1;
              const rawLinkH = (Number.isFinite(link.value) && Number.isFinite(srcNodeTotalVal) && srcNodeTotalVal > 0)
                ? (link.value / srcNodeTotalVal) * srcNodeH
                : 0;
              const linkH = Math.max(2, rawLinkH);
              const srcNY = nodeY[link.src]; const dstNY = nodeY[link.dst];
              if (!srcNY || !dstNY) return null;
              const y0 = srcCur[link.src], y1 = dstCur[link.dst];
              srcCur[link.src] += linkH + 1; dstCur[link.dst] += linkH + 1;
              const x0 = COL_X[0] + NODE_W / 2 + 2, x1 = COL_X[1] - NODE_W / 2 - 2;
              const cpX = (x0 + x1) / 2;
              const col = COLORS[li % COLORS.length];
              return (
                <g key={li}>
                  <path d={`M${x0},${y0} C${cpX},${y0} ${cpX},${y1} ${x1},${y1} L${x1},${y1 + linkH} C${cpX},${y1 + linkH} ${cpX},${y0 + linkH} ${x0},${y0 + linkH} Z`}
                    fill={col} fillOpacity={0.22} stroke={col} strokeWidth={0.5} strokeOpacity={0.35} />
                  <text x={(x0 + x1) / 2} y={(y0 + y1) / 2 + 5} textAnchor="middle" fontSize={9} fill={col} fillOpacity={0.8}>
                    {fmtVal(link.value)}
                  </text>
                </g>
              );
            })}
            {/* Nodes */}
            {nodes.map((n, ni) => {
              const ny = nodeY[n.id]; if (!ny) return null;
              const x = COL_X[n.col], col = COLORS[ni % COLORS.length];
              const lx = n.col === 0 ? x + NODE_W / 2 + 6 : x - NODE_W / 2 - 6;
              const anchor = n.col === 0 ? "start" : "end";
              const nh = Math.max(8, ny.height);
              const label = n.label.length > 28 ? n.label.slice(0, 26) + "..." : n.label;
              return (
                <g key={n.id}>
                  <rect x={x - NODE_W / 2} y={ny.top} width={NODE_W} height={nh} rx={3} fill={col} fillOpacity={0.88} />
                  <text x={lx} y={ny.top + nh / 2 + 2} textAnchor={anchor} fontSize={11} fill={C.dark} fontWeight={600}>{label}</text>
                  <text x={lx} y={ny.top + nh / 2 + 14} textAnchor={anchor} fontSize={10} fill={C.midDark}>{fmtVal(nodeVal[n.id] ?? 0)}</text>
                </g>
              );
            })}
            {/* Column labels */}
            <text x={COL_X[0]} y={H - 10} textAnchor="middle" fontSize={11} fill={C.midDark} fontStyle="italic">Steps</text>
            <text x={COL_X[1]} y={H - 10} textAnchor="middle" fontSize={11} fill={C.midDark} fontStyle="italic">Categories</text>
          </svg>
        </div>
      )}
    </div>
  );
}

// --- GreenMetricsSection -----------------------------------------------------
// Renders the green chemistry KPI cards and mass flow summary.
// Receives all pre-computed values as props so OverviewTab stays slim.
function GreenMetricsSection({ gm, hasGreen, pmiColor, pmiLabel, pmiNote, typeColors, typeOrder, cardS, numS, labelS, noteS }) {
  const { totalMassIn = 0, productMassOut = 0, pmi = null,
    wasteKg = 0, aqueousWasteKg = 0, organicWasteKg = 0, byMaterialType = {},
    productTrackingMode = "heuristic", productCompoundNames = [] } = gm;
  if (!hasGreen) return (
    <div style={{ padding: "20px", color: C.midDark, fontSize: "13px", marginBottom: "24px" }}>
      No mass flow data. Add addition operations to compute green metrics.
    </div>
  );
  return (
    <>
      <div style={{ fontSize: "13px", fontWeight: 700, color: C.midDark, marginBottom: "12px", textTransform: "uppercase", letterSpacing: "0.06em" }}>Green Chemistry Metrics</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "14px", marginBottom: "18px" }}>
        <div style={cardS}>
          <div style={labelS}>Process Mass Intensity</div>
          <div style={{ ...numS, color: pmiColor }}>{pmiLabel}</div>
          <div style={noteS}>{pmiNote}</div>
        </div>
        <div style={cardS}>
          <div style={labelS}>Estimated Waste</div>
          <div style={{ ...numS, color: wasteKg > totalMassIn * 0.5 ? "#c44" : C.midDark }}>{fmtKgSig(wasteKg)}</div>
          <div style={noteS}>{totalMassIn > 0 ? fmtPctSig((wasteKg / totalMassIn) * 100, 3) : "0%"} of total input</div>
        </div>
        <div style={cardS}>
          <div style={labelS}>Organic Waste</div>
          <div style={{ ...numS, color: C.orange }}>{fmtKgSig(organicWasteKg)}</div>
          <div style={noteS}>{wasteKg > 0 ? fmtPctSig((organicWasteKg / wasteKg) * 100, 3) : "0%"} of waste</div>
        </div>
        <div style={cardS}>
          <div style={labelS}>Aqueous Waste</div>
          <div style={{ ...numS, color: C.blue }}>{fmtKgSig(aqueousWasteKg)}</div>
          <div style={noteS}>{wasteKg > 0 ? fmtPctSig((aqueousWasteKg / wasteKg) * 100, 3) : "0%"} of waste</div>
        </div>
      </div>

      <div style={cardS}>
        <div style={{ ...labelS, marginBottom: "12px" }}>Mass Flow Summary</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "16px", fontSize: "13px" }}>
          <div>
            <div style={{ color: C.midDark, marginBottom: "4px" }}>Total Mass In</div>
            <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: "16px" }}>{fmtKgSig(totalMassIn)}</div>
          </div>
          <div>
            <div style={{ color: C.midDark, marginBottom: "4px" }}>Product Mass Out</div>
            <div style={{ fontFamily: MONO, fontWeight: 600, fontSize: "16px", color: C.green }}>
              {productMassOut > 0 ? fmtKgSig(productMassOut) : "Unknown"}
            </div>
            {productTrackingMode === "explicit"
              ? <div style={{ fontSize: "10px", color: C.green, marginTop: "3px" }}>explicit tracking: {productCompoundNames.join(", ") || "product compound"}</div>
              : <div style={{ fontSize: "10px", color: C.midDark, marginTop: "3px" }}>heuristic (last step balance)</div>
            }
          </div>
          <div>
            <div style={{ color: C.midDark, marginBottom: "4px" }}>PMI calculation</div>
            <div style={{ fontFamily: MONO, fontSize: "13px", color: C.midDark }}>
              {fmtKgSig(totalMassIn)} / {productMassOut > 0 ? fmtKgSig(productMassOut) : "?"} = {pmiLabel}
            </div>
          </div>
        </div>
      </div>

      <div style={cardS}>
        <div style={{ ...labelS, marginBottom: "14px" }}>Input Mass by Material Type</div>
        {typeOrder.length === 0
          ? <div style={{ color: C.midDark, fontSize: "13px" }}>No addition operations found.</div>
          : typeOrder.map(t => {
            const frac = totalMassIn > 0 ? byMaterialType[t].massIn / totalMassIn : 0;
            const col = typeColors[t] ?? C.midDark;
            return (
              <div key={t} style={{ marginBottom: "10px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12px", marginBottom: "3px" }}>
                  <span style={{ color: C.dark, textTransform: "capitalize" }}>{t}</span>
                  <span style={{ fontFamily: MONO }}>{fmtKgSig(byMaterialType[t].massIn)} ({fmtPctSig(frac * 100, 3)})</span>
                </div>
                <div style={{ background: C.lightBorder, borderRadius: "3px", height: "10px", overflow: "hidden" }}>

    </>

function OverviewTab({ project }) {
  const { greenMetrics, durationMap, costResult } = useContext(SimContext);

  const hasGreen = !!greenMetrics;
  const gm = greenMetrics || {};
  const { pmi = null, byMaterialType = {} } = gm;

  let pmiColor = C.midDark;
  if (pmi !== null) { pmiColor = pmi < 10 ? C.green : pmi < 50 ? C.orange : "#c44"; }
  const pmiLabel = pmi === null ? "N/A" : fmtSig(pmi, 4);
  let pmiNote = "Product mass could not be determined.";
  if (pmi !== null) pmiNote = pmi < 10 ? "Excellent (PMI < 10)" : pmi < 25 ? "Good (PMI < 25)" : pmi < 100 ? "Fair -- consider solvent reduction" : "High -- significant waste";

  const typeColors = { solvent: C.blue, reagent: C.orange, product: C.green, reactant: "#a8729e" };
  const typeOrder = Object.keys(byMaterialType).sort((a, b) => byMaterialType[b].massIn - byMaterialType[a].massIn);
  const cardS = { background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", padding: "20px 24px", marginBottom: "16px" };
  const numS = { fontFamily: MONO, fontSize: "26px", fontWeight: 700 };
  const labelS = { fontSize: "11px", color: C.midDark, marginBottom: "6px", textTransform: "uppercase", letterSpacing: "0.06em" };
  const noteS = { fontSize: "12px", color: C.midDark, marginTop: "6px", lineHeight: 1.5 };

  const fmtDur = op => {
    const dr = durationMap[op.id];
    if (op.duration?.isOverridden && op.duration.override != null)
      return fmtSig(op.duration.override, 4) + " " + op.duration.unit + " (override)";
    if (dr?.calculated != null) return fmtSig(dr.calculated, 4) + " " + dr.unit + " (calc)";
    return "Not set";
  };
  const fmtF = v => (v === null || v === undefined || v === "") ? "--" : String(v);
  const recThS = { padding: "6px 10px", textAlign: "left", borderBottom: `1px solid ${C.border}`, fontSize: "11px", fontWeight: 700, color: C.midDark, textTransform: "uppercase", letterSpacing: "0.04em" };
  const recTdS = { padding: "6px 10px", fontSize: "12px", color: C.dark, borderBottom: `1px solid ${C.lightBorder}`, verticalAlign: "top" };
  const getOpsForStep = step => (step.itemIds || []).flatMap(id => {
    const direct = project.operations.find(o => o.id === id && !o.compositeOperationId);
    if (direct) return [{ op: direct, composite: null }];
    const comp = project.compositeOperations.find(c => c.id === id);
    if (comp) return (comp.operationIds || []).map(oid => ({
      op: project.operations.find(o => o.id === oid), composite: comp
    })).filter(x => x.op);
    return [];
  });
  const steps = [...project.steps].sort((a, b) => a.sequence - b.sequence);

  return (
    <div style={{ flex: 1, overflow: "auto", padding: "20px 24px" }}>
      <div style={{ maxWidth: "920px", margin: "0 auto" }}>
        <h2 style={{ fontSize: "17px", fontWeight: 700, marginBottom: "18px", color: C.dark }}>Overview</h2>
        <ProcessSummarySection project={project} steps={steps} fmtDur={fmtDur} fmtF={fmtF}
          recThS={recThS} recTdS={recTdS} getOpsForStep={getOpsForStep} costResult={costResult} />
        <GreenMetricsSection gm={gm} hasGreen={hasGreen} pmiColor={pmiColor} pmiLabel={pmiLabel} pmiNote={pmiNote}
          typeColors={typeColors} typeOrder={typeOrder} cardS={cardS} numS={numS} labelS={labelS} noteS={noteS} />
      </div>
      <style>{`
        @media print {
          .no-print { display: none !important; }
          body { background: #fff !important; }
          * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
      `}</style>
    </div>
  );
}

          r.unitCostPerKg > 0 ? r.unitCostPerKg : "",

        mat?.type ?? "",

        r.unitCostPerKg > 0 ? r.unitCostPerKg : "",
        r.lineCost > 0 ? r.lineCost : "",

// The namespace object IS window.ReactFlow; the ReactFlow component is
// window.ReactFlow.ReactFlow. Destructure as:

// StepNode -- custom React Flow node type for a single process step.
// Receives step name, type badge, and current selection state via data prop.
function StepNode({ data }) {
  const { label, stepName } = data;
  return (
    <div style={{
      background: "#fff", border: "2px solid " + C.blue, borderRadius: "8px",
      padding: "8px 12px", minWidth: "140px", fontSize: "12px",
