// PfdMatNodeRF -- full material detail card with React Flow handles (v53).
// Content mirrors PfdDetailNodeRF from the prior version; adds Handle on left (target) and right (source).
// Editable fields: MW (click), Assay (click), Weight (product only, click).
// All edits dispatch to project state via data.dispatch.
function PfdMatNodeRF({ data }) {
  if (typeof ReactFlow === "undefined") {
    return <div style={{ padding: "8px 12px", border: "2px solid #888", borderRadius: "8px", background: "#fff", fontSize: "12px" }}>
      {data.mat ? data.mat.name : "Material"}
    </div>;
  }
  const { Handle, Position } = ReactFlow;

  const {
    mat, mw, assay, moles, weightKg, isProduct, isProducedByProductStep,
    armColor, targetMass, dispatch, blendNames, smiles, compoundById,
  } = data;

  const [mwEdit, setMwEdit] = React.useState(null);
  const [assayEdit, setAssayEdit] = React.useState(null);
  const [wgtEdit, setWgtEdit] = React.useState(null);

  const CW = 214, CH = 236, SH = 84;
  const firstCmpId = (mat?.composition || [])[0]?.compoundId;
  const smilesRaw = String(smiles || "").trim();
  const cardStroke = isProducedByProductStep ? 2.5 : 1.5;
  const isBlend = blendNames && blendNames.length > 0;
  const name = mat?.name ?? "(no material)";

  function commitMw(raw) {
    const n = parseFloat(raw);
    if (!isNaN(n) && n > 0 && firstCmpId) {
      dispatch(p => updateCompound(p, firstCmpId, { molecularWeight: parseFloat(n.toFixed(4)) }));
    }
    setMwEdit(null);
  }
  function commitAssay(raw) {
    const n = parseFloat(raw);
    if (!isNaN(n) && n >= 0 && n <= 100 && mat) {
      const entry = (mat.composition || [])[0];
      if (entry) {
        const rebalanced = rebalanceCompositionFractions(mat.composition, entry.compoundId, parseFloat((n / 100).toFixed(6)));
        dispatch(p => updateMaterial(p, mat.id, { composition: rebalanced }));
      }
    }
    setAssayEdit(null);
  }
  function commitWeight(raw) {
    const n = parseFloat(raw);
    if (!isNaN(n) && n > 0) {
      dispatch(p => setTargetOutputMass(p, n));
    }
    setWgtEdit(null);
  }

  const fPct = v => v == null ? "--" : v.toFixed(1) + "%";
  const fMolDisplay = (mol, mwVal) => {
    if (mol == null || mwVal == null) return "--";
    return mol < 0.1 ? fmtSig(mol * 1000, 3) + " mmol" : fmtSig(mol, 3) + " mol";
  };

  return (
    <div style={{
      width: CW, height: CH,
      border: `${cardStroke}px solid ${armColor}`,
      borderRadius: 8, background: "#fff",
      boxShadow: isProducedByProductStep ? ("0 2px 14px " + armColor + "44") : "0 1px 6px rgba(0,0,0,0.10)",
      display: "flex", flexDirection: "column", overflow: "visible",
      fontFamily: "system-ui,-apple-system,'Segoe UI',sans-serif",
    }}>
      {/* Left handle (target) -- materials receive flow from upstream steps */}
      <Handle type="target" position={Position.Left}
        style={{ background: armColor, width: 10, height: 10, border: "2px solid #fff", left: -6 }} />

      {/* SMILES or blend names top panel */}
      <div style={{
        height: SH, background: armColor + "12",
        borderBottom: "1px solid " + armColor + "28",
        borderRadius: "6px 6px 0 0",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        overflow: "hidden", padding: isBlend ? "6px 8px" : 0,
      }}>
        {isBlend ? (
          <div style={{ width: "100%" }}>
            <div style={{ fontSize: "9px", color: armColor, fontWeight: 700, marginBottom: "4px" }}>Blend:</div>
            {blendNames.map((n, i) => (
              <div key={i} style={{ fontSize: "9px", color: "#333",
                whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{n}</div>
            ))}
          </div>
        ) : (
          <SmilesRenderer smiles={smilesRaw || null} width={CW - 20} height={SH - 8} />
        )}
      </div>

      {/* Property grid */}
      <div style={{ flex: 1, padding: "6px 9px", display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{
          fontSize: "11px", fontWeight: 700, color: "#222",
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
          paddingBottom: 4, borderBottom: "1px solid #e8e8e8", marginBottom: 3,
        }} title={name}>{name}</div>

        {/* MW */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
          fontSize: "11px", padding: "2px 0", borderBottom: "1px solid #f0f0f0" }}>
          <span style={{ color: "#666" }}>MW</span>
          {mwEdit !== null ? (
            <input type="number" step="any" min="0" value={mwEdit}
              onChange={e => setMwEdit(e.target.value)}
              onBlur={e => commitMw(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") commitMw(mwEdit); if (e.key === "Escape") setMwEdit(null); }}
              style={{ width: 72, fontSize: "11px", fontFamily: MONO, border: "none",
                borderBottom: "1px solid " + C.orange, outline: "none", background: "transparent",
                color: "#222", textAlign: "right" }} autoFocus />
          ) : (
            <span onClick={firstCmpId ? () => setMwEdit(mw != null ? String(mw) : "") : undefined}
              title={firstCmpId ? "Click to edit MW" : ""}
              style={{ fontFamily: MONO, fontSize: "11px",
                color: firstCmpId ? "#222" : "#999",
                cursor: firstCmpId ? "text" : "default",
                borderBottom: firstCmpId ? "1px dashed #888" : "none" }}>
              {mw != null ? mw + " g/mol" : "--"}
            </span>
          )}
        </div>

        {/* Moles */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
          fontSize: "11px", padding: "2px 0", borderBottom: "1px solid #f0f0f0" }}>
          <span style={{ color: "#666" }}>Moles</span>
          <span style={{ fontFamily: MONO, color: "#222" }}>{fMolDisplay(moles, mw)}</span>
        </div>

        {/* Assay */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
          fontSize: "11px", padding: "2px 0", borderBottom: "1px solid #f0f0f0" }}>
          <span style={{ color: "#666" }}>Assay</span>
          {assayEdit !== null ? (
            <input type="number" step="any" min="0" max="100" value={assayEdit}
              onChange={e => setAssayEdit(e.target.value)}
              onBlur={e => commitAssay(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") commitAssay(assayEdit); if (e.key === "Escape") setAssayEdit(null); }}
              style={{ width: 72, fontSize: "11px", fontFamily: MONO, border: "none",
                borderBottom: "1px solid " + C.orange, outline: "none", background: "transparent",
                color: "#222", textAlign: "right" }} autoFocus />
          ) : (
            <span onClick={(mat?.composition?.length > 0) ? () => setAssayEdit(assay != null ? String(assay.toFixed(2)) : "") : undefined}
              title={(mat?.composition?.length > 0) ? "Click to edit assay %" : ""}
              style={{ fontFamily: MONO, fontSize: "11px",
                color: (mat?.composition?.length > 0) ? "#222" : "#999",
                cursor: (mat?.composition?.length > 0) ? "text" : "default",
                borderBottom: (mat?.composition?.length > 0) ? "1px dashed #888" : "none" }}>
              {fPct(assay)}
            </span>
          )}
        </div>

        {/* Weight -- editable for product node */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
          fontSize: "11px", padding: "2px 0" }}>
          <span style={{ color: "#666" }}>Weight</span>
          {isProducedByProductStep ? (
            wgtEdit !== null ? (
              <input value={wgtEdit}
                onChange={e => setWgtEdit(e.target.value)}
                onBlur={e => commitWeight(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") commitWeight(wgtEdit); if (e.key === "Escape") setWgtEdit(null); }}
                style={{ width: 80, fontSize: "11px", fontFamily: MONO, border: "none",
                  borderBottom: "1px solid " + C.blue, outline: "none", background: "transparent",
                  color: "#222", textAlign: "right" }} autoFocus />
            ) : (
              <span onClick={() => setWgtEdit(String(targetMass ?? weightKg ?? ""))}
                title="Click to set target batch weight"
                style={{ fontFamily: MONO, fontSize: "11px", color: C.blue, fontWeight: 600,
                  borderBottom: "1px dashed " + C.blue, cursor: "text" }}>
                {targetMass != null ? targetMass.toFixed(2) + " kg" : fmtKgSig(weightKg)}
              </span>
            )
          ) : (
            <span style={{ fontFamily: MONO, fontSize: "11px", color: "#999" }}>{fmtKgSig(weightKg)}</span>
          )}
        </div>
      </div>

      {/* Right handle (source) -- materials feed into downstream steps */}
      <Handle type="source" position={Position.Right}
        style={{ background: armColor, width: 10, height: 10, border: "2px solid #fff", right: -6 }} />
    </div>
  );
}

// PfdStepEdgeRF -- custom edge rendering a step name + editable yield between material nodes (v53).
// v56: supports both straight (getStraightPath) and curved (getBezierPath) routing.
//   data.curvedEdges === true -> bezier; false/undefined -> straight (default).
function PfdStepEdgeRF({ id, sourceX, sourceY, targetX, targetY, sourcePosition, targetPosition, data, markerEnd }) {
  if (typeof ReactFlow === "undefined") return null;
  const { getStraightPath, getBezierPath, EdgeLabelRenderer, BaseEdge } = ReactFlow;
  const { stepName, yieldPct, armColor, dispatch, stepId, curvedEdges } = data;

  const [yieldEdit, setYieldEdit] = React.useState(null);

  // Use bezier for curved mode; straight for default.
  // getStraightPath ignores sourcePosition/targetPosition; getBezierPath uses them for handle curvature.
  const pathArgs = curvedEdges
    ? [{ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition }]
    : [{ sourceX, sourceY, targetX, targetY }];
  const pathFn = curvedEdges ? getBezierPath : getStraightPath;
  const [edgePath, labelX, labelY] = pathFn(...pathArgs);

  function commitYield(raw) {
    const n = parseFloat(raw);
    if (!isNaN(n) && n >= 0 && n <= 100) {
      dispatch(p => updateStep(p, stepId, { yield: parseFloat(n.toFixed(2)) }));
    }
    setYieldEdit(null);
  }

  const displayName = stepName && stepName.length > 26 ? stepName.slice(0, 24) + ".." : (stepName || "");

  return (
    <>
      <BaseEdge id={id} path={edgePath}
        style={{ stroke: armColor, strokeWidth: 2, opacity: 0.85 }}
        markerEnd={markerEnd} />
      <EdgeLabelRenderer>
        <div style={{
          position: "absolute",
          transform: `translate(-50%, -50%) translate(${labelX}px, ${labelY}px)`,
          pointerEvents: "all",
          display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          zIndex: 1,
        }}>
          <div style={{
            fontSize: "10px", fontWeight: 600, color: "#222",
            background: "rgba(250,249,245,0.92)",
            padding: "1px 5px", borderRadius: 3, whiteSpace: "nowrap",
          }}>{displayName}</div>
          {yieldEdit !== null ? (
            <div style={{ display: "flex", alignItems: "center", gap: 3,
              background: "#fff", border: "1px solid #ddd", borderRadius: 4,
              padding: "2px 6px", boxShadow: "0 2px 8px rgba(0,0,0,0.12)" }}>
              <span style={{ fontSize: "10px", color: "#666", fontFamily: MONO }}>Yield:</span>
              <input type="number" min={0} max={100} step={0.1} value={yieldEdit}
                onChange={e => setYieldEdit(e.target.value)}
                onBlur={e => commitYield(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") commitYield(yieldEdit); if (e.key === "Escape") setYieldEdit(null); }}
                style={{ width: 46, fontSize: "11px", fontFamily: MONO, border: "none",
                  outline: "none", background: "transparent", color: "#222", textAlign: "right" }}
                autoFocus />
              <span style={{ fontSize: "10px", color: "#666", fontFamily: MONO }}>%</span>
            </div>
          ) : (
            <div onClick={() => setYieldEdit(yieldPct != null ? String(yieldPct) : "")}
              title="Click to edit yield"
              style={{ fontSize: "11px", color: C.green, fontFamily: MONO, fontWeight: 600,
                cursor: "text", background: "rgba(250,249,245,0.85)",
                padding: "1px 5px", borderRadius: 3, borderBottom: "1px dashed " + C.green }}>
              Yield: {yieldPct != null ? yieldPct + "%" : "--"}
            </div>
          )}
        </div>
      </EdgeLabelRenderer>
    </>
  );
}

// Module-scope type registries -- prevents React Flow from re-creating on each render.
const PFD_UNIFIED_NODE_TYPES = { pfdMatNode: PfdMatNodeRF };
const PFD_UNIFIED_EDGE_TYPES = { pfdStepEdge: PfdStepEdgeRF };

// PfdUnifiedGraph -- single React Flow canvas for the PFD tab (v53).
// Materials (input/intermediate/output types only) are nodes; steps are edges.
// Node positions keyed "p:{matId}"; old "s:", "m:", "dm:" keys are silently ignored.
// v56: accepts curvedEdges prop (boolean); when true, edges use getBezierPath.
//      accepts exportRef: React.MutableRefObject assigned to an ()->{} export callback.
// v57: accepts pngContainerRef: React.MutableRefObject attached to the canvas wrapper div
//      for html2canvas PNG export.
function PfdUnifiedGraph({ project, dispatch, curvedEdges, exportRef, pngContainerRef }) {
  if (typeof ReactFlow === "undefined" || !ReactFlow.ReactFlow) {
    return (
      <div style={{ padding: "32px", textAlign: "center", color: C.midDark }}>
        PFD canvas unavailable -- React Flow library did not load.
        Check your network connection and reload the page.
      </div>
    );
  }

  const { ReactFlow: RF, Background, Controls, MiniMap,
          useNodesState, useEdgesState, MarkerType } = ReactFlow;

  const { sortedSteps, massFlowResult, batchResult } = useContext(SimContext);
  const nodePositions = project.pfdNodePositions || {};

  const compoundById = useMemo(() =>
    Object.fromEntries((project.compounds || []).map(c => [c.id, c])),
    [project.compounds]
  );

  const productStep = Array.isArray(sortedSteps) && sortedSteps.length > 0
    ? sortedSteps[sortedSteps.length - 1] : null;
  const targetMass = project.batchSizingConfig?.targetMass ?? null;

  // Strict type filter: only input/intermediate/output materials are shown.
  // Solvents and waste are bookkeeping entries, not primary flow nodes.
  const VISIBLE_TYPES = new Set(["input", "intermediate", "output"]);

  const { derivedNodes, derivedEdges } = useMemo(() => {
    const steps = Array.isArray(sortedSteps) ? sortedSteps : [];
    if (steps.length === 0) return { derivedNodes: [], derivedEdges: [] };

    let layout = null;
    try { layout = computePfdLayout(project, steps); } catch (_) {}

    const { depthOf = {}, rowOf = {}, armColorOf = {}, ARM_COLORS = [] } = layout || {};
    const CW = 214, CH = 236, HG = 220, VG = 68, PAD = 36;
    const cX = col => PAD + col * (CW + HG);
    const cY = row => PAD + row * (CH + VG);

    const matById = Object.fromEntries((project.materials || []).map(m => [m.id, m]));

    function matMW(mat) {
      if (!mat) return null;
      for (const e of (mat.composition || [])) {
        const c = compoundById[e.compoundId];
        if (c?.molecularWeight) return c.molecularWeight;
      }
      return null;
    }
    function matAssay(mat) {
      if (!mat) return null;
      const e = (mat.composition || [])[0];
      return e ? e.fraction * 100 : null;
    }
    function stepOutputMass(stepId) {
      const out = massFlowResult?.stepOutputMassByStepId?.[stepId];
      return Number.isFinite(out) ? out : null;
    }

    const rfNodes = [];
    const addedMatIds = new Set();

    function addMatNode(matId, col, row, armColor, isProduct, isProducedByProductStep) {
      if (addedMatIds.has(matId)) return;
      const mat = matById[matId];
      // Strict type filter: only render input/intermediate/output materials.
      if (!mat || !VISIBLE_TYPES.has(mat.type)) return;
      addedMatIds.add(matId);

      const entries = (mat.composition) || [];
      const mw = matMW(mat);
      const assay = matAssay(mat);
      const assayFactor = assay != null ? assay / 100 : 1;
      const weightKg = isProducedByProductStep
        ? stepOutputMass(productStep?.id)
        : (entries.length > 0 ? stepOutputMass(steps.find(s => s.intermediateOutputMaterialId === matId)?.id) : null);
      const moles = (weightKg != null && mw != null) ? (weightKg * assayFactor * 1000 / mw) : null;
      const blendNames = entries.length > 1
        ? entries.map(e => compoundById[e.compoundId]?.name || e.compoundId)
        : null;
      const firstCmpId = entries.length > 0 ? entries[0].compoundId : null;
      const smiles = firstCmpId ? (compoundById[firstCmpId]?.smiles || "") : "";

      const posKey = "p:" + matId;
      const defaultPos = { x: cX(col), y: cY(row) };
      const pos = nodePositions[posKey] ?? defaultPos;

      rfNodes.push({
        id: posKey,
        type: "pfdMatNode",
        position: pos,
        draggable: true,
        data: {
          mat, compoundById, mw, assay, moles, weightKg,
          isProduct, isProducedByProductStep, armColor,
          targetMass: isProducedByProductStep ? targetMass : null,
          dispatch, blendNames, smiles,
        },
      });
    }

    // Step output nodes: col = depthOf[step] + 1
    steps.forEach(step => {
      const col = (depthOf[step.id] ?? 0) + 1;
      const row = rowOf[step.id] ?? 0;
      const armColor = armColorOf[step.id] || ARM_COLORS[0] || C.blue;
      if (step.intermediateOutputMaterialId) {
        const isProducedByProductStep = !!(productStep && step.id === productStep.id);
        const mat = matById[step.intermediateOutputMaterialId];
        const isProduct = mat?.type === "output" || isProducedByProductStep;
        addMatNode(step.intermediateOutputMaterialId, col, row, armColor, isProduct, isProducedByProductStep);
      }
    });

    // Root step input nodes: col = 0 (to the left of root steps).
    // Use all addition op materials that pass the type filter.
    const rootSteps = steps.filter(s => (s.upstreamStepIds || []).length === 0);
    rootSteps.forEach(step => {
      const row = rowOf[step.id] ?? 0;
      const armColor = armColorOf[step.id] || ARM_COLORS[0] || C.blue;
      const addOps = (project.operations || []).filter(o => o.stepId === step.id && o.type === "addition" && o.materialId);
      addOps.forEach((op, oi) => {
        addMatNode(op.materialId, 0, row + oi * 0.4, armColor, false, false);
      });
    });

    // Edges: one per step->upstream connection (step as labeled arrow between material nodes).
    const rfEdges = [];
    steps.forEach(step => {
      const armColor = armColorOf[step.id] || ARM_COLORS[0] || C.blue;
      const toMatId = step.intermediateOutputMaterialId;
      if (!toMatId || !addedMatIds.has(toMatId)) return;
      const targetNodeId = "p:" + toMatId;

      if ((step.upstreamStepIds || []).length === 0) {
        // Root step: edge from each SM addition material to this step's output.
        const addOps = (project.operations || [])
          .filter(o => o.stepId === step.id && o.type === "addition" && o.materialId && addedMatIds.has(o.materialId));
        addOps.forEach(op => {
          rfEdges.push({
            id: "pe:" + step.id + ":sm:" + op.materialId,
            source: "p:" + op.materialId,
            target: targetNodeId,
            type: "pfdStepEdge",
            markerEnd: { type: MarkerType.ArrowClosed, color: armColor },
            data: { stepName: step.name, yieldPct: step.yield ?? null, armColor, dispatch, stepId: step.id, curvedEdges: !!curvedEdges },
          });
        });
      } else {
        // Convergent/downstream step: one edge per upstream step's output material.
        (step.upstreamStepIds || []).forEach(upId => {
          const upStep = steps.find(s => s.id === upId);
          if (!upStep?.intermediateOutputMaterialId) return;
          if (!addedMatIds.has(upStep.intermediateOutputMaterialId)) return;
          rfEdges.push({
            id: "pe:" + step.id + ":up:" + upId,
            source: "p:" + upStep.intermediateOutputMaterialId,
            target: targetNodeId,
            type: "pfdStepEdge",
            markerEnd: { type: MarkerType.ArrowClosed, color: armColor },
            data: { stepName: step.name, yieldPct: step.yield ?? null, armColor, dispatch, stepId: step.id, curvedEdges: !!curvedEdges },
          });
        });
      }
    });

    return { derivedNodes: rfNodes, derivedEdges: rfEdges };
  }, [project, sortedSteps, nodePositions, compoundById, massFlowResult, batchResult, targetMass, dispatch, productStep, curvedEdges]);

  const [nodes, setNodes, onNodesChange] = useNodesState(derivedNodes);
  const [edges, setEdges, onEdgesChange] = useEdgesState(derivedEdges);

  useEffect(() => { setNodes(derivedNodes); }, [derivedNodes]);
  useEffect(() => { setEdges(derivedEdges); }, [derivedEdges]);

  // Wire export callback into the ref so PfdTab's button can trigger it.
  // exportRef.current() calls exportPfdSvg with the live node/edge state.
  useEffect(() => {
    if (exportRef && exportRef.current !== undefined) {
      exportRef.current = () => exportPfdSvg(nodes, edges, project.name || "PFD");
    }
  }, [exportRef, nodes, edges, project.name]);

  // Persist node drag positions with "p:{matId}" key namespace (v53).
  const onNodeDragStop = useCallback((event, node) => {
    dispatch(p => ({ ...p, pfdNodePositions: { ...(p.pfdNodePositions || {}), [node.id]: node.position } }));
  }, [dispatch]);

  return (
    <div ref={pngContainerRef} style={{ width: "100%", height: "100%" }}>
      <RF
        nodes={nodes} edges={edges}
        onNodesChange={onNodesChange} onEdgesChange={onEdgesChange}
        onNodeDragStop={onNodeDragStop}
        nodeTypes={PFD_UNIFIED_NODE_TYPES}
        edgeTypes={PFD_UNIFIED_EDGE_TYPES}
        fitView
        style={{ background: C.light }}
      >
        <Background color={C.mid} gap={20} />
        <Controls />
        <MiniMap nodeColor={C.blue} />
      </RF>
    </div>
  );
}

// computePfdLayout -- pure function, no React dependencies.
// Derives the 2D grid positions, arm colors, and step topology from project data.
// Returns { stepMap, depthOf, rowOf, numRows, maxDepth, numCols, armColorOf }.
// v56: improved row spacing for multi-arm syntheses. Root steps that carry many
//   addition-op inputs need extra vertical clearance so input cards don't visually
//   overlap the next arm's output card. Each root step reserves Math.max(1, inputCount*0.4+0.6)
//   row units before the next arm begins.
function computePfdLayout(project, sortedSteps) {
  const stepMap = Object.fromEntries(project.steps.map(s => [s.id, s]));

  // Topological depth: root steps get depth 0; downstream steps get max(upstream)+1.
  const depthOf = {};
  for (const step of sortedSteps) {
    const upDepths = (step.upstreamStepIds || []).map(id => depthOf[id] ?? 0);
    depthOf[step.id] = upDepths.length > 0 ? Math.max(...upDepths) + 1 : 0;
  }

  // Row assignment with multi-arm spacing (v56).
  // Root steps: row is allocated by how many addition-op input nodes they need,
  // because inputs are placed at row + oi*0.4 vertically and need clearance from
  // the next arm's nodes (each card is CH=236px tall, VG=68 gap -> 304px/row).
  // Reserving max(1, inputCount*0.4 + 0.6) prevents input cards from overlapping
  // the next arm's output card.
  const rowOf = {};
  let nextRow = 0;
  for (const step of sortedSteps) {
    if ((step.upstreamStepIds || []).length === 0) {
      rowOf[step.id] = nextRow;
      const inputCount = (project.operations || [])
        .filter(o => o.stepId === step.id && o.type === "addition" && o.materialId).length;
      nextRow += Math.max(1, inputCount * 0.4 + 0.6);
    } else {
      const upRows = (step.upstreamStepIds || []).map(id => rowOf[id] ?? 0);
      rowOf[step.id] = upRows.reduce((a, b) => a + b, 0) / upRows.length;
    }
  }

  const numRows = nextRow;
  const maxDepth = Math.max(0, ...Object.values(depthOf));
  const numCols = maxDepth + 2; // col 0 = SM input nodes; col 1..N+1 = output nodes

  // Arm colors: each root step gets a deterministic color; descendants inherit.
  const ARM_COLORS = ["#6a9bcc", "#d97757", "#788c5d", "#9b7db8", "#6dada8", "#c4a43c"];
  const rootSteps = sortedSteps.filter(s => (s.upstreamStepIds || []).length === 0);
  const armColorOf = {};
  rootSteps.forEach((s, i) => { armColorOf[s.id] = ARM_COLORS[i % ARM_COLORS.length]; });
  for (const step of sortedSteps) {
    if (armColorOf[step.id] == null) {
      const firstUp = (step.upstreamStepIds || [])[0];
      armColorOf[step.id] = armColorOf[firstUp] || ARM_COLORS[0];
    }
  }

  // Keep rootSteps/ARM_COLORS in this return contract for PfdTab destructuring.
  return { stepMap, depthOf, rowOf, numRows, maxDepth, numCols, armColorOf, rootSteps, ARM_COLORS };
}

// === PFD SVG EXPORT (v56) =====================================================
// Pure-JS SVG export: no external dependencies (html2canvas not required).
// Generates an SVG from the current React Flow node/edge state.
// Each node renders as a bordered rectangle with name + key properties.
// Each edge renders as a line with arrowhead + step name + yield label.
// SMILES structures are omitted (canvas elements cannot be serialized to SVG).
// =============================================================================

function exportPfdSvg(nodes, edges, projectName) {
  if (!nodes || nodes.length === 0) return;

  const CW = 214, CH = 236;
  const PADDING = 40;
  const ARROW_LEN = 10;

  // Compute bounding box of all nodes.
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    const x = n.position.x, y = n.position.y;
    if (x < minX) minX = x;
    if (y < minY) minY = y;
    if (x + CW > maxX) maxX = x + CW;
    if (y + CH > maxY) maxY = y + CH;
  });

  // Node lookup by id for edge endpoint calculation.
  const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));

  const svgW = maxX - minX + PADDING * 2;
  const svgH = maxY - minY + PADDING * 2;
  const ox = -minX + PADDING; // translation offset
  const oy = -minY + PADDING;

  const svgLines = [];
  svgLines.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">`);
  svgLines.push(`<rect width="${svgW}" height="${svgH}" fill="#faf9f5"/>`);

  // Title
  const title = (projectName || "PFD").replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" })[c]);
  svgLines.push(`<text x="${svgW / 2}" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#141413">${title} -- Process Flow Diagram</text>`);

  // Edges (drawn first, underneath nodes).
  edges.forEach(e => {
    const src = nodeById[e.source], tgt = nodeById[e.target];
    if (!src || !tgt) return;
    // Source handle: right-center of source node.
    const x1 = src.position.x + ox + CW;
    const y1 = src.position.y + oy + CH / 2;
    // Target handle: left-center of target node.
    const x2 = tgt.position.x + ox;
    const y2 = tgt.position.y + oy + CH / 2;

    const color = (e.data && e.data.armColor) || "#6a9bcc";
    const safeColor = color.replace(/[^#a-zA-Z0-9]/g, "");

    // Draw line.
    svgLines.push(`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${safeColor}" stroke-width="2" opacity="0.85"/>`);

    // Arrowhead at target end.
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const ux = dx / len, uy = dy / len;
    const ax = x2 - ux * ARROW_LEN, ay = y2 - uy * ARROW_LEN;
    const nx = -uy, ny = ux; // normal
    svgLines.push(`<polygon points="${x2},${y2} ${ax + nx * 5},${ay + ny * 5} ${ax - nx * 5},${ay - ny * 5}" fill="${safeColor}"/>`);

    // Edge label (step name + yield) at midpoint.
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const stepName = (e.data && e.data.stepName) ? String(e.data.stepName) : "";
    const yieldPct = (e.data && e.data.yieldPct != null) ? e.data.yieldPct + "%" : "";
    const rawLabel = stepName.length > 28 ? stepName.slice(0, 26) + ".." : stepName;
    const label = rawLabel.replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" })[c]);
    const yLabel = yieldPct.replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" })[c]);

    if (label) {
      svgLines.push(`<rect x="${mx - label.length * 3.2}" y="${my - 22}" width="${label.length * 6.4 + 4}" height="14" rx="2" fill="rgba(250,249,245,0.92)"/>`);
      svgLines.push(`<text x="${mx}" y="${my - 11}" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#222">${label}</text>`);
    }
    if (yLabel) {
      svgLines.push(`<rect x="${mx - 28}" y="${my - 6}" width="56" height="14" rx="2" fill="rgba(250,249,245,0.85)"/>`);
      svgLines.push(`<text x="${mx}" y="${my + 5}" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#788c5d">Yield: ${yLabel}</text>`);
    }
  });

  // Nodes (drawn on top of edges).
  nodes.forEach(n => {
    const { data } = n;
    if (!data) return;
    const x = n.position.x + ox, y = n.position.y + oy;
    const color = (data.armColor || "#6a9bcc").replace(/[^#a-zA-Z0-9]/g, "");
    const isProduct = data.isProducedByProductStep;
    const strokeW = isProduct ? 2.5 : 1.5;

    // Background + border.
    svgLines.push(`<rect x="${x}" y="${y}" width="${CW}" height="${CH}" rx="8" fill="#fff" stroke="${color}" stroke-width="${strokeW}"/>`);

    // SMILES area header (colored tint, no actual structure).
    const SH = 84;
    const isBlend = data.blendNames && data.blendNames.length > 0;
    const tintColor = color + "12"; // color with ~7% opacity suffix isn't valid SVG hex; use rgba
    svgLines.push(`<rect x="${x}" y="${y}" width="${CW}" height="${SH}" rx="6" fill="${color}" fill-opacity="0.07"/>`);

    if (isBlend && data.blendNames) {
      svgLines.push(`<text x="${x + 8}" y="${y + 18}" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="${color}">Blend:</text>`);
      data.blendNames.slice(0, 4).forEach((bn, bi) => {
        const safe = String(bn).replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" })[c]);
        svgLines.push(`<text x="${x + 8}" y="${y + 30 + bi * 12}" font-family="system-ui,sans-serif" font-size="9" fill="#333">${safe}</text>`);
      });
    } else {
      svgLines.push(`<text x="${x + CW / 2}" y="${y + SH / 2 + 4}" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="${color}" opacity="0.6">SMILES</text>`);
    }

    // Separator line.
    svgLines.push(`<line x1="${x}" y1="${y + SH}" x2="${x + CW}" y2="${y + SH}" stroke="${color}" stroke-width="0.5" opacity="0.2"/>`);

    // Material name.
    const name = String(data.mat?.name || "(no material)").replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" })[c]).slice(0, 30);
    svgLines.push(`<text x="${x + 9}" y="${y + SH + 16}" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#222">${name}</text>`);
    svgLines.push(`<line x1="${x + 9}" y1="${y + SH + 21}" x2="${x + CW - 9}" y2="${y + SH + 21}" stroke="#e8e8e8"/>`);

    // Properties grid (MW, Moles, Assay, Weight).
    const rows = [
      ["MW", data.mw != null ? data.mw + " g/mol" : "--"],
      ["Moles", data.moles != null && data.mw != null
        ? (data.moles < 0.1 ? (data.moles * 1000).toFixed(2) + " mmol" : data.moles.toFixed(3) + " mol") : "--"],
      ["Assay", data.assay != null ? data.assay.toFixed(1) + "%" : "--"],
      ["Weight", data.weightKg != null ? data.weightKg.toFixed(2) + " kg" : (data.targetMass != null ? data.targetMass.toFixed(2) + " kg" : "--")],
    ];
    rows.forEach(([label, value], ri) => {
      const ry = y + SH + 32 + ri * 20;
      const safeVal = String(value).replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" })[c]);
      svgLines.push(`<text x="${x + 9}" y="${ry}" font-family="system-ui,sans-serif" font-size="11" fill="#666">${label}</text>`);
      svgLines.push(`<text x="${x + CW - 9}" y="${ry}" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" fill="#222">${safeVal}</text>`);
      if (ri < 3) svgLines.push(`<line x1="${x + 9}" y1="${ry + 4}" x2="${x + CW - 9}" y2="${ry + 4}" stroke="#f0f0f0"/>`);
    });
  });

  svgLines.push("</svg>");
  const svgStr = svgLines.join("\n");

  // Trigger download.
  const blob = new Blob([svgStr], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = (projectName || "PFD").replace(/\s+/g, "_") + "_PFD.svg";
  a.click();
  URL.revokeObjectURL(url);
}

// Single-canvas PFD view (v53). Replaced the two-view toggle (Step Canvas / Detail Canvas).
// v56: curved-edges toggle (straight/bezier) + SVG export button added to toolbar.
// v57: PNG export via html2canvas added (pngContainerRef passed to PfdUnifiedGraph).

// exportPfdPng -- PNG export using html2canvas (CDN-loaded, optional).
// containerEl: the DOM element wrapping the React Flow canvas.
// projectName: used as the filename base.
// Falls back to an alert if html2canvas is not available (CDN not loaded yet).
function exportPfdPng(containerEl, projectName) {
  if (typeof window.html2canvas !== "function") {
    alert("PNG export requires the html2canvas library. Check your network connection and try again.");
    return;
  }
  window.html2canvas(containerEl, { useCORS: true, logging: false, backgroundColor: "#faf9f5" })
    .then(canvas => {
      const url = canvas.toDataURL("image/png");
      const a = document.createElement("a");
      a.href = url;
      a.download = (projectName || "PFD").replace(/\s+/g, "_") + "_PFD.png";
      a.click();
    })
    .catch(err => {
      console.error("html2canvas error:", err);
      alert("PNG export failed. Try SVG export instead.");
    });
}

        {/* PNG export (html2canvas) */}
        <button
          onClick={() => { if (pngContainerRef.current) exportPfdPng(pngContainerRef.current, project.name); }}
          title="Export PFD as PNG image (requires network for html2canvas)"
          style={{
            padding: "4px 10px", fontSize: "12px", fontWeight: 600,
            background: "#fff", color: C.dark, border: `1px solid ${C.border}`,
            borderRadius: "5px", cursor: "pointer", whiteSpace: "nowrap",
          }}>
          Export PNG
        </button>
      </div>
      <div style={{ flex: 1, overflow: "hidden" }}>
        <PfdUnifiedGraph project={project} dispatch={dispatch}
          curvedEdges={curvedEdges} exportRef={exportRef} pngContainerRef={pngContainerRef} />
      </div>
    </div>
  );
}

            {project.equipment.map((e, i) => {

                            <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "4px", fontWeight: 600 }}>Type</div>
                            <select value={e.type} onChange={ev => dispatch(p => updateEquipment(p, e.id, { type: ev.target.value }))}
                              style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "13px", fontFamily: "inherit", boxSizing: "border-box" }}>

                          <div>
                            <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "4px", fontWeight: 600 }}>MOC</div>

                            <input type="number" min="0" step="any" value={e.minWorkingVolume ?? ""} onChange={ev => dispatch(p => updateEquipment(p, e.id, { minWorkingVolume: ev.target.value ? parseFloat(ev.target.value) : null }))}
                              style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "13px", fontFamily: "inherit", boxSizing: "border-box" }} />
                          </div>
                          <div>
                            <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "4px", fontWeight: 600 }}>Max vol (L)</div>
                            <input type="number" min="0" step="any" value={e.maxWorkingVolume ?? ""} onChange={ev => dispatch(p => updateEquipment(p, e.id, { maxWorkingVolume: ev.target.value ? parseFloat(ev.target.value) : null }))}
                              style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "13px", fontFamily: "inherit", boxSizing: "border-box" }} />
                          </div>
                          <div>
                            <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "4px", fontWeight: 600 }}>Rate ($/h)</div>
                            <input type="number" min="0" step="any" value={e.hourlyRate ?? ""} onChange={ev => dispatch(p => updateEquipment(p, e.id, { hourlyRate: ev.target.value ? parseFloat(ev.target.value) : null }))}
                              style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "13px", fontFamily: "inherit", boxSizing: "border-box" }} />
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ fontSize: "11px", color: C.midDark, lineHeight: 1.6 }}>
        <strong>Builtin equipment</strong> items are pre-loaded from the standard library. Custom equipment can be added and deleted freely.
        Equipment is assigned to operations in the Process Editor.
      </div>

      {/* ===== Consumables & Packaging section ===== */}
      <div style={{ marginTop: "32px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "16px" }}>
          <span style={{ fontSize: "15px", fontWeight: 700, color: C.dark }}>Consumables &amp; Packaging</span>
          <span style={{ fontSize: "12px", color: C.midDark }}>{(project.consumables || []).length} items</span>
          <div style={{ marginLeft: "auto" }}>
            <Btn variant="primary" onClick={() => dispatch(p => addConsumable(p))}><Icon name="plus" size={13} /> Add Consumable</Btn>
          </div>
        </div>
        <div style={{ overflowX: "auto", marginBottom: "12px" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: "600px" }}>
            <thead>
              <tr>
                <th style={thS}>Name</th>
                <th style={{ ...thS, textAlign: "right" }}>Capacity (kg)</th>
                <th style={{ ...thS, textAlign: "right" }}>Unit Cost ($/unit)</th>
                <th style={thS}>Notes</th>
                <th style={{ ...thS, textAlign: "center" }}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {(project.consumables || []).map((c, i) => {
                const isOpenC = expandedId === c.id + "__con";
                const isBuiltinC = BUILTIN_CONSUMABLES.some(b => b.id === c.id);
                return (
                  <React.Fragment key={c.id}>
                    <tr style={{ background: i % 2 === 0 ? "#fff" : C.lightHover, cursor: "pointer" }} onClick={() => setExpandedId(isOpenC ? null : c.id + "__con")}>
                      <td style={tdS}>
                        {c.name || "--"}
                        {isBuiltinC && <span style={{ marginLeft: "6px", fontSize: "9px", background: C.blue + "22", color: C.blue, borderRadius: "3px", padding: "1px 5px", fontWeight: 700 }}>BUILTIN</span>}
                      </td>
                      <td style={{ ...tdS, textAlign: "right", fontFamily: MONO }}>{c.capacityKg ?? "--"}</td>
                      <td style={{ ...tdS, textAlign: "right", fontFamily: MONO }}>{c.unitCost != null ? `$${c.unitCost}` : "--"}</td>
                      <td style={{ ...tdS, color: C.midDark }}>{c.notes || "--"}</td>
                      <td style={{ ...tdS, textAlign: "center" }}>
                        <div style={{ display: "flex", gap: "6px", justifyContent: "center" }}>
                          <button onClick={ev => { ev.stopPropagation(); setExpandedId(isOpenC ? null : c.id + "__con"); }}
                            style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: "4px", cursor: "pointer", padding: "3px 8px", fontSize: "11px", color: C.dark }}>
                            {isOpenC ? "Close" : "Edit"}
                          </button>
                          {!isBuiltinC && (
                            <button onClick={ev => { ev.stopPropagation(); dispatch(p => deleteConsumable(p, c.id)); }}
                              style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: "4px", cursor: "pointer", padding: "3px 8px", fontSize: "11px", color: C.orange }}>
                              Delete
                            </button>
                          )}
                        </div>
                      </td>
                    </tr>
                    {isOpenC && (
                      <tr style={{ background: C.lightHover }}>
                        <td colSpan={5} style={{ padding: "14px 20px", borderBottom: `1px solid ${C.border}` }}>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: "12px" }}>
                            <div>
                              <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "4px", fontWeight: 600 }}>Name</div>
                              <input value={c.name || ""} onChange={ev => dispatch(p => updateConsumable(p, c.id, { name: ev.target.value }))}
                                style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "13px", fontFamily: "inherit", boxSizing: "border-box" }} />
                            </div>
                            <div>
                              <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "4px", fontWeight: 600 }}>Capacity (kg)</div>
                              <input type="number" min="0" step="any" value={c.capacityKg ?? ""} onChange={ev => dispatch(p => updateConsumable(p, c.id, { capacityKg: ev.target.value ? parseFloat(ev.target.value) : null }))}
                                style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "13px", fontFamily: "inherit", boxSizing: "border-box" }} />
                            </div>
                            <div>
                              <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "4px", fontWeight: 600 }}>Unit Cost ($/unit)</div>
                              <input type="number" min="0" step="any" value={c.unitCost ?? ""} onChange={ev => dispatch(p => updateConsumable(p, c.id, { unitCost: ev.target.value ? parseFloat(ev.target.value) : null }))}
                                style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "13px", fontFamily: "inherit", boxSizing: "border-box" }} />
                            </div>
                            <div style={{ gridColumn: "span 2" }}>
                              <div style={{ fontSize: "10px", color: C.midDark, marginBottom: "4px", fontWeight: 600 }}>Notes</div>
                              <input value={c.notes || ""} onChange={ev => dispatch(p => updateConsumable(p, c.id, { notes: ev.target.value }))}
                                style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "13px", fontFamily: "inherit", boxSizing: "border-box" }} />
                            </div>
                          </div>

                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{ fontSize: "11px", color: C.midDark, lineHeight: 1.6 }}>
          <strong>Builtin consumables</strong> are pre-loaded packaging containers. Capacity and cost can be edited to match actual procurement prices.
          Assign a container to a Packaging operation in the Process Editor to compute unit counts.
        </div>
      </div>
    </div>
  );
}

// =============================================================================
// === MATERIALS TAB ===========================================================
// =============================================================================
// Unified materials view: compounds (left) and process materials (right).
// Compounds are pure chemicals with MW, density, cost, and SMILES data.
// Process materials are solutions/mixtures with composition fractions.
// Step stoichiometry is now in the Process Editor tab (inline in each StepCard).
// This tab focuses on defining and editing material properties.
// =============================================================================

function StepStoichCard({ step, stepOps, project, dispatch, compoundById, intermediates, massFlowResult, getDensity, getMolarEquiv, inlineMode = false }) {
  const [expanded, setExpanded] = useState(true);
  // liveEdit: tracks in-progress typed values so all three quantity columns update
  // live while the user types, before committing to project state on blur.
  // Shape: { opId: string, kg: number|null, L: number|null, mol: number|null } | null
  const [liveEdit, setLiveEdit] = useState(null);
  if (stepOps.length === 0) {
    if (inlineMode) return null;
    return (
      <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", padding: "10px 14px", marginBottom: "10px", display: "flex", alignItems: "center", gap: "8px", opacity: 0.7 }}>
        <span style={{ fontFamily: MONO, fontSize: "10px", color: C.midDark, background: C.lightBorder, padding: "1px 5px", borderRadius: "3px" }}>{step.sequence}</span>
        <span style={{ fontSize: "12px", color: C.midDark }}>{step.name} -- no stoichiometric feeds</span>
      </div>
    );
  }

  const limitingMatId = step.limitingMaterialId || null;
  const stoichBasis = step.stoichBasis || "mol";
  const stepStoichMaterialIds = [...new Set(stepOps.map(op => op.materialId).filter(Boolean))];
  const limitingOp = stepOps.find(op => op.materialId === limitingMatId);
  const limitingMat = project.materials.find(m => m.id === limitingMatId);
  const limitingKg = (limitingOp && limitingMat)
    ? resolveStoichLimitingMassKg({ limitingOp, limitingMaterial: limitingMat, compoundById, materialOutputMassByMaterialId: massFlowResult?.materialOutputMassByMaterialId || {} })
    : null;

  const calcSuggestedKg = (opMatId) => {
    if (!limitingMat || !limitingKg || limitingKg <= 0) return null;
    const targetMat = project.materials.find(m => m.id === opMatId);
    if (!targetMat) return null;
    return computeStoichSuggestedKgFromLimitingKg({ limitingKg, limitingMaterial: limitingMat, targetMaterial: targetMat, stoichBasis, compoundById });
  };

  const buildMassCalcDetail = (targetMat, suggestedKg) => {
    if (!limitingOp || !limitingMat || !targetMat || suggestedKg == null) return null;
    const lEq = getMaterialMolarEquiv(limitingMat, compoundById);
    const tEq = getMaterialMolarEquiv(targetMat, compoundById);
    const lAssay = getMaterialAssayFraction(limitingMat) * 100;
    const tAssay = getMaterialAssayFraction(targetMat) * 100;
    const lBasis = normalizePositiveNumber(limitingOp.amount, null)
      ? `${limitingOp.amount} ${limitingOp.unit || ""}`
      : `inferred=${limitingKg != null ? fmtKgSig(limitingKg) : "--"}`;
    return {
      formula: stoichBasis === "mol"
        ? "Start from limiting active moles, then scale by equivalent ratio, target MW, and target assay."
        : "Start from limiting active mass, then scale by equivalent ratio and target assay.",
      inputValues: `Basis: ${stoichBasis}; limiting basis: ${lBasis}; limiting assay: ${fmtPctSig(lAssay, 4)}; target equiv: ${fmtEquivSig(tEq)}; limiting equiv: ${fmtEquivSig(lEq)}; target assay: ${fmtPctSig(tAssay, 4)}`,
      calculated: fmtSig(suggestedKg, 5), unit: "kg",
      source: "Calculated by computeStoichSuggestedKgFromLimitingKg.",
    };
  };

  // commitAmount: saves amount+unit to project state then re-propagates.
  const commitAmount = (opId, raw, unit) => {
    const val = parseFloat(raw);
    if (isNaN(val)) return;
    dispatch(p => {
      const next = { ...p, operations: p.operations.map(o => o.id === opId ? { ...o, amount: parseFloat(val.toFixed(4)), ...(unit ? { unit } : {}) } : o), updatedAt: new Date().toISOString() };
      return runTargetDrivenPropagation(next);
    });
  };

  const commitEquiv = (matId, raw) => {
    const val = parseFloat(raw);
    if (isNaN(val) || val <= 0) return;
    const mat = project.materials.find(m => m.id === matId);
    if (!mat || !mat.composition || mat.composition.length === 0) return;
    const cid = mat.composition[0]?.compoundId;
    if (!cid) return;
    dispatch(p => {
      const next = { ...p, compounds: p.compounds.map(c => c.id === cid ? { ...c, molarEquivalents: parseFloat(val.toFixed(3)) } : c), updatedAt: new Date().toISOString() };
      return runTargetDrivenPropagation(next);
    });
  };

  const commitYield = (raw) => {
    const val = parseFloat(raw);
    if (isNaN(val)) return;
    dispatch(p => runTargetDrivenPropagation(updateStep(p, step.id, { yield: Math.max(0, Math.min(100, val)) })));
  };

  // --- Upstream step selection ---
  const upstreamIds = step.upstreamStepIds || [];
  const candidateSteps = (project.steps || []).filter(s => s.id !== step.id)
    .sort((a, b) => normalizeNumber(a.sequence, 0) - normalizeNumber(b.sequence, 0));

  const toggleUpstream = (candidateId) => {
    const next = upstreamIds.includes(candidateId)
      ? upstreamIds.filter(id => id !== candidateId)
      : sortStepIdsBySequence(project.steps, [...upstreamIds, candidateId]);
    if (doesUpstreamSelectionCreateCycle(project.steps, step.id, next)) return;
    dispatch(p => updateStep(p, step.id, { upstreamStepIds: next }));
  };

  // inp: base style for editable inputs in the stoich table.
  // warningBorder: applied when a required field is empty (no input entered yet).
  const inp = (extra = {}) => ({
    border: `1px solid ${C.border}`, borderRadius: "4px", padding: "4px 6px",
    fontSize: "12px", fontFamily: MONO, outline: "none", background: "#fff",
    color: C.dark, textAlign: "right", width: "72px", boxSizing: "border-box", ...extra,
  });
  const warningBorder = `1px solid #e05050`;

  // deriveRowValues: given op.amount + op.unit (the committed state), compute
  // the display values for all three quantity columns. Returns { kg, L, mol }.
  // When op.amount is null, returns null for all three (caller shows hint values instead).
  const deriveRowValues = (op, mat) => {
    if (op.amount == null || !isFinite(op.amount)) return { kg: null, L: null, mol: null };
    const unit = op.unit || "kg";
    const massKg = amountToKg(op.amount, unit, mat, compoundById);
    if (!massKg || massKg <= 0) {
      // If conversion failed (missing density/MW), show only the entered field.
      return {
        kg: unit === "kg" ? op.amount : null,
        L: unit === "L" ? op.amount : null,
        mol: unit === "mol" ? op.amount : null,
      };
    }
    const dens = getMaterialDensity(mat, compoundById, null);
    const mw = getMaterialMW(mat, compoundById);
    return {
      kg: unit === "kg" ? op.amount : massKg,
      L: dens && dens > 0 ? massKg / dens : null,
      mol: mw && mw > 0 ? massKg * 1000 / mw : null,
    };
  };

  const thS = { padding: "8px 10px", textAlign: "left", fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: C.midDark, borderBottom: `1px solid ${C.border}` };

  return (
    <div style={inlineMode
      ? { background: "transparent" }
      : { background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", marginBottom: "12px", overflow: "hidden" }
    }>
      {!inlineMode && (
      <div onClick={() => setExpanded(!expanded)}
        style={{ display: "flex", alignItems: "center", gap: "10px", padding: "10px 14px", cursor: "pointer", background: C.lightHover, borderBottom: expanded ? `1px solid ${C.border}` : "none" }}>
        <Icon name={expanded ? "chevronDown" : "chevronRight"} size={12} />
        <span style={{ fontFamily: MONO, fontSize: "10px", color: C.midDark, background: C.lightBorder, padding: "1px 5px", borderRadius: "3px" }}>{step.sequence}</span>
        <span style={{ fontSize: "13px", fontWeight: 600, color: C.dark }}>{step.name}</span>
        <span style={{ fontSize: "11px", color: C.midDark }}>{stepOps.length} feed{stepOps.length !== 1 ? "s" : ""}</span>
        {step.yield != null && <span style={{ fontSize: "10px", color: C.green, fontWeight: 600, marginLeft: "4px" }}>Yield: {step.yield}%</span>}
        {limitingMatId && <span style={{ fontSize: "10px", color: C.blue, fontWeight: 600, marginLeft: "auto" }}>LR: {limitingMat?.name || "set"}</span>}
      </div>
      )}

      {(expanded || inlineMode) && (
        <div style={{ padding: "10px 14px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "16px", marginBottom: "10px", flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <span style={{ fontSize: "11px", color: C.midDark }}>Limiting:</span>
              <select value={limitingMatId || ""} onChange={e => dispatch(p => updateStep(p, step.id, { limitingMaterialId: e.target.value || null }))}
                style={{ border: `1px solid ${C.border}`, borderRadius: "4px", padding: "3px 8px", fontSize: "11px", fontFamily: "inherit", background: "#fff", color: C.dark }}>
                <option value="">-- none --</option>
                {stepStoichMaterialIds.map(matId => {
                  const mat = project.materials.find(m => m.id === matId);
                  return <option key={matId} value={matId}>{mat?.name || matId}</option>;
                })}
              </select>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <span style={{ fontSize: "11px", color: C.midDark }}>Yield (%):</span>
              <input type="number" step="any" min="0" max="100" defaultValue={step.yield ?? ""}
                onBlur={e => commitYield(e.target.value)} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
                placeholder="--" style={inp({ width: "56px" })} />
            </div>
          </div>

          {candidateSteps.length > 0 && (
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px", flexWrap: "wrap" }}>
              <span style={{ fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: C.midDark }}>Upstream:</span>
              {candidateSteps.map(cs => {
                const sel = upstreamIds.includes(cs.id);
                return (
                  <button key={cs.id} onClick={() => toggleUpstream(cs.id)}
                    style={{
                      padding: "2px 8px", border: `1px solid ${sel ? C.blue : C.border}`, borderRadius: "4px",
                      cursor: "pointer", fontFamily: "inherit", fontSize: "10px",
                      background: sel ? C.blue + "18" : "#fff", color: sel ? C.blue : C.midDark, fontWeight: sel ? 600 : 400
                    }}>
                    {cs.sequence}. {cs.name}
                  </button>
                );
              })}
            </div>
          )}

          {/* v45: Omnidirectional stoich table.
              All quantity columns (Mass/kg, Volume/L, Amount/mol) are editable inputs.
              Entering any one field computes and displays the other two as derived values.
              Rows with no amount entered are highlighted (red borders) on all three fields
              until the user commits a value -- "required field" pattern. */}
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: C.lightHover }}>
                <th style={thS}>Material</th>
                <th style={{ ...thS, textAlign: "right" }}>Molar Equiv</th>
                <th style={{ ...thS, textAlign: "right", color: C.orange }}>Mass (kg)</th>
                <th style={{ ...thS, textAlign: "right", color: C.blue }}>Volume (L)</th>
                <th style={{ ...thS, textAlign: "right", color: C.midDark }}>Amount (mol)</th>
                {limitingMatId && <th style={{ ...thS, width: "44px" }}></th>}
              </tr>
            </thead>
            <tbody>
              {stepOps.map((op, i) => {
                const mat = project.materials.find(m => m.id === op.materialId);
                const isLimiting = op.materialId === limitingMatId;
                const equiv = getMolarEquiv(op.materialId);
                const dens = getDensity(op.materialId);
                const isInt = intermediates.has(op.materialId);
                const tdS = { padding: "8px 10px", fontSize: "12px", color: C.dark, borderBottom: `1px solid ${C.lightBorder}` };

                // Derive display values from committed state.
                // For limiting row: show stored amount plus derived fields.
                // For non-limiting row with no amount: show stoich suggestions as hints.
                const hasAmount = op.amount != null && isFinite(op.amount);
                const derived = hasAmount ? deriveRowValues(op, mat) : { kg: null, L: null, mol: null };

                // Stoich suggestions (non-limiting rows only): computed from limiting material
                const sugKg = (!isLimiting && !hasAmount) ? calcSuggestedKg(op.materialId) : null;
                const massDet = (!isLimiting && sugKg != null) ? buildMassCalcDetail(mat, sugKg) : null;
                const sugL = (sugKg != null && dens && dens > 0) ? sugKg / dens : null;
                const sugMol = (sugKg != null) ? (() => {
                  const mw = getMaterialMW(mat, compoundById);
                  return mw && mw > 0 ? sugKg * 1000 / mw : null;
                })() : null;

                // Warning: row needs input -- no amount entered yet on a non-limiting row.
                const needsInput = !isLimiting && !hasAmount;

                // Per-cell display helpers: show derived or suggested value, or empty.
                const dispKg = isLimiting
                  ? (derived.kg ?? (op.amount != null && op.unit === "kg" ? op.amount : null))
                  : (hasAmount ? derived.kg : sugKg);
                const dispL = isLimiting
                  ? derived.L
                  : (hasAmount ? derived.L : sugL);
                const dispMol = isLimiting
                  ? derived.mol
                  : (hasAmount ? derived.mol : sugMol);

                // Styling: "active" field = what the user last entered (op.unit);
                // derived fields shown with subtle calculated background.
                const activeUnit = op.unit || "kg";
                const calcStyle = { background: C.lightHover, color: C.midDark };
                const activeStyle = { background: "#fff" };

                const fmtCell = (val, unit2) => {
                  if (val == null) return null;
                  if (unit2 === "kg") return fmtSig(val, 4);
                  if (unit2 === "L") return fmtSig(val, 4);
                  if (unit2 === "mol") return fmtSig(val, 4);
                  return fmtSig(val, 4);
                };

                const makeQtyInput = (colUnit, displayVal, isSug) => {
                  const isActive = !isLimiting && hasAmount && activeUnit === colUnit;
                  const isRef = isLimiting;
                  // Red warning border when: non-limiting, no amount, no suggestion available for this column
                  const showWarn = needsInput && !isSug && displayVal == null;
                  const showSugWarn = needsInput && isSug; // has suggestion but not committed

                  // When liveEdit is active for this row, use live-computed derived values.
                  const liveRowActive = liveEdit && liveEdit.opId === op.id;
                  const liveDisplayVal = liveRowActive ? liveEdit[colUnit] : displayVal;
                  const effectiveDisplayVal = liveRowActive ? liveDisplayVal : displayVal;

                  let borderStyle;
                  if (showWarn) borderStyle = warningBorder;
                  else if (showSugWarn) borderStyle = `1px dashed ${C.orange}`;
                  else if (isActive) borderStyle = `1px solid ${C.orange}`;
                  else borderStyle = `1px solid ${C.border}`;

                  let bgStyle;
                  if (showWarn || showSugWarn) bgStyle = "#fff8f8";
                  else if (isRef) bgStyle = C.lightHover;
                  else if (isActive) bgStyle = "#fff";
                  else if (hasAmount) bgStyle = C.lightHover;
                  else bgStyle = "#fff";

                  const shownVal = effectiveDisplayVal != null ? fmtCell(effectiveDisplayVal, colUnit) : "";
                  const placeholder = isSug && displayVal != null
                    ? fmtCell(displayVal, colUnit)
                    : (needsInput ? "enter..." : "--");

                  return (
                    <input
                      type="number" step="any" min="0"
                      key={`${op.id}-${colUnit}-${op.amount}-${op.unit}`}
                      defaultValue={isActive || isRef ? shownVal : ""}
                      placeholder={(!isActive && !isRef) ? placeholder : ""}
                      title={
                        isSug && !hasAmount
                          ? `Suggested: ${fmtCell(displayVal, colUnit)} ${colUnit} (from stoichiometry -- click to accept)`
                          : isActive ? `Last entered as ${colUnit}`
                          : hasAmount ? `Derived from entered ${activeUnit}`
                          : "Enter a value to auto-fill row"
                      }
                      onChange={e => {
                        // Live cascade: as the user types, compute and display derived
                        // Mass/Volume/Amount values without committing to project state.
                        const raw = parseFloat(e.target.value);
                        if (!Number.isFinite(raw) || raw < 0) { setLiveEdit(null); return; }
                        const massKg = amountToKg(raw, colUnit, mat, compoundById, getMaterialDensity(mat, compoundById, null));
                        const dens = getMaterialDensity(mat, compoundById, null);
                        const mw = getMaterialMW(mat, compoundById);
                        setLiveEdit({
                          opId: op.id,
                          kg: colUnit === "kg" ? raw : (massKg > 0 ? massKg : null),
                          L: colUnit === "L" ? raw : (massKg > 0 && dens && dens > 0 ? massKg / dens : null),
                          mol: colUnit === "mol" ? raw : (massKg > 0 && mw && mw > 0 ? massKg * 1000 / mw : null),
                        });
                      }}
                      onBlur={e => {
                        setLiveEdit(null);
                        const raw = e.target.value.trim();
                        if (raw && !isNaN(parseFloat(raw))) {
                          commitAmount(op.id, raw, colUnit);
                        } else if (!raw && isActive) {
                          // User cleared the active field -- remove amount
                          dispatch(p => ({
                            ...p,
                            operations: p.operations.map(o => o.id === op.id ? { ...o, amount: null } : o),
                            updatedAt: new Date().toISOString(),
                          }));
                        }
                      }}
                      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
                      style={{
                        ...inp(),
                        border: borderStyle,
                        background: bgStyle,
                        color: (isSug && !hasAmount) ? C.orange : (hasAmount && !isActive && !isRef) ? C.midDark : C.dark,
                        fontStyle: (isSug && !hasAmount) ? "italic" : "normal",
                        width: "72px",
                      }}
                    />
                  );
                };

                return (
                  <tr key={op.id} style={{ background: i % 2 === 0 ? "#fff" : C.lightHover }}>
                    <td style={tdS}>
                      <div style={{ fontWeight: isLimiting ? 700 : 500 }}>{mat?.name || op.materialId}</div>
                      {isInt && <div style={{ fontSize: "9px", color: C.orange, marginTop: "1px" }}>intermediate</div>}
                      {isLimiting && <div style={{ fontSize: "9px", color: C.blue, marginTop: "1px", fontWeight: 600 }}>LIMITING</div>}
                      {needsInput && <div style={{ fontSize: "9px", color: "#e05050", marginTop: "1px" }}>enter amount</div>}
                    </td>
                    <td style={{ ...tdS, textAlign: "right" }}>
                      {isLimiting
                        ? <span style={{ fontFamily: MONO, fontSize: "12px" }}>1.00</span>
                        : <span style={{ display: "inline-flex", flexDirection: "column", alignItems: "flex-end", gap: "2px" }}>
                          <input type="number" step="any" min="0" defaultValue={equiv.toFixed(2)}
                            onBlur={e => commitEquiv(op.materialId, e.target.value)}
                            onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
                            style={inp()} />
                          <span style={{ fontSize: "10px", color: C.midDark, fontFamily: MONO }}>{fmtEquivSig(equiv)}</span>
                        </span>}
                    </td>
                    {/* Mass (kg) -- active when op.unit==="kg", derived otherwise */}
                    <td style={{ ...tdS, textAlign: "right" }}>
                      <div style={{ display: "inline-flex", alignItems: "center", gap: "4px" }}>
                        {makeQtyInput("kg", dispKg, !hasAmount && sugKg != null)}
                        {massDet && <CalcInfoIcon result={massDet} size={10} color={C.orange} />}
                      </div>
                    </td>
                    {/* Volume (L) -- active when op.unit==="L", derived otherwise */}
                    <td style={{ ...tdS, textAlign: "right" }}>
                      {makeQtyInput("L", dispL, !hasAmount && sugL != null)}
                    </td>
                    {/* Amount (mol) -- active when op.unit==="mol", derived otherwise */}
                    <td style={{ ...tdS, textAlign: "right" }}>
                      {makeQtyInput("mol", dispMol, !hasAmount && sugMol != null)}
                    </td>
                    {/* Clear button for limiting row or rows with committed amounts */}
                    {limitingMatId && (
                      <td style={{ ...tdS, textAlign: "center", padding: "8px 6px" }}>
                        {hasAmount && (
                          <button
                            onClick={() => dispatch(p => ({
                              ...p,
                              operations: p.operations.map(o => o.id === op.id ? { ...o, amount: null } : o),
                              updatedAt: new Date().toISOString(),
                            }))}
                            title="Clear entered amount"
                            style={{ background: "none", border: "none", cursor: "pointer", color: C.midDark, opacity: 0.5, padding: "2px", fontSize: "10px" }}
                          >
                            <Icon name="x" size={10} />
                          </button>
                        )}
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>

          <div style={{ padding: "6px 0", fontSize: "10px", color: C.midDark }}>
            {limitingMatId
              ? "Enter any one field per row (kg, L, or mol) -- the other two auto-fill. Orange italic = stoich suggestion. Red border = value required."
              : "Set a limiting reactant above to enable stoich calculations."}
          </div>
        </div>
      )}
    </div>
  );
}

      return { ...prev, [matId]: s };

    for (const op of stepOps) {
      if (!matToSteps[op.materialId]) matToSteps[op.materialId] = [];

    project.steps.map(s => s.intermediateOutputMaterialId).filter(Boolean)
