const tw = { fontFamily: MONO, fontSize: "13px", lineHeight: "1.8", display: "flex", flexWrap: "wrap", alignItems: "baseline", gap: "2px" };

// CC-016: Per-operation pump rate input field
function PumpRateField({ op, dispatch }) {
  const isSet = op.pumpRate != null;
  const display = isSet ? op.pumpRate : DEFAULT_PUMP_RATE;
  const [editing, setEditing] = useState(false);
  const [localVal, setLocalVal] = useState("");
  const inputRef = useRef(null);
  useEffect(() => { if (editing) inputRef.current?.focus(); }, [editing]);
  const commit = () => {
    const n = parseFloat(localVal);
    dispatch(p => ({ ...p, operations: p.operations.map(o => o.id === op.id ? { ...o, pumpRate: (Number.isFinite(n) && n > 0) ? n : null } : o), updatedAt: new Date().toISOString() }));
    setEditing(false);
  };
  const underlineColor = isSet ? C.orange : C.blue;
  if (editing) {
    return (
      <input ref={inputRef} type="number" min="1" step="any" value={localVal}
        onChange={e => setLocalVal(e.target.value)}
        onBlur={commit}
        onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") { setEditing(false); } }}
        placeholder={String(DEFAULT_PUMP_RATE)}
        style={{
          width: "64px", fontFamily: MONO, fontSize: "13px", border: "none", borderBottom: `1.5px solid ${underlineColor}`,
          background: "transparent", outline: "none", color: C.dark, padding: "0 2px", textAlign: "right"
        }} />
    );
  }
  return (
    <span title={isSet ? `Pump rate: ${display} L/h (set on this operation)` : `Pump rate: ${DEFAULT_PUMP_RATE} L/h (default -- click to override)`}
      onClick={() => { setLocalVal(isSet ? String(op.pumpRate) : ""); setEditing(true); }}
      style={{
        fontFamily: MONO, fontSize: "13px", borderBottom: `1.5px solid ${underlineColor}`, cursor: "text",
        padding: "0 2px", color: C.dark, minWidth: "32px", display: "inline-block", textAlign: "right"
      }}>
      {display}
    </span>
  );
}

// v46: Generic per-operation rate field (solid addition %/h, packaging kg/h).
// Follows the same inline-editable pattern as PumpRateField.
// v47: Shows a "(per-op)" or "(global)" badge to make the override state explicit.
function RateField({ op, dispatch, field, defaultVal, label, title }) {
  const isSet = op[field] != null;
  const display = isSet ? op[field] : defaultVal;
  const [editing, setEditing] = useState(false);
  const [localVal, setLocalVal] = useState("");
  const inputRef = useRef(null);
  useEffect(() => { if (editing) inputRef.current?.focus(); }, [editing]);
  const commit = () => {
    const n = parseFloat(localVal);
    dispatch(p => ({ ...p, operations: p.operations.map(o => o.id === op.id ? { ...o, [field]: (Number.isFinite(n) && n > 0) ? n : null } : o), updatedAt: new Date().toISOString() }));
    setEditing(false);
  };
  const underlineColor = isSet ? C.orange : C.blue;
  if (editing) {
    return (
      <input ref={inputRef} type="number" min="0.01" step="any" value={localVal}
        onChange={e => setLocalVal(e.target.value)}
        onBlur={commit}
        onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") setEditing(false); }}
        placeholder={String(defaultVal)}
        style={{ width: "56px", fontFamily: MONO, fontSize: "13px", border: "none", borderBottom: `1.5px solid ${underlineColor}`, background: "transparent", outline: "none", color: C.dark, padding: "0 2px", textAlign: "right" }} />
    );
  }
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: "3px" }}>
      <span title={title || (isSet ? `${display} ${label} (set on this operation -- click to edit or clear)` : `${defaultVal} ${label} (global default -- click to set a per-operation override)`)}
        onClick={() => { setLocalVal(isSet ? String(op[field]) : ""); setEditing(true); }}
        style={{ fontFamily: MONO, fontSize: "13px", borderBottom: `1.5px solid ${underlineColor}`, cursor: "text", padding: "0 2px", color: C.dark, minWidth: "28px", display: "inline-block", textAlign: "right" }}>
        {display}
      </span>
      <span style={{ fontSize: "9px", color: isSet ? C.orange : C.blue, background: isSet ? C.orange + "18" : C.blue + "18", borderRadius: "3px", padding: "0 3px", fontWeight: 600, letterSpacing: "0.02em", cursor: "default", userSelect: "none" }}
        title={isSet ? "Rate overridden on this operation. Click the value to clear or edit." : "Using global default. Click the value to set a per-operation rate."}>
        {isSet ? "(per-op)" : "(global)"}
      </span>
    </span>
  );
}

function renderAddition(op, p, d) {
  const mat = p.materials.find(m => m.id === op.materialId);
  const state = mat?.physicalState || "liquid";
  const showPumpRate = state === "liquid" || state === "slurry";
  const showSolidRate = state === "solid";
  return (
    <div style={tw}>
      <P>Add</P><NumField value={op.amount} field="amount" opId={op.id} dispatch={d} />
      <UnitField value={op.unit} opId={op.id} dispatch={d} />
      <P>of</P><MatField materialId={op.materialId} project={p} dispatch={d} opId={op.id} />
      <P>to</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} />
      {showPumpRate && <><P>at</P><PumpRateField op={op} dispatch={d} /><P>L/h</P></>}
      {showSolidRate && <><P>at</P><RateField op={op} dispatch={d} field="solidAdditionPctPerHour" defaultVal={25} label="%/h" title="Solid addition rate (%/h): percent of planned charge dosed per hour. Click to override." /><P>%/h</P></>}
      <P>over</P><DurationField op={op} dispatch={d} isAutoCalc={true} />
    </div>
  );
}

function renderTransfer(op, p, d) {
  return (
    <div style={tw}>
      <P>Transfer</P><NumField value={op.amount} field="amount" opId={op.id} dispatch={d} placeholder="volume" />
      <UnitField value={op.unit} opId={op.id} dispatch={d} />
      <P>from</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} />
      <P>to</P><EquipField equipmentId={op.secondaryEquipmentId} project={p} dispatch={d} opId={op.id} fieldName="secondaryEquipmentId" />
      <P>at</P><PumpRateField op={op} dispatch={d} /><P>L/h</P>
      <P>over</P><DurationField op={op} dispatch={d} isAutoCalc={true} />
    </div>
  );
}

function renderStir(op, p, d) { return <div style={tw}><P>Stir</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>for</P><DurationField op={op} dispatch={d} isAutoCalc={false} /><P>at</P><TempField value={op.temperature} opId={op.id} dispatch={d} tempUnit={p.settings?.temperatureUnit || "C"} /></div>; }
function renderHeatCool(op, p, d) { return <div style={tw}><P>Adjust</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>to</P><TempField value={op.temperature} opId={op.id} dispatch={d} tempUnit={p.settings?.temperatureUnit || "C"} /><P>over</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }
function renderFiltration(op, p, d) { return <div style={tw}><P>Filter contents of</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>, filtrate to</P><EquipField equipmentId={op.secondaryEquipmentId} project={p} dispatch={d} opId={op.id} fieldName="secondaryEquipmentId" /><P>as</P><MatField materialId={op.materialId} project={p} dispatch={d} opId={op.id} placeholder="filtrate material" /><P>over</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }
function renderDistillation(op, p, d) { return <div style={tw}><P>Distill</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} equipFilter={e => e.type !== "distillation_unit"} /><P>at</P><TempField value={op.temperature} opId={op.id} dispatch={d} tempUnit={p.settings?.temperatureUnit || "C"} /><P>, collecting</P><NumField value={op.amount} field="amount" opId={op.id} dispatch={d} placeholder="volume" /><UnitField value={op.unit} opId={op.id} dispatch={d} /><P>of</P><MatField materialId={op.materialId} project={p} dispatch={d} opId={op.id} placeholder="distillate" /><P>over</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }
function renderDrying(op, p, d) { return <div style={tw}><P>Dry</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>at</P><TempField value={op.temperature} opId={op.id} dispatch={d} tempUnit={p.settings?.temperatureUnit || "C"} /><P>for</P><DurationField op={op} dispatch={d} isAutoCalc={false} /></div>; }
function renderIpc(op, p, d) { return <div style={tw}><P>Sample from</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>for IPC:</P><TextField value={op.ipcMethod} field="ipcMethod" opId={op.id} dispatch={d} placeholder="method" /><P>&middot;</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }
function renderReleaseTesting(op, p, d) { return <div style={tw}><P>Release test from</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>:</P><TextField value={op.ipcMethod} field="ipcMethod" opId={op.id} dispatch={d} placeholder="method" /><P>&middot;</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }
function renderLoss(op, p, d) { return <div><div style={tw}><P>Account for a loss of</P><NumField value={op.amount} field="amount" opId={op.id} dispatch={d} /><UnitField value={op.unit} opId={op.id} dispatch={d} /><P>from</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>:</P><TextField value={op.notes} field="notes" opId={op.id} dispatch={d} placeholder="description" /></div><LossCompositionEditor op={op} project={p} dispatch={d} /></div>; }
function renderInertPurge(op, p, d) { return <div style={tw}><P>Inert</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>with nitrogen for</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }
function renderIpcCleaning(op, p, d) { return <div style={tw}><P>Clean</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>per</P><TextField value={op.notes} field="notes" opId={op.id} dispatch={d} placeholder="SOP" /><P>over</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }
function renderChangeoverCleaning(op, p, d) { return <div style={tw}><P>Changeover clean</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>per</P><TextField value={op.notes} field="notes" opId={op.id} dispatch={d} placeholder="SOP" /><P>over</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }
function renderPackaging(op, p, d) { return <div style={tw}><P>Package</P><NumField value={op.amount} field="amount" opId={op.id} dispatch={d} /><UnitField value={op.unit} opId={op.id} dispatch={d} /><P>of</P><MatField materialId={op.materialId} project={p} dispatch={d} opId={op.id} /><P>from</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>at</P><RateField op={op} dispatch={d} field="packagingRateKgPerH" defaultVal={100} label="kg/h" title="Packaging rate (kg/h): throughput for this packaging step. Click to override." /><P>kg/h over</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }
function renderStaging(op, p, d) { return <div style={tw}><P>Stage</P><EquipField equipmentId={op.primaryEquipmentId} project={p} dispatch={d} opId={op.id} /><P>for</P><DurationField op={op} dispatch={d} isAutoCalc={true} /></div>; }

function renderOperationTemplate(op, project, dispatch) {
  switch (op.type) {
    case "addition": return renderAddition(op, project, dispatch);
    case "transfer": return renderTransfer(op, project, dispatch);
    case "reaction": return renderReaction(op, project, dispatch);
    case "stir": return renderStir(op, project, dispatch);
    case "heat_cool": return renderHeatCool(op, project, dispatch);
    case "filtration": return renderFiltration(op, project, dispatch);
    case "distillation": return renderDistillation(op, project, dispatch);
    case "drying": return renderDrying(op, project, dispatch);
    case "ipc": return renderIpc(op, project, dispatch);
    case "release_testing": return renderReleaseTesting(op, project, dispatch);
    case "loss": return renderLoss(op, project, dispatch);
    case "inert_purge": return renderInertPurge(op, project, dispatch);
    case "ipc_cleaning": return renderIpcCleaning(op, project, dispatch);
    case "changeover_cleaning": return renderChangeoverCleaning(op, project, dispatch);
    case "packaging": return renderPackaging(op, project, dispatch);
    case "staging": return renderStaging(op, project, dispatch);
    default: return <P>{op.type}</P>;
  }
}

function sortStepIdsBySequence(steps, ids) {
  const rank = Object.fromEntries((steps || []).map((s, idx) => [s.id, normalizeNumber(s.sequence, idx + 1)]));
  return Array.from(new Set((ids || []).filter(id => typeof id === "string")))
    .sort((a, b) => (rank[a] ?? Number.MAX_SAFE_INTEGER) - (rank[b] ?? Number.MAX_SAFE_INTEGER));
}

function doesUpstreamSelectionCreateCycle(steps, stepId, upstreamStepIds) {
  const nextSteps = (steps || []).map(s => (
    s.id === stepId
      ? { ...s, upstreamStepIds: sortStepIdsBySequence(steps, upstreamStepIds).filter(id => id !== stepId) }
      : s
  ));
  return !Array.isArray(topoSort(nextSteps));
}

function StepCard({ step, project, dispatch, referenceHighlight = null }) {
  const [collapsed, setCollapsed] = useState(false);
  const [showPicker, setShowPicker] = useState(false);
  const [showUpstreamPicker, setShowUpstreamPicker] = useState(false);
  const [editingName, setEditingName] = useState(false);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const [showStoich, setShowStoich] = useState(true); // stoich section visible by default
  const dragState = useRef(null);
  const { batchResult, massFlowResult } = useContext(SimContext);

  // Stoich helpers: derived inside StepCard so ProcessEditorTab is self-contained.
  // compoundById, intermediates, getDensity, getMolarEquiv match the same logic
  // previously computed in MaterialsTab and passed down to StepStoichCard.
  const compoundById = Object.fromEntries(project.compounds.map(c => [c.id, c]));
  const stepOutputMaterialIds = new Set(project.steps.map(s => s.intermediateOutputMaterialId).filter(Boolean));
  const intermediates = new Set(
    project.materials
      .filter(m => m.type === "intermediate" || stepOutputMaterialIds.has(m.id))
      .map(m => m.id)
  );
  const getDensity = (matId) => {
    const mat = project.materials.find(m => m.id === matId);
    return getMaterialDensity(mat, compoundById, null);
  };
  const getMolarEquiv = (matId) => {
    const mat = project.materials.find(m => m.id === matId);
    return getMaterialMolarEquiv(mat, compoundById);
  };
  const stepOps = collectStepStoichFeedOps(project, step.id);
  const hds = (e, idx) => { dragState.current = { fromIdx: idx }; e.dataTransfer.effectAllowed = "move"; };
  const hdo = (e, idx) => { e.preventDefault(); setDragOverIdx(idx); };
  const hdl = () => setDragOverIdx(null);
  const hdd = (e, toIdx) => { e.preventDefault(); setDragOverIdx(null); if (!dragState.current) return; const { fromIdx } = dragState.current; if (fromIdx !== toIdx) dispatch(p => reorderOperations(p, step.id, fromIdx, toIdx)); dragState.current = null; };
  const hde = () => { setDragOverIdx(null); dragState.current = null; };
  const handleSelect = (typeId, cat) => { if (cat === "atomic") dispatch(p => addOperation(p, step.id, typeId)); else dispatch(p => addCompositeOperation(p, step.id, typeId)); setShowPicker(false); };
  const items = step.itemIds.map((id, idx) => { const op = project.operations.find(o => o.id === id && !o.compositeOperationId); const comp = project.compositeOperations.find(c => c.id === id); return { kind: op ? "op" : comp ? "comp" : null, data: op || comp, idx }; }).filter(i => i.kind);
  const eq = project.equipment.find(e => e.id === step.keyEquipmentId);
  const outMat = project.materials.find(m => m.id === step.intermediateOutputMaterialId);
  const stepById = Object.fromEntries(project.steps.map(s => [s.id, s]));
  const upstreamLabels = sortStepIdsBySequence(project.steps, step.upstreamStepIds || [])
    .map(id => {
      const s = stepById[id];
      return s ? `${s.sequence}. ${s.name}` : id;
    });
  // Batch sizing: find this step's volume info
  const sv = batchResult?.stepVolumes?.find(v => v.stepId === step.id);
  const hasBatchWarn = sv && (sv.exceeds || sv.belowMin);
  const showBatchSizing = !!sv && (sv.utilizationPct != null || sv.batchCount > 1 || (sv.perBatchVolL ?? 0) > 0);
  const stepBatchCalcDetail = (sv && showBatchSizing) ? {
    formula: "Per-batch load is own additions plus upstream intermediate flow, divided by required batches.",
    inputValues: `Own additions: ${fmtLSig(sv.ownScaledVolL)}; upstream: ${fmtLSig(sv.upstreamContribVolL)}; batches: ${sv.batchCount}; vessel capacity: ${sv.capacityVolL != null ? fmtLSig(sv.capacityVolL) : "--"}`,
    calculated: sv.utilizationPct != null ? fmtSig(sv.utilizationPct, 4) : fmtSig(sv.perBatchVolL, 4),
    unit: sv.utilizationPct != null ? "%" : "L",
    source: `Sizing mode: ${batchResult?.mode || "target_output"}; this step runs ${sv.batchCount} batch(es).`,
  } : null;
  return (
    <>
      <div style={{ position: "relative", borderRadius: "8px", border: `1px solid ${hasBatchWarn ? "#c05050" : C.border}`, marginBottom: "16px", boxShadow: "0 1px 4px rgba(0,0,0,0.05)", overflow: "visible" }}>
        <div style={{ overflow: "hidden", borderRadius: "7px", background: "#fff" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "10px 14px", background: hasBatchWarn ? "#fff0ee" : C.lightHover, borderBottom: collapsed ? "none" : `1px solid ${C.border}`, cursor: "pointer" }} onClick={() => setCollapsed(c => !c)}>
          <div style={{ width: "24px", height: "24px", borderRadius: "5px", background: C.dark, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px", fontWeight: 700, flexShrink: 0, fontFamily: MONO }}>{step.sequence}</div>
          <span style={{ color: C.midDark, flexShrink: 0 }}>{collapsed ? <Icon name="chevronRight" size={12} /> : <Icon name="chevronDown" size={12} />}</span>
          {editingName ? (
            <input autoFocus value={step.name} onChange={e => dispatch(p => updateStep(p, step.id, { name: e.target.value }))} onBlur={() => setEditingName(false)} onKeyDown={e => { if (e.key === "Enter" || e.key === "Escape") setEditingName(false); }} onClick={e => e.stopPropagation()} style={{ flex: 1, border: "none", borderBottom: `2px solid ${C.blue}`, outline: "none", background: "transparent", fontSize: "13px", fontWeight: 600, color: C.dark, fontFamily: "inherit" }} />
          ) : (
            <span style={{ flex: 1, fontSize: "13px", fontWeight: 600, color: C.dark }} onDoubleClick={e => { e.stopPropagation(); setEditingName(true); }} title="Double-click to rename">{step.name}</span>
          )}
          <div style={{ display: "flex", alignItems: "center", gap: "6px", flexShrink: 0 }}>
            {showBatchSizing && sv && sv.utilizationPct != null && (
              <span style={{ fontSize: "10px", fontFamily: MONO, color: sv.exceeds ? "#c05050" : sv.belowMin ? C.orange : C.green, background: sv.exceeds ? "#c0505018" : sv.belowMin ? C.orange + "18" : C.green + "18", padding: "1px 6px", borderRadius: "3px", border: `1px solid ${sv.exceeds ? "#c05050" : sv.belowMin ? C.orange : C.green}44`, display: "inline-flex", alignItems: "center", gap: "4px" }}>
                <span>
                  {sv.batchCount > 1 ? `${sv.batchCount} batches, ` : ""}
                  {fmtLSig(sv.perBatchVolL)} per batch ({fmtPctSig(sv.utilizationPct, 3)})
                </span>
                <CalcInfoIcon result={stepBatchCalcDetail} size={10} color={sv.exceeds ? "#c05050" : sv.belowMin ? C.orange : C.green} />
              </span>
            )}
            {hasBatchWarn && <span title={sv.exceeds ? "Volume exceeds equipment max" : "Volume below equipment min"} style={{ color: "#c05050" }}><Icon name="warning" size={12} /></span>}
            {outMat && <span style={{ fontSize: "10px", color: C.green, background: C.green + "22", padding: "1px 6px", borderRadius: "3px", fontWeight: 600 }}>&rarr; {outMat.name}</span>}
            <span style={{ fontSize: "10px", color: C.midDark }}>{step.itemIds.length} ops</span>
            <span style={{ fontSize: "10px", color: C.dark, background: C.lightBorder, padding: "1px 6px", borderRadius: "3px" }}>{step.yield}% yield</span>
          </div>
          <div style={{ display: "flex", gap: "4px", flexShrink: 0 }} onClick={e => e.stopPropagation()}>
            <Btn variant="ghost" size="sm" onClick={() => setEditingName(true)} title="Rename"><Icon name="edit" size={11} /></Btn>
            <Btn variant="ghost" size="sm" onClick={() => dispatch(p => deleteStep(p, step.id))} title="Delete"><Icon name="trash" size={11} /></Btn>
          </div>
        </div>
        {!collapsed && (
          <div style={{ display: "flex", gap: "16px", padding: "8px 14px", background: "#f6f5f0", borderBottom: `1px solid ${C.lightBorder}`, fontSize: "12px" }}>
            <label style={{ display: "flex", alignItems: "center", gap: "6px", color: C.midDark }}>Yield: <input type="number" min="0" max="100" step="any" value={step.yield} onChange={e => dispatch(p => updateStep(p, step.id, { yield: parseFloat(e.target.value) || 0 }))} style={{ ...sidebarInputStyle, width: "60px", background: "#fff", color: C.dark, display: "inline" }} /> <span>%</span></label>
            <label style={{ display: "flex", alignItems: "center", gap: "6px", color: C.midDark }}>Key vessel: <select value={step.keyEquipmentId || ""} onChange={e => dispatch(p => updateStep(p, step.id, { keyEquipmentId: e.target.value || null }))} style={{ ...sidebarInputStyle, background: "#fff", color: C.dark, display: "inline", minWidth: "100px" }}><option value=""> -- none  --</option>{project.equipment.map(eq => <option key={eq.id} value={eq.id}>{eq.id}</option>)}</select></label>
            <label style={{ display: "flex", alignItems: "center", gap: "6px", color: C.midDark }}>Output: <select value={step.intermediateOutputMaterialId || ""} onChange={e => dispatch(p => updateStep(p, step.id, { intermediateOutputMaterialId: e.target.value || null }))} style={{ ...sidebarInputStyle, background: "#fff", color: C.dark, display: "inline", minWidth: "160px" }}><option value=""> -- none  --</option>{project.materials.map(m => <option key={m.id} value={m.id}>{m.name || m.id}</option>)}</select></label>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", color: C.midDark, flex: 1, minWidth: "260px" }}>
              <span style={{ lineHeight: "22px", flexShrink: 0 }}>Upstream DAG:</span>
              <span style={{ fontSize: "11px", color: upstreamLabels.length > 0 ? C.dark : C.midDark, fontStyle: upstreamLabels.length > 0 ? "normal" : "italic", lineHeight: "22px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {upstreamLabels.length > 0 ? upstreamLabels.join(" -> ") : "None"}
              </span>
              <Btn variant="light" size="sm" onClick={() => setShowUpstreamPicker(true)}>Edit DAG</Btn>
            </div>

              <button

                style={{ marginLeft: "auto", padding: "2px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "10px", fontWeight: 600, background: showStoich ? C.dark + "12" : "#fff", color: showStoich ? C.dark : C.midDark, cursor: "pointer", fontFamily: "inherit", flexShrink: 0 }}
                title="Toggle stoichiometry table"
              >
                Stoich {showStoich ? String.fromCharCode(9650) : String.fromCharCode(9660)}
              </button>
            )}
          </div>
        )}
        {!collapsed && (
          <div>
            {/* Stoichiometry section: shown inline at top of step body when feeds exist.
                Collapsible via the "Stoich" toggle in the config row.
                getDensity/getMolarEquiv are computed inside StepCard so ProcessEditorTab
                is self-contained and does not depend on MaterialsTab for stoich data. */}
            {stepOps.length > 0 && showStoich && (
              <div style={{ borderBottom: `1px solid ${C.lightBorder}`, background: "#fdfcf8" }}>
                <StepStoichCard
                  step={step}
                  stepOps={stepOps}
                  project={project}
                  dispatch={dispatch}
                  compoundById={compoundById}
                  intermediates={intermediates}
                  massFlowResult={massFlowResult}
                  getDensity={getDensity}
                  getMolarEquiv={getMolarEquiv}
                  inlineMode={true}
                />
              </div>
            )}
            {items.length === 0 && <div style={{ padding: "24px 16px", color: C.midDark, fontSize: "13px", textAlign: "center" }}>No operations yet. Add one below.</div>}
            {items.map(({ kind, data, idx }) => {
              const isLossTrigger = kind === "op" && (data.type === "filtration" || data.type === "distillation");
              const nextItem = items[idx + 1];
              const nextIsLoss = nextItem && nextItem.kind === "op" && nextItem.data.type === "loss";
              return (
                <React.Fragment key={data.id}>
                  <div draggable onDragStart={e => hds(e, idx)} onDragOver={e => hdo(e, idx)} onDragLeave={hdl} onDrop={e => hdd(e, idx)} onDragEnd={hde}
                    style={{ outline: dragOverIdx === idx ? `2px solid ${C.blue}` : "none", outlineOffset: "-1px" }}>
                    {kind === "op" ? <OperationRow op={data} project={project} dispatch={dispatch} referenceHighlight={referenceHighlight} /> : <div style={{ padding: "4px 14px" }}><CompositeGroup comp={data} project={project} dispatch={dispatch} referenceHighlight={referenceHighlight} /></div>}
                  </div>
                  {isLossTrigger && !nextIsLoss && (
                    <LossSuggestion op={data} stepId={step.id} dispatch={dispatch} />
                  )}
                </React.Fragment>
              );
            })}
            <div style={{ padding: "10px 14px", borderTop: items.length > 0 ? `1px solid ${C.lightBorder}` : "none" }}>
              <Btn variant="light" size="sm" onClick={() => setShowPicker(true)}><Icon name="plus" size={11} /> Add operation</Btn>
            </div>
          </div>
        )}
        </div>{/* end inner clip wrapper (v35: allows CalcInfoIcon popovers to overflow above card) */}
      </div>
      {showPicker && <OperationPickerModal onSelect={handleSelect} onClose={() => setShowPicker(false)} />}
      {showUpstreamPicker && (
        <UpstreamDagPickerModal
          step={step}
          project={project}
          onClose={() => setShowUpstreamPicker(false)}
          onSave={(nextIds) => {
            dispatch(p => updateStep(p, step.id, { upstreamStepIds: sortStepIdsBySequence(p.steps, nextIds) }));
            setShowUpstreamPicker(false);
          }}
        />
      )}
    </>
  );
}

// === LOAD VALIDATION MODAL (CC-011) ==========================================
// =============================================================================
// Shown after loading a JSON file if there are any warnings or errors.
// Errors require the user to dismiss (load was already blocked by migrateProject).
// Warnings are informational; the project loaded successfully.

// Hoisted to module scope so LoadValidationModal does not recreate it per render.
const CATEGORY_COLORS = {
  Operation: C.blue,
  Composite: C.midDark,
  Step: C.orange,
  Material: C.green,
  Config: C.midDark,
  Compounds: C.midDark,
  Project: "#b04000",
};

function IssueRow({ item, severity }) {
  return (
    <div style={{ display: "flex", gap: "10px", padding: "8px 12px", borderBottom: `1px solid ${C.lightBorder}`, alignItems: "flex-start" }}>
      <span style={{
        fontSize: "9px", fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase",
        padding: "2px 7px", borderRadius: "10px", marginTop: "1px", flexShrink: 0,
        background: severity === "error" ? "#ffe4cc" : C.lightHover,
        color: severity === "error" ? "#b04000" : C.midDark,
        border: `1px solid ${severity === "error" ? "#f5c89a" : C.border}`
      }}>{severity}</span>

        <span style={{ fontSize: "10px", fontWeight: 600, color: CATEGORY_COLORS[item.category] || C.midDark, marginRight: "6px" }}>{item.category}</span>
        <span style={{ fontSize: "12px", color: C.dark }}>{item.message}</span>

function LoadValidationModal({ result, filename, onClose }) {
  if (!result) return null;
  const { errors, warnings } = result;
  const hasErrors = errors.length > 0;
  const hasWarnings = warnings.length > 0;
  if (!hasErrors && !hasWarnings) return null;



  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "system-ui,-apple-system,'Segoe UI',sans-serif" }}>
      <div style={{ background: "#fff", borderRadius: "10px", boxShadow: "0 8px 40px rgba(0,0,0,0.22)", width: "560px", maxHeight: "80vh", display: "flex", flexDirection: "column", overflow: "hidden", border: `1px solid ${C.border}` }}>
        {/* Header */}
        <div style={{ padding: "16px 20px 14px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: "10px", flexShrink: 0 }}>
          <Icon name="warning" size={18} color={hasErrors ? C.orange : C.blue} />
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: "14px", color: C.dark }}>
              {hasErrors ? "Load Issues Detected" : "Load Warnings"}
            </div>
            <div style={{ fontSize: "11px", color: C.midDark, marginTop: "2px" }}>
              {filename && <span style={{ fontFamily: "ui-monospace,monospace", color: C.dark }}>{filename}</span>}
              {hasErrors
                ? ` -- project could not be loaded due to ${errors.length} error${errors.length !== 1 ? "s" : ""}. Fix the JSON and try again.`
                : ` -- loaded with ${warnings.length} warning${warnings.length !== 1 ? "s" : ""}. Review below.`
              }
            </div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: C.midDark, fontSize: "18px", padding: "0 4px", lineHeight: 1 }} title="Close">&times;</button>
        </div>

        {/* Issue list */}
        <div style={{ flex: 1, overflowY: "auto" }}>
          {hasErrors && (
            <>
              <div style={{ padding: "10px 12px 6px", fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "#b04000", background: "#fff8f5", borderBottom: `1px solid ${C.lightBorder}` }}>
                Errors ({errors.length})
              </div>
              {errors.map((e, i) => <IssueRow key={i} item={e} severity="error" />)}
            </>
          )}
          {hasWarnings && (
            <>
              <div style={{ padding: "10px 12px 6px", fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: C.midDark, background: C.lightHover, borderBottom: `1px solid ${C.lightBorder}` }}>
                Warnings ({warnings.length})
              </div>
              {warnings.map((w, i) => <IssueRow key={i} item={w} severity="warning" />)}
            </>
          )}
        </div>

        {/* Footer */}
        <div style={{ padding: "12px 20px", borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "flex-end", gap: "8px", flexShrink: 0, background: C.lightHover }}>
          {!hasErrors && (
            <span style={{ fontSize: "11px", color: C.green, alignSelf: "center", marginRight: "auto", display: "flex", alignItems: "center", gap: "5px" }}>
              <Icon name="check" size={13} color={C.green} /> Project loaded successfully
            </span>
          )}
          <Btn variant={hasErrors ? "primary" : "light"} onClick={onClose}>
            {hasErrors ? "Dismiss" : "OK, Understood"}
          </Btn>
        </div>
      </div>
    </div>
  );
}

function Toolbar({ project, dispatch, undo, redo, canUndo, canRedo, loadProject, onValidationResult }) {
  const fileInputRef = useRef(null);
  const { cycleIds, massFlowResult, costResult } = useContext(SimContext);
  const hasCycles = cycleIds.length > 0;
  const flaggedCount = massFlowResult?.stepBalances?.filter(b => b.flagged).length ?? 0;
  const hasSteps = project.steps.length > 0;
  const totalCost = costResult?.totalBatchCost ?? null;

  const handleSave = () => {
    const blob = new Blob([JSON.stringify(project, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a");
    a.href = url; a.download = `${project.name.replace(/\s+/g, "_")}.chemcost.json`; a.click(); URL.revokeObjectURL(url);
  };
  const handleLoad = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const fname = file.name;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        // Migrate first (throws if structurally invalid JSON object)
        const migrated = migrateProject(parsed);
        // Run detailed validation (CC-011)
        const valResult = validateProjectDetailed(migrated);
        // Only load project if no blocking errors
        if (valResult.errors.length === 0) {
          loadProject(migrated);
        }
        // Show validation modal if there are any issues
        if ((valResult.errors.length > 0 || valResult.warnings.length > 0) && onValidationResult) {
          onValidationResult({ result: valResult, filename: fname });
        }
      } catch (err) {
        const msg = err?.message || "Unknown error";
        if (onValidationResult) {
          onValidationResult({ result: { errors: [{ category: "Parse/Migrate", message: msg }], warnings: [] }, filename: fname });
        } else {
          alert(`Unable to load project:\n${msg}`);
        }
      }
    };
    reader.readAsText(file); e.target.value = "";
  };

  return (
    <div style={{ display: "flex", alignItems: "center", gap: "8px", background: C.dark, color: "#fff", padding: "0 16px", height: "48px", flexShrink: 0, borderBottom: `1px solid ${C.darkHover}`, fontFamily: "inherit", fontSize: "13px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginRight: "8px" }}>
        <span style={{ fontSize: "20px", color: C.orange, lineHeight: 1 }}>&#x2394;</span>
        <span style={{ fontWeight: 700, fontSize: "15px", letterSpacing: "-0.3px", color: "#fff" }}>Chem<span style={{ color: C.orange }}>Cost</span></span>
      </div>
      <div style={{ width: 1, height: 24, background: "#3a3935" }} />
      <input value={project.name} onChange={e => dispatch(p => ({ ...p, name: e.target.value }))} style={{ background: "transparent", border: "none", color: "#fff", fontSize: "13px", fontFamily: "inherit", outline: "none", minWidth: "200px", fontWeight: 500 }} onFocus={e => e.target.select()} />
      <div style={{ flex: 1 }} />
      {hasCycles && <div style={{ display: "flex", alignItems: "center", gap: "5px", background: "#7a1a1a", borderRadius: "5px", padding: "3px 9px", fontSize: "11px", color: "#ffaaaa" }} title="Cycle detected in step dependencies"><Icon name="warning" size={12} /> Cycle detected</div>}
      {hasSteps && !hasCycles && (
        <div style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "11px", color: flaggedCount > 0 ? C.orange : C.green }} title={flaggedCount > 0 ? `${flaggedCount} step(s) with unaccounted mass` : "All steps balanced"}>
          <span style={{ width: "7px", height: "7px", borderRadius: "50%", background: flaggedCount > 0 ? C.orange : C.green }} />
          {flaggedCount > 0 ? `${flaggedCount} unbalanced` : "Balanced"}
        </div>
      )}
      {hasSteps && !hasCycles && totalCost !== null && (
        <div style={{ display: "flex", alignItems: "center", gap: "4px", fontSize: "11px", color: C.green, fontFamily: MONO }} title="Estimated total batch cost">
          ${totalCost.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 })}
        </div>
      )}
      <Btn variant="ghost" onClick={() => fileInputRef.current.click()} title="Load from JSON"><Icon name="load" size={13} /> Load</Btn>
      <Btn variant="ghost" onClick={handleSave} title="Save as JSON"><Icon name="save" size={13} /> Save</Btn>
      <input type="file" ref={fileInputRef} accept=".json" onChange={handleLoad} style={{ display: "none" }} />
      <div style={{ width: 1, height: 24, background: "#3a3935" }} />
      <Btn variant="ghost" onClick={undo} disabled={!canUndo} title="Undo (Ctrl+Z)"><Icon name="undo" size={13} /></Btn>
      <Btn variant="ghost" onClick={redo} disabled={!canRedo} title="Redo (Ctrl+Shift+Z)"><Icon name="redo" size={13} /></Btn>
    </div>
  );
}

function MassBalanceTab({ project, onJumpToStep }) {
  const { massFlowResult, sortedSteps, cycleIds } = useContext(SimContext);
  if (cycleIds.length > 0) return (
    <div style={{ padding: "40px 24px", color: C.orange, textAlign: "center" }}>
      <Icon name="warning" size={24} /><br /><br />
      <strong>Cycle detected in step dependencies.</strong><br />
      <span style={{ fontSize: "13px", color: C.midDark }}>Resolve the cycle before running mass balance.</span>
    </div>
  );
  if (!massFlowResult || massFlowResult.error) return (
    <div style={{ padding: "40px 24px", color: C.midDark, textAlign: "center", fontSize: "13px" }}>
      {massFlowResult?.error || "No steps defined."}
    </div>
  );
  const { stepBalances } = massFlowResult;
  if (stepBalances.length === 0) return (
    <div style={{ padding: "40px 24px", color: C.midDark, textAlign: "center", fontSize: "13px" }}>No steps to balance.</div>
  );
  const totalIn = stepBalances.reduce((s, b) => s + b.massIn, 0);
  const totalOut = stepBalances.reduce((s, b) => s + b.massOut, 0);
  const totalUnacc = totalIn - totalOut;
  const thS = {
    padding: "8px 14px", textAlign: "left", fontSize: "11px", fontWeight: 700, letterSpacing: "0.06em",
    textTransform: "uppercase", color: C.midDark, borderBottom: `2px solid ${C.border}`, whiteSpace: "nowrap", background: C.lightHover
  };

// === PROCESS EDITOR TAB ======================================================
// =============================================================================

function ProcessEditorTab({ project, dispatch, focusStepId = null, referenceHighlight = null }) {
  const [stepDragState, setStepDragState] = useState(null);
  const [stepDragOver, setStepDragOver] = useState(null);
  const { durationMap } = useContext(SimContext);
  const autoCount = project.operations.filter(op => !USER_SPECIFIED_DURATION_TYPES.has(op.type) && !op.duration.isOverridden && durationMap[op.id]?.calculated != null).length;
  const hsd = (e, idx) => { setStepDragState({ fromIdx: idx }); e.dataTransfer.effectAllowed = "move"; };
  const hsdo = (e, idx) => { e.preventDefault(); setStepDragOver(idx); };
  const hsdl = () => setStepDragOver(null);
  const hsdd = (e, toIdx) => { e.preventDefault(); setStepDragOver(null); if (stepDragState && stepDragState.fromIdx !== toIdx) dispatch(p => reorderSteps(p, stepDragState.fromIdx, toIdx)); setStepDragState(null); };
  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
      {project.steps.length === 0 && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "300px", gap: "12px", color: C.midDark }}>
          <Icon name="flask" size={36} />
          <div style={{ fontSize: "15px", fontWeight: 600, color: C.dark }}>No steps yet</div>
          <div style={{ fontSize: "13px", maxWidth: "320px", textAlign: "center", lineHeight: 1.6 }}>Add a synthesis step to get started. Each step can contain atomic or composite operations.</div>
          <Btn variant="primary" onClick={() => dispatch(p => addStep(p))}><Icon name="plus" size={13} /> Add First Step</Btn>
        </div>
      )}
      {project.steps.map((step, idx) => (
        <div key={step.id} draggable onDragStart={e => hsd(e, idx)} onDragOver={e => hsdo(e, idx)} onDragLeave={hsdl} onDrop={e => hsdd(e, idx)}
          style={{ outline: stepDragOver === idx ? `2px solid ${C.blue}` : step.id === focusStepId ? `2px solid ${C.orange}` : "none", outlineOffset: "2px", borderRadius: "8px" }}>
          <StepCard step={step} project={project} dispatch={dispatch} referenceHighlight={referenceHighlight} />
        </div>
      ))}
      {project.steps.length > 0 && (
        <div style={{ display: "flex", gap: "10px", paddingBottom: "20px" }}>
          <Btn variant="light" onClick={() => dispatch(p => addStep(p))}><Icon name="plus" size={13} /> Add Step</Btn>
          {autoCount > 0 && <span style={{ fontSize: "12px", color: C.blue, alignSelf: "center" }}>{autoCount} duration{autoCount === 1 ? "" : "s"} auto-calculated</span>}
        </div>
      )}
    </div>
  );
}

// =============================================================================
// === SUMMARY BAR =============================================================
// =============================================================================

function SummaryBar({ project }) {
  const { durationMap } = useContext(SimContext);
  const totalOps = project.operations.length;
  const totalSteps = project.steps.length;
  const autoCount = project.operations.filter(op => !USER_SPECIFIED_DURATION_TYPES.has(op.type) && !op.duration.isOverridden && durationMap[op.id]?.calculated != null).length;
  const overrideCount = project.operations.filter(op => op.duration.isOverridden).length;
  const totalDuration = project.operations.reduce((sum, op) => {
    const d = op.duration; const val = d.isOverridden ? d.override : (durationMap[op.id]?.calculated ?? null);
    if (!val) return sum;
    return sum + (d.unit === "min" ? val / 60 : val);
  }, 0);
  return (
    <div style={{ height: "32px", background: C.lightHover, borderTop: `1px solid ${C.border}`, display: "flex", alignItems: "center", padding: "0 20px", gap: "18px", fontSize: "11px", color: C.midDark, flexShrink: 0, fontFamily: MONO }}>
      <span style={{ color: C.dark, fontWeight: 600 }}>ChemCost</span>
      <span>&nbsp;.&nbsp;</span>
      <span>{totalSteps} step{totalSteps !== 1 ? "s" : ""}</span>
      <span>{totalOps} op{totalOps !== 1 ? "s" : ""}</span>
      {autoCount > 0 && <span style={{ color: C.blue }}>{autoCount} auto-calc</span>}
      {overrideCount > 0 && <span style={{ color: C.orange }}>{overrideCount} override{overrideCount !== 1 ? "s" : ""}</span>}
      {totalDuration > 0 && <span style={{ color: C.dark, fontWeight: 500 }}>{fmtDurationSig(totalDuration)} estimated</span>}
      <span style={{ marginLeft: "auto", color: C.midDark, fontFamily: "inherit", fontSize: "10px" }}>Updated {new Date(project.updatedAt).toLocaleTimeString()}</span>
    </div>
  );
}

// =============================================================================
// === MATERIALS TAB ===========================================================
// =============================================================================
// Unified materials view: compounds (left) and process materials (right).
// Compounds are pure chemicals with MW, density, cost, and SMILES data.
// Process materials are solutions/mixtures with composition fractions.
// Step stoichiometry is now in the Process Editor tab (inline in each StepCard).
// This tab focuses on defining and editing material properties.
// =============================================================================

function StepStoichCard({ step, stepOps, project, dispatch, compoundById, intermediates, massFlowResult, getDensity, getMolarEquiv, inlineMode = false }) {
  const [expanded, setExpanded] = useState(true);
  // liveEdit: tracks in-progress typed values so all three quantity columns update
  // live while the user types, before committing to project state on blur.
  // Shape: { opId: string, kg: number|null, L: number|null, mol: number|null } | null
  const [liveEdit, setLiveEdit] = useState(null);
  if (stepOps.length === 0) {
    if (inlineMode) return null;
    return (
      <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", padding: "10px 14px", marginBottom: "10px", display: "flex", alignItems: "center", gap: "8px", opacity: 0.7 }}>
        <span style={{ fontFamily: MONO, fontSize: "10px", color: C.midDark, background: C.lightBorder, padding: "1px 5px", borderRadius: "3px" }}>{step.sequence}</span>
        <span style={{ fontSize: "12px", color: C.midDark }}>{step.name} -- no stoichiometric feeds</span>
      </div>
    );
  }

  const limitingMatId = step.limitingMaterialId || null;
  const stoichBasis = step.stoichBasis || "mol";
  const stepStoichMaterialIds = [...new Set(stepOps.map(op => op.materialId).filter(Boolean))];
  const limitingOp = stepOps.find(op => op.materialId === limitingMatId);
  const limitingMat = project.materials.find(m => m.id === limitingMatId);
  const limitingKg = (limitingOp && limitingMat)
    ? resolveStoichLimitingMassKg({ limitingOp, limitingMaterial: limitingMat, compoundById, materialOutputMassByMaterialId: massFlowResult?.materialOutputMassByMaterialId || {} })
    : null;

  const calcSuggestedKg = (opMatId) => {
    if (!limitingMat || !limitingKg || limitingKg <= 0) return null;
    const targetMat = project.materials.find(m => m.id === opMatId);
    if (!targetMat) return null;
    return computeStoichSuggestedKgFromLimitingKg({ limitingKg, limitingMaterial: limitingMat, targetMaterial: targetMat, stoichBasis, compoundById });
  };

  const buildMassCalcDetail = (targetMat, suggestedKg) => {
    if (!limitingOp || !limitingMat || !targetMat || suggestedKg == null) return null;
    const lEq = getMaterialMolarEquiv(limitingMat, compoundById);
    const tEq = getMaterialMolarEquiv(targetMat, compoundById);
    const lAssay = getMaterialAssayFraction(limitingMat) * 100;
    const tAssay = getMaterialAssayFraction(targetMat) * 100;
    const lBasis = normalizePositiveNumber(limitingOp.amount, null)
      ? `${limitingOp.amount} ${limitingOp.unit || ""}`
      : `inferred=${limitingKg != null ? fmtKgSig(limitingKg) : "--"}`;
    return {
      formula: stoichBasis === "mol"
        ? "Start from limiting active moles, then scale by equivalent ratio, target MW, and target assay."
        : "Start from limiting active mass, then scale by equivalent ratio and target assay.",
      inputValues: `Basis: ${stoichBasis}; limiting basis: ${lBasis}; limiting assay: ${fmtPctSig(lAssay, 4)}; target equiv: ${fmtEquivSig(tEq)}; limiting equiv: ${fmtEquivSig(lEq)}; target assay: ${fmtPctSig(tAssay, 4)}`,
      calculated: fmtSig(suggestedKg, 5), unit: "kg",
      source: "Calculated by computeStoichSuggestedKgFromLimitingKg.",
    };
  };

  // commitAmount: saves amount+unit to project state then re-propagates.
  const commitAmount = (opId, raw, unit) => {
    const val = parseFloat(raw);
    if (isNaN(val)) return;
    dispatch(p => {
      const next = { ...p, operations: p.operations.map(o => o.id === opId ? { ...o, amount: parseFloat(val.toFixed(4)), ...(unit ? { unit } : {}) } : o), updatedAt: new Date().toISOString() };
      return runTargetDrivenPropagation(next);
    });
  };

  const commitEquiv = (matId, raw) => {
    const val = parseFloat(raw);
    if (isNaN(val) || val <= 0) return;
    const mat = project.materials.find(m => m.id === matId);
    if (!mat || !mat.composition || mat.composition.length === 0) return;
    const cid = mat.composition[0]?.compoundId;
    if (!cid) return;
    dispatch(p => {
      const next = { ...p, compounds: p.compounds.map(c => c.id === cid ? { ...c, molarEquivalents: parseFloat(val.toFixed(3)) } : c), updatedAt: new Date().toISOString() };
      return runTargetDrivenPropagation(next);
    });
  };

  const commitYield = (raw) => {
    const val = parseFloat(raw);
    if (isNaN(val)) return;
    dispatch(p => runTargetDrivenPropagation(updateStep(p, step.id, { yield: Math.max(0, Math.min(100, val)) })));
  };

  // --- Upstream step selection ---
  const upstreamIds = step.upstreamStepIds || [];
  const candidateSteps = (project.steps || []).filter(s => s.id !== step.id)
    .sort((a, b) => normalizeNumber(a.sequence, 0) - normalizeNumber(b.sequence, 0));

  const toggleUpstream = (candidateId) => {
    const next = upstreamIds.includes(candidateId)
      ? upstreamIds.filter(id => id !== candidateId)
      : sortStepIdsBySequence(project.steps, [...upstreamIds, candidateId]);
    if (doesUpstreamSelectionCreateCycle(project.steps, step.id, next)) return;
    dispatch(p => updateStep(p, step.id, { upstreamStepIds: next }));
  };

  // inp: base style for editable inputs in the stoich table.
  // warningBorder: applied when a required field is empty (no input entered yet).
  const inp = (extra = {}) => ({
    border: `1px solid ${C.border}`, borderRadius: "4px", padding: "4px 6px",
    fontSize: "12px", fontFamily: MONO, outline: "none", background: "#fff",
    color: C.dark, textAlign: "right", width: "72px", boxSizing: "border-box", ...extra,
  });
  const warningBorder = `1px solid #e05050`;

  // deriveRowValues: given op.amount + op.unit (the committed state), compute
  // the display values for all three quantity columns. Returns { kg, L, mol }.
  // When op.amount is null, returns null for all three (caller shows hint values instead).
  const deriveRowValues = (op, mat) => {
    if (op.amount == null || !isFinite(op.amount)) return { kg: null, L: null, mol: null };
    const unit = op.unit || "kg";
    const massKg = amountToKg(op.amount, unit, mat, compoundById);
    if (!massKg || massKg <= 0) {
      // If conversion failed (missing density/MW), show only the entered field.
      return {
        kg: unit === "kg" ? op.amount : null,
        L: unit === "L" ? op.amount : null,
        mol: unit === "mol" ? op.amount : null,
      };
    }
    const dens = getMaterialDensity(mat, compoundById, null);
    const mw = getMaterialMW(mat, compoundById);
    return {
      kg: unit === "kg" ? op.amount : massKg,
      L: dens && dens > 0 ? massKg / dens : null,
      mol: mw && mw > 0 ? massKg * 1000 / mw : null,
    };
  };

  const thS = { padding: "8px 10px", textAlign: "left", fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: C.midDark, borderBottom: `1px solid ${C.border}` };

  return (
    <div style={inlineMode
      ? { background: "transparent" }
      : { background: "#fff", border: `1px solid ${C.border}`, borderRadius: "8px", marginBottom: "12px", overflow: "hidden" }
    }>
      {!inlineMode && (
      <div onClick={() => setExpanded(!expanded)}
        style={{ display: "flex", alignItems: "center", gap: "10px", padding: "10px 14px", cursor: "pointer", background: C.lightHover, borderBottom: expanded ? `1px solid ${C.border}` : "none" }}>
        <Icon name={expanded ? "chevronDown" : "chevronRight"} size={12} />
        <span style={{ fontFamily: MONO, fontSize: "10px", color: C.midDark, background: C.lightBorder, padding: "1px 5px", borderRadius: "3px" }}>{step.sequence}</span>
        <span style={{ fontSize: "13px", fontWeight: 600, color: C.dark }}>{step.name}</span>
        <span style={{ fontSize: "11px", color: C.midDark }}>{stepOps.length} feed{stepOps.length !== 1 ? "s" : ""}</span>
        {step.yield != null && <span style={{ fontSize: "10px", color: C.green, fontWeight: 600, marginLeft: "4px" }}>Yield: {step.yield}%</span>}
        {limitingMatId && <span style={{ fontSize: "10px", color: C.blue, fontWeight: 600, marginLeft: "auto" }}>LR: {limitingMat?.name || "set"}</span>}
      </div>
      )}

      {(expanded || inlineMode) && (
        <div style={{ padding: "10px 14px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "16px", marginBottom: "10px", flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <span style={{ fontSize: "11px", color: C.midDark }}>Limiting:</span>
              <select value={limitingMatId || ""} onChange={e => dispatch(p => updateStep(p, step.id, { limitingMaterialId: e.target.value || null }))}
                style={{ border: `1px solid ${C.border}`, borderRadius: "4px", padding: "3px 8px", fontSize: "11px", fontFamily: "inherit", background: "#fff", color: C.dark }}>
                <option value="">-- none --</option>
                {stepStoichMaterialIds.map(matId => {
                  const mat = project.materials.find(m => m.id === matId);
                  return <option key={matId} value={matId}>{mat?.name || matId}</option>;
                })}
              </select>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <span style={{ fontSize: "11px", color: C.midDark }}>Yield (%):</span>
              <input type="number" step="any" min="0" max="100" defaultValue={step.yield ?? ""}
                onBlur={e => commitYield(e.target.value)} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
                placeholder="--" style={inp({ width: "56px" })} />
            </div>
          </div>

          {candidateSteps.length > 0 && (
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px", flexWrap: "wrap" }}>
              <span style={{ fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: C.midDark }}>Upstream:</span>
              {candidateSteps.map(cs => {
                const sel = upstreamIds.includes(cs.id);
                return (
                  <button key={cs.id} onClick={() => toggleUpstream(cs.id)}
                    style={{
                      padding: "2px 8px", border: `1px solid ${sel ? C.blue : C.border}`, borderRadius: "4px",
                      cursor: "pointer", fontFamily: "inherit", fontSize: "10px",
                      background: sel ? C.blue + "18" : "#fff", color: sel ? C.blue : C.midDark, fontWeight: sel ? 600 : 400
                    }}>
                    {cs.sequence}. {cs.name}
                  </button>
                );
              })}
            </div>
          )}

          {/* v45: Omnidirectional stoich table.
              All quantity columns (Mass/kg, Volume/L, Amount/mol) are editable inputs.
              Entering any one field computes and displays the other two as derived values.
              Rows with no amount entered are highlighted (red borders) on all three fields
              until the user commits a value -- "required field" pattern. */}
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: C.lightHover }}>
                <th style={thS}>Material</th>
                <th style={{ ...thS, textAlign: "right" }}>Molar Equiv</th>
                <th style={{ ...thS, textAlign: "right", color: C.orange }}>Mass (kg)</th>
                <th style={{ ...thS, textAlign: "right", color: C.blue }}>Volume (L)</th>
                <th style={{ ...thS, textAlign: "right", color: C.midDark }}>Amount (mol)</th>
                {limitingMatId && <th style={{ ...thS, width: "44px" }}></th>}
              </tr>
            </thead>
            <tbody>
              {stepOps.map((op, i) => {
                const mat = project.materials.find(m => m.id === op.materialId);
                const isLimiting = op.materialId === limitingMatId;
                const equiv = getMolarEquiv(op.materialId);
                const dens = getDensity(op.materialId);
                const isInt = intermediates.has(op.materialId);
                const tdS = { padding: "8px 10px", fontSize: "12px", color: C.dark, borderBottom: `1px solid ${C.lightBorder}` };

                // Derive display values from committed state.
                // For limiting row: show stored amount plus derived fields.
                // For non-limiting row with no amount: show stoich suggestions as hints.
                const hasAmount = op.amount != null && isFinite(op.amount);
                const derived = hasAmount ? deriveRowValues(op, mat) : { kg: null, L: null, mol: null };

                // Stoich suggestions (non-limiting rows only): computed from limiting material
                const sugKg = (!isLimiting && !hasAmount) ? calcSuggestedKg(op.materialId) : null;
                const massDet = (!isLimiting && sugKg != null) ? buildMassCalcDetail(mat, sugKg) : null;
                const sugL = (sugKg != null && dens && dens > 0) ? sugKg / dens : null;
                const sugMol = (sugKg != null) ? (() => {
                  const mw = getMaterialMW(mat, compoundById);
                  return mw && mw > 0 ? sugKg * 1000 / mw : null;
                })() : null;

                // Warning: row needs input -- no amount entered yet on a non-limiting row.
                const needsInput = !isLimiting && !hasAmount;

                // Per-cell display helpers: show derived or suggested value, or empty.
                const dispKg = isLimiting
                  ? (derived.kg ?? (op.amount != null && op.unit === "kg" ? op.amount : null))
                  : (hasAmount ? derived.kg : sugKg);
                const dispL = isLimiting
                  ? derived.L
                  : (hasAmount ? derived.L : sugL);
                const dispMol = isLimiting
                  ? derived.mol
                  : (hasAmount ? derived.mol : sugMol);

                // Styling: "active" field = what the user last entered (op.unit);
                // derived fields shown with subtle calculated background.
                const activeUnit = op.unit || "kg";
                const calcStyle = { background: C.lightHover, color: C.midDark };
                const activeStyle = { background: "#fff" };

                const fmtCell = (val, unit2) => {
                  if (val == null) return null;
                  if (unit2 === "kg") return fmtSig(val, 4);
                  if (unit2 === "L") return fmtSig(val, 4);
                  if (unit2 === "mol") return fmtSig(val, 4);
                  return fmtSig(val, 4);
                };

                const makeQtyInput = (colUnit, displayVal, isSug) => {
                  const isActive = !isLimiting && hasAmount && activeUnit === colUnit;
                  const isRef = isLimiting;
                  // Red warning border when: non-limiting, no amount, no suggestion available for this column
                  const showWarn = needsInput && !isSug && displayVal == null;
                  const showSugWarn = needsInput && isSug; // has suggestion but not committed

                  // When liveEdit is active for this row, use live-computed derived values.
                  const liveRowActive = liveEdit && liveEdit.opId === op.id;
                  const liveDisplayVal = liveRowActive ? liveEdit[colUnit] : displayVal;
                  const effectiveDisplayVal = liveRowActive ? liveDisplayVal : displayVal;

                  let borderStyle;
                  if (showWarn) borderStyle = warningBorder;
                  else if (showSugWarn) borderStyle = `1px dashed ${C.orange}`;
                  else if (isActive) borderStyle = `1px solid ${C.orange}`;
                  else borderStyle = `1px solid ${C.border}`;

                  let bgStyle;
                  if (showWarn || showSugWarn) bgStyle = "#fff8f8";
                  else if (isRef) bgStyle = C.lightHover;
                  else if (isActive) bgStyle = "#fff";
                  else if (hasAmount) bgStyle = C.lightHover;
                  else bgStyle = "#fff";

                  const shownVal = effectiveDisplayVal != null ? fmtCell(effectiveDisplayVal, colUnit) : "";
                  const placeholder = isSug && displayVal != null
                    ? fmtCell(displayVal, colUnit)
                    : (needsInput ? "enter..." : "--");

                  return (
                    <input
                      type="number" step="any" min="0"
                      key={`${op.id}-${colUnit}-${op.amount}-${op.unit}`}
                      defaultValue={isActive || isRef ? shownVal : ""}
                      placeholder={(!isActive && !isRef) ? placeholder : ""}
                      title={
                        isSug && !hasAmount
                          ? `Suggested: ${fmtCell(displayVal, colUnit)} ${colUnit} (from stoichiometry -- click to accept)`
                          : isActive ? `Last entered as ${colUnit}`
                          : hasAmount ? `Derived from entered ${activeUnit}`
                          : "Enter a value to auto-fill row"
                      }
                      onChange={e => {
                        // Live cascade: as the user types, compute and display derived
                        // Mass/Volume/Amount values without committing to project state.
                        const raw = parseFloat(e.target.value);
                        if (!Number.isFinite(raw) || raw < 0) { setLiveEdit(null); return; }
                        const massKg = amountToKg(raw, colUnit, mat, compoundById, getMaterialDensity(mat, compoundById, null));
                        const dens = getMaterialDensity(mat, compoundById, null);
                        const mw = getMaterialMW(mat, compoundById);
                        setLiveEdit({
                          opId: op.id,
                          kg: colUnit === "kg" ? raw : (massKg > 0 ? massKg : null),
                          L: colUnit === "L" ? raw : (massKg > 0 && dens && dens > 0 ? massKg / dens : null),
                          mol: colUnit === "mol" ? raw : (massKg > 0 && mw && mw > 0 ? massKg * 1000 / mw : null),
                        });
                      }}
                      onBlur={e => {
                        setLiveEdit(null);
                        const raw = e.target.value.trim();
                        if (raw && !isNaN(parseFloat(raw))) {
                          commitAmount(op.id, raw, colUnit);
                        } else if (!raw && isActive) {
                          // User cleared the active field -- remove amount
                          dispatch(p => ({
                            ...p,
                            operations: p.operations.map(o => o.id === op.id ? { ...o, amount: null } : o),
                            updatedAt: new Date().toISOString(),
                          }));
                        }
                      }}
                      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
                      style={{
                        ...inp(),
                        border: borderStyle,
                        background: bgStyle,
                        color: (isSug && !hasAmount) ? C.orange : (hasAmount && !isActive && !isRef) ? C.midDark : C.dark,
                        fontStyle: (isSug && !hasAmount) ? "italic" : "normal",
                        width: "72px",
                      }}
                    />
                  );
                };

                return (
                  <tr key={op.id} style={{ background: i % 2 === 0 ? "#fff" : C.lightHover }}>
                    <td style={tdS}>
                      <div style={{ fontWeight: isLimiting ? 700 : 500 }}>{mat?.name || op.materialId}</div>
                      {isInt && <div style={{ fontSize: "9px", color: C.orange, marginTop: "1px" }}>intermediate</div>}
                      {isLimiting && <div style={{ fontSize: "9px", color: C.blue, marginTop: "1px", fontWeight: 600 }}>LIMITING</div>}
                      {needsInput && <div style={{ fontSize: "9px", color: "#e05050", marginTop: "1px" }}>enter amount</div>}
                    </td>
                    <td style={{ ...tdS, textAlign: "right" }}>
                      {isLimiting
                        ? <span style={{ fontFamily: MONO, fontSize: "12px" }}>1.00</span>
                        : <span style={{ display: "inline-flex", flexDirection: "column", alignItems: "flex-end", gap: "2px" }}>
                          <input type="number" step="any" min="0" defaultValue={equiv.toFixed(2)}
                            onBlur={e => commitEquiv(op.materialId, e.target.value)}
                            onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
                            style={inp()} />
                          <span style={{ fontSize: "10px", color: C.midDark, fontFamily: MONO }}>{fmtEquivSig(equiv)}</span>
                        </span>}
                    </td>
                    {/* Mass (kg) -- active when op.unit==="kg", derived otherwise */}
                    <td style={{ ...tdS, textAlign: "right" }}>
                      <div style={{ display: "inline-flex", alignItems: "center", gap: "4px" }}>
                        {makeQtyInput("kg", dispKg, !hasAmount && sugKg != null)}
                        {massDet && <CalcInfoIcon result={massDet} size={10} color={C.orange} />}
                      </div>
                    </td>
                    {/* Volume (L) -- active when op.unit==="L", derived otherwise */}
                    <td style={{ ...tdS, textAlign: "right" }}>
                      {makeQtyInput("L", dispL, !hasAmount && sugL != null)}
                    </td>
                    {/* Amount (mol) -- active when op.unit==="mol", derived otherwise */}
                    <td style={{ ...tdS, textAlign: "right" }}>
                      {makeQtyInput("mol", dispMol, !hasAmount && sugMol != null)}
                    </td>
                    {/* Clear button for limiting row or rows with committed amounts */}
                    {limitingMatId && (
                      <td style={{ ...tdS, textAlign: "center", padding: "8px 6px" }}>
                        {hasAmount && (
                          <button
                            onClick={() => dispatch(p => ({
                              ...p,
                              operations: p.operations.map(o => o.id === op.id ? { ...o, amount: null } : o),
                              updatedAt: new Date().toISOString(),
                            }))}
                            title="Clear entered amount"
                            style={{ background: "none", border: "none", cursor: "pointer", color: C.midDark, opacity: 0.5, padding: "2px", fontSize: "10px" }}
                          >
                            <Icon name="x" size={10} />
                          </button>
                        )}
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>

          <div style={{ padding: "6px 0", fontSize: "10px", color: C.midDark }}>
            {limitingMatId
              ? "Enter any one field per row (kg, L, or mol) -- the other two auto-fill. Orange italic = stoich suggestion. Red border = value required."
              : "Set a limiting reactant above to enable stoich calculations."}
          </div>
        </div>
      )}
    </div>
  );
}
function MaterialsTab({ project, dispatch }) {
  const [expandedCompId, setExpandedCompId] = useState(null);
  const [expandedMatId, setExpandedMatId] = useState(null);
  const [showAddCompound, setShowAddCompound] = useState(false);
  const [showAddMaterial, setShowAddMaterial] = useState(false);
  const [newCmp, setNewCmp] = useState({ name: "", symbol: "", type: "raw_material", smiles: "" });
  const [newMat, setNewMat] = useState({ name: "", type: "input", physicalState: "liquid" });
  // CC-042 v47: ChEMBL compound lookup state (replaces PubChem two-phase flow)
  const [pubchemQuery, setPubchemQuery] = useState("");
  const [pubchemStatus, setPubchemStatus] = useState(null); // null | "searching" | "found" | "not_found" | "error"
  const [pubchemResult, setPubchemResult] = useState(null);
  // Debounce ref: prevents rapid successive lookups from hitting ChEMBL rate limits.
  // Lookup is blocked for 800ms after last invocation.
  const lookupDebounceRef = useRef(null);
  const [lookupEntries, setLookupEntries] = useState([]);
  const [lookupSourceName, setLookupSourceName] = useState("");
  const [lookupLoadError, setLookupLoadError] = useState(null);
  const lookupFileInputRef = useRef(null);
  // CC-039: per-material locked fraction sets (UI-only, not persisted)
  const [lockedFractions, setLockedFractions] = useState({});
  const toggleLock = (matId, cmpId) => {
    setLockedFractions(prev => {
      const s = new Set(prev[matId] || []);
      if (s.has(cmpId)) s.delete(cmpId); else s.add(cmpId);
      return { ...prev, [matId]: s };
    });
  };

  const compoundById = Object.fromEntries(project.compounds.map(c => [c.id, c]));

  // Build material ID -> steps that use it map (for "used in N steps" display and intermediate detection)
  const matToSteps = {};
  for (const step of project.steps) {
    const stepOps = collectStepStoichFeedOps(project, step.id);
    for (const op of stepOps) {
      if (!matToSteps[op.materialId]) matToSteps[op.materialId] = [];
      if (!matToSteps[op.materialId].includes(step.id)) matToSteps[op.materialId].push(step.id);
    }
  }

  // Detect intermediates (v35 tightened heuristic):
  // A material is auto-detected as intermediate only if it is the output of at
  // least one step (intermediateOutputMaterialId) AND also fed into another step.
  // This prevents solvents and reagents used in multiple steps from being
  // incorrectly flagged. Explicit m.type === "intermediate" always qualifies.
  const stepOutputMaterialIds = new Set(
    project.steps.map(s => s.intermediateOutputMaterialId).filter(Boolean)
  );
  // v36: track explicitly-typed vs auto-detected intermediates for visual distinction
  const explicitIntermediateIds = new Set(
    project.materials.filter(m => m.type === "intermediate").map(m => m.id)
  );
  const intermediates = new Set(
    project.materials
      .filter(m =>
        m.type === "intermediate" ||
        (stepOutputMaterialIds.has(m.id) && matToSteps[m.id] && matToSteps[m.id].length > 0)
      )
      .map(m => m.id)
  );
  const inp = (extra = {}) => ({ border: `1px solid ${C.border}`, borderRadius: "4px", padding: "5px 8px", fontSize: "12px", fontFamily: "inherit", outline: "none", background: "#fff", color: C.dark, ...extra });

  const applyLookupResult = (r, source) => {
    const result = {
      ...r,
      source,
      title: r?.title || pubchemQuery.trim(),
      smiles: r?.smiles || "",
      molecularWeight: toLookupNumber(r?.molecularWeight),
      density: toLookupNumber(r?.density),
    };
    setPubchemStatus("found");
    setPubchemResult(result);
    setNewCmp(c => ({
      ...c,

    if (localHit) {

    // v47: ChEMBL phase 2 lookup; v49: CIR phase 3 fallback when ChEMBL returns null/throws.
    fetchCompoundFromChEMBL(pubchemQuery).then(r => {

      });

  };

        setLookupSourceName(file.name);

        setLookupEntries([]);
        setLookupSourceName(file.name);
        setLookupLoadError("Could not parse lookup JSON file.");
      }
    };
    reader.readAsText(file);

  const typeColors = { raw_material: C.blue, solvent: C.green, reagent: "#a3b87a", intermediate: C.orange, product: C.green, waste: C.midDark };
  const matTypeColors = { input: C.blue, solvent: C.green, intermediate: C.orange, output: C.green, waste: C.midDark };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        {/* === LEFT: Material Library === */}
        <div style={{ width: "340px", flexShrink: 0, borderRight: `1px solid ${C.border}`, overflowY: "auto", background: "#fff" }}>
          {/* Compounds section */}
          <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.lightBorder}`, display: "flex", justifyContent: "space-between", alignItems: "center", background: C.lightHover }}>
            <span style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: C.midDark }}>Pure Compounds</span>
            <Btn variant="ghost" size="sm" onClick={() => setShowAddCompound(!showAddCompound)}><Icon name="plus" size={12} /></Btn>
          </div>
          {/* CC-042 v47: ChEMBL compound lookup strip; v49: CIR phase 3 fallback added */}
          <div style={{ padding: "8px 12px", borderBottom: `1px solid ${C.lightBorder}`, background: "#fafaf6" }}>
            <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
              <input
                placeholder="Lookup (name, CAS, or SMILES)..."

                  if (e.key === "Enter" && pubchemQuery.trim()) runCompoundLookup();

                style={{ ...inp(), flex: 1, boxSizing: "border-box", fontSize: "11px" }}

            </div>

              </div>
