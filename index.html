function normalizeNumber(value, fallback = null) {
  const n = typeof value === "number" ? value : Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function normalizePositiveNumber(value, fallback = null) {
  const n = normalizeNumber(value, null);
  return (n && n > 0) ? n : fallback;
}

function normalizeDuration(duration) {
  const d = duration || {};
  return {
    calculated: normalizeNumber(d.calculated, null),
    override: normalizeNumber(d.override, null),
    isOverridden: !!d.isOverridden,
    unit: d.unit === "min" ? "min" : "h",
  };
}

function normalizeSettings(settings) {
  const base = { ...makeSettings(), ...(settings || {}) };
  return {
    massBalanceTolerance: Math.max(0, normalizeNumber(base.massBalanceTolerance, 0.05)),
    temperatureUnit: TEMP_UNITS.includes(base.temperatureUnit) ? base.temperatureUnit : "C",
  };
}

function normalizeLaborRates(laborRates) {
  const defaults = Object.fromEntries(makeLaborRates().map(r => [r.department, { ...r }]));
  if (!Array.isArray(laborRates)) return Object.values(defaults);
  for (const row of laborRates) {
    if (!row || typeof row !== "object" || !defaults[row.department]) continue;
    defaults[row.department] = {
      ...defaults[row.department],
      name: row.name || defaults[row.department].name,
      rate: Math.max(0, normalizeNumber(row.rate, defaults[row.department].rate)),
    };
  }
  return Object.values(defaults);
}

function normalizeStepOverrides(stepOverrides) {
  if (!stepOverrides || typeof stepOverrides !== "object") return {};
  const normalized = {};
  for (const [stepId, value] of Object.entries(stepOverrides)) {
    if (!stepId) continue;
    if (typeof value === "number") {
      const n = normalizeNumber(value, null);
      if (n && n > 0) normalized[stepId] = { batchSizeL: n };
      continue;
    }
    if (!value || typeof value !== "object") continue;
    const batchSizeL = normalizeNumber(value.batchSizeL, null);
    if (batchSizeL && batchSizeL > 0) normalized[stepId] = { batchSizeL };
  }
  return normalized;
}

function normalizeBatchSizingConfig(batchSizingConfig) {
  const cfg = batchSizingConfig || {};
  return {
    mode: "target_output",
    targetMass: normalizeNumber(cfg.targetMass, null),
    targetUnit: "kg",
    stepOverrides: normalizeStepOverrides(cfg.stepOverrides),
    allowExcessIntermediate: !!cfg.allowExcessIntermediate,
  };
}

const TARGET_REBALANCE_OP_TYPES = new Set(["addition", "transfer", "loss", "distillation", "packaging"]);
const STOICH_REBALANCE_SKIP_TYPES = new Set(["solvent", "waste", "output"]);
const STOICH_FEED_OP_TYPES = new Set(["addition", "transfer"]);
const PROPAGATION_MAX_ITERS = 10;
const PROPAGATION_AMOUNT_TOL = 0.000001;
const PROPAGATION_SCALE_TOL = 0.0005;
// Propagation alternates stoich and target-mass passes; stop when both amount
// updates and implied scale movement are below UI-visible significance.

function collectStepStoichFeedOps(project, stepId) {
  if (!project || !stepId) return [];
  return (project.operations || []).filter(op => (
    op.stepId === stepId
    && STOICH_FEED_OP_TYPES.has(op.type)
    && !!op.materialId
  ));
}

function computeCurrentProductMass(project) {
  const sortedSteps = topoSort(project?.steps || []);
  if (!Array.isArray(sortedSteps) || sortedSteps.length === 0) return null;
  const massFlow = runMassFlow(project, sortedSteps);
  if (massFlow?.error) return null;
  const green = computeGreenMetrics(project, massFlow);
  return normalizePositiveNumber(green?.productMassOut, null);
}

function ensureTargetOutputMass(project) {
  const currentTarget = normalizePositiveNumber(project?.batchSizingConfig?.targetMass, null);
  if (currentTarget) return project;
  // Seed from the solved baseline so first-time target mode starts from current output.
  const seededTarget = computeCurrentProductMass(project);
  if (!seededTarget) return project;
  return {
    ...project,
    batchSizingConfig: {
      ...normalizeBatchSizingConfig(project.batchSizingConfig),
      targetMass: parseFloat(seededTarget.toFixed(6)),
      mode: "target_output",
    },
    updatedAt: new Date().toISOString(),
  };
}

function getOperationAmountMap(project) {
  const map = {};
  for (const op of (project?.operations || [])) {
    map[op.id] = normalizeNumber(op.amount, null);
  }
  return map;
}

function maxOperationAmountDelta(beforeMap, afterMap) {
  const ids = new Set([
    ...Object.keys(beforeMap || {}),
    ...Object.keys(afterMap || {}),
  ]);
  let maxDelta = 0;
  for (const id of ids) {
    const beforeAmount = normalizeNumber(beforeMap?.[id], null);
    const afterAmount = normalizeNumber(afterMap?.[id], null);
    if (beforeAmount == null && afterAmount == null) continue;
    if (beforeAmount == null || afterAmount == null) return Infinity;
    const delta = Math.abs(beforeAmount - afterAmount);
    if (delta > maxDelta) maxDelta = delta;
  }
  return maxDelta;
}

function computeTargetScaleFactor(project) {
  const targetMass = normalizePositiveNumber(project?.batchSizingConfig?.targetMass, null);
  if (!targetMass) return 1;
  const productMass = computeCurrentProductMass(project);
  if (!productMass) return 1;
  return targetMass / productMass;
}

function resolveStoichLimitingMassKg({ limitingOp, limitingMaterial, compoundById, materialOutputMassByMaterialId }) {
  if (limitingOp && limitingMaterial) {
    const explicitKg = amountToKg(
      limitingOp.amount,
      limitingOp.unit,
      limitingMaterial,
      compoundById,
      getMaterialDensity(limitingMaterial, compoundById, 1.0)
    );
    if (explicitKg > 0) return explicitKg;
  }
  const inferredKg = normalizePositiveNumber(materialOutputMassByMaterialId?.[limitingMaterial?.id], null);
  return inferredKg || null;
}

function scaleProjectOperationAmounts(project, scaleFactor) {
  const sf = normalizeNumber(scaleFactor, null);
  if (!Number.isFinite(sf) || sf <= 0 || Math.abs(sf - 1) < 0.000001) return project;
  let changed = false;
  const operations = (project.operations || []).map(op => {
    if (!TARGET_REBALANCE_OP_TYPES.has(op.type)) return op;
    const amount = normalizeNumber(op.amount, null);
    if (!(amount && amount > 0)) return op;
    const scaled = parseFloat((amount * sf).toFixed(6));
    if (!Number.isFinite(scaled) || scaled <= 0 || Math.abs(scaled - amount) < 0.000001) return op;
    changed = true;
    return { ...op, amount: scaled };
  });
  if (!changed) return project;
  return { ...project, operations, updatedAt: new Date().toISOString() };
}

function applyStoichRebalance(project, changedMaterialIds = []) {
  // changedMaterialIds retained for call compatibility; reapplication is intentionally global.
  void changedMaterialIds;
  const compoundById = Object.fromEntries((project.compounds || []).map(c => [c.id, c]));
  const materialById = Object.fromEntries((project.materials || []).map(m => [m.id, m]));

  let next = project;
  for (let iter = 0; iter < PROPAGATION_MAX_ITERS; iter++) {
    // Limiting masses can come from upstream outputs, so recompute mass flow each pass.
    const sortedSteps = topoSort(next.steps || []);
    if (!Array.isArray(sortedSteps) || sortedSteps.length === 0) return next;
    const massFlow = runMassFlow(next, sortedSteps);
    if (massFlow?.error) return next;

    const nextByOpId = {};
    const outByMaterial = massFlow.materialOutputMassByMaterialId || {};

    for (const step of (next.steps || [])) {
      if (!step?.limitingMaterialId) continue;

      const feedOps = collectStepStoichFeedOps(next, step.id);
      if (feedOps.length < 2) continue;

      const limitingOp = feedOps.find(op => op.materialId === step.limitingMaterialId);
      const limitingMaterial = materialById[step.limitingMaterialId];
      if (!limitingOp || !limitingMaterial) continue;

      const limitingKg = resolveStoichLimitingMassKg({
        limitingOp,
        limitingMaterial,
        compoundById,
        materialOutputMassByMaterialId: outByMaterial,
      });
      if (!limitingKg || limitingKg <= 0) continue;

      for (const op of feedOps) {
        // Keep the limiting feed as-entered; only rebalance non-limiting participants.
        if (op.id === limitingOp.id) continue;

        const targetMaterial = materialById[op.materialId];
        // Skip non-stoich classes so recycle/waste placeholders are not auto-resized.
        if (!targetMaterial || STOICH_REBALANCE_SKIP_TYPES.has(targetMaterial.type)) continue;

        const suggestedKg = computeStoichSuggestedKgFromLimitingKg({
          limitingKg,
          limitingMaterial,
          targetMaterial,
          stoichBasis: step.stoichBasis || "mol",
          compoundById,
        });
        if (!suggestedKg || suggestedKg <= 0) continue;

        const density = getMaterialDensity(targetMaterial, compoundById, 1.0);
        const nextAmount = kgToAmount(suggestedKg, op.unit || "kg", targetMaterial, compoundById, density);
        if (!Number.isFinite(nextAmount) || nextAmount <= 0) continue;

        const rounded = parseFloat(nextAmount.toFixed(6));
        const currentAmount = normalizeNumber(op.amount, null);
        if (currentAmount != null && Math.abs(rounded - currentAmount) < PROPAGATION_AMOUNT_TOL) continue;
        nextByOpId[op.id] = rounded;
      }
    }

    if (Object.keys(nextByOpId).length === 0) return next;
    const beforeAmounts = getOperationAmountMap(next);
    const updated = {
      ...next,
      operations: (next.operations || []).map(op => (
        Object.prototype.hasOwnProperty.call(nextByOpId, op.id)
          ? { ...op, amount: nextByOpId[op.id] }
          : op
      )),
      updatedAt: new Date().toISOString(),
    };
    const afterAmounts = getOperationAmountMap(updated);
    next = updated;
    if (maxOperationAmountDelta(beforeAmounts, afterAmounts) < PROPAGATION_AMOUNT_TOL) return next;
  }

  return next;
}

function runTargetDrivenPropagation(project, { seedTarget = true } = {}) {
  let next = seedTarget ? ensureTargetOutputMass(project) : project;
  let prevScale = null;

  // Stoich rebalance and target rebalance are coupled, so iterate until both settle.
  for (let iter = 0; iter < PROPAGATION_MAX_ITERS; iter++) {
    const beforeAmounts = getOperationAmountMap(next);
    const stoichAdjusted = applyStoichRebalance(next);
    const rebalanced = rebalanceProjectToTarget(stoichAdjusted);
    const afterAmounts = getOperationAmountMap(rebalanced);
    const amountDelta = maxOperationAmountDelta(beforeAmounts, afterAmounts);
    const scaleFactor = computeTargetScaleFactor(rebalanced);
    const scaleDelta = (prevScale == null)
      ? Math.abs(scaleFactor - 1)
      : Math.abs(scaleFactor - prevScale);

    next = rebalanced;
    if (amountDelta < PROPAGATION_AMOUNT_TOL && scaleDelta < PROPAGATION_SCALE_TOL) break;
    prevScale = scaleFactor;
  }
  return next;
}

function setTargetOutputMass(project, kg) {
  const n = normalizeNumber(kg, null);
  const nextProject = {
    ...project,
    batchSizingConfig: {
      ...normalizeBatchSizingConfig(project.batchSizingConfig),
      targetMass: (n && n > 0) ? n : null,
      mode: "target_output",
    },
    updatedAt: new Date().toISOString(),
  };
  if (!(n && n > 0)) return nextProject;
  return runTargetDrivenPropagation(nextProject);
}

function rebalanceProjectToTarget(project) {
  const targetMass = normalizePositiveNumber(project?.batchSizingConfig?.targetMass, null);
  if (!targetMass) return project;

  // Scale only quantity-bearing operation classes, then remeasure product mass.
  let next = project;
  for (let i = 0; i < PROPAGATION_MAX_ITERS; i++) {
    const sortedSteps = topoSort(next.steps || []);
    if (!Array.isArray(sortedSteps) || sortedSteps.length === 0) return next;
    const massFlow = runMassFlow(next, sortedSteps);
    if (massFlow?.error) return next;
    const green = computeGreenMetrics(next, massFlow);
    const productMass = normalizePositiveNumber(green?.productMassOut, null);
    if (!productMass) return next;
    const sf = targetMass / productMass;
    if (!Number.isFinite(sf) || sf <= 0 || Math.abs(sf - 1) < PROPAGATION_SCALE_TOL) return next;
    const scaled = scaleProjectOperationAmounts(next, sf);
    if (scaled === next) return next;
    next = scaled;
  }
  return next;
}

// Shared unit/concentration helpers used across engines and tabs.
function getMaterialPrimaryEntry(material) {
  if (!material || !Array.isArray(material.composition)) return null;
  for (const entry of material.composition) {
    if (entry && typeof entry.compoundId === "string") return entry;
  }
  return null;
}

function getMaterialAssayFraction(material) {
  const frac = normalizeNumber(getMaterialPrimaryEntry(material)?.fraction, null);
  if (!Number.isFinite(frac)) return 1;
  return Math.max(0, frac);
}

function getMaterialMW(material, compoundById) {
  if (!material || !compoundById) return null;
  for (const entry of (material.composition || [])) {
    const mw = normalizeNumber(compoundById[entry?.compoundId]?.molecularWeight, null);
    if (mw && mw > 0) return mw;
  }
  return null;
}

function getMaterialDensity(material, compoundById, fallback = null) {
  const direct = normalizeNumber(material?.density, null);
  if (direct && direct > 0) return direct;
  const primary = getMaterialPrimaryEntry(material);
  const fromCmp = normalizeNumber(compoundById?.[primary?.compoundId]?.density, null);
  if (fromCmp && fromCmp > 0) return fromCmp;
  return fallback;
}

function amountToKg(amount, unit, material, compoundById, densityFallback = null) {
  const qty = normalizeNumber(amount, null);
  if (!qty || qty <= 0) return 0;
  const u = unit || "kg";
  if (u === "kg") return qty;
  if (u === "g") return qty / 1000;
  if (u === "L") {
    const density = getMaterialDensity(material, compoundById, densityFallback);
    return density && density > 0 ? qty * density : 0;
  }
  if (u === "mol") {
    const mw = getMaterialMW(material, compoundById);
    return mw && mw > 0 ? qty * mw / 1000 : 0;
  }
  return 0;
}

function amountToL(amount, unit, material, compoundById, densityFallback = null) {
  const qty = normalizeNumber(amount, null);
  if (!qty || qty <= 0) return 0;
  const u = unit || "L";
  if (u === "L") return qty;
  const kg = amountToKg(qty, u, material, compoundById, densityFallback);
  if (!kg || kg <= 0) return 0;
  const density = getMaterialDensity(material, compoundById, densityFallback);
  return density && density > 0 ? kg / density : 0;
}

function kgToAmount(kg, unit, material, compoundById, densityFallback = null) {
  const massKg = normalizeNumber(kg, null);
  if (!Number.isFinite(massKg) || massKg < 0) return null;
  const u = unit || "kg";
  if (u === "kg") return massKg;
  if (u === "g") return massKg * 1000;
  if (u === "L") {
    const density = getMaterialDensity(material, compoundById, densityFallback);
    return density && density > 0 ? massKg / density : null;
  }
  if (u === "mol") {
    const mw = getMaterialMW(material, compoundById);
    return mw && mw > 0 ? massKg * 1000 / mw : null;
  }
  return null;
}

function getMaterialMolarEquiv(material, compoundById) {
  if (!material || !compoundById) return 1;
  for (const entry of (material.composition || [])) {
    const equiv = normalizeNumber(compoundById[entry?.compoundId]?.molarEquivalents, null);
    if (equiv && equiv > 0) return equiv;
  }
  return 1;
}

function computeStoichSuggestedKgFromLimitingKg({ limitingKg, limitingMaterial, targetMaterial, stoichBasis, compoundById }) {
  if (!Number.isFinite(limitingKg) || limitingKg <= 0 || !limitingMaterial || !targetMaterial) return null;

  const limitingMW = getMaterialMW(limitingMaterial, compoundById);
  const targetMW = getMaterialMW(targetMaterial, compoundById);
  const limitingEquiv = getMaterialMolarEquiv(limitingMaterial, compoundById);
  const targetEquiv = getMaterialMolarEquiv(targetMaterial, compoundById);

  const limitingAssay = Math.max(0.000001, getMaterialAssayFraction(limitingMaterial));
  const targetAssay = Math.max(0.000001, getMaterialAssayFraction(targetMaterial));
  const limitingActiveKg = limitingKg * limitingAssay;

  if (stoichBasis === "mol") {
    if (!limitingMW || !targetMW || !limitingEquiv) return null;
    const molLimiting = limitingActiveKg * 1000 / limitingMW;
    const molTarget = molLimiting * targetEquiv / limitingEquiv;
    const targetActiveKg = molTarget * targetMW / 1000;
    return targetActiveKg / targetAssay;
  }

  if (stoichBasis === "w/w" || stoichBasis === "v/w") {
    if (!limitingEquiv) return null;
    const targetActiveKg = limitingActiveKg * targetEquiv / limitingEquiv;
    return targetActiveKg / targetAssay;
  }

  return null;
}

function computeStoichSuggestedKg({ limitingOp, limitingMaterial, targetMaterial, stoichBasis, compoundById }) {
  if (!limitingOp || !limitingMaterial || !targetMaterial) return null;
  const limitingKg = amountToKg(
    limitingOp.amount,
    limitingOp.unit,
    limitingMaterial,
    compoundById,
    getMaterialDensity(limitingMaterial, compoundById, 1.0)
  );
  if (!limitingKg || limitingKg <= 0) return null;
  return computeStoichSuggestedKgFromLimitingKg({
    limitingKg,
    limitingMaterial,
    targetMaterial,
    stoichBasis,
    compoundById,
  });
}

// =============================================================================
// === CHEMBL COMPOUND IMPORT (v47: replaces PubChem) ==========================
// =============================================================================
// Async helper that looks up a compound by name, CAS, or SMILES using the
// ChEMBL REST API. No API key required. Returns a ChemCost CompoundObject
// shape on success, or null if not found or on network/parse error.
//
// ChEMBL does not expose reliable density data, so density is always null.
// The local JSON lookup DB (handled in UI) remains the density source.
// =============================================================================

// fetchCompoundFromChEMBL(query) -- Phase 2 compound lookup via ChEMBL REST API.
//
// DESIGN NOTE: The former text-search endpoint (/molecule/search?q=) was removed
// because it returns fuzzy/relevance-ranked results -- not exact name matches.
// For a query like "2,6-dichloropyrazine", it returned the top fuzzy match which
// could be a structurally different compound. The returned SMILES was valid but
// wrong, and SmilesDrawer drew the wrong structure silently (no parse error).
//
// This function now uses two exact-match endpoints in sequence:
//   Phase A: pref_name__iexact -- matches ChEMBL preferred names exactly (case-insensitive)
//   Phase B: molecule_synonym?synonym__iexact -- matches synonyms/trade names exactly,
//            then fetches the full molecule record by chembl_id
//
// If both phases return empty, returns null (CIR phase 3 then runs as before).
//
// SMILES validation: after either phase succeeds, the returned smiles string is
// checked: must be a non-empty printable ASCII string with no "InChI" substring.
// ChEMBL occasionally stores InChI strings in the smiles field for legacy entries;
// SmilesDrawer cannot parse InChI, so we blank those out rather than store garbage.
async function fetchCompoundFromChEMBL(query) {
  if (!query || typeof query !== "string" || !query.trim()) return null;
  const q = query.trim();
  const BASE = "https://www.ebi.ac.uk/chembl/api/data";
  const headers = { Accept: "application/json" };

  // Validate and sanitise a SMILES string before returning it.
  // Returns "" if the string is not safe for SmilesDrawer.
  const validateSmiles = (raw) => {
    if (!raw || typeof raw !== "string") return "";
    const s = raw.trim();
    // Must be non-empty printable ASCII only (no high-byte or control chars)
    if (!/^[\x20-\x7E]+$/.test(s)) return "";
    // ChEMBL legacy entries sometimes store InChI strings here; SmilesDrawer cannot parse them.
    if (s.includes("InChI")) return "";
    return s;
  };

  // Extract the standard result shape from a ChEMBL MoleculeObject.
  const extractMol = (mol) => {
    if (!mol) return null;
    const props = mol.molecule_properties;
    const structs = mol.molecule_structures;
    return {
      title: mol.pref_name || q,
      molecularWeight: props ? parseFloat(props.full_mwt) || null : null,
      smiles: validateSmiles(structs ? (structs.canonical_smiles || "") : ""),
      density: null, // ChEMBL does not provide reliable density data
    };
  };

  try {
    // Phase A: exact preferred name match (pref_name__iexact)
    const resA = await fetch(`${BASE}/molecule?pref_name__iexact=${encodeURIComponent(q)}&format=json&limit=1`, { headers });
    if (resA.ok) {
      const dataA = await resA.json();
      if (dataA.molecules && dataA.molecules.length > 0) {
        const result = extractMol(dataA.molecules[0]);
        if (result) result.smiles = await canonicalizeSmiles(result.smiles);
        return result;
      }
    }

    // Phase B: synonym exact match, then fetch full molecule by chembl_id
    const resB = await fetch(`${BASE}/molecule_synonym?synonym__iexact=${encodeURIComponent(q)}&format=json&limit=1`, { headers });
    if (resB.ok) {
      const dataB = await resB.json();
      if (dataB.molecule_synonyms && dataB.molecule_synonyms.length > 0) {
        const chemblId = dataB.molecule_synonyms[0].molecule_chembl_id;
        if (chemblId) {
          const resC = await fetch(`${BASE}/molecule/${encodeURIComponent(chemblId)}?format=json`, { headers });
          if (resC.ok) {
            const mol = await resC.json();
            const result = extractMol(mol);
            if (result) result.smiles = await canonicalizeSmiles(result.smiles);
            return result;
          }
        }
      }
    }

    // Both phases returned empty -- let CIR phase 3 run
    return null;
  } catch (err) {
    // Re-throw so the caller's .catch() sets lookup status to "error"
    throw err;
  }
}

// canonicalizeSmiles(rawSmiles) -- async helper to obtain the PubChem canonical SMILES form.
//
// RATIONALE: SmilesDrawer is sensitive to SMILES notation. ChEMBL returns its own canonical
// form (e.g. "Clc1cncc(Cl)n1" for 2,6-dichloropyrazine) which SmilesDrawer may fail to parse,
// while the PubChem canonical form ("c1cnc(nc1Cl)Cl") renders correctly. Canonicalizing at
// ingest time means stored SMILES are always the PubChem preferred form.
//
// Calls PubChem PUG REST: POST /compound/smiles/property/CanonicalSMILES/TXT
// Returns the canonical string on success, or rawSmiles unchanged on any failure
// (network error, invalid SMILES, or offline) so the caller is never blocked.
async function canonicalizeSmiles(rawSmiles) {
  if (!rawSmiles || typeof rawSmiles !== "string") return rawSmiles || "";
  const s = rawSmiles.trim();
  if (!s) return s;
  try {
    const body = "smiles=" + encodeURIComponent(s);
    const res = await fetch(
      "https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/smiles/property/CanonicalSMILES/TXT",
      { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body }
    );
    if (!res.ok) return s; // non-2xx means invalid SMILES or server error; keep original
    const text = (await res.text()).trim();
    // PUG REST TXT output is just the value on a single line; guard against HTML error pages
    if (!text || text.includes("<") || text.includes("Status")) return s;
    return text;
  } catch (_) {
    // Network/CORS error (offline); degrade gracefully
    return s;
  }
}

// fetchCompoundFromCIR(query) -- Phase 3 compound lookup via NCI CADD Chemical Identifier Resolver.
// Used as a fallback when ChEMBL returns null or throws (e.g. CAS numbers, common trivial names).
// CIR is very forgiving with common names and CAS numbers; no API key required.
// Returns { title, molecularWeight, smiles, density: null } or null if CIR does not recognise query.
// Throws on genuine network/CORS failure so the caller can surface "error" status.
//
// API: each property is a separate endpoint returning plain text.
// A non-2xx response or empty body means "not found" -- surface as null (not error).
// Both MW and SMILES requests are made in parallel.
async function fetchCompoundFromCIR(query) {
  if (!query || typeof query !== "string" || !query.trim()) return null;
  const q = query.trim();
  const BASE = "https://cactus.nci.nih.gov/chemical/structure";
  const enc = encodeURIComponent(q);

  let mwText = null, smilesText = null;
  // Parallel fetch; allSettled so one failure does not abort the other.
  const [mwRes, smilesRes] = await Promise.allSettled([
    fetch(`${BASE}/${enc}/mw`),
    fetch(`${BASE}/${enc}/smiles`),
  ]);

  // Plain-text parse helpers -- network errors (rejected promises) propagate as throws.
  if (mwRes.status === "fulfilled" && mwRes.value.ok) {
    const txt = (await mwRes.value.text()).trim();
    if (txt) mwText = txt;
  } else if (mwRes.status === "rejected") {
    // Re-throw the underlying network error so MaterialsTab .catch() sets status "error".
    throw mwRes.reason;
  }

  if (smilesRes.status === "fulfilled" && smilesRes.value.ok) {
    const txt = (await smilesRes.value.text()).trim();
    if (txt) smilesText = txt;
  } else if (smilesRes.status === "rejected") {
    throw smilesRes.reason;
  }

  // If neither property resolved, CIR does not recognise this identifier.
  if (!mwText && !smilesText) return null;

  const mw = mwText ? parseFloat(mwText) : null;
  // CIR returns non-canonical SMILES; canonicalize via PubChem so SmilesDrawer prefers it.
  const canonSmiles = smilesText ? await canonicalizeSmiles(smilesText) : "";
  return {
    title: q,
    molecularWeight: mw && isFinite(mw) ? mw : null,
    smiles: canonSmiles || "",
    density: null, // CIR does not provide density
  };
}

function migrateProject(rawProject) {
  if (!rawProject || typeof rawProject !== "object" || Array.isArray(rawProject)) {
    throw new Error("Project file must be a JSON object.");
  }
  const now = new Date().toISOString();
  const base = { ...makeEmptyProject(), ...rawProject };
  const opTypeSet = new Set(OPERATION_TYPES.map(t => t.id));
  const compTypeSet = new Set(COMPOSITE_TYPES.map(t => t.id));
  const migrated = {
    ...base,
    id: typeof base.id === "string" && base.id ? base.id : crypto.randomUUID(),
    name: typeof base.name === "string" && base.name ? base.name : "Imported Project",
    notes: typeof base.notes === "string" ? base.notes : "",   // CC-025
    schemaVersion: SCHEMA_VERSION,
    createdAt: typeof base.createdAt === "string" ? base.createdAt : now,
    updatedAt: now,
    compounds: Array.isArray(base.compounds) ? base.compounds.map(c => {
      // v46: isAqueous on compounds -- migrate from stored value or default false.
      // MIGRATION BRANCH NOTES:
      //   isAqueous != null path: ALWAYS ACTIVE (v46+ projects have it stored).
      //   isAqueous == null path: STILL REACHABLE for any project saved before v46.
      const isAqueous = c?.isAqueous != null ? !!c.isAqueous : false;
      return {
        ...c,
        id: typeof c?.id === "string" ? c.id : genId("CMP"),
        name: c?.name ?? "",
        symbol: c?.symbol ?? "",
        molecularWeight: normalizeNumber(c?.molecularWeight, null),
        density: normalizeNumber(c?.density, null),
        molarEquivalents: normalizeNumber(c?.molarEquivalents, 1),
        unitCost: normalizeNumber(c?.unitCost, null),
        type: COMPOUND_TYPES.includes(c?.type) ? c.type : "raw_material",
        notes: c?.notes ?? "",
        smiles: typeof c?.smiles === "string" ? c.smiles : "",
        isProduct: !!c?.isProduct,                                            // CC-015
        isAqueous,
      };
    }) : [],
    materials: Array.isArray(base.materials) ? base.materials.map(m => {
      // v46: isAqueous migration -- run the legacy string heuristic one last time on
      // loaded (pre-v46) data to explicitly stamp isAqueous=true on matching materials.
      // For materials that already have isAqueous set, preserve the stored value.
      // MIGRATION BRANCH NOTES:
      //   isAqueous == null path: STILL REACHABLE for any project saved before v46.
      //   isAqueous already set path: ALWAYS ACTIVE for v46+ projects.
      let isAqueous = m?.isAqueous;
      if (isAqueous == null) {
        const nameLc = (m?.name || "").toLowerCase();
        isAqueous = nameLc.includes("water") || nameLc.includes("aqueous") || nameLc.includes("(aq)");
      }
      return {
        ...m,
        id: typeof m?.id === "string" ? m.id : genId("MAT"),
        name: m?.name ?? "",
        composition: Array.isArray(m?.composition) ? m.composition
          .filter(x => x && typeof x.compoundId === "string")
          .map(x => ({ compoundId: x.compoundId, fraction: normalizeNumber(x.fraction, 0) })) : [],
        type: MATERIAL_TYPES.includes(m?.type) ? m.type : "input",
        preferredUnit: PREFERRED_UNITS.includes(m?.preferredUnit) ? m.preferredUnit : "L",
        physicalState: PHYSICAL_STATES.includes(m?.physicalState) ? m.physicalState : "liquid",
        density: normalizeNumber(m?.density, null),
        isAqueous: !!isAqueous,
      };
    }) : [],
    equipment: (() => {
      // Normalize each equipment entry from the loaded file
      const normalized = Array.isArray(base.equipment) ? base.equipment.map(e => ({
        ...e,
        id: typeof e?.id === "string" ? e.id : genId("EQ"),
        name: e?.name ?? e?.id ?? "",
        type: EQUIPMENT_TYPES.includes(e?.type) ? e.type : "other",
        moc: e?.moc ?? "",
        minWorkingVolume: normalizeNumber(e?.minWorkingVolume, null),
        maxWorkingVolume: normalizeNumber(e?.maxWorkingVolume, null),
        hourlyRate: normalizeNumber(e?.hourlyRate, 0),
        // Legacy equipment-level pumpRate is ignored; operation-level pumpRate is used
      })) : [];
      // Ensure all BUILTIN_EQUIPMENT entries are present. Any builtin not already
      // in the loaded file (matched by id) is appended so saved projects do not
      // silently lose the standard equipment register.
      const loadedIds = new Set(normalized.map(e => e.id));
      for (const builtin of BUILTIN_EQUIPMENT) {
        if (!loadedIds.has(builtin.id)) normalized.push({ ...builtin });
      }
      return normalized;
    })(),
    consumables: (() => {
      // v51: normalize each stored consumable; ensure all BUILTIN_CONSUMABLES are present.
      // Pattern mirrors the equipment migration above.
      const raw = Array.isArray(base.consumables) ? base.consumables : [];
      const normalized = raw.map(c => ({
        id: typeof c?.id === "string" ? c.id : genId("CON"),
        name: typeof c?.name === "string" ? c.name : "",
        capacityKg: normalizePositiveNumber(c?.capacityKg, null),
        unitCost: normalizePositiveNumber(c?.unitCost, null),
        notes: typeof c?.notes === "string" ? c.notes : "",
      }));
      const loadedIds = new Set(normalized.map(c => c.id));
      for (const b of BUILTIN_CONSUMABLES) {
        if (!loadedIds.has(b.id)) normalized.push({ ...b });
      }
      return normalized;
    })(),
    steps: Array.isArray(base.steps) ? base.steps.map((s, idx) => ({
      ...s,
      id: typeof s?.id === "string" ? s.id : genId("STP"),
      sequence: Math.max(1, normalizeNumber(s?.sequence, idx + 1)),
      name: s?.name ?? `Step ${idx + 1}`,
      description: s?.description ?? "",
      itemIds: Array.isArray(s?.itemIds) ? s.itemIds.filter(id => typeof id === "string") : [],
      yield: Math.max(0, Math.min(100, normalizeNumber(s?.yield, 100))),
      keyEquipmentId: typeof s?.keyEquipmentId === "string" ? s.keyEquipmentId : null,
      upstreamStepIds: Array.isArray(s?.upstreamStepIds) ? s.upstreamStepIds.filter(id => typeof id === "string") : [],
      intermediateOutputMaterialId: typeof s?.intermediateOutputMaterialId === "string" ? s.intermediateOutputMaterialId : null,
      limitingMaterialId: typeof s?.limitingMaterialId === "string" ? s.limitingMaterialId : null,
      stoichBasis: ["mol", "w/w", "v/w"].includes(s?.stoichBasis) ? s.stoichBasis : "mol",
    })) : [],
    compositeOperations: Array.isArray(base.compositeOperations) ? base.compositeOperations.map(c => ({
      ...c,
      id: typeof c?.id === "string" ? c.id : genId("COP"),
      stepId: typeof c?.stepId === "string" ? c.stepId : null,
      sequence: Math.max(1, normalizeNumber(c?.sequence, 1)),
      macroType: compTypeSet.has(c?.macroType) ? c.macroType : "filter_cake_wash",
      label: c?.label ?? "Composite Operation",
      operationIds: Array.isArray(c?.operationIds) ? c.operationIds.filter(id => typeof id === "string") : [],
      isExpanded: !!c?.isExpanded,
    })) : [],
    operations: Array.isArray(base.operations) ? (() => {
      // v46: per-operation solidAdditionPctPerHour (addition) and packagingRateKgPerH (packaging).
      // If the raw project has legacy global settings, seed the per-op field from there
      // so no user-configured rates are lost. Ops that already have the field keep it.
      const legacySolidRate = normalizeNumber(rawProject?.settings?.solidAdditionPctPerHour, null);
      const legacyPkgRate = normalizeNumber(rawProject?.settings?.packagingRateKgPerH, null);
      return base.operations.map((o, idx) => {
        const normalized = {
          ...o,
          id: typeof o?.id === "string" ? o.id : genId("OPR"),
          stepId: typeof o?.stepId === "string" ? o.stepId : null,
          compositeOperationId: typeof o?.compositeOperationId === "string" ? o.compositeOperationId : null,
          sequence: Math.max(1, normalizeNumber(o?.sequence, idx + 1)),
          type: opTypeSet.has(o?.type) ? o.type : "addition",
          primaryEquipmentId: typeof o?.primaryEquipmentId === "string" ? o.primaryEquipmentId : null,
          secondaryEquipmentId: typeof o?.secondaryEquipmentId === "string" ? o.secondaryEquipmentId : null,
          materialId: typeof o?.materialId === "string" ? o.materialId : null,
          amount: normalizePositiveNumber(o?.amount, null),
          unit: AMOUNT_UNITS.includes(o?.unit) ? o.unit : "L",
          temperature: normalizeNumber(o?.temperature, null),
          duration: normalizeDuration(o?.duration),
          notes: o?.notes ?? "",
          ipcMethod: typeof o?.ipcMethod === "string" ? o.ipcMethod : null,
          reactants: Array.isArray(o?.reactants) ? o.reactants : [],
          products: Array.isArray(o?.products) ? o.products : [],
          reactionYield: normalizeNumber(o?.reactionYield, 100),
          lossComposition: Array.isArray(o?.lossComposition) ? o.lossComposition : [],
          pumpRate: normalizePositiveNumber(o?.pumpRate, null),
        };
      // Seed per-op rate fields from stored value or legacy global settings (migration).
      // MIGRATION BRANCH NOTES:
      //   legacySolidRate / legacyPkgRate non-null: STILL REACHABLE for projects saved
      //     before v46 that used global solidAdditionPctPerHour / packagingRateKgPerH in
      //     settings. Those fields were moved to per-operation level in v46; this branch
      //     seeds the per-op field from the old global value on first load only.
      //   Stored per-op field already present: ALWAYS ACTIVE for v46+ projects.
      //   Both null: DEFENSIVE -- applies when neither global nor per-op rate was ever set.
        if (normalized.type === "addition") {
          const stored = normalizePositiveNumber(o?.solidAdditionPctPerHour, null);
          normalized.solidAdditionPctPerHour = stored ?? legacySolidRate ?? null;
        }
        if (normalized.type === "packaging") {
          const stored = normalizePositiveNumber(o?.packagingRateKgPerH, null);
          normalized.packagingRateKgPerH = stored ?? legacyPkgRate ?? null;
          // v51: consumableId links a packaging op to a consumable container
          normalized.consumableId = typeof o?.consumableId === "string" ? o.consumableId : null;
        }
        return normalized;
      });
    })() : [],
    batchSizingConfig: normalizeBatchSizingConfig(base.batchSizingConfig),
    laborRates: normalizeLaborRates(base.laborRates),
    settings: normalizeSettings(base.settings),
    orgCosts: (() => {
      // v51: normalize orgCosts; seed any missing sub-section from makeOrgCosts() defaults.
      const defaults = makeOrgCosts();
      const src = (base.orgCosts && typeof base.orgCosts === "object") ? base.orgCosts : {};
      const rdSrc = src.rd || {};
      const qcSrc = src.qc || {};
      const qaSrc = src.qa || {};
      const prdSrc = src.prd || {};
      return {
        rd: {
          processDevelopmentWeeks: normalizeNumber(rdSrc.processDevelopmentWeeks, 0),
          processSupportHours: normalizeNumber(rdSrc.processSupportHours, 0),
          developmentReportIncluded: !!rdSrc.developmentReportIncluded,
        },
        qc: {
          fteHours: normalizeNumber(qcSrc.fteHours, 0),
          methodTransfers: normalizeNumber(qcSrc.methodTransfers, 0),
          rmIntermediateReleases: normalizeNumber(qcSrc.rmIntermediateReleases, 0),
          methodValidations: normalizeNumber(qcSrc.methodValidations, 0),
          productReleases: normalizeNumber(qcSrc.productReleases, 0),
          stabilityTestPoints: normalizeNumber(qcSrc.stabilityTestPoints, 0),
          stabilityStorage: normalizeNumber(qcSrc.stabilityStorage, 0),
          externalLabValidations: normalizeNumber(qcSrc.externalLabValidations, 0),
          externalLabTestingBatches: normalizeNumber(qcSrc.externalLabTestingBatches, 0),
          externalLabQualification: normalizeNumber(qcSrc.externalLabQualification, 0),
        },
        qa: {
          reviewMethodTransfer: normalizeNumber(qaSrc.reviewMethodTransfer, 0),
          reviewSpecifications: normalizeNumber(qaSrc.reviewSpecifications, 0),
          reviewAnalyticalDocumentation: normalizeNumber(qaSrc.reviewAnalyticalDocumentation, 0),
          reviewNewMasterBatchRecord: normalizeNumber(qaSrc.reviewNewMasterBatchRecord, 0),
          reviewTestMethods: normalizeNumber(qaSrc.reviewTestMethods, 0),
          reviewCleaningMethodValidation: normalizeNumber(qaSrc.reviewCleaningMethodValidation, 0),
          reviewExecutedBatchRecord: normalizeNumber(qaSrc.reviewExecutedBatchRecord, 0),
          reviewAnalyticalReleasePaperwork: normalizeNumber(qaSrc.reviewAnalyticalReleasePaperwork, 0),
          authorPVProtocolAndReport: normalizeNumber(qaSrc.authorPVProtocolAndReport, 0),
          reviewFPMethodValidation: normalizeNumber(qaSrc.reviewFPMethodValidation, 0),
          newSupplierQualification: normalizeNumber(qaSrc.newSupplierQualification, 0),
        },
        prd: {
          ppeCostPerHour: normalizeNumber(prdSrc.ppeCostPerHour, defaults.prd.ppeCostPerHour),
        },
      };
    })(),
    pfdNodePositions: (() => {
      // v53: migrate stored canvas positions; any non-object value falls back to empty.
      const raw = base.pfdNodePositions;
      if (!raw || typeof raw !== "object" || Array.isArray(raw)) return {};
      const cleaned = {};
      for (const [k, v] of Object.entries(raw)) {
        if (typeof v === "object" && v !== null && typeof v.x === "number" && typeof v.y === "number") {
          cleaned[k] = { x: v.x, y: v.y };
        }
      }
      return cleaned;
    })(),
  };
  return migrated;
}

function validateProject(project) {
  const errors = [];
  if (!project || typeof project !== "object") errors.push("Project is not an object.");
  if (!Array.isArray(project.steps)) errors.push("Project.steps must be an array.");
  if (!Array.isArray(project.operations)) errors.push("Project.operations must be an array.");
  if (!Array.isArray(project.compositeOperations)) errors.push("Project.compositeOperations must be an array.");
  if (errors.length) throw new Error(errors.join("\n"));

  const stepIds = new Set(project.steps.map(s => s.id));
  const opIds = new Set(project.operations.map(o => o.id));
  const compIds = new Set(project.compositeOperations.map(c => c.id));
  const equipById = Object.fromEntries((project.equipment || []).map(e => [e.id, e]));

  for (const op of project.operations) {
    if (!stepIds.has(op.stepId)) errors.push(`Operation ${op.id} references missing stepId ${op.stepId}`);
    if (op.compositeOperationId && !compIds.has(op.compositeOperationId)) {
      errors.push(`Operation ${op.id} references missing compositeOperationId ${op.compositeOperationId}`);
    }
    if (op.primaryEquipmentId && !equipById[op.primaryEquipmentId]) {
      errors.push(`Operation ${op.id} references missing primaryEquipmentId ${op.primaryEquipmentId}`);
    }
    if (op.secondaryEquipmentId && !equipById[op.secondaryEquipmentId]) {
      errors.push(`Operation ${op.id} references missing secondaryEquipmentId ${op.secondaryEquipmentId}`);
    }
    if (op.type === "distillation" && op.primaryEquipmentId) {
      const eq = equipById[op.primaryEquipmentId];
      if (eq?.type === "distillation_unit") {
        errors.push(`Operation ${op.id} uses distillation unit ${eq.id} as primary equipment. In this model, distillation operations represent concentration and must run on reactor vessels.`);
      }
    }
  }
  for (const comp of project.compositeOperations) {
    if (!stepIds.has(comp.stepId)) errors.push(`Composite ${comp.id} references missing stepId ${comp.stepId}`);
    for (const opId of comp.operationIds || []) {
      if (!opIds.has(opId)) errors.push(`Composite ${comp.id} references missing op ${opId}`);
    }
  }
  for (const step of project.steps) {
    for (const itemId of step.itemIds || []) {
      if (!opIds.has(itemId) && !compIds.has(itemId)) {
        errors.push(`Step ${step.id} itemId ${itemId} is neither operation nor composite.`);
      }
    }
    for (const upId of step.upstreamStepIds || []) {
      if (!stepIds.has(upId)) errors.push(`Step ${step.id} references missing upstreamStepId ${upId}`);
    }
  }
  if (errors.length) throw new Error(errors.join("\n"));
  return true;
}

// =============================================================================
// === VALIDATION ENGINE (CC-011) ==============================================
// =============================================================================
// validateProjectDetailed: returns { errors, warnings } where each entry is
// { category: string, message: string, entityId?: string }.
// Errors are blocking; warnings are data-quality issues shown in a modal.
// =============================================================================

function validateProjectDetailed(project) {
  const errors = [];
  const warnings = [];
  if (!project || typeof project !== "object") {
    errors.push({ category: "Project", message: "Project data is not a valid object." });
    return { errors, warnings };
  }

  const compoundIds = new Set((project.compounds || []).map(c => c.id));
  const materialIds = new Set((project.materials || []).map(m => m.id));
  const stepIds = new Set((project.steps || []).map(s => s.id));
  const opIds = new Set((project.operations || []).map(o => o.id));
  const compIds = new Set((project.compositeOperations || []).map(c => c.id));
  const equipById = Object.fromEntries((project.equipment || []).map(e => [e.id, e]));

  // Referential integrity -- ERRORS
  for (const op of (project.operations || [])) {
    if (op.stepId && !stepIds.has(op.stepId)) {
      errors.push({ category: "Operation", entityId: op.id, message: `Operation ${op.id} (${op.type}) references missing step "${op.stepId}".` });
    }
    if (op.compositeOperationId && !compIds.has(op.compositeOperationId)) {
      errors.push({ category: "Operation", entityId: op.id, message: `Operation ${op.id} references missing composite operation "${op.compositeOperationId}".` });
    }
    if (op.primaryEquipmentId && !equipById[op.primaryEquipmentId]) {
      errors.push({ category: "Operation", entityId: op.id, message: `Operation ${op.id} references missing primary equipment "${op.primaryEquipmentId}".` });
    }
    if (op.secondaryEquipmentId && !equipById[op.secondaryEquipmentId]) {
      errors.push({ category: "Operation", entityId: op.id, message: `Operation ${op.id} references missing secondary equipment "${op.secondaryEquipmentId}".` });
    }
  }
  for (const comp of (project.compositeOperations || [])) {
    if (comp.stepId && !stepIds.has(comp.stepId)) {
      errors.push({ category: "Composite", entityId: comp.id, message: `Composite ${comp.id} references missing step "${comp.stepId}".` });
    }
    for (const opId of (comp.operationIds || [])) {
      if (!opIds.has(opId)) {
        errors.push({ category: "Composite", entityId: comp.id, message: `Composite ${comp.id} references missing operation "${opId}".` });
      }
    }
  }
  for (const step of (project.steps || [])) {
    for (const itemId of (step.itemIds || [])) {
      if (!opIds.has(itemId) && !compIds.has(itemId)) {
        errors.push({ category: "Step", entityId: step.id, message: `Step "${step.name}" (${step.id}) itemId "${itemId}" is neither an operation nor a composite.` });
      }
    }
    for (const upId of (step.upstreamStepIds || [])) {
      if (!stepIds.has(upId)) {
        errors.push({ category: "Step", entityId: step.id, message: `Step "${step.name}" references missing upstream step "${upId}".` });
      }
    }
  }

  // Data-quality warnings (CC-011) -- non-blocking
  const MATERIAL_OPS = new Set(["addition", "transfer", "loss"]);
  for (const op of (project.operations || [])) {
    if (MATERIAL_OPS.has(op.type) && !op.materialId) {
      warnings.push({ category: "Operation", entityId: op.id, message: `Operation ${op.id} (${op.type}) has no material assigned -- mass balance may be incomplete.` });
    }
    if (op.materialId && !materialIds.has(op.materialId)) {
      warnings.push({ category: "Operation", entityId: op.id, message: `Operation ${op.id} (${op.type}) references material "${op.materialId}" not found in project.` });
    }
  }
  for (const mat of (project.materials || [])) {
    const frac = (mat.composition || []).reduce((s, c) => s + (c.fraction || 0), 0);
    if (mat.composition && mat.composition.length > 0 && frac > 1.05) {
      warnings.push({ category: "Material", entityId: mat.id, message: `Material "${mat.name}" composition fractions sum to ${frac.toFixed(3)} (expected <= 1.0).` });
    }
    for (const comp of (mat.composition || [])) {
      if (comp.compoundId && !compoundIds.has(comp.compoundId)) {
        warnings.push({ category: "Material", entityId: mat.id, message: `Material "${mat.name}" composition references compound "${comp.compoundId}" not found in project.` });
      }
    }
  }
  for (const step of (project.steps || [])) {
    if ((step.itemIds || []).length === 0) {
      warnings.push({ category: "Step", entityId: step.id, message: `Step "${step.name}" (${step.id}) has no operations -- it will be ignored in simulation.` });
    }
    if (step.intermediateOutputMaterialId && !materialIds.has(step.intermediateOutputMaterialId)) {
      warnings.push({ category: "Step", entityId: step.id, message: `Step "${step.name}" references missing intermediate output material "${step.intermediateOutputMaterialId}".` });
    }
  }
  const missingCost = (project.compounds || []).filter(c => c.unitCost === null || c.unitCost === undefined);
  if (missingCost.length > 0) {
    warnings.push({ category: "Compounds", message: `${missingCost.length} compound${missingCost.length === 1 ? "" : "s"} (${missingCost.map(c => c.name || c.id).slice(0, 3).join(", ")}${missingCost.length > 3 ? "..." : ""}) have no unit cost -- cost calculations may be incomplete.` });
  }

  return { errors, warnings };
}

// =============================================================================
// === ROUNDTRIP TEST ENGINE (CC-012) ==========================================
// =============================================================================
// Diagnostics now include:
// - CC-012 persistence roundtrip checks
// - CC-036 propagation regression checks (mol/g/assay/transfer/loss/yield/target paths)
//
// runRoundtripTest: lightweight import/export roundtrip validation.
// Tests that serialize -> parse -> migrateProject preserves all array counts,
// key field values, and passes validateProjectDetailed. The CC-036 propagation
// regression step (step 7) runs only when tests.js is loaded; otherwise it
// degrades gracefully via try/catch so this function stays usable in the HTML build.
// Returns { passed, checks } where each check is { name, passed, detail }.
// =============================================================================

function runRoundtripTest(project) {
  const checks = [];
  let serialized, reparsed, remigrated;

  // Step 1: serialize
  try {
    serialized = JSON.stringify(project, null, 2);
    checks.push({ name: "JSON.stringify", passed: true, detail: `${serialized.length} bytes` });
  } catch (e) {
    checks.push({ name: "JSON.stringify", passed: false, detail: String(e) });
    return { passed: false, checks };
  }

  // Step 2: parse
  try {
    reparsed = JSON.parse(serialized);
    checks.push({ name: "JSON.parse", passed: true, detail: "OK" });
  } catch (e) {
    checks.push({ name: "JSON.parse", passed: false, detail: String(e) });
    return { passed: false, checks };
  }

  // Step 3: migrate
  try {
    remigrated = migrateProject(reparsed);
    checks.push({ name: "migrateProject", passed: true, detail: "OK" });
  } catch (e) {
    checks.push({ name: "migrateProject", passed: false, detail: String(e) });
    return { passed: false, checks };
  }

  // Step 4: count invariants
  const countChecks = [
    ["compounds", project.compounds.length, remigrated.compounds.length],
    ["materials", project.materials.length, remigrated.materials.length],
    ["equipment", project.equipment.length, remigrated.equipment.length],
    ["steps", project.steps.length, remigrated.steps.length],
    ["operations", project.operations.length, remigrated.operations.length],
    ["compositeOperations", project.compositeOperations.length, remigrated.compositeOperations.length],
  ];
  for (const [name, orig, migrated] of countChecks) {
    const passed = orig === migrated;
    checks.push({ name: `Count: ${name}`, passed, detail: passed ? `${orig}` : `orig=${orig}, after=${migrated}` });
  }

  // Step 5: spot-check fields
  checks.push({ name: "dataVersion", passed: remigrated.schemaVersion === SCHEMA_VERSION, detail: remigrated.schemaVersion });
  checks.push({ name: "project.name", passed: remigrated.name === project.name, detail: remigrated.name });
  checks.push({ name: "project.notes roundtrip", passed: remigrated.notes === project.notes, detail: `${(project.notes || "").length} chars` });
  const smilesRoundtripOk = (project.compounds || []).every(c => {
    const next = remigrated.compounds.find(x => x.id === c.id);
    return String(next?.smiles || "") === String(c?.smiles || "");
  });
  checks.push({ name: "compound.smiles roundtrip", passed: smilesRoundtripOk, detail: smilesRoundtripOk ? "OK" : "Mismatch in compound SMILES fields" });
  checks.push({ name: "batchSizingConfig.mode", passed: remigrated.batchSizingConfig.mode === project.batchSizingConfig.mode, detail: remigrated.batchSizingConfig.mode });

  // Step 6: validate re-migrated project
  try {
    const valResult = validateProjectDetailed(remigrated);
    const errCount = valResult.errors.length;
    checks.push({ name: "Post-roundtrip validation", passed: errCount === 0, detail: errCount === 0 ? "No errors" : `${errCount} error(s)` });
  } catch (e) {
    checks.push({ name: "Post-roundtrip validation", passed: false, detail: String(e) });
  }

  // Step 7: convergence assertion (roadmap item 5)
  // After target-driven propagation, verify |productMassOut - targetMass| / targetMass < PROPAGATION_SCALE_TOL.
  try {
    const sortedForConv = topoSort(project.steps || []);
    if (Array.isArray(sortedForConv) && sortedForConv.length > 0) {
      const propProject = runTargetDrivenPropagation(project);
      const mfr = runMassFlow(propProject, sortedForConv);
      const gm = computeGreenMetrics(propProject, mfr);
      const target = normalizePositiveNumber(propProject?.batchSizingConfig?.targetMass, null);
      const productOut = normalizePositiveNumber(gm?.productMassOut, null);
      if (target != null && productOut != null) {
        const relErr = Math.abs(productOut - target) / target;
        const converged = relErr < PROPAGATION_SCALE_TOL;
        checks.push({
          name: "Propagation convergence",
          passed: converged,
          detail: converged
            ? `productMassOut=${productOut.toFixed(4)} kg, target=${target.toFixed(4)} kg, relErr=${(relErr * 100).toFixed(4)}%`
            : `relErr=${(relErr * 100).toFixed(4)}% exceeds tolerance ${(PROPAGATION_SCALE_TOL * 100).toFixed(2)}% -- increase PROPAGATION_MAX_ITERS`,
        });
      } else {
        checks.push({ name: "Propagation convergence", passed: true, detail: "Skipped (no target mass or no product output)" });
      }
    } else {
      checks.push({ name: "Propagation convergence", passed: true, detail: "Skipped (no steps or cycle)" });
    }
  } catch (e) {
    checks.push({ name: "Propagation convergence", passed: false, detail: String(e) });
  }

  // Step 8: propagation regression harness (CC-036)
  try {
    checks.push(...runPropagationRegressionChecks());
  } catch (e) {
    checks.push({ name: "CC-036 harness", passed: false, detail: String(e) });
  }

  const allPassed = checks.every(c => c.passed);
  return { passed: allPassed, checks };
}

// CC-039: Rebalance composition fractions when one entry is edited.
// Distributes remaining (1 - newFraction - sum-of-locked) proportionally
// across unlocked siblings so the total stays at 1.0.
// lockedIds: optional Set of compoundIds whose fractions should not change.
function rebalanceCompositionFractions(composition, editedCompoundId, newFraction, lockedIds) {
  if (!Array.isArray(composition) || composition.length === 0) return composition;
  const clamped = Math.max(0, Math.min(1, newFraction));
  const locked = lockedIds instanceof Set ? lockedIds : new Set();

  // Build updated array with the edited entry set
  let entries = composition.map(e =>
    e.compoundId === editedCompoundId ? { ...e, fraction: clamped } : { ...e }
  );

  if (entries.length <= 1) return entries;

  // Sum of locked fractions (excluding the edited entry)
  const lockedSum = entries
    .filter(e => e.compoundId !== editedCompoundId && locked.has(e.compoundId))
    .reduce((s, e) => s + (e.fraction || 0), 0);

  const remaining = Math.max(0, 1 - clamped - lockedSum);

  // Unlocked siblings (not the edited entry, not locked)
  const siblings = entries.filter(
    e => e.compoundId !== editedCompoundId && !locked.has(e.compoundId)
  );
  const siblingSum = siblings.reduce((s, e) => s + (e.fraction || 0), 0);

  if (siblings.length === 0) return entries;

  // Distribute proportionally; if all siblings are zero, distribute equally
  const siblingMap = {};
  if (siblingSum > 0) {
    for (const sib of siblings) {
      siblingMap[sib.compoundId] = parseFloat(
        (remaining * ((sib.fraction || 0) / siblingSum)).toFixed(6)
      );
    }
  } else {
    const each = parseFloat((remaining / siblings.length).toFixed(6));
    for (const sib of siblings) {
      siblingMap[sib.compoundId] = each;
    }
  }

  entries = entries.map(e => {
    if (e.compoundId === editedCompoundId || locked.has(e.compoundId)) return e;
    return { ...e, fraction: Math.max(0, Math.min(1, siblingMap[e.compoundId] ?? 0)) };
  });

  return entries;
}

    updatedAt: new Date().toISOString(),
  };
}

function deleteConsumable(p, id) {
  // Built-in consumables (CON-B prefix) cannot be deleted; caller should guard.
  return {
    ...p,
    consumables: (p.consumables || []).filter(c => c.id !== id),
    updatedAt: new Date().toISOString(),
  };
}

function addStep(p) {
  const id = genId("STP");
  const seq = p.steps.length + 1;
  return {
    ...p,
    steps: [...p.steps, {
      id, sequence: seq, name: `Step ${seq}`, description: "",
      itemIds: [], yield: 100, keyEquipmentId: null, upstreamStepIds: [],
      intermediateOutputMaterialId: null,
      limitingMaterialId: null, stoichBasis: "mol"
    }],
    updatedAt: new Date().toISOString(),
  };
}

function updateStep(p, id, fields) {
  const next = {
    ...p,
    steps: p.steps.map(s => (s.id === id ? { ...s, ...fields } : s)),
    updatedAt: new Date().toISOString(),
  };
  if (!Object.prototype.hasOwnProperty.call(fields || {}, "yield")) {
    return next;
  }
  return runTargetDrivenPropagation(next);
}

function deleteStep(p, id) {
  return {
    ...p,
    steps: p.steps.filter(s => s.id !== id).map((s, i) => ({ ...s, sequence: i + 1 })),
    operations: p.operations.filter(o => o.stepId !== id),
    compositeOperations: p.compositeOperations.filter(c => c.stepId !== id),
    updatedAt: new Date().toISOString(),
  };
}

function reorderSteps(p, fromIdx, toIdx) {
  const steps = [...p.steps];
  const [moved] = steps.splice(fromIdx, 1);
  steps.splice(toIdx, 0, moved);
  return {
    ...p,
    steps: steps.map((s, i) => ({ ...s, sequence: i + 1 })),
    updatedAt: new Date().toISOString(),
  };
}

function makeOperation(stepId, type, seq, compositeOperationId = null) {
  return {
    id: genId("OPR"), stepId, compositeOperationId, sequence: seq, type,
    primaryEquipmentId: null, secondaryEquipmentId: null, materialId: null,
    amount: null, unit: "L", temperature: null, duration: makeDuration(),
    notes: "", ipcMethod: null, reactants: [], products: [], reactionYield: 100,
    lossComposition: [], pumpRate: null, // null -> DEFAULT_PUMP_RATE fallback (CC-016)
  };
}

function addOperation(p, stepId, type) {
  const step = p.steps.find(s => s.id === stepId);
  if (!step) {
    return p;
  }
  const op = makeOperation(stepId, type, step.itemIds.length + 1);
  return {
    ...p,
    steps: p.steps.map(s => (s.id === stepId ? { ...s, itemIds: [...s.itemIds, op.id] } : s)),
    operations: [...p.operations, op],
    updatedAt: new Date().toISOString(),
  };
}

function sanitizeOperationFields(fields, baseOperation = null) {
  if (!fields || typeof fields !== "object") return fields;
  const next = { ...fields };

  if (Object.prototype.hasOwnProperty.call(next, "amount")) {
    next.amount = normalizePositiveNumber(next.amount, null);
  }
  if (Object.prototype.hasOwnProperty.call(next, "pumpRate")) {
    next.pumpRate = normalizePositiveNumber(next.pumpRate, null);
  }
  if (Object.prototype.hasOwnProperty.call(next, "reactionYield")) {
    const y = normalizeNumber(next.reactionYield, null);
    next.reactionYield = Number.isFinite(y) ? Math.max(0, Math.min(100, y)) : (baseOperation?.reactionYield ?? 100);
  }
  if (Object.prototype.hasOwnProperty.call(next, "duration")) {
    next.duration = normalizeDuration({ ...(baseOperation?.duration || {}), ...(next.duration || {}) });
  }
  if (Object.prototype.hasOwnProperty.call(next, "lossComposition") && Array.isArray(next.lossComposition)) {
    next.lossComposition = next.lossComposition
      .filter(r => r && typeof r === "object")
      .map(r => ({
        materialId: typeof r.materialId === "string" ? r.materialId : null,
        compoundId: typeof r.compoundId === "string" ? r.compoundId : null,
        fraction: normalizeNumber(r.fraction, null),
      }));
  }
  return next;
}

function updateOperation(p, id, fields) {
  return {
    ...p,
    operations: p.operations.map(o => (o.id === id ? { ...o, ...sanitizeOperationFields(fields, o) } : o)),
    updatedAt: new Date().toISOString(),
  };
}

function deleteOperation(p, opId) {
  const op = p.operations.find(o => o.id === opId);
  if (!op) {
    return p;
  }
  return {
    ...p,
    steps: p.steps.map(s => (s.id === op.stepId ? { ...s, itemIds: s.itemIds.filter(id => id !== opId) } : s)),
    compositeOperations: op.compositeOperationId
      ? p.compositeOperations.map(c => (c.id === op.compositeOperationId
        ? { ...c, operationIds: c.operationIds.filter(id => id !== opId) }
        : c))
      : p.compositeOperations,
    operations: p.operations.filter(o => o.id !== opId),
    updatedAt: new Date().toISOString(),
  };
}

function reorderOperations(p, stepId, fromIdx, toIdx) {
  const step = p.steps.find(s => s.id === stepId);
  if (!step) {
    return p;
  }
  const itemIds = [...step.itemIds];
  const [moved] = itemIds.splice(fromIdx, 1);
  itemIds.splice(toIdx, 0, moved);
  return {
    ...p,
    steps: p.steps.map(s => (s.id === stepId ? { ...s, itemIds } : s)),
    updatedAt: new Date().toISOString(),
  };
}

function reorderCompositeOps(p, compositeId, fromIdx, toIdx) {
  const comp = p.compositeOperations.find(c => c.id === compositeId);
  if (!comp) {
    return p;
  }
  const operationIds = [...comp.operationIds];
  const [moved] = operationIds.splice(fromIdx, 1);
  operationIds.splice(toIdx, 0, moved);
  return {
    ...p,
    compositeOperations: p.compositeOperations.map(c => (c.id === compositeId ? { ...c, operationIds } : c)),
    updatedAt: new Date().toISOString(),
  };
}

function addCompositeOperation(p, stepId, macroType) {
  const step = p.steps.find(s => s.id === stepId);
  if (!step) {
    return p;
  }
  const compId = genId("COP");
  const ops = (COMPOSITE_COMPONENTS[macroType] || []).map((type, i) => makeOperation(stepId, type, i + 1, compId));
  const composite = {
    id: compId, stepId, sequence: step.itemIds.length + 1, macroType,
    label: COMPOSITE_TYPES.find(c => c.id === macroType)?.label || macroType,
    operationIds: ops.map(o => o.id), isExpanded: false
  };
  return {
    ...p,
    steps: p.steps.map(s => (s.id === stepId ? { ...s, itemIds: [...s.itemIds, compId] } : s)),
    compositeOperations: [...p.compositeOperations, composite],
    operations: [...p.operations, ...ops],
    updatedAt: new Date().toISOString(),
  };
}

function deleteCompositeOperation(p, compositeId) {
  const comp = p.compositeOperations.find(c => c.id === compositeId);
  if (!comp) {
    return p;
  }
  return {
    ...p,
    steps: p.steps.map(s => (s.id === comp.stepId ? { ...s, itemIds: s.itemIds.filter(id => id !== compositeId) } : s)),
    compositeOperations: p.compositeOperations.filter(c => c.id !== compositeId),
    operations: p.operations.filter(o => !comp.operationIds.includes(o.id)),
    updatedAt: new Date().toISOString(),
  };
}

function toggleCompositeExpanded(p, compositeId) {
  return {
    ...p,
    compositeOperations: p.compositeOperations.map(c => (c.id === compositeId ? { ...c, isExpanded: !c.isExpanded } : c)),
  };
}

// CC-005: insert a loss op immediately after a given item in step.itemIds
// Pre-populates primaryEquipmentId from the triggering operation if available
function insertLossAfter(p, stepId, afterItemId, equipmentId) {
  const step = p.steps.find(s => s.id === stepId);
  if (!step) {
    return p;
  }
  const idx = step.itemIds.indexOf(afterItemId);
  const insertAt = idx >= 0 ? idx + 1 : step.itemIds.length;
  const op = { ...makeOperation(stepId, "loss", insertAt + 1), primaryEquipmentId: equipmentId || null };
  const newItemIds = [...step.itemIds.slice(0, insertAt), op.id, ...step.itemIds.slice(insertAt)];
  return {
    ...p,
    steps: p.steps.map(s => (s.id === stepId ? { ...s, itemIds: newItemIds } : s)),
    operations: [...p.operations, op],
    updatedAt: new Date().toISOString(),
  };
}
