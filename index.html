        {label}
      </div>
      {stepName !== label && (
        <div style={{ fontSize: "10px", color: C.midDark, fontStyle: "italic" }}>{stepName}</div>
      )}
    </div>
  );
}

// StepNode requires React Flow handle elements for edge connections.
// These are provided via React Flow's Handle component, rendered inside StepNode.
// We wrap StepNode to inject handles after confirming the global is available.
function StepNodeWithHandles({ data }) {
  if (typeof ReactFlow === "undefined") return <StepNode data={data} />;
  const { Handle, Position } = ReactFlow;
  return (
    <div style={{
      background: "#fff", border: "2px solid " + C.blue, borderRadius: "8px",
      padding: "8px 12px", minWidth: "140px", fontSize: "12px",
      boxShadow: "0 2px 8px rgba(0,0,0,0.10)",
      fontFamily: "system-ui,-apple-system,'Segoe UI',sans-serif",
    }}>
      <Handle type="target" position={Position.Left}
        style={{ background: C.green, width: 10, height: 10 }} />
      <div style={{ fontWeight: 700, color: C.dark, marginBottom: "2px",
        maxWidth: "160px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
        {data.label}
      </div>
      <Handle type="source" position={Position.Right}
        style={{ background: C.orange, width: 10, height: 10 }} />
    </div>
  );
}

// NODE_TYPES: module-scope so React Flow does not re-create on every render.
// Must be defined after StepNodeWithHandles.
const STEP_NODE_TYPES = { stepNode: StepNodeWithHandles };

// InteractiveNodeGraph -- self-contained React Flow canvas component.
// Owns all RF state and event handlers. Project and dispatch are the only external deps.
// Node positions persist in local state (nodePositions map) -- never dispatched.
function InteractiveNodeGraph({ project, dispatch }) {
  // CDN failure guard -- surface a clear error if ReactFlow did not load.
  if (typeof ReactFlow === "undefined" || !ReactFlow.ReactFlow) {
    return (
      <div style={{ padding: "32px", textAlign: "center", color: C.midDark }}>
        Step graph unavailable -- React Flow library did not load.
        Check your network connection and reload the page.
      </div>
    );
  }

  const { ReactFlow: RF, Background, Controls, MiniMap,
          addEdge, useNodesState, useEdgesState } = ReactFlow;

  const { sortedSteps } = useContext(SimContext);

  // nodePositions: stepId -> {x, y} -- local UI state, never written to project.
  const [nodePositions, setNodePositions] = useState({});
  // cycleWarning: shown briefly when a proposed connection would create a cycle.
  const [cycleWarning, setCycleWarning] = useState(false);

  // Derive RF nodes and edges from project state each render.
  // Initial positions come from computePfdLayout to give a sensible starting arrangement.
  const derivedNodes = useMemo(() => {
    let layout = null;
    try { layout = computePfdLayout(project, Array.isArray(sortedSteps) ? sortedSteps : []); } catch (_) {}
    const CELL_W = 200, CELL_H = 120;
    return (Array.isArray(sortedSteps) ? sortedSteps : []).map(step => {
      // Use persisted position if available; fall back to computePfdLayout grid coords.
      const pos = nodePositions[step.id];
      const col = layout ? (layout.depthOf[step.id] ?? 0) : 0;
      const row = layout ? (layout.rowOf[step.id] ?? 0) : 0;
      return {
        id: step.id,
        type: "stepNode",
        position: pos ?? { x: (col + 1) * CELL_W, y: row * CELL_H + 40 },
        data: { label: step.name, stepName: step.name },
      };
    });
  }, [project, sortedSteps, nodePositions]);

  const derivedEdges = useMemo(() => {
    const edges = [];
    (Array.isArray(sortedSteps) ? sortedSteps : []).forEach(step => {
      (step.upstreamStepIds || []).forEach(upId => {
        edges.push({
          id: `e-${upId}-${step.id}`,
          source: upId, target: step.id,
          animated: false, style: { stroke: C.blue, strokeWidth: 2 },
        });
      });
    });
    return edges;
  }, [sortedSteps]);

  const [nodes, setNodes, onNodesChange] = useNodesState(derivedNodes);
  const [edges, setEdges, onEdgesChange] = useEdgesState(derivedEdges);

  // Keep RF nodes/edges in sync when project steps change (e.g. step added/removed).
  // Positions are merged from nodePositions so user-dragged positions are preserved.
  useEffect(() => {
    setNodes(derivedNodes);
  }, [derivedNodes]);
  useEffect(() => {
    setEdges(derivedEdges);
  }, [derivedEdges]);

  // onConnect: user draws a cable from source to target port.
  // Cycle guard: reject the connection if it would create a cycle.
  const onConnect = useCallback((connection) => {
    const { source, target } = connection;
    if (!source || !target) return;
    // Simulate the new edge being added and check for cycles.
    const proposedSteps = project.steps.map(s => {
      if (s.id !== target) return s;
      return { ...s, upstreamStepIds: [...(s.upstreamStepIds || []), source] };
    });
    if (detectCycles(proposedSteps).length > 0) {
      setCycleWarning(true);
      setTimeout(() => setCycleWarning(false), 2500);
      return;
    }
    dispatch(p => updateStep(p, target, {
      upstreamStepIds: [...(p.steps.find(s => s.id === target)?.upstreamStepIds || []), source],
    }));
    setEdges(eds => addEdge({ ...connection, animated: false, style: { stroke: C.blue, strokeWidth: 2 } }, eds));
  }, [project.steps, dispatch]);

  // onEdgesDelete: remove the upstreamStepId when the user deletes an edge.
  const onEdgesDelete = useCallback((deletedEdges) => {
    deletedEdges.forEach(edge => {
      const { source, target } = edge;
      dispatch(p => {
        const step = p.steps.find(s => s.id === target);
        if (!step) return p;
        return updateStep(p, target, {
          upstreamStepIds: (step.upstreamStepIds || []).filter(id => id !== source),
        });
      });
    });
  }, [dispatch]);

  // onNodeDragStop: persist position in local state only -- do NOT dispatch.
  const onNodeDragStop = useCallback((event, node) => {
    setNodePositions(prev => ({ ...prev, [node.id]: node.position }));
  }, []);

  return (
    <div style={{ position: "relative", width: "100%", height: "100%" }}>
      {cycleWarning && (
        <div style={{
          position: "absolute", top: "16px", left: "50%", transform: "translateX(-50%)",
          zIndex: 100, background: C.orange, color: "#fff",
          padding: "8px 18px", borderRadius: "6px", fontSize: "13px", fontWeight: 600,
          boxShadow: "0 2px 10px rgba(0,0,0,0.18)", pointerEvents: "none",
        }}>
          Connection rejected: would create a cycle
        </div>
      )}
      <RF
        nodes={nodes} edges={edges}
        onNodesChange={onNodesChange} onEdgesChange={onEdgesChange}
        onConnect={onConnect} onEdgesDelete={onEdgesDelete}
        onNodeDragStop={onNodeDragStop}
        nodeTypes={STEP_NODE_TYPES}
        fitView
        style={{ background: C.light }}
      >
        <Background color={C.mid} gap={20} />
        <Controls />
        <MiniMap nodeColor={C.blue} />
      </RF>
    </div>
  );
}

// computePfdLayout -- pure function, no React dependencies.
// Derives the 2D grid positions, arm colors, and step topology from project data.
// Returns { stepMap, depthOf, rowOf, numRows, maxDepth, numCols, armColorOf }.
function computePfdLayout(project, sortedSteps) {
  const stepMap = Object.fromEntries(project.steps.map(s => [s.id, s]));

  // Topological depth: root steps get depth 0; downstream steps get max(upstream)+1.
  const depthOf = {};
  for (const step of sortedSteps) {
    const upDepths = (step.upstreamStepIds || []).map(id => depthOf[id] ?? 0);
    depthOf[step.id] = upDepths.length > 0 ? Math.max(...upDepths) + 1 : 0;
  }

  // Row assignment: root steps get sequential rows; convergent steps get mean row.
  // Fractional rows are intentional so merges stay visually centered between parents.
  const rowOf = {};
  let nextRow = 0;
  for (const step of sortedSteps) {
    if ((step.upstreamStepIds || []).length === 0) {
      rowOf[step.id] = nextRow++;
    } else {
      const upRows = (step.upstreamStepIds || []).map(id => rowOf[id] ?? 0);
      rowOf[step.id] = upRows.reduce((a, b) => a + b, 0) / upRows.length;
    }
  }

  const numRows = nextRow;
  const maxDepth = Math.max(0, ...Object.values(depthOf));
  const numCols = maxDepth + 2; // col 0 = SM input nodes; col 1..N+1 = output nodes

  // Arm colors: each root step gets a deterministic color; descendants inherit.
  const ARM_COLORS = ["#6a9bcc", "#d97757", "#788c5d", "#9b7db8", "#6dada8", "#c4a43c"];
  const rootSteps = sortedSteps.filter(s => (s.upstreamStepIds || []).length === 0);
  const armColorOf = {};
  rootSteps.forEach((s, i) => { armColorOf[s.id] = ARM_COLORS[i % ARM_COLORS.length]; });
  for (const step of sortedSteps) {
    if (armColorOf[step.id] == null) {
      const firstUp = (step.upstreamStepIds || [])[0];
      armColorOf[step.id] = armColorOf[firstUp] || ARM_COLORS[0];
    }
  }

  // Keep rootSteps/ARM_COLORS in this return contract for PfdTab destructuring.
  return { stepMap, depthOf, rowOf, numRows, maxDepth, numCols, armColorOf, rootSteps, ARM_COLORS };
}

// === PFD TAB =================================================================
// =============================================================================
// CC-031: Material-node convergent PFD.
// Architecture: "material-node" model -- each node is a discrete chemical entity.
// Layout: strict grid. Arms occupy fixed horizontal lanes. Steps are arrows.
// Nodes: structured cards with SMILES-aware 2D placeholder + editable property grid.
// Arrows: straight horizontal lines labeled with step name and editable yield.
// Convergent inputs stacked vertically with a "+" operator between them.
// Back-calculation: editing product weight dispatches to batchSizingConfig.targetMass;
//   editing step yield dispatches to step.yield. Engine recomputes all derived values.
// =============================================================================

function PfdTab({ project, dispatch }) {
  const { massFlowResult, sortedSteps, batchResult } = useContext(SimContext);
  const [pfdView, setPfdView] = useState("flow"); // "flow" = existing static view | "graph" = React Flow step graph
  const [yieldEditId, setYieldEditId] = useState(null); // stepId being edited
  const [yieldEditVal, setYieldEditVal] = useState("");
  const [targetEditActive, setTargetEditActive] = useState(false);
  const [targetEditVal, setTargetEditVal] = useState("");
  // CC-035: inline MW / Assay editing
  const [mwEditKey, setMwEditKey] = useState(null);   // node.key
  const [mwEditVal, setMwEditVal] = useState("");
  const [assayEditKey, setAssayEditKey] = useState(null);
  const [assayEditVal, setAssayEditVal] = useState("");
  const [depEditStepId, setDepEditStepId] = useState(null);  // step ID for dependency editing

  if (!sortedSteps || sortedSteps.length === 0) return (
    <div style={{ padding: "40px 24px", color: C.midDark, textAlign: "center", fontSize: "13px" }}>
      No steps defined. Add steps and operations to see the Process Flow Diagram.
    </div>
  );

  // View toggle -- local to PfdTab, not lifted to App or project state.
  // "flow" = existing material-node static diagram; "graph" = React Flow interactive step graph.
  const viewToggle = (
    <div style={{ display: "flex", gap: "6px" }}>
      <Btn variant={pfdView === "flow" ? "primary" : "light"} size="sm" onClick={() => setPfdView("flow")}>Flow Diagram</Btn>
      <Btn variant={pfdView === "graph" ? "primary" : "light"} size="sm" onClick={() => setPfdView("graph")}>Step Graph</Btn>
    </div>
  );

  // Step Graph sub-tab: React Flow interactive canvas.
  if (pfdView === "graph") {
    return (
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "12px", padding: "12px 24px", borderBottom: `1px solid ${C.border}`, background: "#fff" }}>
          <span style={{ fontSize: "17px", fontWeight: 700, color: C.dark }}>Step Graph</span>
          <span style={{ fontSize: "12px", color: C.midDark, flex: 1 }}>
            Drag nodes to rearrange &mdash; draw cables between ports to link steps &mdash; select an edge and press Delete to remove
          </span>
          {viewToggle}
        </div>
        <div style={{ flex: 1, overflow: "hidden" }}>
          <InteractiveNodeGraph project={project} dispatch={dispatch} />
        </div>
      </div>
    );
  }

  // Layout constants and topology -- see computePfdLayout() above for derivation.
  // v35: computePfdLayout is wrapped in try/catch to prevent PFD tab crash on
  // unexpected step graph topology (e.g. null IDs, disconnected subgraphs).
  const CW = 214, CH = 236, SH = 84, HG = 220, VG = 68, PAD = 36;
  const cX = col => PAD + col * (CW + HG);
  const cY = row => PAD + row * (CH + VG);
  const cCX = col => cX(col) + CW / 2;
  const cCY = row => cY(row) + CH / 2;
  const cR = col => cX(col) + CW;
  const cL = col => cX(col);
  let pfdLayout = null;
  let pfdLayoutError = null;
  try {
    pfdLayout = computePfdLayout(project, sortedSteps);
  } catch (err) {
    pfdLayoutError = err?.message || "Unknown layout error";
  }
  if (pfdLayoutError || !pfdLayout) {
    return (
      <div style={{ padding: "40px 24px", color: C.midDark, textAlign: "center", fontSize: "13px" }}>
        <div style={{ marginBottom: "8px", fontWeight: 600, color: C.orange }}>PFD layout error</div>
        <div style={{ fontFamily: MONO, fontSize: "11px", color: C.midDark }}>{pfdLayoutError || "Layout could not be computed."}</div>
        <div style={{ marginTop: "12px", fontSize: "12px" }}>Check that all steps have valid IDs and consistent upstream links.</div>
      </div>
    );
  }
  const { stepMap, depthOf, rowOf, numRows, maxDepth, numCols, armColorOf, rootSteps, ARM_COLORS } = pfdLayout;

  // ---- Data helpers ----
  const getMat = (id) => project.materials.find(m => m.id === id);
  const compoundById = Object.fromEntries(project.compounds.map(c => [c.id, c]));
  const getCmp = (id) => compoundById[id];

  function matMW(mat) {
    if (!mat) return null;
    for (const e of (mat.composition || [])) {
      const c = getCmp(e.compoundId);
      if (c?.molecularWeight) return c.molecularWeight;
    }
    return null;
  }
  function matAssay(mat) {
    if (!mat) return null;
    const e = (mat.composition || [])[0];
    return e ? e.fraction * 100 : null;
  }
  function stepOutputMass(stepId) {
    const out = massFlowResult?.stepOutputMassByStepId?.[stepId];
    return Number.isFinite(out) ? out : null;
  }
  function limitingMat(step) {
    if (step.limitingMaterialId) return getMat(step.limitingMaterialId);
    const op = project.operations.find(o => o.stepId === step.id && o.type === "addition" && o.materialId);
    return op ? getMat(op.materialId) : null;
  }
  function limitingMatWeightKg(step) {
    const lm = limitingMat(step);
    if (!lm) return null;
    const op = project.operations.find(o => o.stepId === step.id && o.type === "addition" && o.materialId === lm.id);
    if (!op || op.amount == null) return null;
    const sf = batchResult?.scaleFactor ?? 1;
    return amountToKg(op.amount, op.unit, lm, compoundById, lm.density ?? 1.0) * sf;
  }

  // ---- Build node list ----
  // SM nodes: col 0, one per root step (limiting reagent)
  // Output nodes: col = depthOf[step] + 1
  const nodes = [];
  rootSteps.forEach((step) => {
    const lm = limitingMat(step);
    nodes.push({
      key: "sm-" + step.id,
      col: 0, row: rowOf[step.id],
      mat: lm, stepId: null,
      weightKg: limitingMatWeightKg(step),
      isProduct: false,
      armColor: armColorOf[step.id] || ARM_COLORS[0],
    });
  });
  sortedSteps.forEach((step) => {
    const outMat = getMat(step.intermediateOutputMaterialId);
    const isProduct = outMat?.type === "output";
    nodes.push({
      key: "out-" + step.id,
      col: depthOf[step.id] + 1, row: rowOf[step.id],
      mat: outMat, stepId: step.id,
      weightKg: stepOutputMass(step.id),
      isProduct,
      isPlaceholder: !outMat,
      armColor: armColorOf[step.id] || ARM_COLORS[0],
    });
  });

  // Product node info (last step output)
  const productStep = sortedSteps[sortedSteps.length - 1];
  const targetMass = project.batchSizingConfig?.targetMass ?? null;

  // ---- Build arrow list (one arrow per step) ----
  const arrows = [];
  sortedSteps.forEach((step) => {
    const toCol = depthOf[step.id] + 1;
    const toRow = rowOf[step.id];
    const isConv = (step.upstreamStepIds || []).length > 1;
    let fromCols, fromRows;
    if ((step.upstreamStepIds || []).length === 0) {
      fromCols = [0]; fromRows = [rowOf[step.id]];
    } else {
      fromCols = (step.upstreamStepIds || []).map(uid => depthOf[uid] + 1);
      fromRows = (step.upstreamStepIds || []).map(uid => rowOf[uid]);
    }
    arrows.push({ key: "arr-" + step.id, stepId: step.id, fromCols, fromRows, toCol, toRow, isConv });
  });

  // "+" positions: between stacked input nodes of convergent steps
  const plusSyms = [];
  sortedSteps.forEach((step) => {
    const ups = (step.upstreamStepIds || []);
    if (ups.length > 1) {
      const upRowsSorted = ups.map(uid => rowOf[uid]).sort((a, b) => a - b);
      const col = depthOf[ups[0]] + 1;
      for (let i = 0; i < upRowsSorted.length - 1; i++) {
        plusSyms.push({ key: "plus-" + step.id + "-" + i, col, r1: upRowsSorted[i], r2: upRowsSorted[i + 1] });
      }
    }
  });

  // Total canvas size
  const totalW = Math.max(600, PAD + numCols * CW + (numCols - 1) * HG + PAD);
  const totalH = Math.max(300, PAD + numRows * CH + Math.max(0, numRows - 1) * VG + PAD);

  // ---- Dispatch helpers ----
  function commitYield(stepId, raw) {
    const n = parseFloat(raw);
    if (!isNaN(n) && n >= 0 && n <= 100) {
      dispatch(p => updateStep(p, stepId, { yield: parseFloat(n.toFixed(2)) }));
    }
    setYieldEditId(null);
  }
  function commitTarget(raw) {
    const n = parseFloat(raw);
    if (!isNaN(n) && n > 0) {
      dispatch(p => setTargetOutputMass(p, n));
    }
    setTargetEditActive(false);
  }

  // ---- Format helpers ----
  function fKg(v) {
    // Use module-level smart formatter for consistent 3-sig-fig display.
    return fmtKgSig(v);
  }
  const fMol = (v, mw) => {
    if (v == null || mw == null) return "--";
    const mol = v * 1000 / mw;
    return mol < 0.1 ? fmtSig(mol * 1000, 3) + " mmol" : fmtSig(mol, 3) + " mol";
  };
  const fPct = (v) => v == null ? "--" : v.toFixed(1) + "%";

  // CC-035: commit helpers for MW and Assay inline edits
  function commitMw(mat, raw) {
    const n = parseFloat(raw);
    if (!isNaN(n) && n > 0 && mat) {
      // update the first compound referenced by this material
      const entry = (mat.composition || [])[0];
      if (entry?.compoundId) {
        dispatch(p => updateCompound(p, entry.compoundId, { molecularWeight: parseFloat(n.toFixed(4)) }));
      }
    }
    setMwEditKey(null);
  }
  function commitAssay(mat, raw) {
    const n = parseFloat(raw);
    if (!isNaN(n) && n >= 0 && n <= 100 && mat) {
      const frac = parseFloat((n / 100).toFixed(6));
      const entry = (mat.composition || [])[0];
      if (entry) {
        // CC-039: rebalance siblings when assay is edited
        const rebalanced = rebalanceCompositionFractions(mat.composition, entry.compoundId, frac);
        dispatch(p => updateMaterial(p, mat.id, { composition: rebalanced }));
      }
    }
    setAssayEditKey(null);
  }

  // ---- Material card renderer ----
  function MatCard({ node }) {
    const { key, col, row, mat, stepId, weightKg, isProduct, armColor, isPlaceholder } = node;

    // Placeholder node: step has no intermediateOutputMaterialId set (roadmap item 3)
    if (isPlaceholder) {
      return (
        <div style={{
          position: "absolute", left: cX(col), top: cY(row),
          width: CW, height: CH,
          border: "1.5px dashed " + C.mid,
          borderRadius: 8, background: C.lightHover,
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          fontFamily: "system-ui,-apple-system,'Segoe UI',sans-serif",
          opacity: 0.6, zIndex: 1,
        }}>
          {stepId && (
            <div style={{ fontSize: "9px", color: C.blue, cursor: "pointer", marginBottom: "6px" }} onClick={() => setDepEditStepId(stepId)}>Edit DAG</div>
          )}
          <span style={{ fontSize: "10px", color: C.midDark, fontStyle: "italic" }}>(no output set)</span>
          <span style={{ fontSize: "9px", color: C.mid, marginTop: 3 }}>Set in step settings</span>
        </div>
      );
    }

    const mw = matMW(mat);
    const assay = matAssay(mat);
    const assayFactor = assay != null ? assay / 100 : 1;
    const moles = (weightKg != null && mw != null) ? (weightKg * assayFactor * 1000 / mw) : null;
    const name = mat?.name ?? "(no material)";
    const isProducedByProductStep = isProduct && productStep && stepId === productStep.id;
    const cardStroke = isProducedByProductStep ? 2.5 : 1.5;
    const firstCmpId = (mat?.composition || [])[0]?.compoundId;
    const smilesRaw = String(getCmp(firstCmpId)?.smiles || "").trim();
    const smilesLabel = smilesRaw ? (smilesRaw.length > 22 ? smilesRaw.slice(0, 20) + ".." : smilesRaw) : null;

    return (
      <div style={{
        position: "absolute", left: cX(col), top: cY(row),
        width: CW, height: CH,
        border: `${cardStroke}px solid ${armColor}`,
        borderRadius: 8, background: "#fff",
        boxShadow: isProducedByProductStep
          ? ("0 2px 14px " + armColor + "44")
          : "0 1px 6px rgba(0,0,0,0.10)",
        display: "flex", flexDirection: "column", overflow: "visible",
        fontFamily: "system-ui,-apple-system,'Segoe UI',sans-serif",
        zIndex: (mwEditKey === key || assayEditKey === key) ? 10 : 1,
      }}>
        {/* Structure renderer (CC-042) */}
        <div style={{
          height: SH, background: armColor + "12",
          borderBottom: "1px solid " + armColor + "28",
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
        }}>
          <SmilesRenderer smiles={smilesRaw || null} width={CW - 20} height={SH - 8} />
        </div>
        {/* Property grid */}
        <div style={{ flex: 1, padding: "6px 9px", display: "flex", flexDirection: "column" }}>
          {/* Name */}
          <div style={{
            fontSize: "11px", fontWeight: 700, color: C.dark,
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
            paddingBottom: 4, borderBottom: "1px solid " + C.lightBorder, marginBottom: 3,
          }} title={name}>{name}</div>
          {/* Edit DAG link for output nodes (steps only) */}
          {stepId && (
            <div style={{ fontSize: "9px", color: C.blue, cursor: "pointer", marginBottom: "2px" }} onClick={() => setDepEditStepId(stepId)}>Edit DAG</div>
          )}

          {/* MW -- editable (CC-035) */}
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            fontSize: "11px", padding: "2px 0", borderBottom: "1px solid " + C.lightBorder
          }}>
            <span style={{ color: C.midDark }}>MW</span>
            {mwEditKey === node.key ? (
              <input type="number" step="any" min="0" value={mwEditVal}
                onChange={e => setMwEditVal(e.target.value)}
                onBlur={e => commitMw(mat, e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") commitMw(mat, mwEditVal); if (e.key === "Escape") setMwEditKey(null); }}
                style={{
                  width: 72, fontSize: "11px", fontFamily: MONO, border: "none",
                  borderBottom: "1px solid " + C.orange, outline: "none", background: "transparent",
                  color: C.dark, textAlign: "right"
                }} autoFocus />
            ) : (
              <span
                onClick={firstCmpId ? () => { setMwEditKey(node.key); setMwEditVal(mw != null ? String(mw) : ""); } : undefined}
                title={firstCmpId ? "Click to edit MW" : "Link a compound in Materials tab first"}
                style={{
                  fontFamily: MONO, fontSize: "11px",
                  color: firstCmpId ? C.dark : C.midDark,
                  cursor: firstCmpId ? "text" : "default",
                  borderBottom: firstCmpId ? "1px dashed " + C.midDark : "none"
                }}>
                {mw != null ? mw + " g/mol" : "--"}
              </span>
            )}
          </div>

          {/* Moles -- read only */}
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            fontSize: "11px", padding: "2px 0", borderBottom: "1px solid " + C.lightBorder
          }}>
            <span style={{ color: C.midDark }}>Moles</span>
            <span style={{ fontFamily: MONO, color: C.dark }}>{fMol(moles, mw)}</span>
          </div>

          {/* Assay -- editable (CC-035) */}
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            fontSize: "11px", padding: "2px 0", borderBottom: "1px solid " + C.lightBorder
          }}>
            <span style={{ color: C.midDark }}>Assay</span>
            {assayEditKey === node.key ? (
              <input type="number" step="any" min="0" max="100" value={assayEditVal}
                onChange={e => setAssayEditVal(e.target.value)}
                onBlur={e => commitAssay(mat, e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") commitAssay(mat, assayEditVal); if (e.key === "Escape") setAssayEditKey(null); }}
                style={{
                  width: 72, fontSize: "11px", fontFamily: MONO, border: "none",
                  borderBottom: "1px solid " + C.orange, outline: "none", background: "transparent",
                  color: C.dark, textAlign: "right"
                }} autoFocus />
            ) : (
              <span
                onClick={(mat && (mat.composition || []).length > 0) ? () => { setAssayEditKey(node.key); setAssayEditVal(assay != null ? String(assay.toFixed(2)) : ""); } : undefined}
                title={(mat && (mat.composition || []).length > 0) ? "Click to edit assay %" : "No composition entries"}
                style={{
                  fontFamily: MONO, fontSize: "11px",
                  color: (mat && (mat.composition || []).length > 0) ? C.dark : C.midDark,
                  cursor: (mat && (mat.composition || []).length > 0) ? "text" : "default",
                  borderBottom: (mat && (mat.composition || []).length > 0) ? "1px dashed " + C.midDark : "none"
                }}>
                {fPct(assay)}
              </span>
            )}
          </div>
          {/* Weight row -- editable for product node */}
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            fontSize: "11px", padding: "2px 0",
          }}>
            <span style={{ color: C.midDark }}>Weight</span>
            {isProducedByProductStep ? (
              targetEditActive ? (
                <input
                  value={targetEditVal}
                  onChange={e => setTargetEditVal(e.target.value)}
                  onBlur={e => commitTarget(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === "Enter") commitTarget(targetEditVal);
                    if (e.key === "Escape") setTargetEditActive(false);
                  }}
                  style={{
                    width: 80, fontSize: "11px", fontFamily: MONO,
                    border: "none", borderBottom: "1px solid " + C.blue,
                    outline: "none", background: "transparent", color: C.dark,
                    textAlign: "right", padding: "0 2px",
                  }}
                  autoFocus
                />
              ) : (
                <span
                  onClick={() => { setTargetEditActive(true); setTargetEditVal(String(targetMass ?? weightKg ?? "")); }}
                  title="Click to set target batch weight"
                  style={{
                    fontFamily: MONO, fontSize: "11px", color: C.blue, fontWeight: 600,
                    borderBottom: "1px dashed " + C.blue, cursor: "text",
                  }}>
                  {targetMass != null ? targetMass.toFixed(2) + " kg" : fKg(weightKg)}
                </span>
              )
            ) : (
              <span style={{ fontFamily: MONO, fontSize: "11px", color: C.midDark }}>{fKg(weightKg)}</span>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ---- Arrow geometry ----
  function arrowGeom(arrow) {
    const { fromCols, fromRows, toCol, toRow, isConv } = arrow;
    const toX = cL(toCol);
    const toCY = cCY(toRow);
    let fromX, midY;
    if (!isConv) {
      fromX = cR(fromCols[0]);
      midY = cCY(fromRows[0]);
    } else {
      const sortedRs = [...fromRows].sort((a, b) => a - b);
      fromX = cR(fromCols[0]);
      midY = (cCY(sortedRs[0]) + cCY(sortedRs[sortedRs.length - 1])) / 2;
    }
    return { fromX, toX, midY };
  }

  return (
    <>
      <div style={{ flex: 1, overflow: "auto", padding: "20px 24px", background: C.light }}>
        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "14px" }}>
          <span style={{ fontSize: "17px", fontWeight: 700, color: C.dark }}>Process Flow Diagram</span>
          <span style={{ fontSize: "12px", color: C.midDark }}>{project.name}</span>
          <span style={{ marginLeft: "auto", fontSize: "11px", color: C.midDark }}>
            Material-node model &mdash; {sortedSteps.length} step{sortedSteps.length !== 1 ? "s" : ""} &mdash; read left to right
          </span>
          {viewToggle}
        </div>

        {/* Arm legend */}
        <div style={{ display: "flex", gap: "16px", marginBottom: "14px", flexWrap: "wrap" }}>
          {rootSteps.map((s) => (
            <div key={s.id} style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", color: C.dark }}>
              <span style={{ width: "10px", height: "10px", borderRadius: "2px", background: armColorOf[s.id], display: "inline-block" }} />
              {s.name}
            </div>
          ))}
          <div style={{ marginLeft: "auto", fontSize: "11px", color: C.midDark, fontStyle: "italic" }}>
            Click product weight to set batch target &mdash; click yield to edit
          </div>
        </div>

        {/* Main canvas */}
        <div style={{ overflowX: "auto", overflowY: "auto" }}>
          <div style={{ position: "relative", width: totalW, height: totalH }}>

            {/* Layer 1: Material cards */}
            {nodes.map(node => <MatCard key={node.key} node={node} />)}

            {/* Layer 2: SVG for lines and "+" symbols (no pointer events) */}
            <svg width={totalW} height={totalH}
              style={{ position: "absolute", top: 0, left: 0, pointerEvents: "none", overflow: "visible" }}>
              <defs>
                {sortedSteps.map(step => (
                  <marker key={step.id} id={"am-" + step.id}
                    markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                    <polygon points="0 0, 8 3, 0 6" fill={armColorOf[step.id] || C.midDark} />
                  </marker>
                ))}
              </defs>

              {/* Arrow lines */}
              {arrows.map((arrow) => {
                const step = stepMap[arrow.stepId];
                if (!step) return null;
                const { fromX, toX, midY } = arrowGeom(arrow);
                const col = armColorOf[step.id] || C.midDark;

                return (
                  <g key={arrow.key}>
                    {/* Convergent: vertical collection bar + spurs from each upstream */}
                    {arrow.isConv && (() => {
                      const sortedRs = [...arrow.fromRows].sort((a, b) => a - b);
                      const y1 = cCY(sortedRs[0]);
                      const y2 = cCY(sortedRs[sortedRs.length - 1]);
                      return (
                        <g>
                          <line x1={fromX} y1={y1} x2={fromX} y2={y2}
                            stroke={col} strokeWidth={2} opacity={0.55} />
                          {arrow.fromRows.map((fr, i) => (
                            <line key={i}
                              x1={cR(arrow.fromCols[i])} y1={cCY(fr)}
                              x2={fromX} y2={cCY(fr)}
                              stroke={col} strokeWidth={2} opacity={0.55} />
                          ))}
                        </g>
                      );
                    })()}
                    {/* Main horizontal arrow line */}
                    <line
                      x1={fromX} y1={midY} x2={toX - 8} y2={midY}
                      stroke={col} strokeWidth={2}
                      markerEnd={"url(#am-" + step.id + ")"}
                      opacity={0.85} />
                  </g>
                );
              })}

              {/* "+" symbols between convergent input cards */}
              {plusSyms.map(({ key, col, r1, r2 }) => {
                const x = cCX(col);
                const y = (cCY(r1) + cCY(r2)) / 2;
                return (
                  <text key={key} x={x} y={y + 8} textAnchor="middle"
                    style={{ fontSize: "22px", fontWeight: 700, fill: C.dark, fontFamily: "inherit", userSelect: "none" }}>
                    +
                  </text>
                );
              })}
            </svg>

            {/* Layer 3: Arrow labels (HTML divs for editability) */}
            {arrows.map((arrow) => {
              const step = stepMap[arrow.stepId];
              if (!step) return null;
              const { fromX, toX, midY } = arrowGeom(arrow);
              const midX = (fromX + toX) / 2;
              const yieldVal = step.yield ?? null;
              const isEditingThisYield = yieldEditId === step.id;
              const shortName = step.name.length > 26 ? step.name.slice(0, 24) + ".." : step.name;

              return (
                <div key={"lbl-" + arrow.key} style={{
                  position: "absolute",
                  left: fromX, width: toX - fromX,
                  top: midY - 38,
                  pointerEvents: "auto",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                }}>
                  {/* Step name (top of arrow) */}
                  <div style={{
                    fontSize: "11px", fontWeight: 600, color: C.dark,
                    whiteSpace: "nowrap", textAlign: "center",
                    background: "rgba(250,249,245,0.85)", padding: "1px 5px",
                    borderRadius: 3,
                  }}>
                    {shortName}
                  </div>
                  {/* Arrow spacer */}
                  <div style={{ height: 14 }} />
                  {/* Yield (bottom of arrow) -- editable */}
                  {isEditingThisYield ? (
                    <div style={{
                      display: "flex", alignItems: "center", gap: 4,
                      background: "#fff", border: "1px solid " + C.border,
                      borderRadius: 4, padding: "2px 6px", boxShadow: "0 2px 8px rgba(0,0,0,0.12)"
                    }}>
                      <span style={{ fontSize: "10px", color: C.midDark, fontFamily: MONO }}>Yield:</span>
                      <input
                        type="number" min={0} max={100} step={0.1}
                        value={yieldEditVal}
                        onChange={e => setYieldEditVal(e.target.value)}
                        onBlur={e => commitYield(step.id, e.target.value)}
                        onKeyDown={e => {
                          if (e.key === "Enter") commitYield(step.id, yieldEditVal);
                          if (e.key === "Escape") setYieldEditId(null);
                        }}
                        style={{
                          width: 46, fontSize: "11px", fontFamily: MONO,
                          border: "none", outline: "none", background: "transparent",
                          color: C.dark, textAlign: "right",
                        }}
                        autoFocus
                      />
                      <span style={{ fontSize: "10px", color: C.midDark, fontFamily: MONO }}>%</span>
                    </div>
                  ) : (
                    <div
                      onClick={() => { setYieldEditId(step.id); setYieldEditVal(String(yieldVal ?? "")); }}
                      title="Click to edit yield"
                      style={{
                        fontSize: "12px", color: C.green, fontFamily: MONO, fontWeight: 600,
                        cursor: "text", background: "rgba(250,249,245,0.85)",
                        padding: "1px 5px", borderRadius: 3,
                        borderBottom: "1px dashed " + C.green,
                      }}>
                      Yield: {yieldVal != null ? yieldVal + "%" : "--"}
                    </div>
                  )}
                </div>
              );
            })}

          </div>
        </div>

        {/* Footer */}
        <div style={{ marginTop: "16px", fontSize: "11px", color: C.midDark, lineHeight: 1.7 }}>
          <strong>How to read:</strong> Each card is a material entity (starting material, intermediate, or API).
          The top half reserves space for a 2D structure rendering. If SMILES metadata is present, the placeholder shows a loaded badge.
          The bottom half shows MW, moles, assay, and weight from the mass flow engine.
          <strong>Editable fields:</strong> MW (updates linked compound) and Assay % (updates composition fraction)
          -- click the dashed-underlined values to edit. Yield (green dashed, on arrows) and product Weight (blue) are also editable.
          The "+" symbol marks convergent steps where two or more arms combine.
        </div>
      </div>
      {depEditStepId && (
        <UpstreamDagPickerModal
          step={stepMap[depEditStepId]}
          project={project}
          onClose={() => setDepEditStepId(null)}
          onSave={(nextIds) => {
            dispatch(p => updateStep(p, depEditStepId, { upstreamStepIds: sortStepIdsBySequence(p.steps, nextIds) }));
            setDepEditStepId(null);
          }}
        />
      )}
    </>
  );
}

// === ROOT APP ================================================================
// =============================================================================

function App() {
  const { project, dispatch, undo, redo, canUndo, canRedo, loadProject } = useProjectState(makeEmptyProject());
  const [activeTab, setActiveTab] = useState("process");
  const [focusStepId, setFocusStepId] = useState(null);
  const [loadValidation, setLoadValidation] = useState(null);  // CC-011: { result, filename }

  useEffect(() => {
    if (!focusStepId) return undefined;
    const timer = setTimeout(() => setFocusStepId(null), 4000);
    return () => clearTimeout(timer);
  }, [focusStepId]);

  // Keyboard shortcuts for undo/redo
  useEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === "z") { e.preventDefault(); undo(); }
      else if ((e.ctrlKey || e.metaKey) && (e.shiftKey && e.key === "z" || (e.key === "y"))) { e.preventDefault(); redo(); }
    };
    window.addEventListener("keydown", handler); return () => window.removeEventListener("keydown", handler);
  }, [undo, redo]);

  // === SIMULATION -- computed outside of state, never stored ==================
  // Keep all simulation views derived from the same project snapshot in this render.
  const sortedSteps = useMemo(() => topoSort(project.steps), [project.steps]);
  const cycleIds = useMemo(() => {
    if (!Array.isArray(sortedSteps) && sortedSteps?.error) return detectCycles(project.steps);
    return [];
  }, [project.steps, sortedSteps]);
  const durationMap = useMemo(() => computeAllDurations(project), [
    // computeAllDurations only reads project.operations, .equipment, .materials, .compounds, .settings.
    // Narrowing the dep avoids spurious re-runs when project.name, .notes, .batchSizingConfig,
    // .steps (yield/name), .laborRates, .compositeOperations, or .updatedAt change.
    project.operations, project.equipment, project.materials, project.compounds, project.settings,
  ]);
  const massFlowResult = useMemo(() => {
    const sorted = Array.isArray(sortedSteps) ? sortedSteps : null;
    if (!sorted) return { stepBalances: [], vesselInventory: {}, stepOutputMassByStepId: {}, materialOutputMassByMaterialId: {}, error: "Cycle in steps" };
    return runMassFlow(project, sorted);
  }, [project, sortedSteps]);

  // Engines that require topological order get [] when a cycle exists; cycleIds still surfaces diagnostics.
  const sortedArr = useMemo(() => Array.isArray(sortedSteps) ? sortedSteps : [], [sortedSteps]);
  const costResult = useMemo(() => computeCosts(project, massFlowResult, durationMap), [project, massFlowResult, durationMap]);
  const schedule = useMemo(() => buildSchedule(project, sortedArr, durationMap), [project, sortedArr, durationMap]);
  const greenMetrics = useMemo(() => computeGreenMetrics(project, massFlowResult), [project, massFlowResult]);
  const batchResult = useMemo(() => computeBatchSizing(project, massFlowResult, greenMetrics, sortedArr), [project, massFlowResult, greenMetrics, sortedArr]);
  const simValue = useMemo(() => ({ durationMap, massFlowResult, sortedSteps: sortedArr, cycleIds, costResult, schedule, greenMetrics, batchResult }),
    [durationMap, massFlowResult, sortedArr, cycleIds, costResult, schedule, greenMetrics, batchResult]);

  return (
    <SimContext.Provider value={simValue}>
      <div style={{ display: "flex", flexDirection: "column", height: "100vh", fontFamily: "system-ui,-apple-system,'Segoe UI',sans-serif", overflow: "hidden", background: C.light, color: C.dark }}>
        <Toolbar project={project} dispatch={dispatch} undo={undo} redo={redo} canUndo={canUndo} canRedo={canRedo} loadProject={loadProject}
          onValidationResult={setLoadValidation}
        />
        <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
          <Sidebar project={project} dispatch={dispatch} activeTab={activeTab} setActiveTab={setActiveTab} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {activeTab === "process" && <ProcessEditorTab project={project} dispatch={dispatch} focusStepId={focusStepId} />}
            {activeTab === "materials" && <MaterialsTab project={project} dispatch={dispatch} />}
            {activeTab === "equipment" && <EquipmentTab project={project} dispatch={dispatch} />}
            {activeTab === "config" && <ConfigurationTab project={project} dispatch={dispatch} />}
            {activeTab === "overview" && <OverviewTab project={project} />}
            {activeTab === "balance" && <MassBalanceTab project={project} onJumpToStep={(stepId) => { setActiveTab("process"); setFocusStepId(stepId); }} />}
            {activeTab === "gantt" && <GanttTab project={project} />}
            {activeTab === "cost" && <CostTab project={project} />}
            {activeTab === "bom" && <BomTab project={project} />}
            {activeTab === "pfd" && <PfdTab project={project} dispatch={dispatch} />}
          </div>
        </div>
        <SummaryBar project={project} />
        {loadValidation && (
          <LoadValidationModal
            result={loadValidation.result}
            filename={loadValidation.filename}
            onClose={() => setLoadValidation(null)}
          />
        )}
      </div>
    </SimContext.Provider>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
